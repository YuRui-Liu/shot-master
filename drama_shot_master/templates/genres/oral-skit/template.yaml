# 题材模板 · 口播剧（共用骨架，研究 §3）
# 逐句对白只读、机位固定、按稿长切镜，字幕规范严格。
genre_id: oral-skit
display_name: 口播剧

# §0 硬约束：对白只读不改，台词是单一事实源
hard_constraints:
  - ⚠️ 对白逐句只读、零改动，分镜不得增删或润色台词
  - ⚠️ 字幕须与对白逐字一致，遵循字幕规范（断行/标点/时长）

identity:
  one_liner: 以口播稿为唯一事实源、逐句对白只读的固定机位短剧
  audience: 知识口播、情景对话、段子类内容的泛观众
  conflict_source:
    - 观点交锋
    - 情景误会
    - 角色立场差
    - 反转包袱
    - 一问一答张力

rhythm:
  open_3s: 用第一句台词直接抛出话题或包袱，无需画面铺垫
  open_30s: 通过对白快速建立人物立场与情景，进入主要论述/对话
  beat_density: 节奏由口播稿语句驱动，按稿长切镜，一句一镜或一段一镜

satisfaction_weights:
  信息密度: 35
  表达清晰: 30
  节奏感: 20
  包袱: 15

writing_rules:
  - 对白只读：以口播稿为单一事实源，分镜阶段台词零改动
  - 机位固定为主，靠景别切换与字幕推进，不做花哨运镜
  - 按稿长切镜：依据语句长度估算单镜时长（字数 ÷ 8 + 1 秒）
  - 字幕规范严格：与台词逐字一致、合理断行、标点准确
  - 一句或一个意群对应一个镜头，保证信息节奏清晰
  - 包袱/反转落在句末，配合景别或字幕强调

donts:
  - 不要改动、增删或润色对白台词（只读约束）
  - 不要用复杂运镜，机位以固定/微动为主
  - 不要字幕与台词不一致或断行混乱
  - 不要一镜塞过多语句导致信息节奏拖沓
  - 不要为画面好看牺牲口播稿的逐句对应关系

params_default:
  split_unit: shot
  duration_per_unit_sec: 6
  rhythm_driver: script
  grids_per_unit: 4

inner_slots:
  decompose_strategy: dialogue
  polish_style: neutral
