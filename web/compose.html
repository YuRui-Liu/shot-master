<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糯米AI · 智能转场 · Transition</title>
<link rel="stylesheet" href="tokens.css">
<style>
  /* 作为壳内容页：自带标题栏/侧栏由 web/app.html 壳(糯米 AI)统一提供，本页不重复。 */
  body { overflow-x: hidden; }

  /* 工作区 */
  .work { padding: 24px 28px 36px; }
  .work-head {
    display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
    max-width: 1280px; flex-wrap: wrap;
  }
  .work-head h1 { margin: 0; font-size: 22px; background: linear-gradient(135deg, var(--blue), var(--mauve)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .work-head .sub { font-size: 12px; color: var(--faint); letter-spacing: .5px; align-self: flex-end; padding-bottom: 4px; }
  .head-spacer { flex: 1; }

  /* 标题行之后的切换/工具条（集选择 + 列目录/外部导入/添加片段） */
  .work-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; max-width: 1280px; flex-wrap: wrap; }
  .ep-select { min-width: 170px; }

  /* 工具栏按钮：分析(主CTA) / 渲染 拆开（一主CTA原则） */
  .btn-analyze {
    background: linear-gradient(135deg, var(--blue), var(--periw)); color: #06122a;
    font-weight: 700; white-space: nowrap; box-shadow: 0 0 18px rgba(74,158,255,.28);
  }
  .btn-render {
    background: rgba(74,158,255,.08); color: var(--blue);
    border: 1px solid var(--blue-dim); font-weight: 600; white-space: nowrap;
  }
  .btn-render:hover { filter: none; background: rgba(74,158,255,.16); }
  .btn-soft {
    background: var(--panel2); color: var(--fg2); border: 1px solid var(--border);
    font-weight: 500; white-space: nowrap;
  }
  .btn-soft:hover { filter: none; border-color: var(--mauve); color: var(--fg); }

  /* 主体卡：走马灯 + (预览 / 检查器) + 渲染条 */
  .compose { max-width: 1280px; display: flex; flex-direction: column; gap: 14px; }

  /* ===== 片段走马灯 ClipStrip ===== */
  .strip-card { padding: 14px 16px 12px; }
  .strip-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .strip-hd .h { font-size: 12.5px; color: var(--fg2); font-weight: 600; }
  .strip-hd .cnt { font-size: 11.5px; color: var(--faint); }
  .strip-hd .ana {
    margin-left: auto; font-size: 11px; color: var(--mauve);
    background: rgba(138,127,217,.14); border: 1px solid #4a3d6e;
    border-radius: 10px; padding: 2px 10px;
  }
  .strip-hd .btn-trim-all {
    font-size: 11px; color: var(--blue); background: rgba(74,158,255,.1);
    border: 1px solid var(--blue-dim); border-radius: 10px; padding: 3px 11px;
    cursor: pointer; white-space: nowrap;
  }
  .strip-hd .btn-trim-all:hover:not(:disabled) { background: rgba(74,158,255,.2); }
  .strip-hd .btn-trim-all:disabled { opacity: .4; cursor: not-allowed; }
  .strip { display: flex; align-items: stretch; gap: 0; overflow-x: auto; padding-bottom: 8px; scroll-behavior: smooth; }
  .strip::-webkit-scrollbar { height: 6px; }
  .strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* 片段卡 */
  .clip {
    width: 122px; flex-shrink: 0; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--field); overflow: hidden;
    cursor: pointer; position: relative; transition: border-color .14s, box-shadow .14s;
  }
  .clip.sel { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue), 0 0 18px rgba(74,158,255,.2); }
  .clip.dropped { opacity: .42; }
  .clip.dropped .thumb::after {
    content: "已剔除"; position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    background: rgba(8,8,18,.55); color: var(--err); font-size: 12px; font-weight: 700;
  }
  .clip .thumb { height: 142px; position: relative; background: linear-gradient(135deg, #1a3060, #2a1850); }
  .clip.c2 .thumb { background: linear-gradient(135deg, #281020, #1a1030); }
  .clip.c3 .thumb { background: linear-gradient(135deg, #102820, #1a2028); }
  .clip.c4 .thumb { background: linear-gradient(135deg, #201a10, #281818); }
  .clip .keep {
    position: absolute; top: 6px; left: 6px; width: 20px; height: 20px; border-radius: 5px;
    background: rgba(8,8,18,.6); border: 1px solid var(--blue);
    display: flex; align-items: center; justify-content: center; color: var(--blue); font-size: 12px;
  }
  .clip.dropped .keep { border-color: var(--faint); color: var(--faint); }
  .clip .grip { position: absolute; top: 6px; right: 26px; color: var(--muted); font-size: 13px; opacity: .7; }
  /* 删除片段：真正从走马灯移除该 clip（与「剔除/dropped 置灰保留」区分）。 */
  .clip .del {
    position: absolute; top: 5px; right: 5px; width: 18px; height: 18px; border-radius: 5px;
    background: rgba(8,8,18,.6); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 12px; line-height: 1; cursor: pointer; z-index: 7;
    transition: color .14s, border-color .14s, background .14s;
  }
  .clip .del:hover { color: var(--err); border-color: var(--err); background: rgba(224,90,90,.16); }
  .clip .shots {
    position: absolute; bottom: 34px; left: 6px; font-size: 9px; color: var(--blue);
    background: rgba(74,158,255,.18); border: 1px solid var(--blue-dim); border-radius: 3px; padding: 1px 5px;
  }
  .clip .meta { padding: 5px 7px; background: rgba(13,13,30,.85); }
  .clip .c-name { font-size: 11px; font-weight: 600; color: var(--fg2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .clip .c-dur { font-size: 9px; color: var(--faint); margin-top: 1px; }
  .clip .thumb-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .clip .thumb-vid { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; background: transparent; }
  .clip .trimmed {
    position: absolute; bottom: 34px; right: 6px; font-size: 8.5px; color: var(--warn);
    background: rgba(224,168,90,.16); border: 1px solid #6b5520; border-radius: 3px; padding: 1px 5px;
  }
  .clip .kindbadge {
    position: absolute; top: 6px; left: 30px; font-size: 8.5px; color: var(--mauve);
    background: rgba(138,127,217,.16); border: 1px solid #4a3d6e; border-radius: 3px; padding: 0 5px; line-height: 16px;
  }
  .clip-idx {
    position: absolute; top: 6px; left: 30px; font-size: 9.5px; font-weight: 700;
    color: var(--fg); background: rgba(8,9,16,.65); border-radius: 3px; padding: 0 6px; line-height: 17px;
  }
  .clip .kindbadge { left: 54px; }   /* 有编号时右移 */
  /* 外部片段标记：虚线边框 + warn 色，明确标识非项目生成片 */
  .clip.ext { border-style: dashed; border-color: var(--warn); }
  .extbadge {
    position: absolute; bottom: 34px; right: 6px; font-size: 8px; color: var(--warn);
    background: rgba(224,168,90,.16); border: 1px solid #6b5520; border-radius: 3px; padding: 0 5px; line-height: 16px;
  }
  .clip.add { border-style: dashed; background: transparent; }
  .clip.add .thumb { background: none; display: flex; align-items: center; justify-content: center; color: var(--faint); font-size: 26px; }

  /* ===== 子3：片段卡左右拖拽把手（设 in/out 生效点）+ 裁切遮罩 ===== */
  .clip .trimbar { position: absolute; left: 0; right: 0; bottom: 0; top: 0; pointer-events: none; z-index: 3; }
  /* 被裁掉的头/尾用半透明黑遮罩示意 */
  .clip .trimbar .crop {
    position: absolute; top: 0; bottom: 0; background: rgba(8,8,18,.62);
    border-top: 0; pointer-events: none;
  }
  .clip .trimbar .crop.l { left: 0; }
  .clip .trimbar .crop.r { right: 0; }
  /* 可拖拽把手（仅视频；底部一条贴在缩略图下沿，覆盖整高便于抓取） */
  .clip .thandle {
    position: absolute; top: 0; bottom: 0; width: 9px; background: var(--blue);
    cursor: ew-resize; pointer-events: auto; z-index: 5; opacity: .85;
    box-shadow: 0 0 6px rgba(74,158,255,.5);
  }
  .clip .thandle:hover { opacity: 1; }
  .clip .thandle.l { border-radius: 3px 0 0 3px; }
  .clip .thandle.r { border-radius: 0 3px 3px 0; }
  .clip .thandle::after {
    content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 2px; height: 14px; background: rgba(255,255,255,.85); border-radius: 1px;
  }
  /* 子1：AI 建议裁剪点（虚线指示 + 数值），在缩略图上以虚线竖条标出 auto_in/auto_out */
  .clip .autoline {
    position: absolute; top: 0; bottom: 22px; width: 0; pointer-events: none; z-index: 4;
    border-left: 1.5px dashed var(--mauve);
  }
  .clip .autoline .v {
    position: absolute; top: 2px; font-size: 7.5px; color: var(--mauve);
    background: rgba(138,127,217,.22); border: 1px solid #4a3d6e; border-radius: 2px;
    padding: 0 3px; white-space: nowrap; line-height: 1.5;
  }
  .clip .autoline.ai-in .v { left: 1px; }
  .clip .autoline.ai-out .v { right: 1px; }
  /* 子1：单卡 AI 建议条（采纳/锁定），覆盖在 meta 上方 */
  .clip .suggest {
    position: absolute; left: 0; right: 0; bottom: 22px; z-index: 6;
    display: flex; align-items: center; gap: 4px; padding: 2px 5px;
    background: rgba(138,127,217,.92); font-size: 8.5px; color: #0b0a1a; font-weight: 700;
  }
  .clip .suggest .lab { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .clip .suggest .sg-btn {
    cursor: pointer; pointer-events: auto; padding: 0 4px; border-radius: 3px;
    background: rgba(11,10,26,.25); border: 1px solid rgba(11,10,26,.4);
  }
  .clip .suggest .sg-btn:hover { background: rgba(11,10,26,.45); }
  .clip.locktrim .meta { box-shadow: inset 0 0 0 1px var(--warn); }

  /* 切口连接器 conn = 转场切口 */
  .conn {
    width: 70px; flex-shrink: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px; cursor: pointer; align-self: center; position: relative;
  }
  .conn .node {
    width: 30px; height: 30px; border-radius: 50%; border: 1px dashed var(--faint);
    background: var(--navy); display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 13px; transition: border-color .14s, color .14s;
  }
  .conn .lbl { font-size: 9px; color: var(--muted); white-space: nowrap; }
  .conn .score { font-size: 8.5px; color: var(--faint); }
  .conn .tagb { font-size: 8px; border-radius: 3px; padding: 0 4px; line-height: 1.4; }
  /* 状态：AI 推荐(紫) / 分析中(脉冲) / 手动(灰) / 锁定(橙) / 硬切(实线方块) / 选中(蓝) */
  .conn.ai .node { border-style: solid; border-color: var(--mauve); color: var(--mauve); }
  .conn.ai .lbl { color: var(--mauve); }
  .conn.ai .tagb { color: var(--mauve); border: 1px solid #4a3d6e; background: rgba(138,127,217,.16); }
  .conn.analyzing .node { border-style: solid; border-color: var(--mauve); color: var(--mauve); animation: pulse 1s infinite; }
  .conn.manual .node { border-style: solid; border-color: var(--faint); color: var(--fg2); }
  .conn.manual .tagb { color: var(--fg2); border: 1px solid var(--border); background: var(--panel2); }
  .conn.locked .node { border-style: solid; border-color: var(--warn); color: var(--warn); }
  .conn.locked .lbl { color: var(--warn); }
  .conn.locked .tagb { color: var(--warn); border: 1px solid #6b5520; background: rgba(224,168,90,.14); }
  .conn.locked .lock { position: absolute; top: -3px; right: 16px; font-size: 9px; color: var(--warn); }
  .conn.cut .node { border-style: solid; }
  .conn.sel .node { box-shadow: 0 0 0 2px var(--blue), 0 0 12px rgba(74,158,255,.45); }
  @keyframes pulse { 0%,100% { opacity: .4; } 50% { opacity: 1; } }

  /* ===== 下部：预览 + 检查器 ===== */
  .lower { display: flex; gap: 14px; align-items: stretch; }
  .preview { flex: 1; min-width: 0; padding: 14px 16px; display: flex; flex-direction: column; }
  .player {
    flex: 1; min-height: 220px; background: #000; border: 1px solid var(--border-lo);
    border-radius: var(--radius-sm); position: relative;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .player .pv-tag { position: absolute; top: 8px; left: 10px; font-size: 10.5px; color: var(--muted); }
  .player .play {
    width: 48px; height: 48px; border-radius: 50%; background: rgba(74,158,255,.18);
    border: 1px solid var(--blue); display: flex; align-items: center; justify-content: center;
    color: var(--blue); font-size: 18px;
  }
  /* trim 裁切条 */
  .trim { margin-top: 12px; }
  .trim .tl-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--faint); margin-bottom: 5px; }
  .scrub {
    height: 38px; border-radius: var(--radius-sm); position: relative; overflow: hidden;
    background: repeating-linear-gradient(90deg, #1a2848 0 24px, #22305a 24px 48px);
    border: 1px solid var(--border);
  }
  .scrub .keepzone { position: absolute; top: 0; bottom: 0; left: 14%; right: 18%; background: rgba(74,158,255,.12); border-left: 2px solid var(--blue); border-right: 2px solid var(--blue); }
  .scrub .handle { position: absolute; top: 0; bottom: 0; width: 8px; background: var(--blue); cursor: ew-resize; }
  .scrub .handle.l { left: 14%; border-radius: 3px 0 0 3px; }
  .scrub .handle.r { right: 18%; border-radius: 0 3px 3px 0; }
  .trim .hint { font-size: 10.5px; color: var(--faint); margin-top: 6px; }

  /* 检查器 inspector */
  .inspector { width: 280px; flex-shrink: 0; padding: 14px 16px; display: flex; flex-direction: column; gap: 13px; }
  .insp-hd { font-size: 13.5px; font-weight: 700; color: var(--fg); display: flex; align-items: center; gap: 8px; }
  .field label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; }
  .field .select {
    background: var(--field); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 8px 11px; color: var(--fg); font-size: 12.5px; display: flex; justify-content: space-between; cursor: pointer;
  }
  .field .select:hover { border-color: var(--mauve); }
  .field input[type="number"] { width: 100%; }
  /* 子2：转场类型 <select> + <optgroup>（通用/方向/特效/切） */
  .field select.fx-select {
    width: 100%; background: var(--field); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 11px; color: var(--fg);
    font-size: 12.5px; cursor: pointer; appearance: auto;
  }
  .field select.fx-select:hover { border-color: var(--mauve); }
  .field select.fx-select optgroup { color: var(--mauve); font-style: normal; font-weight: 700; }
  .field select.fx-select option { color: var(--fg); background: var(--panel); font-weight: 400; }

  /* CV 评分拆解卡 */
  .scorecard { background: var(--field); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 12px; }
  .scorecard .row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .scorecard .k { font-size: 10.5px; color: var(--muted); width: 46px; }
  .scorecard .bar { flex: 1; height: 6px; border-radius: 3px; background: var(--border); position: relative; overflow: hidden; }
  .scorecard .bar i { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 3px; background: linear-gradient(90deg, var(--blue), var(--periw)); }
  .scorecard .v { font-size: 10.5px; color: var(--fg2); width: 32px; text-align: right; font-variant-numeric: tabular-nums; }
  .scorecard .total { font-size: 11px; color: var(--mauve); margin-top: 3px; }

  .chiprow { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    font-size: 11.5px; color: var(--fg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 5px 10px; cursor: pointer; background: var(--panel2);
  }
  .chip:hover { border-color: var(--mauve); color: var(--fg); }
  .chip.on { border-color: var(--blue); color: var(--blue); background: rgba(74,158,255,.1); }
  .lock-toggle { font-size: 11.5px; color: var(--fg2); display: flex; align-items: center; gap: 7px; cursor: pointer; }
  .insp-foot { margin-top: auto; }

  /* 渲染条 */
  .renderbar { display: flex; align-items: center; gap: 12px; padding: 11px 16px; }
  .progress { flex: 1; height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; }
  .progress .pf { height: 100%; width: 0%; background: linear-gradient(90deg, var(--blue), var(--periw)); transition: width .3s; }
  .renderbar .st { font-size: 11.5px; color: var(--muted); white-space: nowrap; }
  .renderbar .st.act { color: var(--mauve); }

  .toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px);
    background: var(--panel); border: 1px solid var(--mauve); color: var(--fg);
    padding: 10px 18px; border-radius: var(--radius); font-size: 13px; opacity: 0;
    transition: opacity .2s, transform .2s; z-index: 80; box-shadow: 0 10px 28px rgba(0,0,0,.5);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== 外部导入下拉面板 ===== */
  .ext-import-wrap { position: relative; display: inline-block; }
  .ext-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: var(--panel);
    border: 1px solid #3a3d5c;
    border-radius: 8px;
    width: 280px;
    box-shadow: 0 8px 28px rgba(0,0,0,.55);
    z-index: 200;
  }
  .ext-dropdown.open { display: block; }
  .ext-dropdown-head {
    padding: 8px 12px 6px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .5px;
    border-bottom: 1px solid #2a2c40;
  }
  .ext-history-list { padding: 6px 8px 4px; }
  .ext-history-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 6px; border-radius: 5px; cursor: pointer;
    font-size: 11px; color: var(--muted);
    white-space: nowrap; overflow: hidden;
  }
  .ext-history-item:hover { background: var(--panel2); }
  .ext-history-item .eh-path {
    flex: 1; overflow: hidden; text-overflow: ellipsis;
  }
  .ext-history-item .eh-hint { font-size: 10px; color: var(--blue); opacity: .7; flex-shrink: 0; }
  .ext-history-empty { padding: 6px 8px; font-size: 11px; color: var(--faint); }
  .ext-dropdown-input-row {
    display: flex; gap: 6px; align-items: center;
    padding: 6px 8px 8px;
    border-top: 1px solid #2a2c40;
  }
  .ext-dropdown-input-row input {
    flex: 1; font-size: 11px; padding: 5px 8px;
  }
  .ext-dropdown-input-row .btn-import {
    background: var(--blue); color: #06122a;
    border: none; border-radius: 6px;
    padding: 5px 12px; font-size: 11px;
    font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .ext-dropdown-input-row .btn-import:hover { filter: brightness(1.15); }
</style>
</head>
<body>
<div class="work">
  <div class="work-head">
    <h1>智能转场</h1><span class="sub">Transition</span>
    <span class="head-spacer"></span>
    <!-- 主 CTA：智能转场=CV 分析触发（不直接出片） -->
    <button class="btn-analyze" data-act="analyze">✦ 一键智能转场</button>
    <!-- 拆出的渲染：分析→审阅→再生成 -->
    <button class="btn-render" data-act="render">⬇ 生成成片</button>
  </div>

  <!-- 标题行之后：集选择 + 生成目录/外部导入/添加片段 工具条 -->
  <div class="work-toolbar">
    <select class="ep-select">
      <option>第1集 · 成片</option>
      <option>第2集 · 成片</option>
      <option>预告片</option>
    </select>
    <span class="head-spacer"></span>
    <input type="text" id="subDir" class="ep-select" style="min-width:120px;max-width:160px"
           placeholder="子目录(如 video)" title="GET /project/clips 的 sub 参数（生成视频子目录）">
    <button class="btn-soft" data-act="listdir">⟳ 列出生成目录</button>
    <div class="ext-import-wrap">
      <button class="btn-soft" id="btnAddExt" title="从外部路径导入片段（不持久落盘，关软件丢失）">＋ 外部导入 ▾</button>
      <div class="ext-dropdown" id="extDropdown">
        <div class="ext-dropdown-head">最近使用</div>
        <div class="ext-history-list" id="extHistoryList">
          <div class="ext-history-empty">暂无历史记录</div>
        </div>
        <div class="ext-dropdown-input-row">
          <input type="text" id="extPathInput" placeholder="输入绝对路径…" />
          <button class="btn-import" id="btnDoImport">导入</button>
        </div>
      </div>
    </div>
    <button class="btn-soft" data-act="addclip">＋ 添加片段</button>
  </div>

  <div class="compose">

        <span class="ana" id="anaState">未分析 · 点「一键智能转场」跑 CV 推荐</span>
        <!-- 子1：一键采纳全部 AI 裁剪建议（auto_in/out → in_point/out_point）；无建议时禁用 -->
        <button class="btn-trim-all" id="adoptAll" data-act="adoptall" disabled
                title="把每个片段的 AI 建议裁剪点采纳为生效入/出点">✓ 采纳全部裁剪建议</button>
      </div>

    <!-- 下部：预览 + 检查器 -->
    <div class="lower">

            <span style="display:flex;gap:10px;align-items:center">
              <span id="trimDurEnd">0:11.0</span>
              <button class="btn-soft" style="padding:3px 10px;font-size:11px" data-act="trim">✂ 裁剪</button>
            </span>

          <div class="hint">拖动蓝色手柄裁掉片段头尾瑕疵帧（仅存入/出点，渲染时 ffmpeg -ss/-to 实裁）</div>

      <span class="st">归一化 1080p/30fps · 保留原音(acrossfade)</span>

<div class="toast" id="toast"></div>

<script>
/* ===== 壳内容页：API 基址从 URLSearchParams 读，默认 18430/18450 ===== */
const SW_API    = new URLSearchParams(location.search).get('sw')    || 'http://127.0.0.1:18430'; // screenwriter_agent
const MEDIA_API = new URLSearchParams(location.search).get('media') || 'http://127.0.0.1:18450'; // media_agent
const PROJECT   = new URLSearchParams(location.search).get('project') || '';                      // 壳已转发 ?project=
/* 转场接 media_agent /transition（同步 JSON，非 SSE）：
     POST {MEDIA_API}/transition/analyze {composition:{clips:[...]}} → {composition}
       回填每个未锁定片段的 auto_transition/auto_duration/cv_scores（cv_scores={hist,feature,motion,score}）。
       注意：切口转场参数挂在「前一个片段」上（clip[i].auto_transition = i→i+1 的转场）。
     POST {MEDIA_API}/transition/render {composition, out_path} → {output}（成片路径）。
   失败：FastAPI 抛 {detail} 或统一 {error:{code,message,hint}}，均显 hint/detail。 */

/* ===== 列生成目录契约（后端待实现）=====
   GET {MEDIA_API}/project/clips?project=<dir>&sub=<可选子目录>
     → {clips:[{name,path,kind:'video'|'image',size}]}
   该端点当前 media_agent 尚未实现（projects.py 只有 list/open/create，
   projectx.py 只有 /project/overview）。本页按契约请求：
     - 命中(200) → 用真实片段替换硬编码；
     - 404/连接失败 → 保留内置 stub 片段 + TODO 提示，绝不假装成功。
   sub 默认空（项目根）；常用如 "video" 指生成视频子目录。 */
const CLIPS_SUB_DEFAULT = "video";   // 视频成片常落在 <project>/video（可在输入框改）
let clipsSub = CLIPS_SUB_DEFAULT;
let clipsLoaded = false;             // 是否已从后端成功拉到真实片段

/* 本地媒体 URL 助手（替代 file://，因 http 页面禁 file://）。
   走 media_agent GET /file?path=…[&project=…]：绝对路径直读，相对路径附 project 解析。
   本页项目目录变量名为 PROJECT。 */
function mediaUrl(p) {
  if (!p) return "";
  if (/^(https?:|data:|blob:)/.test(p)) return p;
  var u = MEDIA_API + "/file?path=" + encodeURIComponent(p);
  if (PROJECT && !/^([a-zA-Z]:[\\/]|\/|\\\\)/.test(p)) u += "&project=" + encodeURIComponent(PROJECT);
  return u;
}
/* 片段缩略图/媒体 src（保留原函数名，内部改走 mediaUrl 消除色块/空白）。 */
function fileSrc(path) { return mediaUrl(path); }

/* 视频预览 src：走 /preview（H.264 mp4 会转成 QtWebEngine 能播的 WebM）。
   QtWebEngine 本构建不带 H.264/AAC 解码，直接喂 mp4 会 MEDIA_ERR_SRC_NOT_SUPPORTED。 */
function previewSrc(p) {
  if (!p) return "";
  if (/^(https?:|data:|blob:)/.test(p)) return p;
  var u = MEDIA_API + "/preview?path=" + encodeURIComponent(p);
  if (PROJECT && !/^([a-zA-Z]:[\\/]|\/|\\\\)/.test(p)) u += "&project=" + encodeURIComponent(PROJECT);
  return u;
}

/* 在系统文件管理器中定位本地文件：经壳中继 open.path → Qt filepick.openPath。
   传**本地文件路径**(非 http URL)。QtWebEngine 里 <a target=_blank> 不会开新窗，故走桥。 */
function openInShell(absPath) {
  if (!absPath) return;
  try { window.parent.postMessage({ type: "open.path", path: absPath }, "*"); }
  catch (_) { try { navigator.clipboard.writeText(absPath); } catch (__) {} }
}

/* 视频片段缩略图：无现成抽帧端点 → 若存在同名图(.jpg/.png/.webp)用首帧图；
   否则返回空（renderStrip 退化为「文件名卡片」，不造假抽帧）。 */
const _THUMB_EXT = ["jpg", "jpeg", "png", "webp"];
function videoThumbSrc(cl) {
  if (!cl) return "";
  if (cl.kind === "image") return fileSrc(cl.path);
  // 视频：尝试同名图（约定 <stem>.<ext> 与视频同目录）
  if (cl.thumb) return fileSrc(cl.thumb);           // 后端若给了 thumb 字段优先
  const p = String(cl.path || "").replace(/\\/g, "/");
  const dot = p.lastIndexOf(".");
  if (dot < 0) return "";
  const stem = p.slice(0, dot);
  // 只能给 <img> 一个候选 + onerror 兜底（浏览器无法探测多扩展名存在性）
  return fileSrc(stem + "." + _THUMB_EXT[0]);
}

/* ===== 预览播放器：在 .player 容器中创建/切换视频播放 ===== */
function playPreview(cl) {
  if (!cl || cl.kind !== "video" || !cl.path) {
    toast("请先选中一个视频片段");
    return;
  }
  const pvBox = document.querySelector(".player");
  if (!pvBox) return;

  // 清理旧视频/错误提示
  const oldVid = pvBox.querySelector("video");
  if (oldVid) { oldVid.pause(); oldVid.remove(); }
  const oldErr = pvBox.querySelector(".vid-err");
  if (oldErr) oldErr.remove();
  const playIcon = pvBox.querySelector(".play");
  if (playIcon) playIcon.style.display = "none";

  // 构造 src：路径归一化反斜杠；视频走 /preview（转 WebM 才能在 QtWebEngine 播放）
  const rawPath = (typeof cl.path === "string" ? cl.path : String(cl.path || "")).replace(/\\/g, "/");
  const src = previewSrc(rawPath);

  const vid = document.createElement("video");
  vid.src = src;
  vid.controls = true;
  vid.autoplay = true;
  vid.preload = "auto";
  vid.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:contain;border-radius:8px;z-index:1;";

  vid.onerror = function () {
    var code = vid.error ? vid.error.code : null;
    var codeLabel = ({1:"MEDIA_ERR_ABORTED(1)", 2:"MEDIA_ERR_NETWORK(2)", 3:"MEDIA_ERR_DECODE(3)", 4:"MEDIA_ERR_SRC_NOT_SUPPORTED(4)"})[code] || ("code:" + (code != null ? code : "?"));
    vid.remove();
    if (pvBox.querySelector(".vid-err")) return;
    var d = document.createElement("div");
    d.className = "vid-err";
    d.style.cssText = "position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:11px;z-index:2;gap:5px;background:rgba(0,0,0,.72);";
    d.innerHTML =
      '<div style="font-size:12px;color:var(--err);font-weight:600">视频无法播放</div>' +
      '<div style="font-size:10px;color:var(--warn)">' + codeLabel + '</div>' +
      '<div style="font-size:9.5px;word-break:break-all;max-width:92%;color:var(--faint);line-height:1.4">' + esc(rawPath) + '</div>' +
      '<div style="margin-top:3px"><span onclick="openInShell(\'' + rawPath.replace(/'/g, "\\'") + '\')" style="cursor:pointer;color:var(--blue);text-decoration:underline;font-size:12px">在文件管理器中打开</span></div>' +
      '<div style="font-size:9px;color:var(--faint);margin-top:3px">Tips: 预览经 /preview 转 WebM；若仍失败请确认 media_agent 已重启且 ffmpeg 可用</div>';
    pvBox.appendChild(d);
    if (playIcon) playIcon.style.display = "";
  };
  pvBox.appendChild(vid);

  var pvTag = document.getElementById("pvTag");
  if (pvTag) pvTag.textContent = "预览：" + (cl.name || "片段") + "（也可切「整片预览」）";
}

/* 统一 GET JSON：解析 FastAPI {detail} 或统一 {error:{hint}}；区分 404 便于降级。 */
async function getJSON(url) {
  let resp;
  try {
    resp = await fetch(url);
  } catch (e) {
    const err = new Error("无法连接 media_agent（请确认服务已启动）");
    err.status = 0;
    throw err;
  }
  let data = null;
  try { data = await resp.json(); } catch (e) { /* ignore */ }
  if (!resp.ok) {
    const hint = (data && ((data.error && (data.error.hint || data.error.message)) || data.detail)) || `HTTP ${resp.status}`;
    const err = new Error(hint);
    err.status = resp.status;
    throw err;
  }
  return data || {};
}

/* ===== 转场词汇表（子2：~20 种，分四类，与后端 transition_render.TRANSITIONS / ffmpeg xfade 名一致） =====
   每项 {fx, label, cat, icon, dir}：
     fx   = ffmpeg xfade 名（cut 为硬切，render 时降级 none/0 时长）
     cat  = general(通用) | direction(方向) | fx(特效) | cut(切)
     icon = 走马灯节点静态图标（零渲染，子3 用）
     dir  = 方向类的箭头方向（用于节点显示）。
   分类顺序即检查器 <optgroup> 顺序。 */
const TRANSITIONS = [
  // 通用
  { fx: "dissolve",   label: "叠化 (dissolve)",     cat: "general",   icon: "◈" },
  { fx: "fade",       label: "淡入淡出 (fade)",     cat: "general",   icon: "○" },
  { fx: "fadeblack",  label: "淡入黑 (fadeblack)",  cat: "general",   icon: "●" },
  { fx: "fadewhite",  label: "淡入白 (fadewhite)",  cat: "general",   icon: "◌" },
  // 方向
  { fx: "smoothleft",  label: "推左 (smoothleft)",  cat: "direction", icon: "⇠", dir: "left" },
  { fx: "smoothright", label: "推右 (smoothright)", cat: "direction", icon: "⇢", dir: "right" },
  { fx: "smoothup",    label: "推上 (smoothup)",    cat: "direction", icon: "⇡", dir: "up" },
  { fx: "smoothdown",  label: "推下 (smoothdown)",  cat: "direction", icon: "⇣", dir: "down" },
  { fx: "slideleft",   label: "滑左 (slideleft)",   cat: "direction", icon: "←", dir: "left" },
  { fx: "slideright",  label: "滑右 (slideright)",  cat: "direction", icon: "→", dir: "right" },
  { fx: "wipeleft",    label: "擦左 (wipeleft)",    cat: "direction", icon: "◁", dir: "left" },
  { fx: "wiperight",   label: "擦右 (wiperight)",   cat: "direction", icon: "▷", dir: "right" },
  // 特效
  { fx: "circleopen",  label: "圆开 (circleopen)",  cat: "fx", icon: "◎" },
  { fx: "circleclose", label: "圆闭 (circleclose)", cat: "fx", icon: "⊙" },
  { fx: "radial",      label: "径向 (radial)",      cat: "fx", icon: "✺" },
  { fx: "pixelize",    label: "像素化 (pixelize)",  cat: "fx", icon: "▦" },
  { fx: "zoomin",      label: "缩放推近 (zoomin)",  cat: "fx", icon: "⊕" },
  { fx: "diagtl",      label: "对角 (diagtl)",      cat: "fx", icon: "◤" },
  { fx: "hlslice",     label: "百叶窗 (hlslice)",   cat: "fx", icon: "▤" },
  // 切
  { fx: "cut",         label: "硬切 (cut)",         cat: "cut", icon: "▭" },
];
const CAT_LABEL = { general: "通用", direction: "方向", fx: "特效", cut: "切" };
const CAT_ORDER = ["general", "direction", "fx", "cut"];
const TX_BY_FX = {};
TRANSITIONS.forEach((t) => { TX_BY_FX[t.fx] = t; });

/* fx → 中文标签（沿用旧 fxLabel 调用点） */
const FX_LABEL = {};
TRANSITIONS.forEach((t) => { FX_LABEL[t.fx] = t.label; });
function fxLabel(fx) { return FX_LABEL[fx] || (fx ? `${fx}` : "叠化 (dissolve)"); }
/* fx → 短名（节点/走马灯用，去掉英文括号部分） */
function fxShortName(fx) {
  const t = TX_BY_FX[fx];
  if (!t) return fx || "叠化";
  return t.label.split(" (")[0];
}
/* fx → 节点图标（子3 静态映射，方向类带方向语义） */
function fxIcon(fx) {
  const t = TX_BY_FX[fx];
  return t ? t.icon : "◈";
}
/* fx → 方向中文（仅方向类有） */
const DIR_LABEL = { left: "←左", right: "→右", up: "↑上", down: "↓下" };
function fxDir(fx) {
  const t = TX_BY_FX[fx];
  return (t && t.dir) ? DIR_LABEL[t.dir] : "";
}
function catFor(total) {
  if (total >= 0.7) return "高匹配 → 万能类（叠化）";
  if (total >= 0.4) return "中匹配+运动 → 方向类（推进）";
  return "低匹配 → 创意/硬切";
}

/* ===== stub 数据：片段 + 切口（cut 在两片段之间）=====
   clips 用 let：列出生成目录(GET /project/clips)命中后追加真实片段（不覆盖已加载的）。
   每片段含 trimIn/trimOut（秒，null=未裁）→ 渲染时 ffmpeg -ss/-to 实裁。 */
let clips = [];
/* 切口状态：ai | analyzing | manual | locked | cut；含 CV 评分拆解（hist 直方图 / sift 结构 / flow 光流）。 */
const cuts = [];

let selClip = 2;     // 当前预览片段
let selCut  = "c12"; // 当前检查器切口

/* ===== 组装 composition（从 ClipStrip 当前状态）=====
   切口转场挂在「前一个 kept 片段」上：clip[i].user/auto_transition = i→i+1 的转场。 */
function buildComposition() {
  const kept = clips.filter((cl) => cl.kept);
  const reelClips = clips.map((cl, idx) => {
    // 找该片段「之后」的切口（a===cl.id），其转场参数写到本 clip 上
    const cut = cuts.find((c) => c.a === cl.id);
    const rc = {
      clip_id: String(cl.id),
      path: cl.path || cl.name,
      keep: !!cl.kept,
      duration: cl.durSec || 0,
    };
    // trim 实裁：生效入/出点交给后端，render 时 ffmpeg -ss/-to 真实裁切
    // （CompositionModel.trimmed_duration / transition_render 已支持 in_point/out_point）
    // 子1/子3 共用字段：trimIn/trimOut = in_point/out_point（生效值，子1采纳 + 子3拖拽都写这里）。
    if (cl.trimIn != null) rc.in_point = cl.trimIn;
    if (cl.trimOut != null) rc.out_point = cl.trimOut;
    // 子1：回传 AI 建议值（auto_in/auto_out），便于后端在已有建议基础上跳过/对照（向后兼容：缺省 None）。
    if (cl.autoIn != null) rc.auto_in = cl.autoIn;
    if (cl.autoOut != null) rc.auto_out = cl.autoOut;
    if (cut) {
      const isCut = cut.fx === "cut";
      rc.locked = cut.status === "locked";
      if (cut.status === "manual" || cut.status === "locked" || isCut) {
        rc.user_transition = cut.fx;                  // 手动/锁定/硬切 → user 字段
        rc.user_duration = isCut ? 0.0 : cut.dur;
      } else {
        rc.auto_transition = cut.fx;
        rc.auto_duration = cut.dur;
      }
      if (cut.scores && Object.keys(cut.scores).length) {
        rc.cv_scores = {
          hist: cut.scores.hist, feature: cut.scores.sift,
          motion: cut.scores.motion != null ? cut.scores.motion : (1 - (cut.scores.flow || 0)),
          score: cut.total,
        };
      }
    }
    return rc;
  });
  // Read fps/width/height from first kept video clip real metadata; fallback 1920x1080/30fps
  let fps = 30, width = 1920, height = 1080;
  for (const cl of kept) {
    if (cl.kind !== "image" && cl.fps && cl.w && cl.h) {
      fps = cl.fps; width = cl.w; height = cl.h; break;
    }
  }
  return { clips: reelClips, fps, width, height, output_prefix: PROJECT || "compose" };
}

/* ===== 把后端 composition 回填到页面 cuts/clips（更新圆点匹配分/效果 + 片段时长） ===== */
function applyComposition(comp) {
  if (!comp || !comp.clips) return;
  const byId = {};
  comp.clips.forEach((rc) => { byId[String(rc.clip_id)] = rc; });
  // P1-1: CV 分析后端可能返回 probe 检测到的真实时长，回填到 clips
  comp.clips.forEach((rc) => {
    const cl = clips.find((c) => String(c.id) === String(rc.clip_id));
    if (!cl) return;
    if (rc.duration != null && rc.duration > 0 && Math.abs(cl.durSec - rc.duration) > 0.01) {
      cl.durSec = rc.duration;
      cl.dur = durLabel(rc.duration);
    }
    // 子1：回填 AI 建议裁剪点（auto_in/auto_out）→ 待用户采纳才写 trimIn/trimOut（生效值不被覆盖）。
    cl.autoIn = (rc.auto_in != null) ? rc.auto_in : null;
    cl.autoOut = (rc.auto_out != null) ? rc.auto_out : null;
  });
  cuts.forEach((cut) => {
    const rc = byId[String(cut.a)];               // 切口参数在前一个片段上
    if (!rc) return;
    const fx = rc.user_transition || rc.auto_transition || "dissolve";
    cut.fx = fx;
    cut.effect = fxLabel(fx);
    const d = rc.user_duration != null ? rc.user_duration : (rc.auto_duration != null ? rc.auto_duration : 0.5);
    cut.dur = fx === "cut" ? 0.0 : d;
    const sc = rc.cv_scores || {};
    if (Object.keys(sc).length) {
      cut.scores = {
        hist: sc.hist != null ? sc.hist : 0,
        sift: sc.feature != null ? sc.feature : 0,          // 后端 feature → UI「SIFT/结构」
        flow: sc.motion != null ? (1 - sc.motion) : 0,      // 后端 motion=运动差异 → UI「光流匹配」取 1-
        motion: sc.motion,
      };
      cut.total = sc.score != null ? sc.score : cut.total;
      cut.cat = catFor(cut.total);
    }
    if (rc.locked) cut.status = "locked";
    else if (fx === "cut") cut.status = "cut";
    else cut.status = "ai";                       // 分析回来的非硬切默认 AI 推荐
  });
}

/* ===== 统一 POST JSON：解析 FastAPI {detail} 或统一 {error:{hint}} ===== */
async function postJSON(url, body) {
  let resp;
  try {
    resp = await fetch(url, {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
    });
  } catch (e) {
    throw new Error("无法连接 media_agent（请确认服务已启动）");
  }
  let data = null;
  try { data = await resp.json(); } catch (e) { /* ignore */ }
  if (!resp.ok) {
    const hint = (data && ((data.error && (data.error.hint || data.error.message)) || data.detail)) || `HTTP ${resp.status}`;
    throw new Error(hint);
  }
  return data || {};
}

/* ===== 外部路径导入片段（不持久落盘，关软件丢失） ===== */
async function loadExternal(dir) {
  dir = (dir || "").trim();
  if (!dir) { toast("请输入文件夹路径"); return false; }
  if (!dir.match(/^[a-zA-Z]:[\\/]/) && !dir.startsWith("/")) {
    toast("外部路径需为绝对路径（如 E:\\MyClips 或 /home/user/clips）"); return false;
  }
  if (!PROJECT) { toast("请先选择项目（外部路径导入需要项目）"); return false; }
  toast("列出外部目录中…");
  try {
    const data = await getJSON(MEDIA_API + "/project/clips?" + new URLSearchParams({ project: PROJECT, ext: dir }).toString());
    const list = (data && data.clips) || [];
    if (!list.length) { toast("外部目录下没有可用的视频/图片文件"); return false; }
    const startId = clips.length ? Math.max(...clips.map(c => c.id)) + 1 : 1;
    const newClips = list.map((c, i) => ({
      id: startId + i,
      name: c.name || "外部片段 " + String(i + 1).padStart(2, "0"),
      dur: durLabel(typeof c.duration === "number" ? c.duration : 0),
      durSec: typeof c.duration === "number" ? c.duration : 0,
      shots: c.shots || "—",
      cls: ["", "c2", "c3", "c4"][i % 4],
      kept: true,
      path: c.path || c.name,
      kind: c.kind === "image" ? "image" : "video",
      thumb: c.thumb || "",
      trimIn: null, trimOut: null,
      autoIn: null, autoOut: null,
      _external: true,
      w: c.w || null, h: c.h || null, fps: c.fps || null,
    }));
    newClips.forEach(c => clips.push(c));
    rebuildCutsFromOrder();
    renderStrip(); renderInspector(); renderTrim();
    toast("已从外部路径导入 " + newClips.length + " 个片段（不持久落盘，关软件丢失）");
    return true;
  } catch (e) {
    if (e.status === 404) { toast("外部路径不可用：目录不存在或无权限访问"); }
    else { toast("外部导入失败：" + e.message); }
    return false;
  }
}

/* ===== 外部导入下拉面板 ===== */
const _EXT_LS_KEY = "nuomi.extDirHistory." + encodeURIComponent(PROJECT || "");

function extHistoryLoad() {
  try { return JSON.parse(localStorage.getItem(_EXT_LS_KEY) || "[]"); }
  catch (_) { return []; }
}

function extHistorySave(path) {
  let arr = extHistoryLoad().filter(p => p !== path);
  arr.unshift(path);
  if (arr.length > 5) arr = arr.slice(0, 5);
  localStorage.setItem(_EXT_LS_KEY, JSON.stringify(arr));
}

function renderExtHistory() {
  const list = document.getElementById("extHistoryList");
  if (!list) return;
  const hist = extHistoryLoad();
  if (!hist.length) {
    list.innerHTML = '<div class="ext-history-empty">暂无历史记录</div>';
    return;
  }
  list.innerHTML = hist.map(p =>
    `<div class="ext-history-item" data-path="${esc(p)}">
       <span style="font-size:13px">📁</span>
       <span class="eh-path" title="${esc(p)}">${esc(p)}</span>
       <span class="eh-hint">↵</span>
     </div>`
  ).join("");
  list.querySelectorAll(".ext-history-item").forEach(el => {
    el.addEventListener("click", () => {
      const inp = document.getElementById("extPathInput");
      if (inp) inp.value = el.dataset.path;
      inp && inp.focus();
    });
  });
}

function openExtDropdown() {
  const dd = document.getElementById("extDropdown");
  if (!dd) return;
  renderExtHistory();
  dd.classList.add("open");
  const inp = document.getElementById("extPathInput");
  if (inp) inp.focus();
}

function closeExtDropdown() {
  const dd = document.getElementById("extDropdown");
  if (dd) dd.classList.remove("open");
}

function toggleExtDropdown() {
  const dd = document.getElementById("extDropdown");
  if (!dd) return;
  if (dd.classList.contains("open")) closeExtDropdown();
  else openExtDropdown();
}

let _extWired = false;
function wireExtDropdown() {
  if (_extWired) return;
  _extWired = true;
  const btn = document.getElementById("btnAddExt");
  const dd = document.getElementById("extDropdown");
  const doImport = document.getElementById("btnDoImport");
  if (!btn || !dd || !doImport) return;

  btn.addEventListener("click", (e) => { e.stopPropagation(); toggleExtDropdown(); });

  doImport.addEventListener("click", async () => {
    const inp = document.getElementById("extPathInput");
    const path = (inp && inp.value || "").trim();
    const ok = await loadExternal(path);
    if (ok) {
      extHistorySave(path);
      closeExtDropdown();
    }
  });

  // 面板内 Enter 键触发导入
  const inp = document.getElementById("extPathInput");
  if (inp) {
    inp.addEventListener("keydown", async (e) => {
      if (e.key === "Enter") { e.preventDefault(); doImport.click(); }
    });
  }

  // 点外部关闭
  document.addEventListener("click", (e) => {
    const wrap = btn.closest(".ext-import-wrap");
    if (wrap && !wrap.contains(e.target)) closeExtDropdown();
  });

  // Esc 关闭
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeExtDropdown();
  });
}

/* 切口状态标签（子3：走马灯节点常显「转场图标 + 名 + 方向 + 时长」，图标改用 fxIcon 按 fx 静态映射）。
   analyzing 用脉冲态图标；其余状态用转场本身图标。 */
const TAG_TXT = { ai: "AI", analyzing: "分析", manual: "手动", locked: "锁定", cut: "硬切" };

/* 走马灯节点图标：分析中=脉冲占位，否则按转场 fx 静态映射（子3） */
function nodeIcon(c) {
  if (c.status === "analyzing") return "◌";
  return fxIcon(c.fx);
}
/* 走马灯节点主标签：转场名 + 方向（如有） + 时长（子3：常显，零渲染） */
function shortEffect(c) {
  if (c.status === "analyzing") return "分析中…";
  if (c.fx === "cut") return "硬切";
  const dir = fxDir(c.fx);
  return fxShortName(c.fx) + (dir ? " " + dir : "") + " " + (c.dur != null ? c.dur.toFixed(1) : "0.5") + "s";
}

/* ===== 渲染 ClipStrip（片段卡 + 卡间切口圆点） ===== */
function renderStrip() {
  const root = document.getElementById("strip");
  root.innerHTML = "";
  clips.forEach((cl, i) => {
    // 片段卡
    const card = document.createElement("div");
    card.className = "clip " + cl.cls + (cl.kept ? "" : " dropped") + (cl.id === selClip ? " sel" : "") + (cl._external ? " ext" : "") + (cl.trimLocked ? " locktrim" : "");
    card.setAttribute("draggable", "true");
    card.dataset.clipId = String(cl.id);
    // 缩略图：图片片段=自身首帧 <img>；视频片段=首帧预览 <video>(走 /preview 转 WebM)。
    // 媒体加载失败 → onerror 隐藏元素，露出 .thumb 渐变色块作为最终兜底。
    const trimmed = (cl.trimIn != null || cl.trimOut != null);
    // 子3：把手位置百分比（生效 in/out → trimIn/trimOut，未设则 0/dur）。
    const dur = cl.durSec || 0;
    const tin = cl.trimIn != null ? cl.trimIn : 0;
    const tout = cl.trimOut != null ? cl.trimOut : dur;
    const inPct = dur > 0 ? clamp01(tin / dur) * 100 : 0;
    const outPct = dur > 0 ? clamp01(tout / dur) * 100 : 100;
    const keptDur = Math.max(0, tout - tin);
    // 子1：AI 建议裁剪点（auto_in/auto_out）虚线指示，仅视频且后端给了建议时显示。
    const hasAuto = cl.kind === "video" && dur > 0 && (cl.autoIn != null || cl.autoOut != null);
    const aInPct = (hasAuto && cl.autoIn != null) ? clamp01(cl.autoIn / dur) * 100 : null;
    const aOutPct = (hasAuto && cl.autoOut != null) ? clamp01(cl.autoOut / dur) * 100 : null;
    // 建议是否已采纳（生效值≈建议值视为已采纳）
    const adopted = hasAuto
      && (cl.autoIn == null || (cl.trimIn != null && Math.abs(cl.trimIn - cl.autoIn) < 0.05))
      && (cl.autoOut == null || (cl.trimOut != null && Math.abs(cl.trimOut - cl.autoOut) < 0.05));
    let thumbImg;
    if (cl.kind === "video" && cl.path) {
      // 视频：直接喂首帧预览（muted+preload=metadata 只取首帧，不自动播放）
      const vsrc = previewSrc(String(cl.path).replace(/\\/g, "/"));
      // onloadedmetadata 时把 currentTime 推到极小偏移 → 强制解码出首帧（否则部分内核显示空白）
      thumbImg = `<video class="thumb-vid" src="${esc(vsrc)}" muted preload="metadata" playsinline
             onloadedmetadata="try{this.currentTime=0.04}catch(_){}"
             onerror="this.style.display='none'"></video>`;
    } else {
      const thumbSrc = videoThumbSrc(cl);   // 图片片段 → 自身文件；视频降级路径
      thumbImg = thumbSrc
        ? `<img class="thumb-img" src="${esc(thumbSrc)}" alt="${esc(cl.name)}"
             onerror="this.style.display='none'">`
        : "";
    }
    // 子3：拖拽把手 + 裁切遮罩（仅视频且有时长可拖；图片靠 /imaging/trim，不放把手）。
    const draggableTrim = cl.kind === "video" && dur > 0;
    const trimOverlay = `
        <div class="trimbar">
          ${inPct > 0 ? `<div class="crop l" style="width:${inPct}%"></div>` : ""}
          ${outPct < 100 ? `<div class="crop r" style="width:${100 - outPct}%"></div>` : ""}
          ${(hasAuto && !adopted && aInPct != null) ? `<div class="autoline ai-in" style="left:${aInPct}%"><span class="v">建议入 ${fmtT(cl.autoIn)}</span></div>` : ""}
          ${(hasAuto && !adopted && aOutPct != null) ? `<div class="autoline ai-out" style="left:${aOutPct}%"><span class="v">建议出 ${fmtT(cl.autoOut)}</span></div>` : ""}
          ${draggableTrim ? `<div class="thandle l" data-thandle="l" data-clip="${cl.id}" style="left:${inPct}%" title="拖动设入点"></div>` : ""}
          ${draggableTrim ? `<div class="thandle r" data-thandle="r" data-clip="${cl.id}" style="left:calc(${outPct}% - 9px)" title="拖动设出点"></div>` : ""}
        </div>`;
    // 子1：单卡 AI 建议条（未采纳时给「采纳/锁定」按钮）
    const suggestBar = (hasAuto && !adopted && !cl.trimLocked) ? `
        <div class="suggest" data-clip="${cl.id}">
          <span class="lab">AI 建议裁 ${cl.autoIn != null ? fmtT(cl.autoIn) : "·"}–${cl.autoOut != null ? fmtT(cl.autoOut) : "·"}</span>
          <span class="sg-btn" data-sg="adopt" data-clip="${cl.id}" title="采纳此建议">采纳</span>
          <span class="sg-btn" data-sg="lock" data-clip="${cl.id}" title="锁定，不被重算/采纳全部覆盖">锁</span>
        </div>` : "";
    card.innerHTML = `
      <div class="thumb">
        ${thumbImg}
        ${trimOverlay}
        <div class="keep" data-keep="${cl.id}">${cl.kept ? "✓" : ""}</div>
        <div class="del" data-del="${cl.id}" title="删除片段（从走马灯移除，不可恢复；与「剔除」置灰保留不同）">✕</div>
        <div class="grip" title="拖拽排序">⠿</div>
        <div class="clip-idx">${i + 1}</div>
        ${cl.shots && cl.shots !== "—" ? `<div class="shots">${esc(cl.shots)}</div>` : ""}
        ${trimmed ? `<div class="trimmed">✂ 裁后 ${keptDur.toFixed(1)}s</div>` : ""}
        ${cl.trimLocked ? `<div class="kindbadge" style="left:auto;right:6px;top:30px;color:var(--warn);border-color:#6b5520;background:rgba(224,168,90,.16)">锁裁</div>` : ""}
        ${cl.kind === "image" ? `<div class="kindbadge">图</div>` : ""}
        ${cl._external ? `<div class="extbadge">EXT</div>` : ""}
        ${suggestBar}
      </div>
      <div class="meta"><div class="c-name">${esc(cl.name)}</div><div class="c-dur">${esc(cl.dur)}${trimmed ? " · 裁后 " + keptDur.toFixed(1) + "s" : ""}</div></div>`;
    card.addEventListener("click", (e) => {
      if (e.target.dataset.del) {
        deleteClip(cl.id);             // 删除：真正从 clips 移除（区别于剔除置灰保留）
        return;
      }
      if (e.target.dataset.keep) {
        cl.kept = !cl.kept;            // 勾选保留/剔除（dropped 置灰但仍在走马灯）
        renderStrip();
        return;
      }
      // 子1/子3：把手 / 建议按钮点击不触发选片预览（各自 wire 处理）
      if (e.target.dataset.thandle || e.target.dataset.sg) return;
      selClip = cl.id;                 // 点卡片预览 → 同步 trim 条
      // 视频片段播放预览
      if (cl.kind === "video" && cl.path) playPreview(cl);
      document.getElementById("pvTag").textContent = `预览：${cl.name}（也可切「整片预览」）`;
      renderStrip();
      renderTrim();
    });
    wireDrag(card, cl);
    wireTrimHandles(card, cl);   // 子3：左右把手拖拽设 in/out
    wireSuggest(card, cl);       // 子1：单卡采纳/锁定
    root.appendChild(card);

    // 卡间切口圆点
    if (i < clips.length - 1) {
      const cut = cuts.find((c) => c.a === cl.id && c.b === clips[i + 1].id);
      if (cut) {
        const conn = document.createElement("div");
        conn.className = "conn " + cut.status + (cut.id === selCut ? " sel" : "");
        conn.innerHTML = `
          ${cut.status === "locked" ? `<span class="lock">🔒</span>` : ""}
          <div class="node">${nodeIcon(cut)}</div>
          ${cut.status !== "cut" ? `<span class="tagb">${TAG_TXT[cut.status]}</span>` : ""}
          <span class="lbl">${shortEffect(cut)}</span>
          <span class="score">${cut.status === "analyzing" ? "" : "匹配 " + cut.total.toFixed(2)}</span>`;
        conn.addEventListener("click", () => { selCut = cut.id; renderInspector(); renderStrip(); });
        root.appendChild(conn);
      }
    }
  });
  // 末尾「添加片段」占位 → 列生成目录
  const add = document.createElement("div");
  add.className = "clip add";
  add.innerHTML = `<div class="thumb">＋</div><div class="meta"><div class="c-name" style="color:var(--faint)">添加片段</div></div>`;
  add.addEventListener("click", () => loadClips());
  root.appendChild(add);
  refreshAdoptAll();   // 子1：每次重渲同步「采纳全部建议」按钮可用性
}

/* HTML 转义（与 ideate/asset-library 的 esc 一致）。 */
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
function clamp01(x) { return Math.max(0, Math.min(1, x)); }

/* ===== 子3：片段卡左右拖拽把手 → 设 in/out（写 trimIn/trimOut = in_point/out_point） =====
   拖拽时实时改 trimIn/trimOut，松手后整表重渲（更新裁后时长/总时长/检查器）。
   in 不得越过 out，反之亦然；至少保留 0.1s。 */
function wireTrimHandles(card, cl) {
  const dur = cl.durSec || 0;
  if (cl.kind !== "video" || dur <= 0) return;
  const thumb = card.querySelector(".thumb");
  card.querySelectorAll("[data-thandle]").forEach((h) => {
    h.addEventListener("mousedown", (e) => {
      e.preventDefault(); e.stopPropagation();
      const which = h.dataset.thandle;     // 'l' | 'r'
      const rect = thumb.getBoundingClientRect();
      const onMove = (ev) => {
        const ratio = clamp01((ev.clientX - rect.left) / Math.max(1, rect.width));
        let t = +(ratio * dur).toFixed(2);
        const curIn = cl.trimIn != null ? cl.trimIn : 0;
        const curOut = cl.trimOut != null ? cl.trimOut : dur;
        if (which === "l") {
          t = Math.min(t, curOut - 0.1);
          cl.trimIn = Math.max(0, t);
        } else {
          t = Math.max(t, curIn + 0.1);
          cl.trimOut = Math.min(dur, t);
        }
        selClip = cl.id;
        liveUpdateTrim(cl);                 // 拖拽中只动该卡把手/遮罩 + trim 条，避免整表重渲卡顿
      };
      const onUp = () => {
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        renderStrip(); renderTrim(); renderInspector();
        const keep = Math.max(0, (cl.trimOut != null ? cl.trimOut : dur) - (cl.trimIn != null ? cl.trimIn : 0));
        toast(`已裁 ${cl.name}：保留 ${keep.toFixed(1)}s（生成成片时 ffmpeg 实裁）`);
      };
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });
}
/* 拖拽过程中的轻量更新：只挪当前卡的把手/遮罩与裁后标签 + 顶部 trim 条（不重建整表）。 */
function liveUpdateTrim(cl) {
  const dur = cl.durSec || 0;
  if (dur <= 0) return;
  const card = document.querySelector(`.clip[data-clip-id="${cl.id}"]`);
  if (!card) return;
  const tin = cl.trimIn != null ? cl.trimIn : 0;
  const tout = cl.trimOut != null ? cl.trimOut : dur;
  const inPct = clamp01(tin / dur) * 100, outPct = clamp01(tout / dur) * 100;
  const hL = card.querySelector('[data-thandle="l"]');
  const hR = card.querySelector('[data-thandle="r"]');
  const cropL = card.querySelector(".trimbar .crop.l");
  const cropR = card.querySelector(".trimbar .crop.r");
  if (hL) hL.style.left = inPct + "%";
  if (hR) hR.style.left = `calc(${outPct}% - 9px)`;
  if (cropL) cropL.style.width = inPct + "%";
  if (cropR) cropR.style.width = (100 - outPct) + "%";
  if (selClip === cl.id) renderTrim();
}

/* ===== 子1：单卡 AI 建议「采纳 / 锁定」 ===== */
function wireSuggest(card, cl) {
  card.querySelectorAll("[data-sg]").forEach((b) => {
    b.addEventListener("click", (e) => {
      e.stopPropagation();
      if (b.dataset.sg === "adopt") {
        adoptClip(cl);
        renderStrip(); renderTrim(); renderInspector();
        toast(`已采纳 ${cl.name} 的 AI 裁剪建议`);
      } else if (b.dataset.sg === "lock") {
        cl.trimLocked = !cl.trimLocked;     // 锁定后：采纳全部 / 重算不覆盖其生效裁剪
        renderStrip();
        toast(cl.trimLocked ? `已锁定 ${cl.name} 裁剪（重算/采纳全部不覆盖）` : `已解锁 ${cl.name} 裁剪`);
      }
    });
  });
}
/* 采纳单个片段建议：auto_in/out → in_point/out_point（生效值）。锁定的不动。 */
function adoptClip(cl) {
  if (cl.trimLocked) return;
  if (cl.autoIn != null) cl.trimIn = cl.autoIn;
  if (cl.autoOut != null) cl.trimOut = cl.autoOut;
}
/* 是否存在未采纳/未锁定的 AI 建议（控制「采纳全部」按钮可用性）。 */
function hasPendingSuggestions() {
  return clips.some((cl) =>
    !cl.trimLocked && (cl.autoIn != null || cl.autoOut != null) &&
    ((cl.autoIn != null && (cl.trimIn == null || Math.abs(cl.trimIn - cl.autoIn) >= 0.05)) ||
     (cl.autoOut != null && (cl.trimOut == null || Math.abs(cl.trimOut - cl.autoOut) >= 0.05)))
  );
}
/* 子1：一键采纳全部建议（auto_in/out → in_point/out_point），跳过锁定片段。 */
function adoptAllSuggestions() {
  let n = 0;
  clips.forEach((cl) => {
    if (cl.trimLocked) return;
    if (cl.autoIn != null || cl.autoOut != null) { adoptClip(cl); n++; }
  });
  renderStrip(); renderTrim(); renderInspector();
  if (n) toast(`已采纳 ${n} 个片段的 AI 裁剪建议（锁定项跳过）`);
  else toast("没有可采纳的建议（先「一键智能转场」生成，或全部已采纳/锁定）");
}
/* 刷新「采纳全部裁剪建议」按钮可用性。 */
function refreshAdoptAll() {
  const btn = document.getElementById("adoptAll");
  if (btn) btn.disabled = !hasPendingSuggestions();
}

/* ===== 拖拽排序：HTML5 DnD，drop 时按落点位置重排 clips ===== */
let dragId = null;
function wireDrag(card, cl) {
  card.addEventListener("dragstart", (e) => {
    dragId = cl.id;
    card.style.opacity = "0.4";
    try { e.dataTransfer.setData("text/plain", String(cl.id)); e.dataTransfer.effectAllowed = "move"; } catch (_) {}
  });
  card.addEventListener("dragend", () => { card.style.opacity = ""; dragId = null; });
  card.addEventListener("dragover", (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; });
  card.addEventListener("drop", (e) => {
    e.preventDefault();
    if (dragId == null || dragId === cl.id) return;
    const from = clips.findIndex((c) => c.id === dragId);
    const to = clips.findIndex((c) => c.id === cl.id);
    if (from < 0 || to < 0) return;
    const [moved] = clips.splice(from, 1);
    clips.splice(to, 0, moved);
    rebuildCutsFromOrder();        // 顺序变了 → 重建切口 a/b（标记需重新分析）
    renderStrip();
    renderInspector();
    toast("已重排片段顺序 · 切口需重新「一键智能转场」");
  });
}

/* 顺序变化后，按相邻 kept 片段重建切口序列（保留锁定切口的 fx/dur，其余回 manual 待分析）。 */
function rebuildCutsFromOrder() {
  const seq = clips;             // 按当前显示顺序（含已剔除，但切口只连相邻显示项，与原逻辑一致）
  const old = {};
  cuts.forEach((c) => { old[c.a + "_" + c.b] = c; });
  const next = [];
  for (let i = 0; i < seq.length - 1; i++) {
    const a = seq[i].id, b = seq[i + 1].id;
    const prev = old[a + "_" + b];
    if (prev) { next.push(prev); continue; }
    // 新相邻关系 → 新建 manual 占位切口（等用户重跑分析回填 CV）
    next.push({
      id: "c" + a + "_" + b, a, b, status: "manual",
      effect: "叠化 (dissolve)", fx: "dissolve", dur: 0.5,
      scores: { hist: 0, sift: 0, flow: 0 }, total: 0, cat: catFor(0),
    });
  }
  cuts.length = 0;
  next.forEach((c) => cuts.push(c));
  if (!cuts.find((c) => c.id === selCut)) selCut = cuts.length ? cuts[0].id : null;
}

/* ===== 删除片段：真正从走马灯移除该 clip（区别于「剔除/dropped」置灰保留）=====
   从 clips 数组 splice 出去 → rebuildCutsFromOrder 重算相邻切口/转场 → 整表重渲，
   避免走马灯里被剔除的卡无限堆积加长。删除是不可恢复操作（外部导入/真实片段均不动盘）。
   selClip/selCut 若指向被删项则回退到第一个可用项；保持拖拽/把手/建议等其他状态不变。 */
function deleteClip(id) {
  const idx = clips.findIndex((c) => c.id === id);
  if (idx < 0) return;
  const removed = clips[idx];
  clips.splice(idx, 1);
  // 选中片段失效 → 回退到相邻/首个；清理预览播放器里的旧视频
  if (selClip === id) {
    selClip = clips.length ? clips[Math.min(idx, clips.length - 1)].id : null;
    const pvBox = document.querySelector(".player");
    const oldVid = pvBox && pvBox.querySelector("video");
    if (oldVid) { oldVid.pause(); oldVid.remove(); }
    const playIcon = pvBox && pvBox.querySelector(".play");
    if (playIcon) playIcon.style.display = "";
  }
  rebuildCutsFromOrder();   // 相邻关系变了 → 重建切口 a/b（保留锁定切口，新邻接回 manual 待重析）
  renderStrip();
  renderInspector();
  renderTrim();
  toast(`已删除片段「${removed ? removed.name : id}」· 切口已重算${clips.length ? "（如需重跑「一键智能转场」）" : "（走马灯已空）"}`);
}

/* ===== trim 条：反映/编辑选中片段的入/出点（图片可实裁；视频靠 render 时 ffmpeg） ===== */
function fmtT(sec) {
  sec = Math.max(0, sec || 0);
  const m = Math.floor(sec / 60), s = (sec - m * 60);
  return m + ":" + (s < 10 ? "0" : "") + s.toFixed(1);
}
function renderTrim() {
  const cl = clips.find((c) => c.id === selClip);
  const info = document.getElementById("trimInfo");
  const endEl = document.getElementById("trimDurEnd");
  if (!cl || !info) return;
  const dur = cl.durSec || 0;
  const tin = cl.trimIn != null ? cl.trimIn : 0;
  const tout = cl.trimOut != null ? cl.trimOut : dur;
  const keep = Math.max(0, tout - tin);
  info.textContent = `入点 ${fmtT(tin)} — 出点 ${fmtT(tout)}（保留 ${keep.toFixed(1)}s）`;
  if (endEl) endEl.textContent = fmtT(dur);
  // 可视 keepzone 宽度
  const kz = document.querySelector(".scrub .keepzone");
  const hL = document.querySelector(".scrub .handle.l");
  const hR = document.querySelector(".scrub .handle.r");
  if (kz && dur > 0) {
    const lp = (tin / dur * 100), rp = (100 - tout / dur * 100);
    kz.style.left = lp + "%"; kz.style.right = rp + "%";
    if (hL) hL.style.left = lp + "%";
    if (hR) hR.style.right = rp + "%";
  }
}

/* ===== 渲染转场检查器（选中切口的 CV 评分拆解 + 效果/时长/来源/锁定） ===== */
function renderInspector() {
  const c = cuts.find((x) => x.id === selCut);
  const insp = document.getElementById("inspector");
  if (!c) { insp.innerHTML = `<div class="insp-hd">未选中切口</div>`; return; }
  const badge = { ai: "AI 推荐", analyzing: "分析中", manual: "手动覆盖", locked: "锁定", cut: "硬切" }[c.status];
  const s = c.scores;
  // 子2：转场类型 <select> + <optgroup>（通用/方向/特效/切），列全 ~20，按 CAT_ORDER 分组。
  const fxOptions = CAT_ORDER.map((cat) => {
    const items = TRANSITIONS.filter((t) => t.cat === cat);
    if (!items.length) return "";
    const opts = items.map((t) =>
      `<option value="${t.fx}"${t.fx === c.fx ? " selected" : ""}>${t.icon} ${esc(t.label)}</option>`
    ).join("");
    return `<optgroup label="${CAT_LABEL[cat]}">${opts}</optgroup>`;
  }).join("");
  const isCut = c.fx === "cut";
  insp.innerHTML = `
    <div class="insp-hd">转场：${c.a} → ${c.b} <span class="badge">${badge}</span></div>

    <div class="field">
      <label>转场类型（通用 / 方向 / 特效 / 切）</label>
      <select class="fx-select" data-act="pickfx">${fxOptions}</select>
    </div>
    <div class="field">
      <label>时长（0.3 – 2.0s）${isCut ? " · 硬切无时长" : ""}</label>
      <input type="number" min="0.3" max="2.0" step="0.1" value="${(c.dur || 0).toFixed(1)}" data-act="dur"${isCut ? " disabled" : ""}>
    </div>
    <div class="field">
      <button class="btn-soft" style="width:100%;padding:7px 0;font-size:11.5px" data-act="previewcut">▶ 预览此切口</button>
    </div>

    <div class="field">
      <label>CV 评分拆解（直方图 / SIFT / 光流）</label>
      <div class="scorecard">
        <div class="row"><span class="k">直方图</span><div class="bar"><i style="width:${s.hist*100}%"></i></div><span class="v">${s.hist.toFixed(2)}</span></div>
        <div class="row"><span class="k">SIFT</span><div class="bar"><i style="width:${s.sift*100}%"></i></div><span class="v">${s.sift.toFixed(2)}</span></div>
        <div class="row"><span class="k">光流</span><div class="bar"><i style="width:${s.flow*100}%"></i></div><span class="v">${s.flow.toFixed(2)}</span></div>
        <div class="total">综合匹配 ${c.total.toFixed(2)} → ${c.cat}</div>
      </div>
    </div>

    <div class="field">
      <label>来源</label>
      <div class="chiprow">
        <span class="chip ${c.status === "ai" ? "on" : ""}" data-src="ai">AI 自动</span>
        <span class="chip ${c.status === "manual" ? "on" : ""}" data-src="manual">手动覆盖</span>
      </div>
    </div>

    <div class="lock-toggle" data-act="lock">${c.status === "locked" ? "☑" : "☐"} 锁定此切口（重跑「一键智能转场」不覆盖）</div>

    <div class="insp-foot chiprow">
      <span class="chip" data-act="reset">↺ 重置为 AI</span>
      <span class="chip" data-act="applyall">应用到全部</span>
    </div>`;
  wireInspector(c);
}

function wireInspector(c) {
  const insp = document.getElementById("inspector");
  // 子2：转场类型 <select>（user 覆盖 → status=manual，cut → status=cut）
  const fxSel = insp.querySelector('[data-act="pickfx"]');
  if (fxSel) fxSel.addEventListener("change", () => {
    c.fx = fxSel.value || "dissolve";
    c.effect = fxLabel(c.fx);
    if (c.fx === "cut") { c.dur = 0.0; c.status = "cut"; }
    else if (c.status === "cut" || c.status === "ai") { c.status = "manual"; }
    renderInspector(); renderStrip();
  });
  const durEl = insp.querySelector('[data-act="dur"]');
  if (durEl) durEl.addEventListener("change", () => { c.dur = parseFloat(durEl.value) || 0.5; renderStrip(); });
  // 子2：「预览此切口」— 最小实现复用整体预览（渲一段含该切口的样片成本高，先标 TODO）。
  const pvCutEl = insp.querySelector('[data-act="previewcut"]');
  if (pvCutEl) pvCutEl.addEventListener("click", () => previewCut(c));
  insp.querySelectorAll("[data-src]").forEach((el) => el.addEventListener("click", () => {
    c.status = el.dataset.src; renderInspector(); renderStrip();
  }));
  insp.querySelector('[data-act="lock"]').addEventListener("click", () => {
    c.status = c.status === "locked" ? "manual" : "locked"; renderInspector(); renderStrip();
  });
  insp.querySelector('[data-act="reset"]').addEventListener("click", () => {
    c.status = "ai"; renderInspector(); renderStrip(); toast("已重置为 AI 推荐");
  });
  insp.querySelector('[data-act="applyall"]').addEventListener("click", () => {
    cuts.forEach((x) => { if (x.status !== "locked" && x.fx !== "cut") { x.effect = c.effect; x.fx = c.fx; x.dur = c.dur; } });
    renderInspector(); renderStrip(); toast(`已把「${c.effect}」应用到全部未锁定切口`);
  });
}

/* ===== 子2：「预览此切口」=====
   POST /transition/preview_cut：渲切口两侧各 2.5s 的短样片，播到预览区。
   输出覆写固定临时文件 PROJECT/.cut_preview.mp4（无需清理）。 */
async function previewCut(c) {
  if (!c) { toast("请先选中一个切口"); return; }
  if (!PROJECT) { toast("请先选择项目（预览切口需要项目路径保存临时文件）"); return; }
  const clA = clips.find((cl) => cl.id === c.a);
  const clB = clips.find((cl) => cl.id === c.b);
  if (!clA || !clB) { toast("找不到切口两侧片段"); return; }
  if (clA.kind !== "video" || clB.kind !== "video") {
    toast("切口预览仅支持视频片段（当前含非视频片段）"); return;
  }

  // 构造仅含 2 个片段的 mini composition
  const isCut = c.fx === "cut";
  const rcA = {
    clip_id: String(clA.id), path: clA.path || clA.name,
    keep: true, duration: clA.durSec || 0,
    ...(clA.trimIn  != null ? { in_point:  clA.trimIn  } : {}),
    ...(clA.trimOut != null ? { out_point: clA.trimOut } : {}),
    user_transition: c.fx,
    user_duration: isCut ? 0.0 : (c.dur || 0.5),
  };
  const rcB = {
    clip_id: String(clB.id), path: clB.path || clB.name,
    keep: true, duration: clB.durSec || 0,
    ...(clB.trimIn  != null ? { in_point:  clB.trimIn  } : {}),
    ...(clB.trimOut != null ? { out_point: clB.trimOut } : {}),
  };
  const miniComp = { clips: [rcA, rcB], fps: 30, width: clA.w || 1920, height: clA.h || 1080 };
  const outPath = PROJECT.replace(/\\/g, "/") + "/.cut_preview.mp4";

  const pvBtn = document.getElementById("inspector") &&
    document.getElementById("inspector").querySelector('[data-act="previewcut"]');
  if (pvBtn) { pvBtn.disabled = true; pvBtn.textContent = "⏳ 渲染中…"; }
  toast(`渲染切口样片（${fxShortName(c.fx)}）中…`);

  try {
    const resp = await fetch(MEDIA_API + "/transition/preview_cut", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ composition: miniComp, out_path: outPath,
                             preview_window: 2.5, project: PROJECT }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      toast("切口预览失败：" + (err.detail || resp.status));
      return;
    }
    const data = await resp.json();
    // 复用 playPreview：传一个虚拟 clip 对象（path = 渲染出的临时文件）
    playPreview({ kind: "video", path: data.output || outPath, _previewCut: true });
    const pvTag = document.getElementById("pvTag");
    if (pvTag) pvTag.textContent = `切口预览：${fxShortName(c.fx)} ${isCut ? "（硬切）" : (c.dur || 0.5) + "s"}`;
    toast(`切口样片已就绪 · ${fxShortName(c.fx)} ${isCut ? "" : (c.dur || 0.5) + "s"}`);
  } catch (e) {
    toast("切口预览网络错误：" + e.message);
  } finally {
    if (pvBtn) { pvBtn.disabled = false; pvBtn.textContent = "▶ 预览此切口"; }
  }
}

/* ===== 列生成目录 → 用真实片段替换硬编码 =====
   GET {MEDIA_API}/project/clips?project=&sub=（后端待实现）。
   命中 → 整表替换；404/未实现/连接失败 → 保留 stub + TODO 提示，绝不假成功。 */
function durLabel(sec) { return sec ? fmtT(sec) : "—"; }
async function loadClips() {
  if (!PROJECT) { toast("请先在首页选择项目"); return; }
  const subEl = document.getElementById("subDir");
  clipsSub = (subEl && subEl.value.trim()) || "";
  const qs = new URLSearchParams({ project: PROJECT });
  if (clipsSub) qs.set("sub", clipsSub);
  toast("列出生成目录中…");
  try {
    const data = await getJSON(`${MEDIA_API}/project/clips?${qs.toString()}`);
    const list = (data && data.clips) || [];
    if (!list.length) { toast("该目录下没有可用片段"); return; }
    const existingPaths = new Set(clips.map((c) => c.path));
    let nextId = clips.length ? Math.max(...clips.map((c) => c.id)) + 1 : 1;
    let added = 0;
    for (const c of list) {
      const p = c.path || c.name;
      if (existingPaths.has(p)) continue;  // skip duplicate
      const sec = (typeof c.duration === "number") ? c.duration : 0;
      clips.push({
        id: nextId++,
        name: c.name || `片段 ${String(nextId).padStart(2, "0")}`,
        dur: durLabel(sec),
        durSec: sec,
        shots: c.shots || "—",
        cls: ["", "c2", "c3", "c4"][nextId % 4],
        kept: true,
        path: p,
        kind: c.kind === "image" ? "image" : "video",
        thumb: c.thumb || "",
        trimIn: null, trimOut: null,
        autoIn: null, autoOut: null,
        w: c.w || null, h: c.h || null, fps: c.fps || null,
      });
      added++;
    }
    if (!added) { toast("没有新片段（全部已加载）"); return; }
    clipsLoaded = true;
    if (selClip == null && clips.length) selClip = clips[0].id;
    rebuildCutsFromOrder();
    renderStrip(); renderInspector(); renderTrim();
    document.getElementById("anaState").textContent =
      `已加载 ${clips.length} 个片段${clipsSub ? "（" + clipsSub + "）" : ""} · 本次追加 ${added} · 点「一键智能转场」跑 CV`;
    toast(`已追加 ${added} 个片段（总计 ${clips.length}）`);
  } catch (e) {
    if (e.status === 404) {
      // TODO(backend): media_agent 尚未实现 GET /project/clips；落地后此分支自动转成功。
      toast("后端暂未提供「列生成目录」端点(GET /project/clips · 404)");
      document.getElementById("anaState").textContent =
        "TODO · 后端 /project/clips 待实现（不影响分析/渲染真机片段路径）";
    } else {
      toast("列目录失败：" + e.message);
    }
  }
}

/* ===== trim 实裁 =====
   图片片段：POST /imaging/trim 去白边(真实裁切并落盘新文件，回填 path)。
   视频片段：无独立 ffmpeg trim 端点 → 仅存入/出点(in_point/out_point)，
             由「生成成片」的 /transition/render(已含 ffmpeg) 用 -ss/-to 实裁。
   不对视频假裁切成功。 */
async function trimSelected() {
  const cl = clips.find((c) => c.id === selClip);
  if (!cl) { toast("请先选中一个片段"); return; }
  if (cl.kind === "image") {
    if (!PROJECT) { toast("请先在首页选择项目"); return; }
    const src = cl.path;
    const outRel = (clipsSub ? clipsSub + "/" : "") + "trim_" + (cl.name || "img");
    const out_path = String(PROJECT).replace(/\\/g, "/").replace(/\/+$/, "") + "/" + outRel;
    toast("裁切图片中…");
    try {
      const res = await postJSON(`${MEDIA_API}/imaging/trim`, { src_path: src, out_path, fmt: "PNG" });
      cl.path = res.output || out_path;
      renderStrip();
      toast("图片已去白边裁切：" + (res.output || out_path));
    } catch (e) {
      toast("裁切失败：" + e.message);
    }
  } else {
    // 视频：标注入/出点（render 时实裁）。stub 默认裁掉头尾各 ~10%/15% 作演示锚点。
    const dur = cl.durSec || 0;
    if (cl.trimIn == null && cl.trimOut == null && dur > 0) {
      cl.trimIn = +(dur * 0.1).toFixed(1);
      cl.trimOut = +(dur * 0.85).toFixed(1);
    }
    renderStrip(); renderTrim();
    toast("已标注视频入/出点 · 生成成片时 ffmpeg 实裁（无独立视频 trim 端点）");
  }
}

/* ===== 一键智能转场 = CV 分析（真机：POST /transition/analyze，锁定项后端跳过不覆盖） ===== */
async function analyze() {
  if (!PROJECT) { toast("请先在首页选择项目"); return; }
  const targets = cuts.filter((c) => c.status !== "locked");
  if (!targets.length) { toast("全部切口已锁定，无需分析"); return; }
  document.getElementById("anaState").textContent = "✦ CV 分析中…（锁定项不覆盖）";
  targets.forEach((c) => (c.status = "analyzing"));   // 脉冲态
  renderStrip();
  try {
    const out = await postJSON(`${MEDIA_API}/transition/analyze`, { composition: buildComposition() });
    applyComposition(out.composition);
    const n = targets.length;
    const sug = clips.filter((cl) => cl.autoIn != null || cl.autoOut != null).length;
    document.getElementById("anaState").textContent =
      `✦ CV 分析完成 · ${n} 切口已推荐${sug ? ` · ${sug} 片段有裁剪建议` : ""}（锁定项保留）`;
    toast(`已完成 CV 分析：${n} 个切口回填推荐效果${sug ? `，${sug} 片段有裁剪建议（可「采纳全部」）` : ""}`);
  } catch (e) {
    targets.forEach((c) => (c.status = c.status === "analyzing" ? "manual" : c.status));  // 回退脉冲
    document.getElementById("anaState").textContent = `✦ 分析失败 · ${e.message}`;
    toast("分析失败：" + e.message);
  }
  renderStrip();
  renderInspector();
}

/* ===== 生成成片（真机：POST /transition/render，同步阻塞至 ffmpeg 完成 → {output}） ===== */
let rendering = false;
let lastOutput = null;  // 最近一次渲染产出路径，供「送去配乐」postMessage 用
function render() {
  if (rendering) return;
  if (!PROJECT) { toast("请先在首页选择项目"); return; }
  const pf = document.getElementById("renderPf");
  const st = document.getElementById("renderSt");
  const tosoundBtn = document.querySelector('[data-act="tosound"]');
  rendering = true;
  st.classList.add("act");
  // 同步端点无进度流：渲染期间动画爬升到 ~90%，完成再补到 100%
  let p = 0;
  pf.style.width = "0%";
  const tick = setInterval(() => {
    p = Math.min(90, p + 3 + Math.random() * 5);
    pf.style.width = p + "%";
    st.textContent = `渲染中 ${Math.floor(p)}% · xfade/acrossfade 归一化 1080p/30fps`;
  }, 380);
  const out_path = PROJECT + "/compose/reel.mp4";
  postJSON(`${MEDIA_API}/transition/render`, { composition: buildComposition(), out_path })
    .then((res) => {
      clearInterval(tick);
      pf.style.width = "100%";
      const output = res.output || out_path;
      lastOutput = output;
      st.textContent = `✓ 成片已生成：${output}（保留原音 acrossfade）· 可送去配乐`;
      if (res.warning) toast("提示：" + res.warning);
      if (tosoundBtn) { tosoundBtn.dataset.output = output; tosoundBtn.removeAttribute("disabled"); }
      toast("成片已生成：" + output);
    })
    .catch((e) => {
      clearInterval(tick);
      pf.style.width = "0%";
      st.textContent = `✗ 渲染失败 · ${e.message}`;
      toast("渲染失败：" + e.message);
    })
    .finally(() => { rendering = false; });
}

/* ===== 工具栏 / 预览 stub 接线 ===== */
function wireToolbar() {
  document.querySelectorAll("[data-act]").forEach((el) => {
    if (el.closest("#inspector")) return; // 检查器自管
    el.addEventListener("click", () => {
      switch (el.dataset.act) {
        case "analyze":  analyze(); break;
        case "render":   render();  break;
        case "listdir":  loadClips(); break;
        case "addclip":  loadClips(); break;
        case "adoptall": adoptAllSuggestions(); break;
        case "trim":     trimSelected(); break;
        case "play": {
          const cl = clips.find(c => c.id === selClip);
          playPreview(cl);
          break;
        }
        case "tosound": {
          if (!lastOutput) { toast("请先「生成成片」再送去配乐"); break; }
          window.parent.postMessage({ type: "soundtrack.open", videoPath: lastOutput }, "*");
          break;
        }
      }
    });
  });
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
}

const _subEl = document.getElementById("subDir");
if (_subEl) _subEl.value = CLIPS_SUB_DEFAULT;   // 默认生成视频子目录，可改
renderStrip();
renderInspector();
renderTrim();
wireToolbar();
wireExtDropdown();
loadClips();
</script>
