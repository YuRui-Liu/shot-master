<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糯米AI · 资源库 · ASSET LIBRARY</title>
<!-- 壳内容页：不自带标题栏/侧栏（由 web/app.html 糯米 AI 壳统一提供）；复用蓝紫设计系统 -->
<link rel="stylesheet" href="tokens.css">
<style>
  /* 内容铺满壳工作区 */
  body { overflow: hidden; }
  .work { height: 100vh; overflow-y: auto; padding: 24px 28px 36px; }
  .wrap { max-width: 1180px; margin: 0 auto; }

  /* ===== 统一头部规范（与其它面板一致）===== */
  .work-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; max-width: 1280px; flex-wrap: wrap; }
  .work-head h1 { margin: 0; font-size: 22px; background: linear-gradient(135deg, var(--blue), var(--mauve)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .work-head .sub { font-size: 12px; color: var(--faint); letter-spacing: .5px; align-self: flex-end; padding-bottom: 4px; }
  .head-spacer { flex: 1; }

  /* 完备性闸门 */
  .gate {
    font-size: 11.5px; color: var(--warn); border: 1px solid #5a4a28;
    background: rgba(224,168,90,.08); border-radius: 13px; padding: 4px 13px;
  }
  .gate b { color: #f0c789; }
  .gate.ok { color: var(--done); border-color: #2f6b4f; background: rgba(78,201,143,.1); }
  .gate.ok b { color: var(--done); }

  /* tabs：角色/场景/道具 + 题材模板/风格圣经 */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border-lo); margin: 10px 0 0; padding: 0 2px; flex-wrap: wrap; }
  .tab {
    font-size: 12.5px; color: var(--muted); padding: 8px 16px; cursor: pointer;
    border: 1px solid transparent; border-bottom: none; border-radius: 7px 7px 0 0;
    margin-bottom: -1px; transition: color .12s, background .12s;
  }
  .tab:hover { color: var(--fg2); }
  .tab .c { font-size: 10px; color: var(--faint); margin-left: 5px; }
  .tab.active { color: #fff; font-weight: 600; background: var(--panel); border-color: var(--border); }
  .tab.active:hover { color: #fff; }
  .tab.active .c { color: var(--blue); }
  .tab .grp-sep { display: none; }

  /* toolbar */
  .toolbar { display: flex; align-items: center; gap: 9px; margin: 13px 0; padding: 0 2px; flex-wrap: wrap; }
  .toolbar .src { font-size: 11.5px; color: var(--muted); }
  .toolbar .sp { flex: 1; }
  .tb-btn {
    font: inherit; font-size: 11.5px; border-radius: 7px; padding: 6px 13px;
    border: 1px solid var(--border); color: var(--fg2); background: transparent;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-weight: 500;
    transition: border-color .12s, color .12s, filter .12s;
  }
  .tb-btn:hover { border-color: var(--mauve); color: var(--fg); }
  .tb-btn.pri {
    background: linear-gradient(135deg, var(--blue), var(--periw)); color: #06122a;
    border: none; font-weight: 600;
  }
  .tb-btn.pri:hover { filter: brightness(1.08); }
  .tb-btn .i { width: 14px; height: 14px; display: inline-block; }
  .tb-btn .i svg { width: 100%; height: 100%; display: block; }

  /* grid */
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(178px, 1fr));
    gap: 14px; align-content: start;
  }
  .grid.wide { grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); }

  /* ref 卡（角色/场景/道具） */
  .rcard {
    background: var(--panel); border: 1px solid var(--border); border-radius: 11px;
    overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,.25);
    transition: border-color .14s, transform .14s, box-shadow .14s;
  }
  .rcard:not(.add):hover { border-color: var(--blue-dim); transform: translateY(-2px); box-shadow: 0 8px 18px rgba(0,0,0,.34); }
  .rcard .thumb {
    height: 132px; position: relative; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a1d33, #24284a);
  }
  .rcard .thumb .ph { color: #3a3f5e; font-size: 32px; }
  .rcard .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .st {
    position: absolute; top: 8px; right: 8px; font-size: 9.5px; border-radius: 9px;
    padding: 2px 8px; backdrop-filter: blur(4px);
  }
  .st.ready { color: var(--done); border: 1px solid #2c5a44; background: rgba(78,201,143,.15); }
  .st.gen { color: var(--warn); border: 1px solid #5a4a28; background: rgba(224,168,90,.15); }
  .st.empty { color: var(--faint); border: 1px solid var(--border); background: rgba(0,0,0,.3); }
  .rcard .rbody { padding: 10px 11px; display: flex; flex-direction: column; gap: 6px; }
  .rcard .nm { font-size: 13px; font-weight: 600; color: var(--fg); }
  .rcard .ref { font-size: 10px; color: var(--faint); font-family: "Consolas", monospace; }
  .rcard .ref.miss { color: var(--err); }
  .rcard .acts { display: flex; gap: 6px; margin-top: 3px; }
  .rcard .a {
    flex: 1; font: inherit; font-size: 11px; text-align: center; cursor: pointer;
    border: 1px solid var(--border); border-radius: 6px; padding: 5px 0; color: var(--muted);
    background: transparent;
  }
  .rcard .a:hover { border-color: var(--mauve); color: var(--fg); }
  .rcard .a.blue { color: var(--blue); border-color: var(--blue-dim); }
  .rcard .a.danger { color: var(--err, #f87171); border-color: transparent; flex: 0 0 auto; padding: 5px 8px; }
  .rcard .a.danger:hover { border-color: var(--err, #f87171); background: rgba(248,113,113,.08); }
  /* 新增卡 */
  .rcard.add {
    border-style: dashed; align-items: center; justify-content: center;
    color: var(--faint); min-height: 210px; cursor: pointer; gap: 8px;
  }
  .rcard.add:hover { border-color: var(--mauve); color: var(--fg2); }
  .rcard.add .pl { font-size: 30px; font-weight: 300; }
  .rcard.add .t { font-size: 12px; }

  /* 题材模板 / 风格圣经 资产卡 */
  .acard {
    background: var(--panel); border: 1px solid var(--border); border-radius: 11px;
    padding: 14px 15px; display: flex; flex-direction: column; gap: 9px;
    box-shadow: 0 4px 10px rgba(0,0,0,.22);
    transition: border-color .14s, transform .14s, box-shadow .14s;
  }
  .acard:hover { border-color: var(--blue-dim); transform: translateY(-2px); box-shadow: 0 8px 18px rgba(0,0,0,.3); }
  .acard .load { transition: filter .12s; }
  .acard .load:hover { filter: brightness(1.08); }
  .acard .top { display: flex; align-items: center; gap: 10px; }
  .acard .swatch { width: 38px; height: 38px; border-radius: 8px; flex-shrink: 0; border: 1px solid var(--border-lo); overflow: hidden; position: relative; }
  .acard .swatch img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .acard .nm { font-size: 14px; font-weight: 600; color: var(--fg); }
  .acard .sub { font-size: 11px; color: var(--muted); font-family: "Consolas", monospace; }
  .acard .desc { font-size: 12px; color: var(--fg2); line-height: 1.55; min-height: 34px; }
  .acard .foot { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
  .acard .load {
    font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; border: none;
    border-radius: 7px; padding: 7px 14px; color: #06122a;
    background: linear-gradient(135deg, var(--blue), var(--periw));
  }
  .acard .load.loaded { background: rgba(78,201,143,.16); color: var(--done); border: 1px solid #2f6b4f; }
  .acard .meta-pill {
    font-size: 10.5px; color: var(--mauve); background: rgba(138,127,217,.18);
    border: 1px solid #4a3d6e; border-radius: 9px; padding: 2px 9px;
  }
  .acard .sp { flex: 1; }

  .empty-hint { color: var(--faint); font-size: 13px; padding: 30px 0; text-align: center; }

  /* ===== 富实体卡（characters/scenes/props 读子2规划的设定集）===== */
  .grid.ent-grid { grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); }
  .ent {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 13px 15px; display: flex; flex-direction: column;
    box-shadow: 0 4px 10px rgba(0,0,0,.22);
    transition: border-color .14s, transform .14s, box-shadow .14s;
  }
  .ent:hover { border-color: var(--blue-dim); transform: translateY(-2px); box-shadow: 0 8px 18px rgba(0,0,0,.3); }
  .ent .hd { display: flex; align-items: flex-start; gap: 12px; }
  .ent .nm { font-size: 16px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 6px; }
  .ent .id { font-size: 10.5px; color: var(--faint); margin-top: 1px; font-family: "Consolas", monospace; }
  .ent .brief { font-size: 12px; color: var(--fg2); margin-top: 4px; line-height: 1.5; }
  .ent .hd .acts { margin-left: auto; display: flex; gap: 6px; flex-shrink: 0; }
  .ent .iconb {
    background: var(--panel2); border: 1px solid var(--border); color: var(--fg2);
    border-radius: 7px; padding: 4px 8px; font-size: 11px; cursor: pointer;
    transition: border-color .12s, color .12s;
  }
  .ent .iconb:hover { border-color: var(--mauve); color: var(--fg); }
  .ent .iconb.danger:hover { border-color: var(--err, #f87171); color: var(--err, #f87171); }
  .ent .src {
    font-size: 9px; padding: 1px 6px; border-radius: 8px;
    background: rgba(139,127,217,.16); border: 1px solid #5a4fa0; color: #b7aef0;
  }
  .ent .sect { margin-top: 11px; }
  .ent .sect .t { font-size: 11px; color: var(--periw, #8b9bff); font-weight: 600; margin-bottom: 6px; }
  .ent .sect .t .muted2 { color: var(--faint); font-weight: 400; }
  .ent .vrow { display: flex; gap: 8px; flex-wrap: wrap; }
  .ent .variant {
    flex: 1; min-width: 170px; background: var(--panel2, #161826);
    border: 1px solid var(--border); border-radius: 9px; padding: 8px 10px;
  }
  .ent .variant .vn { font-size: 12px; font-weight: 600; color: #fff; }
  .ent .variant .vp { font-size: 11px; color: var(--fg2); margin-top: 4px; line-height: 1.5; max-height: 48px; overflow: hidden; }
  .ent .voice {
    background: linear-gradient(160deg, rgba(139,127,217,.06), transparent);
    border: 1px solid #34305a; border-radius: 9px; padding: 9px 11px; margin-top: 11px;
  }
  .ent .voice .t { font-size: 11px; color: #b7aef0; font-weight: 600; margin-bottom: 6px; }
  .ent .voice .vk { display: grid; grid-template-columns: auto 1fr; gap: 4px 10px; font-size: 11.5px; align-items: baseline; }
  .ent .voice .vk b { color: var(--faint); font-weight: 500; }
  .ent .voice .vk span { color: var(--fg2); }
  .ent .voice .vact { display: flex; gap: 7px; margin-top: 8px; }

  /* ===== 实体编辑弹窗（JSON 编辑，首版）===== */
  .emask {
    position: fixed; inset: 0; z-index: 122; display: none;
    align-items: center; justify-content: center;
    background: rgba(8,10,20,.78); backdrop-filter: blur(3px);
  }
  .emask.on { display: flex; }
  .edlg {
    width: 640px; max-width: 92vw; max-height: 88vh; overflow-y: auto;
    background: var(--panel); border: 1px solid var(--border); border-radius: 13px;
    box-shadow: 0 24px 64px rgba(0,0,0,.6); padding: 20px 22px 22px;
  }
  .edlg h2 { margin: 0 0 4px; font-size: 17px; color: var(--fg); }
  .edlg .ed-sub { font-size: 11.5px; color: var(--faint); margin-bottom: 14px; }
  .edlg .ed-sub b { color: var(--blue); }
  .edlg textarea {
    width: 100%; box-sizing: border-box; font-family: "Consolas", monospace; font-size: 12.5px;
    background: var(--navy); border: 1px solid var(--border); border-radius: 7px;
    padding: 10px 12px; color: var(--fg); resize: vertical; min-height: 320px; line-height: 1.5;
  }
  .edlg textarea:focus { outline: none; border-color: var(--blue-dim); }
  .ed-err { font-size: 11.5px; color: var(--err); margin-top: 8px; white-space: pre-wrap; line-height: 1.5; min-height: 16px; }
  .ed-foot { display: flex; align-items: center; gap: 9px; margin-top: 14px; }
  .ed-foot .esp { flex: 1; }
  .ed-x {
    float: right; width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--panel2); color: var(--fg); font-size: 16px; line-height: 24px; text-align: center;
    cursor: pointer; padding: 0; margin: -4px -4px 0 0;
  }
  .ed-x:hover { border-color: var(--mauve); color: #fff; }

  /* ===== 角色音色（配音色）===== */
  /* 卡内音色行：未配 → 「＋配音色」入口；已配 → 状态条 + 试听 + 改/清 */
  .voice-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .voice-row .vbtn {
    flex: 1; font: inherit; font-size: 11px; text-align: center; cursor: pointer;
    border: 1px dashed var(--border); border-radius: 6px; padding: 5px 0; color: var(--muted);
    background: transparent; transition: border-color .12s, color .12s;
  }
  .voice-row .vbtn:hover { border-color: var(--mauve); color: var(--fg); }
  .voice-set {
    display: flex; align-items: center; gap: 6px; margin-top: 4px;
    background: rgba(138,127,217,.1); border: 1px solid #4a3d6e; border-radius: 7px; padding: 4px 6px;
  }
  .voice-set .vtag { font-size: 10px; color: var(--mauve); white-space: nowrap; }
  .voice-set .vsp { flex: 1; }
  .voice-set .vmini {
    font: inherit; font-size: 13px; line-height: 1; cursor: pointer; border: none; background: transparent;
    color: var(--periw); padding: 2px 4px; border-radius: 5px;
  }
  .voice-set .vmini:hover { background: rgba(138,127,217,.22); color: #fff; }
  .voice-set .vmini.busy { color: var(--warn); }

  /* ===== 配音色弹窗（设计/上传/预设 三选）===== */
  .vmask {
    position: fixed; inset: 0; z-index: 120; display: none;
    align-items: center; justify-content: center;
    background: rgba(8,10,20,.78); backdrop-filter: blur(3px);
  }
  .vmask.on { display: flex; }
  .vdlg {
    width: 520px; max-width: 92vw; max-height: 88vh; overflow-y: auto;
    background: var(--panel); border: 1px solid var(--border); border-radius: 13px;
    box-shadow: 0 24px 64px rgba(0,0,0,.6); padding: 20px 22px 22px;
  }
  .vdlg h2 { margin: 0 0 4px; font-size: 17px; color: var(--fg); }
  .vdlg .vd-sub { font-size: 11.5px; color: var(--faint); margin-bottom: 14px; }
  .vdlg .vd-sub b { color: var(--blue); }
  .vd-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
  .vd-tab {
    flex: 1; text-align: center; font-size: 12.5px; color: var(--muted); cursor: pointer;
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 0; transition: all .12s;
  }
  .vd-tab:hover { color: var(--fg2); border-color: var(--mauve); }
  .vd-tab.on { color: #06122a; background: linear-gradient(135deg, var(--blue), var(--periw)); border-color: transparent; font-weight: 600; }
  .vd-pane { display: none; }
  .vd-pane.on { display: block; }
  .vd-field { margin-bottom: 11px; }
  .vd-field label { display: block; font-size: 11.5px; color: var(--muted); margin-bottom: 5px; }
  .vd-field input, .vd-field select, .vd-field textarea {
    width: 100%; box-sizing: border-box; font: inherit; font-size: 12.5px;
    background: var(--navy); border: 1px solid var(--border); border-radius: 7px;
    padding: 8px 10px; color: var(--fg); resize: vertical;
  }
  .vd-field input:focus, .vd-field select:focus, .vd-field textarea:focus { outline: none; border-color: var(--blue-dim); }
  .vd-row2 { display: flex; gap: 9px; }
  .vd-row2 > * { flex: 1; }
  .vd-hint { font-size: 10.5px; color: var(--faint); line-height: 1.5; margin: 2px 0 4px; }
  .vd-preset-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; padding-right: 2px; }
  .vd-preset {
    display: flex; align-items: center; gap: 9px; cursor: pointer;
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 11px; transition: all .12s;
  }
  .vd-preset:hover { border-color: var(--mauve); }
  .vd-preset.on { border-color: var(--blue-dim); background: rgba(74,158,255,.1); }
  .vd-preset .pnm { font-size: 12.5px; color: var(--fg); font-weight: 500; }
  .vd-preset .pds { font-size: 10.5px; color: var(--muted); }
  .vd-preset .pra { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; }
  .vd-preset.on .pra { border-color: var(--blue); background: var(--blue); box-shadow: inset 0 0 0 2px var(--panel); }
  .vd-foot { display: flex; align-items: center; gap: 9px; margin-top: 16px; }
  .vd-foot .vsp { flex: 1; }
  .vd-foot .vd-status { font-size: 11px; color: var(--muted); }
  .vd-foot .vd-status.busy { color: var(--warn); }
  .vd-foot .vd-status.err { color: var(--err); }
  .vd-btn {
    font: inherit; font-size: 12.5px; cursor: pointer; border-radius: 8px; padding: 8px 16px;
    border: 1px solid var(--border); color: var(--fg2); background: transparent; font-weight: 500;
  }
  .vd-btn:hover { border-color: var(--mauve); color: var(--fg); }
  .vd-btn:disabled { opacity: .5; cursor: not-allowed; }
  .vd-btn.pri { background: linear-gradient(135deg, var(--blue), var(--periw)); color: #06122a; border: none; font-weight: 600; }
  .vd-btn.pri:hover { filter: brightness(1.08); }
  .vd-sample { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 11.5px; color: var(--done); }
  .vd-sample.hidden { display: none; }
  .vd-x {
    float: right; width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--panel2); color: var(--fg); font-size: 16px; line-height: 24px; text-align: center;
    cursor: pointer; padding: 0; margin: -4px -4px 0 0;
  }
  .vd-x:hover { border-color: var(--mauve); color: #fff; }

  /* ===== 灯箱（点「查看」看大图）===== */
  .lb {
    position: fixed; inset: 0; z-index: 100; display: none;
    align-items: center; justify-content: center;
    background: rgba(8,10,20,.82); backdrop-filter: blur(3px);
  }
  .lb.on { display: flex; }
  .lb .box {
    position: relative; max-width: 92vw; max-height: 92vh;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .lb img {
    max-width: 92vw; max-height: 82vh; object-fit: contain;
    border-radius: 10px; border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,.6); background: var(--navy);
  }
  .lb .cap { font-size: 12.5px; color: var(--fg2); }
  .lb .x {
    position: absolute; top: -12px; right: -12px; width: 32px; height: 32px;
    border-radius: 50%; border: 1px solid var(--border); background: var(--panel2);
    color: var(--fg); font-size: 18px; line-height: 30px; text-align: center;
    cursor: pointer; padding: 0; box-shadow: 0 4px 12px rgba(0,0,0,.4);
  }
  .lb .x:hover { border-color: var(--mauve); color: #fff; background: var(--panel); }
</style>
</head>
<body>
<main class="work">
  <div class="wrap">
    <!-- 统一头部：标题→副标题→spacer→右侧操作/指示器(完备性闸门) -->
    <div class="work-head">
      <h1>资源库</h1><span class="sub">ASSET LIBRARY</span>
      <span class="head-spacer"></span>
      <span class="gate" id="gate">完备性：<b>—</b></span>
    </div>

    <!-- 标题行下方：切换/标签条（前三个=ref 库 characters/scenes/props，后两个=可加载资产 genres/styles） -->
    <div class="tabs" id="tabs"></div>

    <div class="toolbar" id="toolbar"></div>

    <!-- 内容网格（按当前 tab 渲染） -->
    <div class="grid" id="grid"></div>
  </div>
</main>

<!-- 灯箱：点遮罩/✕/Esc 关闭，居中大图 -->
<div class="lb" id="lightbox" aria-hidden="true">
  <div class="box">
    <button class="x" id="lbClose" title="关闭（Esc）">✕</button>
    <img id="lbImg" src="" alt="">
    <div class="cap" id="lbCap"></div>
  </div>
</div>

<!-- 配音色弹窗：角色音色三选（设计 / 上传 / 预设），仅 characters tab 使用 -->
<div class="vmask" id="voiceMask" aria-hidden="true">
  <div class="vdlg" role="dialog" aria-modal="true">
    <button class="vd-x" id="vdClose" title="关闭">✕</button>
    <h2>配音色</h2>
    <div class="vd-sub">角色 <b id="vdName">—</b> · 设置后用于剧集模式按角色克隆台词</div>

    <div class="vd-tabs">
      <div class="vd-tab on" data-vtab="design">设计</div>
      <div class="vd-tab" data-vtab="upload">上传</div>
      <div class="vd-tab" data-vtab="preset">预设</div>
    </div>

    <!-- 设计：性别/年龄/性格 → audio_style + 一句样本 text → /tts/synthesize mode=design -->

<!-- 实体编辑弹窗：GET 全文 → JSON textarea 改 → PUT /assets/entity（首版 JSON 编辑） -->
<div class="emask" id="entMask" aria-hidden="true">
  <div class="edlg" role="dialog" aria-modal="true">

<script>
/* ===== 可配 API base（真机联调由主控接）=====
   ref 库 → media_agent；genres/styles → 加载接口（media_agent 或专用） */
const MEDIA_API = new URLSearchParams(location.search).get('media') || 'http://127.0.0.1:18450';
const SW_API = new URLSearchParams(location.search).get('sw') || 'http://127.0.0.1:18430';
// 项目目录（壳已转发 ?project=…）；空 → 占位+友好提示，不报错
const PROJECT_DIR = new URLSearchParams(location.search).get('project') || new URLSearchParams(location.search).get('project_dir') || "";

/* ===== 资源库三类富实体（角色/场景/道具，子2「规划实体」产出的设定集）=====
   entries 由 GET {MEDIA_API}/assets/entities?project=<dir>&kind=<复数> 实拉（摘要 {name,id,brief,variant_count,source}）。
   编辑/配音色时再 GET {MEDIA_API}/assets/entity 取完整 JSON（含 variants/prompt/voice）。
   实体 JSON 与 ref_index.json 同目录，后端列举时已跳过 ref_index.json。 */
const REF_DATA = {
  characters: { label: "角色", icon: "👤", single: "character", entries: [] },
  scenes:     { label: "场景", icon: "🏞", single: "scene",     entries: [] },
  props:      { label: "道具", icon: "🗝", single: "prop",      entries: [] },
};
let refsLoaded = false;   // 是否成功拉到过后端数据（区分「空项目」与「未拉取/失败」）

/* 本地媒体 URL 助手（替代 file://，因 http 页面禁 file://）。
   走 media_agent GET /file?path=…[&project=…]：绝对路径直读，相对路径附 project 解析。 */
function mediaUrl(p) {
  if (!p) return "";
  if (/^(https?:|data:|blob:)/.test(p)) return p;
  var u = MEDIA_API + "/file?path=" + encodeURIComponent(p);
  if (PROJECT_DIR && !/^([a-zA-Z]:[\\/]|\/|\\\\)/.test(p)) u += "&project=" + encodeURIComponent(PROJECT_DIR);
  return u;
}
/* 参考图缩略图 src（保留原函数名，内部改走 mediaUrl 消除色块）。 */
function refImgSrc(path) { return mediaUrl(path); }

/* 实拉三类富实体摘要（GET /assets/entities?project=<dir>&kind=<复数>）。
   无 project / 失败 → 保持空 entries + 友好提示，不抛错。三类并行拉取。 */
async function loadEntities() {
  if (!PROJECT_DIR) { refsLoaded = false; renderAll(); return; }
  try {
    const results = await Promise.all(["characters", "scenes", "props"].map(async (k) => {
      const r = await fetch(MEDIA_API + "/assets/entities?project=" + encodeURIComponent(PROJECT_DIR) + "&kind=" + k);
      if (!r.ok) throw new Error("HTTP " + r.status);
      const j = await r.json();
      return { k, ents: Array.isArray(j.entities) ? j.entities : [] };
    }));
    results.forEach(({ k, ents }) => {
      REF_DATA[k].entries = ents.map((e) => ({
        name: e.name || "",
        id: e.id || "",
        brief: e.brief || "",
        variant_count: e.variant_count || 0,
        source: e.source || "",
      }));
    });
    refsLoaded = true;
  } catch (e) {
    refsLoaded = false;
    console.warn("[asset-library] /assets/entities 不可用：", e.message);
  }
  renderAll();
}

// 题材模板：对齐 templates/genres/index.json → genres[]{genre_id,display_name}
// 域W3：题材 tab 实拉 GET {MEDIA_API}/assets/genres（F1 域建）；以下为离线/失败回退占位。
const GENRE_FALLBACK = [
  { genre_id: "short-drama",    display_name: "短剧",     desc: "竖屏强冲突反转，钩子前置、节奏快。", swatch: "linear-gradient(135deg,#4a9eff,#8b7fd9)" },
  { genre_id: "single-episode", display_name: "单集短篇", desc: "完整起承转合的单集叙事结构。",       swatch: "linear-gradient(135deg,#8b7fd9,#a78bfa)" },
  { genre_id: "commercial",     display_name: "商业广告", desc: "产品卖点驱动，强 CTA 收口。",         swatch: "linear-gradient(135deg,#4ec98f,#4a9eff)" },
  { genre_id: "vlog",           display_name: "Vlog",     desc: "第一人称日常记录，口语化旁白。",       swatch: "linear-gradient(135deg,#e0a85a,#8b7fd9)" },
  { genre_id: "mv",             display_name: "MV",       desc: "画面锚定音轨节拍，性能镜+运镜。",     swatch: "linear-gradient(135deg,#a78bfa,#4a9eff)" },
  { genre_id: "oral-skit",      display_name: "口播剧",   desc: "正脸口播+情景，信息密度优先。",       swatch: "linear-gradient(135deg,#4a9eff,#4ec98f)" },
];

// 风格圣经：对齐 templates/styles/visual_styles.json → styles[]{style_id,name_cn,category,prompt_suffix}
// 域W3：风格 tab 实拉 GET {MEDIA_API}/assets/styles（F1 域建）；以下为离线/失败回退占位。
const STYLE_FALLBACK = [
  { style_id: "real/cinematic-warm-v1", name_cn: "电影感暖调", category: "real",  suffix: "warm tungsten grade, shallow DOF, film grain", swatch: "linear-gradient(135deg,#e0a85a,#a76a3a)" },
  { style_id: "real/cinematic-cool-v1", name_cn: "电影感冷调", category: "real",  suffix: "teal-and-orange grade, anamorphic flare",     swatch: "linear-gradient(135deg,#4a9eff,#2f5e96)" },
  { style_id: "real/doc-natural-v1",    name_cn: "纪实自然光", category: "real",  suffix: "natural light, handheld realism",             swatch: "linear-gradient(135deg,#c4c8d4,#9aa0a6)" },
  { style_id: "anime/cel-clean-v1",     name_cn: "赛璐璐动画", category: "anime", suffix: "clean cel shading, flat color blocks",        swatch: "linear-gradient(135deg,#a78bfa,#8b7fd9)" },
];

const DEFAULT_STYLE_ID = "real/cinematic-warm-v1";

// 风格 → style-previews/ 预览图映射（同源静态目录，相对路径即可；图加载失败时 onerror 回退到色块 swatch）。
// 映射不到的条目保持纯色块。文件名按审计确认的命名约定对齐。
const STYLE_PREVIEW = {
  "real/cinematic-warm-v1": "real_cinematic-warm-v1.png",
  "real/cinematic-cool-v1": "real_cinematic-cool-v1.png",
  "real/doc-natural-v1":    "real_doc-natural-v1.png",
  "anime/cel-clean-v1":     "2D_anime-cel-v1.png",
  // 以下为后端可能下发但当前 STYLE_FALLBACK 未定义的条目，预先映射以备实拉命中：
  "2D/guofeng-ink-v1":      "2D_guofeng-ink-v1.png",
  "3D/photoreal-octane-v1": "3D_photoreal-octane-v1.png",
  "3D/pixar-stylized-v1":   "3D_pixar-stylized-v1.png",
};
function stylePreviewSrc(styleId) {
  const f = STYLE_PREVIEW[styleId];
  return f ? ("style-previews/" + f) : "";
}

// 实拉后填充（先用占位，fetch 成功后整组替换并重渲染）
let GENRES = GENRE_FALLBACK.slice();
let STYLES = STYLE_FALLBACK.slice();

/* swatch 轮转色板：后端记录无 swatch 时按序补一个，保持卡面观感 */
const SWATCHES = [
  "linear-gradient(135deg,#4a9eff,#8b7fd9)", "linear-gradient(135deg,#8b7fd9,#a78bfa)",
  "linear-gradient(135deg,#4ec98f,#4a9eff)", "linear-gradient(135deg,#e0a85a,#8b7fd9)",
  "linear-gradient(135deg,#a78bfa,#4a9eff)", "linear-gradient(135deg,#4a9eff,#4ec98f)",
];

/* 归一后端 genre 记录 → 渲染所需字段（容忍多种字段名） */
function normGenre(g, i) {
  return {
    genre_id: g.genre_id || g.id || g.genre || ("genre-" + i),
    display_name: g.display_name || g.name || g.title || g.genre_id || "未命名题材",
    desc: g.desc || g.description || g.summary || g.meta || "",
    swatch: g.swatch || SWATCHES[i % SWATCHES.length],
  };
}
/* 归一后端 style 记录 → 渲染所需字段 */
function normStyle(s, i) {
  return {
    style_id: s.style_id || s.ref || s.id || ("style-" + i),
    name_cn: s.name_cn || s.name || s.display_name || s.style_id || "未命名风格",
    category: s.category || s.cat || s.medium || "",
    suffix: s.suffix || s.prompt_suffix || s.desc || s.meta || s.summary || "",
    swatch: s.swatch || SWATCHES[i % SWATCHES.length],
  };
}

/* 实拉题材/风格模板库（F1 域 /assets/* 就绪即生效；失败回退占位，仅 console 提示） */
async function fetchAssets(kind, norm, apiPath) {
  try {
    const r = await fetch(MEDIA_API + "/assets/" + (apiPath || kind));
    if (!r.ok) throw new Error("HTTP " + r.status);
    const j = await r.json();
    const arr = Array.isArray(j) ? j : (j[kind] || j.items || j.data || []);
    const mapped = (Array.isArray(arr) ? arr : []).map(norm);
    return mapped.length ? mapped : null;
  } catch (e) {
    console.warn("[asset-library] /assets/" + (apiPath || kind) + " 不可用，回退占位：", e.message);
    return null;
  }
}
async function loadAssetLibraries() {
  const [g, s] = await Promise.all([
    fetchAssets("genres", normGenre, "genres/detail"),   // /genres 只返回 ID 数组，需 /genres/detail
    fetchAssets("styles", normStyle),
  ]);
  if (g) GENRES = g;
  if (s) { STYLES = s; if (!STYLES.some((x) => x.style_id === loadedStyle)) loadedStyle = STYLES[0] ? STYLES[0].style_id : loadedStyle; }
  if (g && !GENRES.some((x) => x.genre_id === loadedGenre)) loadedGenre = GENRES[0] ? GENRES[0].genre_id : loadedGenre;
  if (g || s) renderAll();
}

/* ===== 内联图标（与确认稿一致：导入/批量/＋）===== */
const IC = {
  import: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>',
  batch:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 2v4M22 12h-4"/></svg>',
  plus:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>',
};

/* ===== tab 定义 ===== */
const TABS = [
  { id: "characters", kind: "ref",   label: "角色" },
  { id: "scenes",     kind: "ref",   label: "场景" },
  { id: "props",      kind: "ref",   label: "道具" },
  { id: "genres",     kind: "asset", label: "题材模板" },
  { id: "styles",     kind: "asset", label: "风格圣经" },
];
let activeTab = "characters";
let loadedGenre = "short-drama";
let loadedStyle = DEFAULT_STYLE_ID;


/* ===== 完备性闸门（进「分镜板·出图」前需有可出图变体）=====
   汇总富实体三类：有 ≥1 变体（场景/角色）或有出图 prompt（道具）视作「已规划」。
   道具摘要无 variant_count（单 prompt），按存在即计为已规划。 */
function computeCompleteness() {
  let ready = 0, total = 0;
  ["characters", "scenes", "props"].forEach((k) => {
    REF_DATA[k].entries.forEach((e) => {
      total++;
      // 角色/场景：有变体即已规划；道具：单 prompt，存在即计入
      if (k === "props" || (e.variant_count || 0) > 0) ready++;
    });
  });
  return { ready, total, missing: total - ready };
}
function renderGate() {
  const { ready, total, missing } = computeCompleteness();
  const gate = document.getElementById("gate");
  if (total === 0) {
    gate.className = "gate";
    gate.innerHTML = `完备性：<b>—</b> 暂无富实体（去剧本页规划）`;
  } else if (missing === 0) {
    gate.className = "gate ok";
    gate.innerHTML = `完备性：<b>${ready}/${total}</b> 已规划 · 可进分镜板出图`;
  } else {
    gate.className = "gate";
    gate.innerHTML = `完备性：<b>${ready}/${total}</b> 已规划 · ${missing} 项缺变体`;
  }
}

/* ===== tabs ===== */
function renderTabs() {
  const root = document.getElementById("tabs");
  root.innerHTML = TABS.map((t) => {
    let count = "";
    if (t.kind === "ref") count = REF_DATA[t.id].entries.length;
    else if (t.id === "genres") count = GENRES.length;
    else if (t.id === "styles") count = STYLES.length;
    const sep = t.id === "genres" ? ' style="margin-left:14px"' : "";
    return `<div class="tab ${t.id === activeTab ? "active" : ""}" data-tab="${t.id}"${sep}>${t.label}<span class="c">${count}</span></div>`;
  }).join("");
  root.querySelectorAll(".tab").forEach((el) => {
    el.addEventListener("click", () => { activeTab = el.getAttribute("data-tab"); renderAll(); });
  });
}

/* ===== toolbar（随 tab 变化）===== */
function renderToolbar() {
  const root = document.getElementById("toolbar");
  const tab = TABS.find((t) => t.id === activeTab);
  if (tab.kind === "ref") {
    const lbl = REF_DATA[activeTab].label;
    root.innerHTML = `
      <span class="src">设定集：由剧本页「规划实体」产出（含变体/出图 prompt/音色），此处读/展示/编辑。</span>
      <span class="sp"></span>
      <button class="tb-btn" id="btnAddEntity" data-act="add-entity"><span class="i">${IC.plus}</span>手动新增${lbl}</button>
      <button class="tb-btn pri" id="btnPlanEntities" data-act="plan-entities">🧩 去剧本页规划实体</button>`;
  } else if (activeTab === "genres") {
    root.innerHTML = `
      <span class="src">题材模板（templates/genres）— 加载到立意/剧本生成，最多叠加 3 个</span>
      <span class="sp"></span>
      <button class="tb-btn" data-act="genre-import"><span class="i">${IC.plus}</span>自定义题材</button>`;
  } else {
    root.innerHTML = `
      <span class="src">风格圣经（templates/styles）— 加载后锁 ref_fingerprint 保跨镜头一致性</span>
      <span class="sp"></span>
      <button class="tb-btn" data-act="style-import"><span class="i">${IC.plus}</span>自定义风格</button>`;
  }
  root.querySelectorAll("button[data-act]").forEach((b) => b.addEventListener("click", () => onToolbar(b.getAttribute("data-act"))));
}

/* ===== grid ===== */
function renderGrid() {
  const grid = document.getElementById("grid");
  const tab = TABS.find((t) => t.id === activeTab);
  grid.className = tab.kind === "asset" ? "grid wide" : "grid ent-grid";
  if (tab.kind === "ref") grid.innerHTML = renderEntityCards(activeTab);
  else if (activeTab === "genres") grid.innerHTML = renderGenreCards();
  else grid.innerHTML = renderStyleCards();
  wireGrid();
}

function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

/* 富实体卡：摘要直接用列表数据（name/id/brief/variant_count/source）；
   编辑/配音色时再 GET /assets/entity 取全文。结构对齐 mockup（变体计数 + 角色音色区入口）。 */
function renderEntityCards(key) {
  const def = REF_DATA[key];
  // 无项目 / 拉取失败 / 空名单 → 友好提示
  if (!PROJECT_DIR) {
    return `<div class="empty-hint" style="grid-column:1/-1">未选择项目 · 请先在首页打开一个项目（缺少 ?project=）。</div>`;
  }
  if (!refsLoaded) {
    return `<div class="empty-hint" style="grid-column:1/-1">资源库读取失败 · 请确认媒体服务已启动后重试。</div>`;
  }
  if (def.entries.length === 0) {
    return `<div class="empty-hint" style="grid-column:1/-1">该项目暂无${esc(def.label)}富实体。点「🧩 去剧本页规划实体」生成，或「＋ 手动新增」。</div>`;
  }
  return def.entries.map((e) => {
    const srcTag = e.source ? `<span class="src">${esc(e.source)}</span>` : "";
    const isChar = key === "characters";
    const isProp = key === "props";
    // 变体区：道具为单 prompt（无 variants），角色/场景显示变体计数
    const variantSect = isProp
      ? `<div class="sect"><div class="t">出图 prompt <span class="muted2">· 单图（无变体）</span></div></div>`
      : `<div class="sect"><div class="t">变体 variants <span class="muted2">· ${e.variant_count || 0} 个（每变体自带出图 prompt）</span></div></div>`;
    // 音色区：仅角色
    const voiceSect = isChar ? `
      <div class="voice">
        <div class="t">🎙 音色包 voice</div>
        <div class="vk"><b>配音色</b><span>点「🎚 配音色」读/写该角色 voice（设计/上传/预设）</span></div>
        <div class="vact"><button class="iconb" data-act="voice" data-name="${esc(e.name)}">🎚 配音色</button></div>
      </div>` : "";
    return `
      <div class="ent" data-kind="${key}" data-name="${esc(e.name)}">
        <div class="hd">
          <div>
            <div class="nm">${esc(e.name)} ${srcTag}</div>
            <div class="id">${esc(e.id || "")}${e.id ? " · " : ""}变体 ${e.variant_count || 0}</div>

/* POST JSON 小工具：失败抛带 detail 的错误 */
async function postJSON(path, body) {
  const r = await fetch(MEDIA_API + path, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    let detail = "HTTP " + r.status;
    try { const j = await r.json(); detail = j.detail || j.message || detail; } catch (_) {}
    throw new Error(detail);
  }
  return r.json();
}

/* PUT JSON 小工具：失败抛带 detail 的错误（detail 可能是 {errors:[...]} 对象） */
async function putJSON(path, body) {
  const r = await fetch(MEDIA_API + path, {
    method: "PUT", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (r.ok) return r.json();
  let detail = "HTTP " + r.status;
  try { const j = await r.json(); detail = j.detail != null ? j.detail : detail; } catch (_) {}
  const err = new Error(typeof detail === "string" ? detail : JSON.stringify(detail));
  err.status = r.status; err.detail = detail;
  throw err;
}

async function delEntity(kind, name) {

/* 生成参考图：POST /assets/refs/generate。
   对角色/场景取第一变体的 prompt，道具取自身的 prompt。 */
async function genRef(kind, name) {
  if (!requireProject()) return;
  // 1) 先取实体全文以提取 prompt
  let obj;
  try {
    const r = await fetch(MEDIA_API + "/assets/entity?project=" + encodeURIComponent(PROJECT_DIR)
      + "&kind=" + kind + "&name=" + encodeURIComponent(name));
    if (!r.ok) throw new Error("HTTP " + r.status);
    obj = await r.json();
  } catch (e) { toast("读取实体失败：" + e.message); return; }

  // 2) 提取 prompt
  let prompt = "";
  if (kind === "props") {
    // 道具：自身 prompt 字段
    prompt = (obj.prompt || "").trim();
  } else {
    // 角色/场景：第一变体的 prompt
    const vars = obj.variants;
    if (vars && typeof vars === "object") {
      const keys = Object.keys(vars);
      if (keys.length > 0) {
        const first = vars[keys[0]];
        prompt = (first && first.prompt ? first.prompt : "").trim();
      }
    }
  }
  if (!prompt) { toast("该实体无可用的出图 prompt（请先编辑补充变体 prompt）。"); return; }

  // 3) 调用生成端点
  toast("正在提交参考图生成…");
  try {
    const size = "1024x1024";   // 默认方形
    const j = await postJSON("/assets/refs/generate", {
      project: PROJECT_DIR,
      kind: kind,
      entity_id: name,
      prompt: prompt,
      size: size,
    });
    toast("已提交生成 · " + (j.preview_url || j.task_id || "OK"));
    // 刷新列表以更新状态
    loadEntities();
  } catch (e) { toast("生成失败：" + e.message); }
}

/* 手动新增富实体：输入名 → 用最小骨架打开编辑弹窗让用户填实后 PUT（因 validate_entity 拒占位符）。 */
async function addEntityManual(kind) {
  if (!requireProject()) return;
  const def = REF_DATA[kind];
  const single = def ? def.single : "character";
  const nm = prompt(`新增${def ? def.label : "实体"}名称：`, "");
  if (nm === null) return;
  const name = nm.trim();
  if (!name) { toast("名称为空，已取消。"); return; }
  if (def && def.entries.some((x) => x.name === name)) { toast("已存在同名实体。"); return; }
  // 最小骨架（含占位 prompt，需用户在弹窗内填实再保存——validate_entity 会拒占位符）
  const base = single === "character"
    ? { name, character_id: "", identity: "", voice: { design: { style: "（待填）", language: "Chinese" }, clone: { ref_audio: "" } }, variants: {} }
    : single === "scene"
      ? { name, scene_id: "", type: "", variants: { "默认": { prompt: "（待填出图提示词）" } } }
      : { name, prop_id: "", type: "", story_function: "", prompt: "（待填出图提示词）" };
  openEntityEditorWithData(kind, name, base);
}

/* 保存编辑：解析 JSON → PUT /assets/entity；validate 失败显 detail.errors */
async function saveEntityEditor() {
  const kind = entDlg.kind, name = entDlg.name;
  const errBox = vEl("edErr");
  errBox.textContent = "";
  let data;
  try { data = JSON.parse(vEl("edText").value); }
  catch (e) { errBox.textContent = "JSON 解析失败：" + e.message; return; }
  try {
    await putJSON("/assets/entity", { project: PROJECT_DIR, kind, name, data });
    closeEntityEditor();
    toast(`已保存：${name}`);
    loadEntities();
  } catch (e) {
    let msg = "保存失败（" + (e.status || "?") + "）";
    if (e.detail && e.detail.errors && Array.isArray(e.detail.errors)) {
      msg += "\n校验错误：\n· " + e.detail.errors.join("\n· ");
    } else { msg += " " + e.message; }
    errBox.textContent = msg;
  }
}

   后端按「出现的键覆盖、未出现的键保留」合并——故配音色不会清空未操作的另一半。
   设计/预设 → 只传 design；上传 → 只传 clone（原 design.style 由后端保留）。 */
function buildEntityVoice() {
  const tab = voiceDlg.tab;
  const style = vEl("vdStyle").value.trim();
  const upPath = vEl("vdUpPath").value.trim();
  if (tab === "preset") {
    if (!voiceDlg.presetId) return { err: "请先选择一个预设音色。" };
    const pre = VOICE_PRESETS.find((x) => x.id === voiceDlg.presetId) || {};
    return { voice: { design: { style: pre.desc || pre.name || voiceDlg.presetId, language: "Chinese" } } };
  }
  if (tab === "upload") {
    if (!upPath) return { err: "请先选择本地音频文件。" };
    return { voice: { clone: { ref_audio: upPath } } };  // 只动 clone，design.style 后端保留
  }
  if (!style) return { err: "音色风格描述不能为空。" };
  return { voice: { design: { style, language: "Chinese" } } };  // 只动 design，clone 保留
}

/* 保存音色：组富实体 voice → PUT /assets/entity/voice（聚焦更新，不动其它字段）。 */
async function saveVoice() {
  const built = buildEntityVoice();
  if (built.err) { setVdStatus(built.err, "err"); return; }
  setVdStatus("保存中…", "busy");
  try {
    await putJSON("/assets/entity/voice", {
      project: PROJECT_DIR, name: voiceDlg.name, voice: built.voice,
    });
    toast(`已配音色：${voiceDlg.name}`);
    closeVoiceDialog();
    loadEntities();
  } catch (e) {
    let msg = "保存失败（" + (e.status || "?") + "）";
    if (e.detail && e.detail.errors && Array.isArray(e.detail.errors)) {
      msg += "：" + e.detail.errors.join("；");
    } else { msg += " " + e.message; }
    setVdStatus(msg, "err");
  }
}

/* 清除音色：富实体 voice.design.style 不可为空（validate_entity 拒），
   故「清除」改为清空声音克隆参考音频（clone.ref_audio=""），保留 design.style。 */
async function clearVoice() {
  setVdStatus("清除克隆参考音频中…", "busy");
  // 只清 clone.ref_audio（键出现→生效），design 不传由后端保留原描述。
  const voice = { clone: { ref_audio: "" } };
  try {
    await putJSON("/assets/entity/voice", {
      project: PROJECT_DIR, name: voiceDlg.name, voice,
    });
    toast(`已清除克隆参考音频：${voiceDlg.name}`);
    closeVoiceDialog();
    loadEntities();
  } catch (e) {
    let msg = "清除失败（" + (e.status || "?") + "）";
    if (e.detail && e.detail.errors && Array.isArray(e.detail.errors)) {
      msg += "：" + e.detail.errors.join("；");
    } else { msg += " " + e.message; }
    setVdStatus(msg, "err");
  }
}

/* 选择本地音频：优先请壳原生 filepick（postMessage），无回应回退手填路径 */
let _filePickResolve = null;
function pickAudioFile() {
  // 监听壳回传（type:'file.picked'）；超时回退 prompt
  try {
    window.parent.postMessage({ type: "file.pick", accept: "audio", purpose: "voice" }, "*");
  } catch (_) {}
  if (_filePickResolve) { clearTimeout(_filePickResolve._t); }
  const timer = setTimeout(() => {
    _filePickResolve = null;
    const p = prompt("输入本地音频文件路径（FLAC/WAV/MP3）：", vEl("vdUpPath").value || "");
    if (p && p.trim()) { vEl("vdUpPath").value = p.trim(); voiceDlg.uploadPath = p.trim(); vEl("vdUpSample").classList.remove("hidden"); }
  }, 600);
  _filePickResolve = { _t: timer };
}
window.addEventListener("message", (ev) => {
  const d = ev.data || {};
  if (d.type === "file.picked" && d.purpose === "voice" && d.path && _filePickResolve) {
    clearTimeout(_filePickResolve._t); _filePickResolve = null;
    vEl("vdUpPath").value = d.path; voiceDlg.uploadPath = d.path;
    vEl("vdUpSample").classList.remove("hidden");
  }
});

// 弹窗事件绑定
vEl("vdClose").addEventListener("click", closeVoiceDialog);
vEl("voiceMask").addEventListener("click", (ev) => { if (ev.target.id === "voiceMask") closeVoiceDialog(); });
document.querySelectorAll(".vd-tab").forEach((t) => t.addEventListener("click", () => switchVoiceTab(t.getAttribute("data-vtab"))));
["vdSex", "vdAge", "vdTrait"].forEach((id) => vEl(id).addEventListener("input", () => { vEl("vdStyle").value = buildDesignStyle(); }));
vEl("vdSynth").addEventListener("click", synthDesignSample);
vEl("vdSave").addEventListener("click", saveVoice);
vEl("vdClear").addEventListener("click", clearVoice);
vEl("vdSamplePlay").addEventListener("click", () => { if (voiceDlg.designB64) playAudioBase64(voiceDlg.designB64); else playAudioPath(voiceDlg.designPath); });
vEl("vdUpPlay").addEventListener("click", () => playAudioPath(vEl("vdUpPath").value.trim()));
vEl("vdUpPick").addEventListener("click", pickAudioFile);
vEl("vdUpPath").addEventListener("input", () => { voiceDlg.uploadPath = vEl("vdUpPath").value.trim(); });

// 实体编辑弹窗事件绑定
vEl("edClose").addEventListener("click", closeEntityEditor);
vEl("edCancel").addEventListener("click", closeEntityEditor);
vEl("edSave").addEventListener("click", saveEntityEditor);
vEl("entMask").addEventListener("click", (ev) => { if (ev.target.id === "entMask") closeEntityEditor(); });
document.addEventListener("keydown", (ev) => {
  if (ev.key === "Escape" && vEl("entMask").classList.contains("on")) closeEntityEditor();
});

/* ===== 轻量 toast ===== */
let toastTimer = null;
function toast(msg) {
  let el = document.getElementById("__toast");
  if (!el) {
    el = document.createElement("div");
    el.id = "__toast";
    el.style.cssText = "position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:50;" +
      "background:var(--panel2);border:1px solid var(--mauve);color:var(--fg);" +
      "padding:9px 16px;border-radius:9px;font-size:12.5px;box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:80vw;";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = "1";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = "0"; }, 2200);
}

function renderAll() { renderTabs(); renderToolbar(); renderGrid(); renderGate(); }
renderAll();
/* 资源库三类富实体实拉（GET MEDIA_API /assets/entities?project=…&kind=…），无项目/失败 → 占位+提示 */
loadEntities();
/* 域W3：题材模板/风格圣经实拉（GET MEDIA_API /assets/genres、/assets/styles），失败回退占位 */
loadAssetLibraries();
</script>
