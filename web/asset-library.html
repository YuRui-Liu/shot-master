<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糯米AI · 资源库 · ASSET LIBRARY</title>
<!-- 壳内容页：不自带标题栏/侧栏（由 web/app.html 糯米 AI 壳统一提供）；复用蓝紫设计系统 -->
<link rel="stylesheet" href="tokens.css">
<style>
  /* 内容铺满壳工作区 */
  body { overflow: hidden; }
  .work { height: 100vh; overflow-y: auto; padding: 22px 26px 40px; }
  .wrap { max-width: 1180px; margin: 0 auto; }

  /* 标题 + 完备性闸门 */
  .head { display: flex; align-items: center; gap: 14px; padding: 0 2px 13px; margin-bottom: 0; border-bottom: 1px solid var(--border-lo); }
  .head h1 { margin: 0; font-size: 21px; font-weight: 650; }
  .head .en { font-size: 10px; color: var(--faint); letter-spacing: 2px; margin-left: 7px; }
  .head .sp { flex: 1; }
  .gate {
    font-size: 11.5px; color: var(--warn); border: 1px solid #5a4a28;
    background: rgba(224,168,90,.08); border-radius: 13px; padding: 4px 13px;
  }
  .gate b { color: #f0c789; }
  .gate.ok { color: var(--done); border-color: #2f6b4f; background: rgba(78,201,143,.1); }
  .gate.ok b { color: var(--done); }

  /* tabs：角色/场景/道具 + 题材模板/风格圣经 */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border-lo); margin: 10px 0 0; padding: 0 2px; flex-wrap: wrap; }
  .tab {
    font-size: 12.5px; color: var(--muted); padding: 8px 16px; cursor: pointer;
    border: 1px solid transparent; border-bottom: none; border-radius: 7px 7px 0 0;
    margin-bottom: -1px; transition: color .12s, background .12s;
  }
  .tab:hover { color: var(--fg2); }
  .tab .c { font-size: 10px; color: var(--faint); margin-left: 5px; }
  .tab.active { color: #fff; font-weight: 600; background: var(--panel); border-color: var(--border); }
  .tab.active:hover { color: #fff; }
  .tab.active .c { color: var(--blue); }
  .tab .grp-sep { display: none; }

  /* toolbar */
  .toolbar { display: flex; align-items: center; gap: 9px; margin: 13px 0; padding: 0 2px; flex-wrap: wrap; }
  .toolbar .src { font-size: 11.5px; color: var(--muted); }
  .toolbar .sp { flex: 1; }
  .tb-btn {
    font: inherit; font-size: 11.5px; border-radius: 7px; padding: 6px 13px;
    border: 1px solid var(--border); color: var(--fg2); background: transparent;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-weight: 500;
    transition: border-color .12s, color .12s, filter .12s;
  }
  .tb-btn:hover { border-color: var(--mauve); color: var(--fg); }
  .tb-btn.pri {
    background: linear-gradient(135deg, var(--blue), var(--periw)); color: #06122a;
    border: none; font-weight: 600;
  }
  .tb-btn.pri:hover { filter: brightness(1.08); }
  .tb-btn .i { width: 14px; height: 14px; display: inline-block; }
  .tb-btn .i svg { width: 100%; height: 100%; display: block; }

  /* grid */
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(178px, 1fr));
    gap: 14px; align-content: start;
  }
  .grid.wide { grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); }

  /* ref 卡（角色/场景/道具） */
  .rcard {
    background: var(--panel); border: 1px solid var(--border); border-radius: 11px;
    overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,.25);
    transition: border-color .14s, transform .14s, box-shadow .14s;
  }
  .rcard:not(.add):hover { border-color: var(--blue-dim); transform: translateY(-2px); box-shadow: 0 8px 18px rgba(0,0,0,.34); }
  .rcard .thumb {
    height: 132px; position: relative; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a1d33, #24284a);
  }
  .rcard .thumb .ph { color: #3a3f5e; font-size: 32px; }
  .rcard .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .st {
    position: absolute; top: 8px; right: 8px; font-size: 9.5px; border-radius: 9px;
    padding: 2px 8px; backdrop-filter: blur(4px);
  }
  .st.ready { color: var(--done); border: 1px solid #2c5a44; background: rgba(78,201,143,.15); }
  .st.gen { color: var(--warn); border: 1px solid #5a4a28; background: rgba(224,168,90,.15); }
  .st.empty { color: var(--faint); border: 1px solid var(--border); background: rgba(0,0,0,.3); }
  .rcard .rbody { padding: 10px 11px; display: flex; flex-direction: column; gap: 6px; }
  .rcard .nm { font-size: 13px; font-weight: 600; color: var(--fg); }
  .rcard .ref { font-size: 10px; color: var(--faint); font-family: "Consolas", monospace; }
  .rcard .ref.miss { color: var(--err); }
  .rcard .acts { display: flex; gap: 6px; margin-top: 3px; }
  .rcard .a {
    flex: 1; font: inherit; font-size: 11px; text-align: center; cursor: pointer;
    border: 1px solid var(--border); border-radius: 6px; padding: 5px 0; color: var(--muted);
    background: transparent;
  }
  .rcard .a:hover { border-color: var(--mauve); color: var(--fg); }
  .rcard .a.blue { color: var(--blue); border-color: var(--blue-dim); }
  /* 新增卡 */
  .rcard.add {
    border-style: dashed; align-items: center; justify-content: center;
    color: var(--faint); min-height: 210px; cursor: pointer; gap: 8px;
  }
  .rcard.add:hover { border-color: var(--mauve); color: var(--fg2); }
  .rcard.add .pl { font-size: 30px; font-weight: 300; }
  .rcard.add .t { font-size: 12px; }

  /* 题材模板 / 风格圣经 资产卡 */
  .acard {
    background: var(--panel); border: 1px solid var(--border); border-radius: 11px;
    padding: 14px 15px; display: flex; flex-direction: column; gap: 9px;
    box-shadow: 0 4px 10px rgba(0,0,0,.22);
    transition: border-color .14s, transform .14s, box-shadow .14s;
  }
  .acard:hover { border-color: var(--blue-dim); transform: translateY(-2px); box-shadow: 0 8px 18px rgba(0,0,0,.3); }
  .acard .load { transition: filter .12s; }
  .acard .load:hover { filter: brightness(1.08); }
  .acard .top { display: flex; align-items: center; gap: 10px; }
  .acard .swatch { width: 38px; height: 38px; border-radius: 8px; flex-shrink: 0; border: 1px solid var(--border-lo); }
  .acard .nm { font-size: 14px; font-weight: 600; color: var(--fg); }
  .acard .sub { font-size: 11px; color: var(--muted); font-family: "Consolas", monospace; }
  .acard .desc { font-size: 12px; color: var(--fg2); line-height: 1.55; min-height: 34px; }
  .acard .foot { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
  .acard .load {
    font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; border: none;
    border-radius: 7px; padding: 7px 14px; color: #06122a;
    background: linear-gradient(135deg, var(--blue), var(--periw));
  }
  .acard .load.loaded { background: rgba(78,201,143,.16); color: var(--done); border: 1px solid #2f6b4f; }
  .acard .meta-pill {
    font-size: 10.5px; color: var(--mauve); background: rgba(138,127,217,.18);
    border: 1px solid #4a3d6e; border-radius: 9px; padding: 2px 9px;
  }
  .acard .sp { flex: 1; }

  .empty-hint { color: var(--faint); font-size: 13px; padding: 30px 0; text-align: center; }
</style>
</head>
<body>
<main class="work">
  <div class="wrap">
    <div class="head">
      <h1>资源库<span class="en">ASSET LIBRARY</span></h1>
      <span class="sp"></span>
      <span class="gate" id="gate">完备性：<b>—</b></span>
    </div>

    <!-- tabs：前三个=ref 库（characters/scenes/props），后两个=可加载资产（genres/styles） -->
    <div class="tabs" id="tabs"></div>

    <div class="toolbar" id="toolbar"></div>

    <!-- 内容网格（按当前 tab 渲染） -->
    <div class="grid" id="grid"></div>
  </div>
</main>

<script>
/* ===== 可配 API base（真机联调由主控接）=====
   ref 库 → media_agent；genres/styles → 加载接口（media_agent 或专用） */
const MEDIA_API = new URLSearchParams(location.search).get('media') || 'http://127.0.0.1:18450';
const SW_API = new URLSearchParams(location.search).get('sw') || 'http://127.0.0.1:18430';
// 项目目录（壳已转发 ?project=…）；空 → 占位+友好提示，不报错
const PROJECT_DIR = new URLSearchParams(location.search).get('project') || new URLSearchParams(location.search).get('project_dir') || "";

/* ===== 资源库三类 ref（角色/场景/道具）=====
   entries 由 GET {MEDIA_API}/assets/refs?project=<dir> 实拉填充（每条 {name,path,source,status}）。
   后端 status：ready / pending（缺图）；本页另用前端态 generating（生成中，乐观更新）。 */
const REF_DATA = {
  characters: { label: "角色", icon: "👤", entries: [] },
  scenes:     { label: "场景", icon: "🏞", entries: [] },
  props:      { label: "道具", icon: "🗝", entries: [] },
};
let refsLoaded = false;   // 是否成功拉到过后端数据（区分「空项目」与「未拉取/失败」）

/* 后端条目 status → 前端三态（ready / generating / empty）。
   后端只有 ready / pending；pending（或缺 path）一律视作 empty 缺图。 */
function uiStatus(e) {
  if (e.status === "generating") return "generating";   // 前端乐观态
  if (e.status === "ready" && e.path) return "ready";
  return "empty";
}

/* 本地路径 → 壳内可显示 src（file://，与 storyboard-board fileSrc 一致）。
   后端 path 相对项目目录 → 先拼 PROJECT_DIR 再转 file://。 */
function refImgSrc(path) {
  if (!path) return "";
  let p = String(path).replace(/\\/g, "/");
  const isAbs = /^[A-Za-z]:/.test(p) || p.startsWith("/") || /^(file|https?):/i.test(p);
  if (/^(file|https?):/i.test(p)) return p;
  if (!isAbs && PROJECT_DIR) {
    p = String(PROJECT_DIR).replace(/\\/g, "/").replace(/\/+$/, "") + "/" + p.replace(/^\/+/, "");
  }
  return "file:///" + p.replace(/^\/+/, "");
}

/* 实拉三类 ref_index（GET /assets/refs?project=<dir>）。
   无 project / 失败 → 保持空 entries + 友好提示，不抛错。 */
async function loadRefs() {
  if (!PROJECT_DIR) { refsLoaded = false; renderAll(); return; }
  try {
    const r = await fetch(MEDIA_API + "/assets/refs?project=" + encodeURIComponent(PROJECT_DIR));
    if (!r.ok) throw new Error("HTTP " + r.status);
    const j = await r.json();
    ["characters", "scenes", "props"].forEach((k) => {
      const refs = (j[k] && Array.isArray(j[k].refs)) ? j[k].refs : [];
      REF_DATA[k].entries = refs.map((e) => ({
        name: e.name || "", path: e.path || "", source: e.source || "",
        status: e.status || "pending",
      }));
    });
    refsLoaded = true;
  } catch (e) {
    refsLoaded = false;
    console.warn("[asset-library] /assets/refs 不可用：", e.message);
  }
  renderAll();
}

// 题材模板：对齐 templates/genres/index.json → genres[]{genre_id,display_name}
// 域W3：题材 tab 实拉 GET {MEDIA_API}/assets/genres（F1 域建）；以下为离线/失败回退占位。
const GENRE_FALLBACK = [
  { genre_id: "short-drama",    display_name: "短剧",     desc: "竖屏强冲突反转，钩子前置、节奏快。", swatch: "linear-gradient(135deg,#4a9eff,#8b7fd9)" },
  { genre_id: "single-episode", display_name: "单集短篇", desc: "完整起承转合的单集叙事结构。",       swatch: "linear-gradient(135deg,#8b7fd9,#a78bfa)" },
  { genre_id: "commercial",     display_name: "商业广告", desc: "产品卖点驱动，强 CTA 收口。",         swatch: "linear-gradient(135deg,#4ec98f,#4a9eff)" },
  { genre_id: "vlog",           display_name: "Vlog",     desc: "第一人称日常记录，口语化旁白。",       swatch: "linear-gradient(135deg,#e0a85a,#8b7fd9)" },
  { genre_id: "mv",             display_name: "MV",       desc: "画面锚定音轨节拍，性能镜+运镜。",     swatch: "linear-gradient(135deg,#a78bfa,#4a9eff)" },
  { genre_id: "oral-skit",      display_name: "口播剧",   desc: "正脸口播+情景，信息密度优先。",       swatch: "linear-gradient(135deg,#4a9eff,#4ec98f)" },
];

// 风格圣经：对齐 templates/styles/visual_styles.json → styles[]{style_id,name_cn,category,prompt_suffix}
// 域W3：风格 tab 实拉 GET {MEDIA_API}/assets/styles（F1 域建）；以下为离线/失败回退占位。
const STYLE_FALLBACK = [
  { style_id: "real/cinematic-warm-v1", name_cn: "电影感暖调", category: "real",  suffix: "warm tungsten grade, shallow DOF, film grain", swatch: "linear-gradient(135deg,#e0a85a,#a76a3a)" },
  { style_id: "real/cinematic-cool-v1", name_cn: "电影感冷调", category: "real",  suffix: "teal-and-orange grade, anamorphic flare",     swatch: "linear-gradient(135deg,#4a9eff,#2f5e96)" },
  { style_id: "real/doc-natural-v1",    name_cn: "纪实自然光", category: "real",  suffix: "natural light, handheld realism",             swatch: "linear-gradient(135deg,#c4c8d4,#9aa0a6)" },
  { style_id: "anime/cel-clean-v1",     name_cn: "赛璐璐动画", category: "anime", suffix: "clean cel shading, flat color blocks",        swatch: "linear-gradient(135deg,#a78bfa,#8b7fd9)" },
];

const DEFAULT_STYLE_ID = "real/cinematic-warm-v1";

// 实拉后填充（先用占位，fetch 成功后整组替换并重渲染）
let GENRES = GENRE_FALLBACK.slice();
let STYLES = STYLE_FALLBACK.slice();

/* swatch 轮转色板：后端记录无 swatch 时按序补一个，保持卡面观感 */
const SWATCHES = [
  "linear-gradient(135deg,#4a9eff,#8b7fd9)", "linear-gradient(135deg,#8b7fd9,#a78bfa)",
  "linear-gradient(135deg,#4ec98f,#4a9eff)", "linear-gradient(135deg,#e0a85a,#8b7fd9)",
  "linear-gradient(135deg,#a78bfa,#4a9eff)", "linear-gradient(135deg,#4a9eff,#4ec98f)",
];

/* 归一后端 genre 记录 → 渲染所需字段（容忍多种字段名） */
function normGenre(g, i) {
  return {
    genre_id: g.genre_id || g.id || g.genre || ("genre-" + i),
    display_name: g.display_name || g.name || g.title || g.genre_id || "未命名题材",
    desc: g.desc || g.description || g.summary || g.meta || "",
    swatch: g.swatch || SWATCHES[i % SWATCHES.length],
  };
}
/* 归一后端 style 记录 → 渲染所需字段 */
function normStyle(s, i) {
  return {
    style_id: s.style_id || s.ref || s.id || ("style-" + i),
    name_cn: s.name_cn || s.name || s.display_name || s.style_id || "未命名风格",
    category: s.category || s.cat || s.medium || "",
    suffix: s.suffix || s.prompt_suffix || s.desc || s.meta || s.summary || "",
    swatch: s.swatch || SWATCHES[i % SWATCHES.length],
  };
}

/* 实拉题材/风格模板库（F1 域 /assets/* 就绪即生效；失败回退占位，仅 console 提示） */
async function fetchAssets(kind, norm) {
  try {
    const r = await fetch(MEDIA_API + "/assets/" + kind);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const j = await r.json();
    const arr = Array.isArray(j) ? j : (j[kind] || j.items || j.data || []);
    const mapped = (Array.isArray(arr) ? arr : []).map(norm);
    return mapped.length ? mapped : null;
  } catch (e) {
    console.warn("[asset-library] /assets/" + kind + " 不可用，回退占位：", e.message);
    return null;
  }
}
async function loadAssetLibraries() {
  const [g, s] = await Promise.all([
    fetchAssets("genres", normGenre),
    fetchAssets("styles", normStyle),
  ]);
  if (g) GENRES = g;
  if (s) { STYLES = s; if (!STYLES.some((x) => x.style_id === loadedStyle)) loadedStyle = STYLES[0] ? STYLES[0].style_id : loadedStyle; }
  if (g && !GENRES.some((x) => x.genre_id === loadedGenre)) loadedGenre = GENRES[0] ? GENRES[0].genre_id : loadedGenre;
  if (g || s) renderAll();
}

/* ===== 内联图标（与确认稿一致：导入/批量/＋）===== */
const IC = {
  import: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>',
  batch:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 2v4M22 12h-4"/></svg>',
  plus:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>',
};

/* ===== tab 定义 ===== */
const TABS = [
  { id: "characters", kind: "ref",   label: "角色" },
  { id: "scenes",     kind: "ref",   label: "场景" },
  { id: "props",      kind: "ref",   label: "道具" },
  { id: "genres",     kind: "asset", label: "题材模板" },
  { id: "styles",     kind: "asset", label: "风格圣经" },
];
let activeTab = "characters";
let loadedGenre = "short-drama";
let loadedStyle = DEFAULT_STYLE_ID;

const ST_TEXT = { ready: "✓ 就绪", generating: "⟳ 生成中", empty: "○ 缺图" };
const ST_CLASS = { ready: "ready", generating: "gen", empty: "empty" };

/* ===== 完备性闸门（OnlyShot 失败模式4：进「分镜板·出图」前缺图阻断）=====
   汇总 ref 三类的 ready / 总数 */
function computeCompleteness() {
  let ready = 0, total = 0;
  ["characters", "scenes", "props"].forEach((k) => {
    REF_DATA[k].entries.forEach((e) => { total++; if (uiStatus(e) === "ready") ready++; });
  });
  return { ready, total, missing: total - ready };
}
function renderGate() {
  const { ready, total, missing } = computeCompleteness();
  const gate = document.getElementById("gate");
  if (missing === 0) {
    gate.className = "gate ok";
    gate.innerHTML = `完备性：<b>${ready}/${total}</b> 就绪 · 可进分镜板出图`;
  } else {
    gate.className = "gate";
    gate.innerHTML = `完备性：<b>${ready}/${total}</b> 就绪 · ${missing} 项缺图（出图前需补全）`;
  }
}

/* ===== tabs ===== */
function renderTabs() {
  const root = document.getElementById("tabs");
  root.innerHTML = TABS.map((t) => {
    let count = "";
    if (t.kind === "ref") count = REF_DATA[t.id].entries.length;
    else if (t.id === "genres") count = GENRES.length;
    else if (t.id === "styles") count = STYLES.length;
    const sep = t.id === "genres" ? ' style="margin-left:14px"' : "";
    return `<div class="tab ${t.id === activeTab ? "active" : ""}" data-tab="${t.id}"${sep}>${t.label}<span class="c">${count}</span></div>`;
  }).join("");
  root.querySelectorAll(".tab").forEach((el) => {
    el.addEventListener("click", () => { activeTab = el.getAttribute("data-tab"); renderAll(); });
  });
}

/* ===== toolbar（随 tab 变化）===== */
function renderToolbar() {
  const root = document.getElementById("toolbar");
  const tab = TABS.find((t) => t.id === activeTab);
  if (tab.kind === "ref") {
    const lbl = REF_DATA[activeTab].label;
    root.innerHTML = `
      <span class="src">来源：从剧本/风格圣经自动提取 + 手动导入</span>
      <span class="sp"></span>
      <button class="tb-btn" data-act="import"><span class="i">${IC.import}</span>导入图</button>
      <button class="tb-btn" data-act="batch"><span class="i">${IC.batch}</span>批量生成缺图</button>
      <button class="tb-btn pri" data-act="extract"><span class="i">${IC.plus}</span>从剧本提取${lbl}</button>`;
  } else if (activeTab === "genres") {
    root.innerHTML = `
      <span class="src">题材模板（templates/genres）— 加载到立意/剧本生成，最多叠加 3 个</span>
      <span class="sp"></span>
      <button class="tb-btn" data-act="genre-import"><span class="i">${IC.plus}</span>自定义题材</button>`;
  } else {
    root.innerHTML = `
      <span class="src">风格圣经（templates/styles）— 加载后锁 ref_fingerprint 保跨镜头一致性</span>
      <span class="sp"></span>
      <button class="tb-btn" data-act="style-import"><span class="i">${IC.plus}</span>自定义风格</button>`;
  }
  root.querySelectorAll("button[data-act]").forEach((b) => b.addEventListener("click", () => onToolbar(b.getAttribute("data-act"))));
}

/* ===== grid ===== */
function renderGrid() {
  const grid = document.getElementById("grid");
  const tab = TABS.find((t) => t.id === activeTab);
  grid.className = tab.kind === "asset" ? "grid wide" : "grid";
  if (tab.kind === "ref") grid.innerHTML = renderRefCards(activeTab);
  else if (activeTab === "genres") grid.innerHTML = renderGenreCards();
  else grid.innerHTML = renderStyleCards();
  wireGrid();
}

function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

function renderRefCards(key) {
  const def = REF_DATA[key];
  // 无项目 / 拉取失败 / 空名单 → 友好提示（仍保留「手动新增」卡）
  let lead = "";
  if (!PROJECT_DIR) {
    lead = `<div class="empty-hint" style="grid-column:1/-1">未选择项目 · 请先在首页打开一个项目（缺少 ?project=）。</div>`;
  } else if (!refsLoaded) {
    lead = `<div class="empty-hint" style="grid-column:1/-1">资源库读取失败 · 请确认媒体服务已启动后重试。</div>`;
  } else if (def.entries.length === 0) {
    lead = `<div class="empty-hint" style="grid-column:1/-1">暂无${esc(def.label)} · 点「从剧本提取${esc(def.label)}」或手动新增。</div>`;
  }
  const cards = def.entries.map((e) => {
    const us = uiStatus(e);
    const sc = ST_CLASS[us];
    const img = us === "ready" ? refImgSrc(e.path) : "";
    const thumbInner = img
      ? `<img src="${esc(img)}" alt="${esc(e.name)}" onerror="this.style.display='none';this.parentNode.querySelector('.ph').style.display='';">`
        + `<div class="ph" style="position:absolute;display:none">${def.icon}</div>`
      : `<div class="ph">${us === "generating" ? "⟳" : (us === "ready" ? def.icon : "+")}</div>`;
    const acts = us === "ready"
      ? `<button class="a blue" data-act="view" data-name="${esc(e.name)}">查看</button><button class="a" data-act="regen" data-name="${esc(e.name)}">↻ 重生</button>`
      : us === "generating"
        ? `<button class="a" data-act="cancel" data-name="${esc(e.name)}">取消</button>`
        : `<button class="a blue" data-act="gen" data-name="${esc(e.name)}">✦ 生成</button><button class="a" data-act="import" data-name="${esc(e.name)}">导入</button>`;
    const refLine = us === "empty"
      ? `<div class="ref miss">未生成 · 出图前需补</div>`
      : `<div class="ref">${esc(e.path || "—")}</div>`;
    return `
      <div class="rcard" data-kind="${key}" data-name="${esc(e.name)}">
        <div class="thumb">${thumbInner}<span class="st ${sc}">${ST_TEXT[us]}</span></div>
        <div class="rbody">
          <div class="nm">${esc(e.name)}</div>
          ${refLine}
          <div class="acts">${acts}</div>
        </div>
      </div>`;
  });
  cards.push(`<div class="rcard add" data-act="add"><div class="pl">+</div><div class="t">手动新增${esc(def.label)}</div></div>`);
  return lead + cards.join("");
}

function renderGenreCards() {
  return GENRES.map((g) => {
    const on = g.genre_id === loadedGenre;
    return `
      <div class="acard">
        <div class="top">
          <div class="swatch" style="background:${g.swatch}"></div>
          <div><div class="nm">${g.display_name}</div><div class="sub">${g.genre_id}</div></div>
        </div>
        <div class="desc">${g.desc}</div>
        <div class="foot">
          <span class="meta-pill">题材模板</span><span class="sp"></span>
          <button class="load ${on ? "loaded" : ""}" data-act="load-genre" data-id="${g.genre_id}">${on ? "✓ 已加载" : "加载"}</button>
        </div>
      </div>`;
  }).join("");
}

function renderStyleCards() {
  return STYLES.map((s) => {
    const on = s.style_id === loadedStyle;
    const def = s.style_id === DEFAULT_STYLE_ID ? `<span class="meta-pill">默认</span>` : "";
    return `
      <div class="acard">
        <div class="top">
          <div class="swatch" style="background:${s.swatch}"></div>
          <div><div class="nm">${s.name_cn}</div><div class="sub">${s.style_id}</div></div>
        </div>
        <div class="desc">${s.suffix}</div>
        <div class="foot">
          <span class="meta-pill">${s.category}</span>${def}<span class="sp"></span>
          <button class="load ${on ? "loaded" : ""}" data-act="load-style" data-id="${s.style_id}">${on ? "✓ 已加载" : "加载"}</button>
        </div>
      </div>`;
  }).join("");
}

/* 需要项目的操作前置校验 */
function requireProject() {
  if (!PROJECT_DIR) { toast("请先在首页选择项目（缺少 ?project=）。"); return false; }
  return true;
}

/* POST JSON 小工具：失败抛带 detail 的错误 */
async function postJSON(path, body) {
  const r = await fetch(MEDIA_API + path, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    let detail = "HTTP " + r.status;
    try { const j = await r.json(); detail = j.detail || j.message || detail; } catch (_) {}
    throw new Error(detail);
  }
  return r.json();
}

/* ===== toolbar 动作 ===== */
async function onToolbar(act) {
  if (act === "extract") {
    if (!requireProject()) return;
    const lbl = REF_DATA[activeTab] ? REF_DATA[activeTab].label : "实体";
    toast(`正在从剧本提取${lbl}…`);
    try {
      const j = await postJSON("/assets/refs/extract", { project: PROJECT_DIR });
      // 端点返回 {added, refs}——直接用 refs 刷新本地三类
      if (j.refs) {
        ["characters", "scenes", "props"].forEach((k) => {
          const refs = (j.refs[k] && Array.isArray(j.refs[k].refs)) ? j.refs[k].refs : [];
          REF_DATA[k].entries = refs.map((e) => ({
            name: e.name || "", path: e.path || "", source: e.source || "", status: e.status || "pending",
          }));
        });
        refsLoaded = true;
      } else { await loadRefs(); return; }
      const added = j.added || {};
      const n = (added.characters || 0) + (added.scenes || 0) + (added.props || 0);
      renderAll();
      toast(n ? `已提取，新增 ${n} 项实体。` : "提取完成，无新增实体。");
    } catch (e) {
      toast("提取失败：" + e.message);
    }
    return;
  }
  if (act === "batch") {
    // 批量生成当前类缺图：逐条调单条生成端点
    if (!requireProject()) return;
    const def = REF_DATA[activeTab];
    const targets = (def ? def.entries : []).filter((e) => uiStatus(e) === "empty");
    if (!targets.length) { toast("当前没有缺图条目。"); return; }
    toast(`批量生成 ${targets.length} 张缺图…`);
    let ok = 0, fail = 0;
    for (const e of targets) {
      try { await genOne(activeTab, e.name, { silent: true }); ok++; }
      catch (_) { fail++; }
    }
    toast(`批量生成完成：成功 ${ok}${fail ? ` · 失败 ${fail}` : ""}。`);
    return;
  }
  if (act === "import") {
    // 手动导入：选本地图，写回该条 path/source=custom/status=ready（这里整类批量导入语义不清晰，落到单条 add 流程）
    toast("请在具体条目上点「导入」以指定本地图路径。");
    return;
  }
  if (act === "add") { addEntry(activeTab); return; }
  // genre-import / style-import：题材/风格自定义（后端暂无写端点）
  toast("自定义模板：暂未开放写入。");
}

/* 单条生成 ref 图：乐观置 generating → POST /assets/refs/generate → 用返回 entry 更新 */
async function genOne(kind, name, opts) {
  opts = opts || {};
  if (!requireProject()) return;
  const def = REF_DATA[kind];
  const entry = def && def.entries.find((x) => x.name === name);
  const prevStatus = entry ? entry.status : null;
  if (entry) { entry.status = "generating"; renderGrid(); }
  if (!opts.silent) toast(`生成中：${name}…`);
  try {
    const j = await postJSON("/assets/refs/generate", { project: PROJECT_DIR, kind, entity_id: name });
    const r = j.entry || {};
    if (entry) {
      entry.path = r.path || entry.path;
      entry.source = r.source || "ai-generated";
      entry.status = r.status || "ready";
    }
    renderAll();
    if (!opts.silent) toast(`已生成：${name}`);
  } catch (e) {
    if (entry) entry.status = prevStatus;   // 回滚乐观态
    renderAll();
    if (!opts.silent) toast(`生成失败：${e.message}`);
    if (opts.silent) throw e;               // 批量模式向上累计失败
  }
}

/* 手动导入本地图：输入路径 → /assets/refs/update 写 path+status=ready+source=custom */
async function importOne(kind, name) {
  if (!requireProject()) return;
  const path = prompt(`输入「${name}」的参考图本地路径（可相对项目目录）：`, "");
  if (path === null) return;
  const p = path.trim();
  if (!p) { toast("路径为空，已取消。"); return; }
  try {
    const j = await postJSON("/assets/refs/update", {
      project: PROJECT_DIR, kind, entity_id: name, path: p, source: "custom", status: "ready",
    });
    const r = j.entry || {};
    const def = REF_DATA[kind];
    let entry = def && def.entries.find((x) => x.name === name);
    if (entry) { entry.path = r.path || p; entry.source = r.source || "custom"; entry.status = r.status || "ready"; }
    renderAll();
    toast(`已导入：${name}`);
  } catch (e) {
    toast("导入失败：" + e.message);
  }
}

/* 手动新增条目：输入名字 → /assets/refs/update 登记空条目（status=pending） */
async function addEntry(kind) {
  if (!requireProject()) return;
  const def = REF_DATA[kind];
  const nm = prompt(`新增${def ? def.label : "条目"}名称：`, "");
  if (nm === null) return;
  const name = nm.trim();
  if (!name) { toast("名称为空，已取消。"); return; }
  if (def && def.entries.some((x) => x.name === name)) { toast("已存在同名条目。"); return; }
  try {
    const j = await postJSON("/assets/refs/update", {
      project: PROJECT_DIR, kind, entity_id: name, status: "pending",
    });
    const r = j.entry || {};
    if (def) def.entries.push({ name: r.name || name, path: r.path || "", source: r.source || "", status: r.status || "pending" });
    renderAll();
    toast(`已新增：${name}`);
  } catch (e) {
    toast("新增失败：" + e.message);
  }
}

function wireGrid() {
  document.querySelectorAll("#grid [data-act]").forEach((el) => {
    el.addEventListener("click", (ev) => {
      ev.stopPropagation();
      const act = el.getAttribute("data-act");
      const name = el.getAttribute("data-name");
      const id = el.getAttribute("data-id");
      const card = el.closest(".rcard");
      const kind = card ? card.getAttribute("data-kind") : activeTab;
      if (act === "load-genre") { loadedGenre = id; renderGrid(); toast(`已加载题材：${id}（写入立意/剧本生成上下文）`); return; }
      if (act === "load-style") { loadedStyle = id; renderGrid(); toast(`已加载风格圣经：${id}（锁 ref_fingerprint 保一致性）`); return; }
      if (act === "gen" || act === "regen") { genOne(kind || activeTab, name); return; }
      if (act === "import") { importOne(kind || activeTab, name); return; }
      if (act === "add") { addEntry(activeTab); return; }
      if (act === "view") {
        const def = REF_DATA[kind || activeTab];
        const entry = def && def.entries.find((x) => x.name === name);
        const src = entry ? refImgSrc(entry.path) : "";
        if (src) window.open(src, "_blank"); else toast("暂无可查看的参考图。");
        return;
      }
      if (act === "cancel") { toast("生成中无法中断（后端为同步生成）。"); return; }
      toast(`${act}${name ? " · " + name : ""}`);
    });
  });
}

/* ===== 轻量 toast ===== */
let toastTimer = null;
function toast(msg) {
  let el = document.getElementById("__toast");
  if (!el) {
    el = document.createElement("div");
    el.id = "__toast";
    el.style.cssText = "position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:50;" +
      "background:var(--panel2);border:1px solid var(--mauve);color:var(--fg);" +
      "padding:9px 16px;border-radius:9px;font-size:12.5px;box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:80vw;";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = "1";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = "0"; }, 2200);
}

function renderAll() { renderTabs(); renderToolbar(); renderGrid(); renderGate(); }
renderAll();
/* 资源库三类 ref 实拉（GET MEDIA_API /assets/refs?project=…），无项目/失败 → 占位+提示 */
loadRefs();
/* 域W3：题材模板/风格圣经实拉（GET MEDIA_API /assets/genres、/assets/styles），失败回退占位 */
loadAssetLibraries();
</script>
