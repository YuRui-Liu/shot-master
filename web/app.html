<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糯米 AI · 分镜影视创作台</title>
<link rel="stylesheet" href="tokens.css">
<style>
  html, body { height: 100%; overflow: hidden; }
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* 顶栏 */
  .titlebar { display: flex; align-items: center; height: 44px; padding: 0 12px;
    background: var(--navy); border-bottom: 1px solid var(--border-lo); -webkit-app-region: drag; }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 700; }
  .brand .logo { width: 22px; height: 22px; border-radius: 6px;
    background: linear-gradient(135deg, var(--blue), var(--periw)); }
  .brand .nm { color: var(--periw); letter-spacing: .5px; }
  .crumb { color: var(--muted); font-size: 12.5px; margin-left: 16px; }
  .crumb b { color: var(--fg2); }
  .tb-sp { flex: 1; }
  .tb-act { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 12px; }
  .winctl { display: flex; gap: 4px; margin-left: 14px; }
  .winctl span { width: 28px; height: 22px; display: grid; place-items: center; color: var(--fg);
    font-size: 13px; border-radius: 5px; cursor: pointer; -webkit-app-region: no-drag; }
  .winctl span:hover { background: var(--panel2); color: #fff; }   /* 三者同色(白)，统一 */
  .tb-act { -webkit-app-region: no-drag; }
  .app.landing .nav { display: none; }   /* 首页(无项目)=全宽落地页，无左侧栏 */

  /* 主体 = 左导航 + 内容 */
  .main { flex: 1; display: flex; min-height: 0; }
  .nav { width: 176px; flex: 0 0 176px; background: var(--navy); border-right: 1px solid var(--border-lo);
    display: flex; flex-direction: column; padding: 10px 8px; }
  .nav a { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px;
    color: var(--muted); text-decoration: none; font-size: 13.5px; cursor: pointer; margin-bottom: 2px; }
  .nav a .ic { width: 16px; text-align: center; opacity: .8; }
  .nav a:hover { color: var(--fg2); background: var(--panel); }
  .nav a.active { color: var(--done); background: linear-gradient(90deg, rgba(78,201,143,.12), transparent);
    box-shadow: inset 2px 0 0 var(--done); }
  .nav .sp { flex: 1; }
  .nav .sep { height: 1px; background: var(--border-lo); margin: 8px 6px; }

  .view-wrap { flex: 1; min-width: 0; position: relative; background: var(--bg); display: flex; flex-direction: column; }
  #view { flex: 1; width: 100%; border: 0; display: block; }
  .subnav { display: flex; gap: 6px; padding: 7px 12px; background: var(--navy); border-bottom: 1px solid var(--border-lo); }
  .subnav[hidden] { display: none; }
  .subnav button { font: inherit; font-size: 12.5px; color: var(--muted); background: var(--field);
    border: 1px solid var(--border); border-radius: 7px; padding: 5px 14px; cursor: pointer; }
  .subnav button.on { color: #06122a; background: linear-gradient(135deg, var(--blue), var(--periw)); font-weight: 600; border-color: transparent; }
  .placeholder { position: absolute; inset: 0; display: grid; place-content: center; text-align: center;
    color: var(--muted); gap: 8px; background: var(--bg); }
  .placeholder[hidden] { display: none; }   /* hidden 属性需显式覆盖 display:grid */
  .placeholder .big { font-size: 18px; color: var(--fg2); }
  .placeholder .badge { margin: 0 auto; }

  /* 任务中心抽屉（前端聚合：localStorage 各页任务态 + /project/overview，无后端 job 注册表） */
  .tb-act { cursor: pointer; }
  .tb-act:hover { border-color: var(--mauve); color: var(--fg2); }
  .tb-act .cnt { background: var(--blue); color: #06122a; font-weight: 700; border-radius: 9px;
    padding: 0 6px; font-size: 10.5px; min-width: 16px; text-align: center; display: none; }
  .tb-act .cnt.on { display: inline-block; }
  .tc-mask { position: fixed; inset: 0; background: rgba(6,8,18,.5); z-index: 40; display: none; }
  .tc-mask.on { display: block; }
  .tc-drawer { position: fixed; top: 0; right: 0; width: 380px; max-width: 92vw; height: 100vh;
    background: var(--navy); border-left: 1px solid var(--border); z-index: 41;
    transform: translateX(100%); transition: transform .2s ease; display: flex; flex-direction: column; }
  .tc-drawer.on { transform: translateX(0); }
  .tc-head { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--border-lo); }
  .tc-head .t { font-size: 14px; font-weight: 700; color: var(--fg);
    background: linear-gradient(135deg, var(--blue), var(--mauve)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .tc-head .sp { flex: 1; }
  .tc-head .x { cursor: pointer; color: var(--muted); font-size: 16px; padding: 2px 8px; border-radius: 6px; }
  .tc-head .x:hover { background: var(--panel2); color: #fff; }
  .tc-body { flex: 1; overflow: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 14px; }
  .tc-sect .st { font-size: 11px; color: var(--periw); font-weight: 600; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 8px; }
  .tc-item { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; margin-bottom: 7px; cursor: pointer; }
  .tc-item:hover { border-color: var(--mauve); }
  .tc-item .row1 { display: flex; align-items: center; gap: 8px; }
  .tc-item .nm { font-size: 12.5px; color: var(--fg2); font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tc-item .badge2 { font-size: 9.5px; padding: 1px 8px; border-radius: 8px; }
  .tc-item .b-done { background: rgba(78,201,143,.16); color: var(--done); border: 1px solid #2c5a44; }
  .tc-item .b-run { background: rgba(74,158,255,.14); color: var(--blue); border: 1px solid var(--blue-dim); }
  .tc-item .b-idle { background: var(--panel2); color: var(--muted); border: 1px solid var(--border); }
  .tc-item .sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .tc-empty { color: var(--faint); font-size: 12px; text-align: center; padding: 30px 10px; }
</style>
</head>
<body>
<div class="app">
  <div class="titlebar">
    <div class="brand"><span class="logo"></span><span class="nm">糯米 AI</span></div>
    <div class="crumb">项目 / <b id="proj">测试剧本_废铁场之夜</b></div>
    <div class="tb-sp"></div>
    <div class="tb-act" id="tcBtn"><span class="dot ok"></span>任务中心<span class="cnt" id="tcCnt">0</span></div>
    <div class="winctl"><span data-win="min">—</span><span data-win="max">□</span><span data-win="close">✕</span></div>
  </div>

  <!-- 任务中心抽屉：聚合各页 localStorage 任务态 + 项目阶段进度 -->
  <div class="tc-mask" id="tcMask"></div>
  <aside class="tc-drawer" id="tcDrawer" aria-hidden="true">
    <div class="tc-head"><span class="t">任务中心</span><span class="sp"></span><span class="x" id="tcClose">✕</span></div>
    <div class="tc-body" id="tcBody"></div>
  </aside>

  <div class="main">
    <nav class="nav" id="nav">
      <!-- NAV_ITEMS (nav_config.py 本项目规范) -->
      <a data-key="overview"      data-page="overview.html"        ><span class="ic">▦</span>概览</a>
      <a data-key="screenwriter"  data-page="ideate.html"          ><span class="ic">✎</span>剧本创作</a>
      <a data-key="asset_library" data-page="asset-library.html"   ><span class="ic">◈</span>资源库</a>
      <a data-key="storyboard"    data-page="storyboard-board.html"><span class="ic">▤</span>分镜板</a>
      <a data-key="video_gen"     data-page="video-mode2.html"     ><span class="ic">▶</span>视频生成</a>
      <a data-key="video_post"    data-page="daw-soundtrack.html"  ><span class="ic">✂</span>视频后期</a>
      <div class="sp"></div>
      <div class="sep"></div>
      <a data-key="skills"        data-page="skills.html"          ><span class="ic">✦</span>技能库</a>
      <a data-key="settings"      data-page="settings.html"        ><span class="ic">⚙</span>全局设置</a>
    </nav>

    <div class="view-wrap">
      <div class="subnav" id="subnav" hidden></div>
      <iframe id="view" title="content"></iframe>
      <div class="placeholder" id="ph" hidden>
        <div class="big" id="ph-name"></div>
        <div class="badge">该页迁移中 · 后端已就绪</div>
        <div class="faint">绞杀者模式：迁移期此页暂用 PySide6 原生版本</div>
      </div>
    </div>
  </div>
</div>

<script>
  // hash 路由：#/<navKey> → 加载内容页(iframe)；video_post 为容器(子tab)；无页显占位。
  const NAV = document.getElementById('nav');
  const VIEW = document.getElementById('view');
  const PH = document.getElementById('ph');
  const PHN = document.getElementById('ph-name');
  const SUBNAV = document.getElementById('subnav');
  const links = [...NAV.querySelectorAll('a')];
  const LABEL = Object.fromEntries(links.map(a => [a.dataset.key, a.textContent.trim()]));
  const Q = location.search ? location.search.slice(1) : '';
  let PROJECT = new URLSearchParams(location.search).get('project') || '';

  // 子向导容器：剧本创作=编剧链阶段(立意→剧本→分镜→出图prompt)；视频后期=转场/配音/配乐。
  // page 为空 → 阶段页待建(占位)。
  const SUBROUTES = {
    screenwriter: [
      { label: '立意', page: 'ideate.html' },
      { label: '剧本', page: 'script.html' },
      { label: '分镜', page: 'storyboard-script.html' },
      { label: '出图 Prompt', page: 'prompts.html' },
    ],
    video_post: [
      { label: '智能转场', page: 'compose.html' },
      { label: '配音', page: 'dub-mode2.html' },
      { label: '配乐', page: 'daw-soundtrack.html' },
    ],
  };

  function loadPage(page) {
    PH.hidden = true; VIEW.hidden = false;
    let params = Q;
    if (PROJECT) params = (params ? params + '&' : '') + 'project=' + encodeURIComponent(PROJECT);
    const q = params ? (page.includes('?') ? '&' : '?') + params : '';
    VIEW.src = page + q;
  }
  function showPlaceholder(name) {
    VIEW.hidden = true; VIEW.removeAttribute('src');
    PHN.textContent = name; PH.hidden = false;
  }
  let SUBBTN = {};   // label → button，供 selectSub 程序化切换(如 立意→剧本 推进)
  function renderSub(key) {
    const subs = SUBROUTES[key];
    SUBNAV.innerHTML = ''; SUBBTN = {};
    if (!subs) { SUBNAV.hidden = true; return null; }
    SUBNAV.hidden = false;
    subs.forEach((s, i) => {
      const b = document.createElement('button');
      b.textContent = s.label;
      if (i === 0) b.classList.add('on');
      b.addEventListener('click', () => {
        [...SUBNAV.children].forEach(x => x.classList.toggle('on', x === b));
        if (s.page) loadPage(s.page);
        else showPlaceholder(s.label + ' · 阶段页即将上线');
      });
      SUBNAV.appendChild(b);
      SUBBTN[s.label] = b;
    });
    return subs[0].page;
  }
  function selectSub(label) { const b = SUBBTN[label]; if (b) b.click(); }

  function go(key) {
    const a = links.find(x => x.dataset.key === key) || links[0];
    links.forEach(x => x.classList.toggle('active', x === a));
    const subFirst = renderSub(a.dataset.key);
    const target = subFirst || a.dataset.page;
    if (target) loadPage(target);
    else showPlaceholder(a.textContent.trim());
    if (location.hash !== '#/' + key) history.replaceState(null, '', '#/' + key);
    document.title = '糯米 AI · ' + (LABEL[key] || '');
  }

  // 首页(welcome) 选/建项目 → 设 PROJECT → 正常路由；项目页经 ?project= 拿目录。
  function openProject(path) {
    if (!path) return;
    PROJECT = path;
    const nm = path.split(/[\\/]/).filter(Boolean).pop() || path;
    const pe = document.getElementById('proj'); if (pe) pe.textContent = nm;
    document.querySelector('.app').classList.remove('landing');   // 进项目 → 显左栏
    SUBNAV.hidden = true;
    go('overview');
  }
  // 内容页 → 壳：切剧本创作子向导某阶段（必要时先切到剧本创作导航）。
  function gotoSwStage(label) {
    const sw = links.find(x => x.dataset.key === 'screenwriter');
    if (sw && !sw.classList.contains('active')) go('screenwriter');
    selectSub(label);
  }
  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === 'project.open' && d.path) openProject(d.path);
    // 编剧链阶段推进/回退（立意→剧本→分镜→出图prompt→视频生成）
    else if (d.type === 'ideate.advance') gotoSwStage('剧本');
    else if (d.type === 'storyboard.advance') gotoSwStage('出图 Prompt');
    else if (d.type === 'prompts.back') gotoSwStage('分镜');
    else if (d.type === 'prompts.advance') go('asset_library');   // 出图prompt 完成 → 资源库
    // 概览/其它页通用导航：{type:'nav', key:<左栏 data-key>}
    else if (d.type === 'nav' && d.key) {
      if (links.some(x => x.dataset.key === d.key)) go(d.key);
    }
    // 文件/目录选择中继：iframe 内容页无法直连 QWebChannel(只注入主帧)，
    // 故经壳调 window.filepick 原生对话框，结果回传给请求方 iframe。
    else if (d.type === 'pick.request' && e.source) {
      const fp = window.filepick;
      const fn = d.mode === 'dir' ? 'chooseDir' : 'chooseFiles';
      if (fp && typeof fp[fn] === 'function') {
        try {
          fp[fn]((ret) => {
            const paths = ret ? String(ret).split(/\n+/).map(s => s.trim()).filter(Boolean) : [];
            e.source.postMessage({ type: 'pick.result', reqId: d.reqId, paths }, '*');
          });
        } catch (err) {
          e.source.postMessage({ type: 'pick.result', reqId: d.reqId, nobridge: true }, '*');
        }
      } else {
        // 纯浏览器(无 Qt 桥) → 通知请求页回退手动粘贴
        e.source.postMessage({ type: 'pick.result', reqId: d.reqId, nobridge: true }, '*');
      }
    }
    // 打开本地目录/文件(资源管理器)：经壳调 Qt openPath；无桥则忽略(页内自行 toast 路径)。
    else if (d.type === 'open.path' && d.path) {
      const fp = window.filepick;
      if (fp && typeof fp.openPath === 'function') { try { fp.openPath(d.path); } catch (err) {} }
    }
  });

  links.forEach(a => a.addEventListener('click', () => go(a.dataset.key)));
  window.addEventListener('hashchange', () => go((location.hash.replace('#/', '') || 'storyboard')));

  if (PROJECT) {
    go(location.hash.replace('#/', '') || 'storyboard');
  } else {
    // 无项目 → 全宽首页落地页(隐藏左栏)，welcome.html 经 postMessage 通知本壳
    document.querySelector('.app').classList.add('landing');
    links.forEach(x => x.classList.remove('active'));
    SUBNAV.hidden = true;
    loadPage('welcome.html');
    document.title = '糯米 AI · 首页';
  }

  // 窗控桥：无边框时 window.winctl 由 QWebChannel 注入；纯浏览器中无则忽略。
  function wc(fn) { try { if (window.winctl && window.winctl[fn]) window.winctl[fn](); } catch (e) {} }
  document.querySelectorAll('.winctl span').forEach(s => {
    const m = { min: 'minimize', max: 'toggleMax', close: 'closeWin' }[s.dataset.win];
    s.addEventListener('click', () => wc(m));
  });
  document.querySelector('.titlebar').addEventListener('mousedown', (e) => {
    if (e.target.closest('.winctl') || e.target.closest('.tb-act')) return;
    wc('startMove');   // 无边框时系统拖动窗口
  });

  /* ===== 任务中心（前端聚合：扫 localStorage 各页任务态 + /project/overview 阶段进度） =====
     后端无 job 注册表，故不臆造服务端任务流；这里把各页已持久化的工作状态汇总展示。 */
  const MEDIA = new URLSearchParams(location.search).get('media') || 'http://127.0.0.1:18450';
  const tcMask = document.getElementById('tcMask');
  const tcDrawer = document.getElementById('tcDrawer');
  const tcBody = document.getElementById('tcBody');
  const tcCnt = document.getElementById('tcCnt');

  // 各页 localStorage 前缀 → 任务摘要解析器（返回 {nm, status, sub} | null）
  const TC_SOURCES = [
    { prefix: 'nuomi.ideate.state.', label: '立意', parse: (s) => {
        const n = (s.candidates || []).length;
        return n ? { nm: '立意候选', status: s.selectedId ? 'done' : 'idle',
          sub: n + ' 个候选' + (s.selectedId ? ' · 已选定' : ' · 未选定') } : null; } },
    { prefix: 'nuomi.script.state.', label: '剧本', parse: (s) => {
        const eps = (s.episodes || []).length; if (!eps) return null;
        const done = Object.values(s.status || {}).filter(v => v === 'done').length;
        return { nm: '剧本分集', status: done >= eps ? 'done' : (done ? 'run' : 'idle'),
          sub: done + '/' + eps + ' 集已生成' }; } },
    { prefix: 'nuomi.storyboardScript.', label: '分镜', parse: (s) => {
        const arr = s.episodes || s.shots || s.list || [];
        const n = Array.isArray(arr) ? arr.length : 0;
        return n ? { nm: '分镜脚本', status: 'idle', sub: n + ' 项' } : null; } },
    { prefix: 'nuomi.imggenTasks.', label: '出图', parse: (s) => {
        const tasks = Array.isArray(s) ? s : (s.tasks || []);
        if (!tasks.length) return null;
        const done = tasks.filter(t => t.status === 'done').length;
        return { nm: '出图任务', status: done >= tasks.length ? 'done' : 'run',
          sub: done + '/' + tasks.length + ' 完成' }; } },
    { prefix: 'nuomi.director.', label: '视频', parse: (s) => {
        const segs = (s.segments || s.timeline || []).length;
        return segs ? { nm: '导演台时间轴', status: 'idle', sub: segs + ' 段' } : null; } },
  ];

  function tcParseVal(raw) { try { return JSON.parse(raw); } catch { return null; } }

  function tcCollectLocal() {
    const items = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      const src = TC_SOURCES.find(x => key.startsWith(x.prefix));
      if (!src) continue;
      // 仅当前项目：key 尾缀含 PROJECT（或无项目时全收）
      const suffix = key.slice(src.prefix.length);
      if (PROJECT && suffix && suffix !== PROJECT && suffix !== 'noproj' && suffix !== '_none') {
        if (!PROJECT.endsWith(suffix) && !suffix.endsWith(PROJECT.split(/[\\/]/).pop() || '')) continue;
      }
      const val = tcParseVal(localStorage.getItem(key));
      if (val == null) continue;
      const info = src.parse(val);
      if (info) items.push({ stage: src.label, ...info });
    }
    return items;
  }

  async function tcFetchStages() {
    if (!PROJECT) return null;
    try {
      const r = await fetch(MEDIA + '/project/overview?project=' + encodeURIComponent(PROJECT));
      if (!r.ok) return null;
      const j = await r.json();
      return Array.isArray(j.stages) ? j.stages : null;
    } catch { return null; }
  }

  function tcBadge(status) {
    const m = { done: ['b-done', '已完成'], run: ['b-run', '进行中'], cur: ['b-run', '进行中'] };
    const [cls, txt] = m[status] || ['b-idle', '待处理'];
    return '<span class="badge2 ' + cls + '">' + txt + '</span>';
  }

  async function tcRender() {
    const local = tcCollectLocal();
    const active = local.filter(x => x.status === 'run' || x.status === 'cur').length;
    tcCnt.textContent = local.length;
    tcCnt.classList.toggle('on', local.length > 0);

    let html = '';
    html += '<div class="tc-sect"><div class="st">本地任务（各阶段工作态）</div>';
    if (local.length) {
      local.forEach(it => {
        html += '<div class="tc-item" data-stage="' + esc2(it.stage) + '"><div class="row1">'
          + '<span class="nm">' + esc2(it.stage) + ' · ' + esc2(it.nm) + '</span>' + tcBadge(it.status)
          + '</div><div class="sub">' + esc2(it.sub) + '</div></div>';
      });
    } else {
      html += '<div class="tc-empty">暂无进行中的任务<br>在各创作阶段生成内容后将在此汇总</div>';
    }
    html += '</div>';

    const stages = await tcFetchStages();
    if (stages && stages.length) {
      html += '<div class="tc-sect"><div class="st">项目阶段进度（manifest）</div>';
      stages.forEach(s => {
        const pct = (s.total ? Math.round(100 * (s.done || 0) / s.total) : (s.status === 'done' ? 100 : 0));
        html += '<div class="tc-item"><div class="row1"><span class="nm">' + esc2(s.label || s.key) + '</span>'
          + tcBadge(s.status) + '</div><div class="sub">' + (s.meta ? esc2(s.meta) + ' · ' : '') + pct + '%</div></div>';
      });
      html += '</div>';
    }
    tcBody.innerHTML = html;
    // 任务项点击 → 跳到对应阶段导航
    const STAGE_NAV = { '立意': 'screenwriter', '剧本': 'screenwriter', '分镜': 'screenwriter',
      '出图': 'storyboard', '视频': 'video_gen' };
    tcBody.querySelectorAll('.tc-item[data-stage]').forEach(el => {
      el.addEventListener('click', () => {
        const key = STAGE_NAV[el.dataset.stage];
        if (key && links.some(x => x.dataset.key === key)) { go(key); tcToggle(false); }
      });
    });
  }
  function esc2(s) { return String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

  function tcToggle(open) {
    tcMask.classList.toggle('on', open);
    tcDrawer.classList.toggle('on', open);
    tcDrawer.setAttribute('aria-hidden', open ? 'false' : 'true');
    if (open) tcRender();
  }
  document.getElementById('tcBtn').addEventListener('click', () => tcToggle(true));
  document.getElementById('tcClose').addEventListener('click', () => tcToggle(false));
  tcMask.addEventListener('click', () => tcToggle(false));
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') tcToggle(false); });
  tcRender();   // 启动算一次角标计数
</script>
</body>
</html>
