<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糯米AI · ⑥ 视频后期 · 配乐混音 DAW</title>
<link rel="stylesheet" href="tokens.css">
<!-- wavesurfer.js v7（真实波形）。离线时改为本地：<script src="vendor/wavesurfer.min.js"></script> -->
<script src="https://unpkg.com/wavesurfer.js@7"></script>
<style>
  /* ============================================================
     配乐 / 混音 DAW —— 静态 mockup（P4）
     内容页硬规则：无自带标题栏/侧栏（壳 web/app.html 提供）；
     复用 tokens.css 蓝紫设计系统变量与组件；品牌「糯米 AI」。
     布局取自确认稿 docs/explorer/track-mixer-layout.html 方案 A
     （左侧轨道头列：名称 + M/S + 音量条，与右侧波形轨垂直对齐）。
     ============================================================ */
  body { overflow: hidden; }
  .daw { display: flex; flex-direction: column; height: 100vh; }

  /* ---------- 顶部：标题 + 任务选择 ---------- */
  .head {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border-lo);
  }
  .head h1 {
    margin: 0; font-size: 19px; letter-spacing: .4px;
    background: linear-gradient(135deg, var(--blue), var(--mauve));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .head .spacer { flex: 1; }
  .head .task-select { min-width: 240px; }
  .head .style-pill {
    font-size: 11.5px; color: var(--mauve);
    background: rgba(138,127,217,.16); border: 1px solid #4a3d6e;
    padding: 4px 11px; border-radius: 12px;
  }

  /* ---------- 走带控制条（transport） ---------- */
  .transport {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px; background: var(--navy);
    border-bottom: 1px solid var(--border-lo);
  }
  .tbtn {
    width: 36px; height: 34px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px;
    background: var(--panel2); color: var(--fg2);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
  }
  .tbtn:hover { filter: none; border-color: var(--mauve); color: var(--fg); }
  .tbtn.play {
    background: linear-gradient(135deg, var(--blue), var(--periw));
    color: #06122a; border: none; font-weight: 700;
  }
  .tbtn.rec { color: var(--err); }
  .tbtn.rec:hover { border-color: var(--err); }
  .timecode {
    font-variant-numeric: tabular-nums; font-size: 17px; font-weight: 600;
    color: var(--fg); letter-spacing: 1px;
    background: var(--field); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 5px 12px; margin-left: 4px;
  }
  .timecode .total { color: var(--faint); font-size: 13px; font-weight: 400; }
  .transport .meta { color: var(--muted); font-size: 12px; }
  .transport .meta b { color: var(--fg2); font-weight: 600; }
  .transport .spacer { flex: 1; }
  .master {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 12px;
  }
  .master .vrange { width: 120px; }

  /* ---------- DAW 主体：左轨道头列 + 右时间线 ---------- */
  .stage { flex: 1; display: flex; min-height: 0; }

  /* 左：轨道头列（方案 A） */
  .heads {
    width: 232px; flex-shrink: 0; background: var(--panel);
    border-right: 1px solid var(--border); overflow-y: auto;
  }
  .heads-top {
    height: 30px; display: flex; align-items: center; padding: 0 12px;
    font-size: 11px; letter-spacing: .5px; text-transform: uppercase;
    color: var(--periw); font-weight: 600;
    border-bottom: 1px solid var(--border-lo);
  }
  .thead {
    height: 84px; padding: 9px 12px; display: flex; flex-direction: column; gap: 7px;
    border-bottom: 1px solid var(--border-lo);
  }
  .thead .row1 { display: flex; align-items: center; gap: 8px; }
  .thead .swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .thead .tname { font-size: 13px; font-weight: 600; color: var(--fg); }
  .thead .tkind { font-size: 11px; color: var(--faint); margin-left: auto; }
  .thead .row2 { display: flex; align-items: center; gap: 6px; }
  .ms {
    width: 24px; height: 24px; border-radius: 5px; cursor: pointer;
    font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center;
    background: var(--field); border: 1px solid var(--border); color: var(--text2, var(--fg2));
    color: var(--fg2); user-select: none;
  }
  .ms.m.on { background: var(--err); color: #fff; border-color: var(--err); }
  .ms.s.on { background: var(--warn); color: #1e1f22; border-color: var(--warn); }
  .vol {
    flex: 1; height: 6px; border-radius: 3px; position: relative; cursor: pointer;
    background: var(--field); border: 1px solid var(--border); min-width: 40px;
  }
  .vol .fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--blue-dim), var(--blue));
    border-radius: 3px;
  }
  .vol .knob {
    position: absolute; top: 50%; width: 12px; height: 12px; border-radius: 50%;
    background: #fff; transform: translate(-50%, -50%); box-shadow: 0 1px 3px rgba(0,0,0,.5);
  }
  .thead .pct { font-size: 11px; color: var(--muted); width: 34px; text-align: right; font-variant-numeric: tabular-nums; }
  /* 对白：只读占位（混在视频原声里，无独立 M/S/音量） */
  .thead.readonly { opacity: .62; }
  .thead.readonly .ro-tag {
    font-size: 11px; color: var(--faint);
    border: 1px dashed var(--border); border-radius: 5px; padding: 3px 8px;
  }

  /* 右：时间线区（标尺 + 波形轨 + 播放头） */
  .timeline { flex: 1; position: relative; overflow: auto; background: var(--bg); }
  .tl-inner { position: relative; min-width: 1400px; }
  .ruler {
    height: 30px; position: sticky; top: 0; z-index: 5;
    background: var(--navy); border-bottom: 1px solid var(--border-lo);
  }
  .ruler canvas { display: block; width: 100%; height: 30px; }
  .trk {
    height: 84px; border-bottom: 1px solid var(--border-lo); position: relative;
  }
  /* wavesurfer 渲染容器（每轨一个 WaveSurfer 实例挂这里） */
  .wave-host {
    position: absolute; inset: 0; padding: 10px 0;
    display: flex; align-items: center;
  }
  .wave-host > div { width: 100%; }
  /* 无音源时的静态占位提示（覆盖在容器上，加载真实音频后由 JS 隐藏） */
  .wave-ph {
    position: absolute; inset: 0; display: flex; align-items: center; padding-left: 12px;
    font-size: 11px; color: var(--faint); pointer-events: none;
  }
  .trk.readonly .wave-host { opacity: .62; }
  /* 片段块叠在波形画布上（标注 clip 名 / 区间） */
  .clip {
    position: absolute; top: 12px; bottom: 12px; border-radius: 5px; z-index: 3;
    display: flex; align-items: center; padding: 0 9px; overflow: hidden;
    font-size: 11.5px; color: #fff; border: 1px solid rgba(255,255,255,.18);
    box-shadow: 0 1px 4px rgba(0,0,0,.3); cursor: grab;
  }
  .clip .lab { font-weight: 600; white-space: nowrap; }
  .clip .sub { margin-left: 8px; opacity: .7; font-size: 10.5px; }

  /* 播放头：贯穿标尺 + 所有轨 */
  .playhead {
    position: absolute; top: 0; bottom: 0; width: 2px; z-index: 8;
    background: var(--blue); pointer-events: none;
    box-shadow: 0 0 8px var(--blue);
  }
  .playhead::before {
    content: ''; position: absolute; top: 0; left: -5px;
    border-left: 6px solid transparent; border-right: 6px solid transparent;
    border-top: 8px solid var(--blue);
  }

  /* ---------- 卡点（accent）标记带 ---------- */
  .accents { position: absolute; top: 30px; left: 0; right: 0; height: 0; z-index: 6; }
  .accent {
    position: absolute; top: 0; width: 0; height: 100%;
    border-left: 1px dashed var(--mauve); opacity: .5;
  }
  .accent.big { border-left-color: var(--done); opacity: .85; }
  .accent .dot {
    position: absolute; top: -2px; left: -4px; width: 8px; height: 8px;
    border-radius: 50%; background: var(--mauve);
  }
  .accent.big .dot { background: var(--done); box-shadow: 0 0 6px var(--done); }

  /* ---------- 底部状态/标注条 ---------- */
  .foot {
    padding: 9px 20px; border-top: 1px solid var(--border-lo);
    background: var(--navy); display: flex; align-items: center; gap: 16px;
    color: var(--muted); font-size: 12px; flex-wrap: wrap;
  }
  .foot .legend { display: inline-flex; align-items: center; gap: 6px; }
  .foot .legend .sw { width: 11px; height: 11px; border-radius: 3px; }
  .foot .note { color: var(--faint); }
  .foot .spacer { flex: 1; }
  .foot .api {
    font-family: Consolas, monospace; font-size: 11px; color: var(--blue);
    background: rgba(74,158,255,.1); border: 1px solid var(--blue-dim);
    padding: 2px 8px; border-radius: 10px;
  }
</style>
</head>
<body>
<!-- 壳内容页：标题栏/侧栏由 web/app.html（糯米 AI）统一提供，本页不自带 -->
<div class="daw">

  <!-- 顶部 -->
  <div class="head">
    <h1>⑥ 视频后期 · 配乐混音 DAW</h1>
    <span class="style-pill" id="stylePill">整体风格：（未加载）</span>
    <span class="spacer"></span>
    <button class="ghost" id="btnAccentDetect" title="POST /soundtrack/accent/detect 光流爆点检测">⚡ 检测卡点</button>
    <button class="ghost" id="btnAccentMix" title="POST /soundtrack/accent/mix 卡点泵感试听">⚡ 卡点混音</button>
    <button class="ghost" id="btnSfxDetect" title="POST /soundtrack/sfx/detect 镜头+LLM 规划 SFX">🔊 SFX 检测</button>
    <button class="ghost" id="btnSfxGen" title="POST /soundtrack/sfx/generate 批量生成 SFX">🔊 SFX 生成</button>
    <button class="ghost" id="btnScore" title="POST /soundtrack/advance 推进配乐管线">✦ 自动配乐</button>
    <button class="ghost" id="btnMixdown" title="POST /soundtrack/mixdown 多轨下混出片">⬇ 出片</button>
  </div>

  <!-- 走带控制 -->
  <div class="transport">
    <button class="tbtn" id="btnStart" title="回到开头">⏮</button>
    <button class="tbtn play" id="btnPlay" title="播放/暂停">►</button>
    <button class="tbtn" id="btnStop" title="停止">■</button>
    <button class="tbtn rec" title="（占位）">●</button>
    <span class="timecode"><span id="tcCur">00:00.0</span> <span class="total" id="tcTotal">/ 00:00.0</span></span>
    <span class="meta" id="transportMeta">未加载会话 · POST /soundtrack/advance 推进管线</span>
    <span class="spacer"></span>
    <div class="master">
      <span>主输出</span>
      <input class="vrange" type="range" min="0" max="150" value="100" id="masterVol">
      <span id="masterPct" style="width:34px;">100%</span>
    </div>
  </div>

  <!-- DAW 主体 -->
  <div class="stage">
    <!-- 左：轨道头列 -->
    <div class="heads" id="heads">
      <div class="heads-top">轨道</div>
      <!-- 轨道头由 JS 渲染 -->
    </div>

    <!-- 右：时间线 -->
    <div class="timeline" id="timeline">
      <div class="tl-inner" id="tlInner">
        <div class="ruler"><canvas id="rulerCanvas"></canvas></div>
        <!-- 卡点标记带 -->
        <div class="accents" id="accents"></div>
        <!-- 波形轨由 JS 渲染 -->
        <div id="lanes"></div>
        <!-- 播放头 -->
        <div class="playhead" id="playhead" style="left:0;"></div>
      </div>
    </div>
  </div>

  <!-- 底部标注 -->
  <div class="foot">
    <span class="legend"><span class="sw" style="background:#8a5aa8;"></span>原声/对白</span>
    <span class="legend"><span class="sw" style="background:var(--done);"></span>BGM</span>
    <span class="legend"><span class="sw" style="background:var(--warn);"></span>SFX</span>
    <span class="legend"><span class="sw" style="background:var(--done);border-radius:50%;"></span>大爆点</span>
    <span class="legend"><span class="sw" style="background:var(--mauve);border-radius:50%;"></span>普通卡点</span>
    <span class="spacer"></span>
    <span class="note" id="footNote">wavesurfer.js 真实波形 · 播放头本地驱动（后端无 WS）</span>
    <span class="api">POST /soundtrack/{advance,mixdown,accent,sfx,overlay}</span>
  </div>
</div>

<script>
/* ===== 接活：后端约定（照视频/配音样板） =====
   MEDIA_API：media_agent，默认 18450；?media= 覆盖。本页全部走 /soundtrack/* 路由。
   PROJECT_DIR：壳把 ?project= 转发进来；配乐会话以 work_dir 为锚（facade 读写 work_dir/session.json）。
     约定 work_dir = PROJECT_DIR + '/soundtrack'（与图生视频 PROJECT_DIR+'/video' 同套路；可由 ?workdir= 覆盖）。
   VIDEO：成片 mp4 路径（accent/detect、sfx/detect、首次 advance 新建会话需要）；?video= 传入。
   真实端点契约（见 media_agent/routes/soundtrack.py）：
     POST /soundtrack/advance  {work_dir, video?, global_style?, workflow_id, seeds_count, stop_after}
       → {stop_after, output, segments:[{index,t_start,t_end,duration,status,music_prompt,
            n_candidates,chosen_candidate,chosen_path,volume,emotion}], accents:[{t,intensity,confirmed}], global_style}
     POST /soundtrack/mixdown  {work_dir,...} → {output: 成片 mp4}
     POST /soundtrack/accent/detect {video, work_dir?} → {accents:[{t,intensity,confirmed}]}
     POST /soundtrack/accent/mix    {work_dir,...}     → {preview: bgm wav}
     POST /soundtrack/sfx/detect    {video, work_dir}  → {source_mp4, sfx_planned, shots:[{shot_index,t_start,t_end,...,chosen_path}]}
     POST /soundtrack/sfx/generate  {work_dir}         → 同上 view（含 chosen_path）
     POST /soundtrack/overlay/{generate,list,remove}   → {segment}/{segments}
   后端无 WS / 无服务端播放头（见 soundtrack.py docstring）：播放头本地定时器驱动。
   后端只产出本地音频/会话静态产物；media_agent 仅 /ui 静态托管 web/，无通用文件服务端点，
   故波形/回放统一用 file://（与 dub-mode2 / video-mode2 / asset-library 同约定）。 */
const MEDIA_API = new URLSearchParams(location.search).get('media') || 'http://127.0.0.1:18450';
const PROJECT_DIR = new URLSearchParams(location.search).get('project') || '';
const WORK_DIR = new URLSearchParams(location.search).get('workdir')
  || (PROJECT_DIR ? PROJECT_DIR.replace(/[\\/]+$/, '') + '/soundtrack' : '');
const VIDEO = new URLSearchParams(location.search).get('video') || '';

/* 本地路径 → 可在壳内播放/取波形的 src（file://，同 dub-mode2/asset-library 约定） */
function fileSrc(p) {
  if (!p) return '';
  if (/^(file|https?):/i.test(p)) return p;
  return 'file:///' + String(p).replace(/\\/g, '/').replace(/^\/+/, '');
}

async function postJSON(path, body) {
  const resp = await fetch(MEDIA_API + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body || {}),
  });
  let data = null;
  try { data = await resp.json(); } catch (e) {}
  if (!resp.ok) {
    const msg = (data && (data.detail || (data.error && (data.error.hint || data.error.message)))) || ('HTTP ' + resp.status);
    throw new Error(msg);
  }
  return data;
}

/* 时间线：总时长来自会话（段末或成片）；无会话时给一个占位时长仅用于画空标尺。 */
let TOTAL = 24.0;            // 成片总时长（秒）——由 setTotal() 按真实会话覆盖
const PX_PER_SEC = 58;       // 时间线缩放
let TL_WIDTH = TOTAL * PX_PER_SEC;

/* 真机由 setTrackSrc(trackId, url) 注入各轨音源（成片/BGM/SFX 输出）；
   无后端会话时为空 → 各轨显示静态占位，不渲染波形（不再用 CDN demo 假音源）。 */
const TRACK_SRC = { orig: null, bgm: null, sfx: null, dlg: null };

/* 轨道定义（取自确认稿：原声/BGM/SFX 三轨 + 对白只读占位）。
   clips 初始为空，由真实会话 segments / sfx shots / overlay 填充。 */
const TRACKS = [
  { id: 'orig', name: '视频原声', kind: 'AUDIO', color: '#3a5a8a', vol: 100, mute: false, solo: false, clips: [] },
  { id: 'bgm',  name: 'BGM',     kind: 'MUSIC', color: '#4ec98f', vol: 80,  mute: false, solo: false, clips: [] },
  { id: 'sfx',  name: 'SFX',     kind: 'FX',    color: '#c2884c', vol: 100, mute: false, solo: false, clips: [] },
  { id: 'dlg',  name: '对白',    kind: '只读',  color: '#8a5aa8', readonly: true, clips: [] }
];

/* 卡点（accent points）—— 由 /accent/detect 或 advance 返回填充；big = 高强度 */
let ACCENTS = [];

/* ---------- 渲染：轨道头列（方案 A） ---------- */
function renderHeads() {
  const root = document.getElementById('heads');
  root.querySelectorAll('.thead').forEach(n => n.remove());   // 保留 .heads-top，清旧轨头
  TRACKS.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'thead' + (t.readonly ? ' readonly' : '');
    if (t.readonly) {
      el.innerHTML = `
        <div class="row1">
          <span class="swatch" style="background:${t.color}"></span>
          <span class="tname">${t.name}</span>
          <span class="tkind">${t.kind}</span>
        </div>
        <div class="row2"><span class="ro-tag">只读 · 混在原声内，无独立 M/S/音量</span></div>`;
    } else {
      el.innerHTML = `
        <div class="row1">
          <span class="swatch" style="background:${t.color}"></span>
          <span class="tname">${t.name}</span>
          <span class="tkind">${t.kind}</span>
        </div>
        <div class="row2">
          <span class="ms m ${t.mute ? 'on' : ''}" data-trk="${i}" data-k="m">M</span>
          <span class="ms s ${t.solo ? 'on' : ''}" data-trk="${i}" data-k="s">S</span>
          <span class="vol" data-trk="${i}">
            <span class="fill" style="width:${t.vol / 1.5}%"></span>
            <span class="knob" style="left:${t.vol / 1.5}%"></span>
          </span>
          <span class="pct" id="pct-${i}">${t.vol}%</span>
        </div>`;
    }
    root.appendChild(el);
  });
}

/* ---------- wavesurfer 实例池（每轨一个；id -> WaveSurfer） ---------- */
const WS = {};            // { trackId: WaveSurfer }
const wsReady = {};       // { trackId: bool } 是否已 ready（用于联动播放/跳转）

/* hex 颜色转 rgba（给波形 progress/wave 上不同透明度） */
function rgba(hex, a) {
  const m = hex.replace('#', '');
  const r = parseInt(m.substring(0, 2), 16);
  const g = parseInt(m.substring(2, 4), 16);
  const b = parseInt(m.substring(4, 6), 16);
  return `rgba(${r},${g},${b},${a})`;
}

/* 创建一条音轨的 WaveSurfer 实例并渲染真实波形。
   宽度铺满时间线（TL_WIDTH），与标尺/卡点像素对齐。 */
function makeWave(track, hostEl, phEl) {
  if (typeof WaveSurfer === 'undefined') return null;  // CDN 未加载（离线）→ 保留占位
  const ws = WaveSurfer.create({
    container: hostEl,
    width: TL_WIDTH,
    height: 60,
    waveColor: rgba(track.color, 0.55),
    progressColor: rgba(track.color, 0.95),
    cursorColor: 'transparent',     // 播放头由全局 .playhead 统一画，关掉每轨游标
    barWidth: 2, barGap: 1, barRadius: 2,
    normalize: true,
    interact: false,                // 定位走全局时间线点击 → 统一 seek
    media: undefined,
  });
  ws.on('ready', () => {
    wsReady[track.id] = true;
    if (phEl) phEl.style.display = 'none';   // 隐藏静态占位
    // 音量 = 主输出 × 本轨音量；静音/独奏状态由 applyMuteSolo 接管
    const master = (parseInt(document.getElementById('masterVol').value, 10) || 100) / 100;
    try { ws.setVolume(Math.min(1, master * ((track.vol || 100) / 100))); } catch (e) {}
    if (playing) { try { ws.play(); ws.seekTo(Math.max(0, Math.min(1, cur / (ws.getDuration() || TOTAL)))); } catch (e) {} }
    applyMuteSolo();
  });
  ws.on('error', () => { if (phEl) phEl.textContent = '（波形加载失败：路径不可达 / 非音频）'; });
  return ws;
}

/* 对外接口：把 media_agent 成片/BGM/SFX 输出本地路径接到某条轨（自动 file:// 化）。
   真机：setTrackSrc('orig', sess.output) / setTrackSrc('bgm', accentPreviewWav) 等。 */
function setTrackSrc(trackId, path) {
  TRACK_SRC[trackId] = path || null;
  const ws = WS[trackId];
  const phEl = document.getElementById('waveph-' + trackId);
  if (!ws || !path) { if (phEl) { phEl.style.display = ''; } wsReady[trackId] = false; return; }
  wsReady[trackId] = false;
  if (phEl) { phEl.style.display = ''; phEl.textContent = '加载波形…'; }
  try { ws.load(fileSrc(path)); } catch (e) { if (phEl) phEl.textContent = '（波形加载失败）'; }
}
window.setTrackSrc = setTrackSrc;   // 暴露给主控/壳调用

/* ---------- 渲染：波形轨（wavesurfer 容器）+ clip 块 ----------
   可重复调用：先销毁旧 WaveSurfer 实例 + 清空 lanes，再按当前 TRACKS/TRACK_SRC 重建。 */
function renderLanes() {
  const lanes = document.getElementById('lanes');
  Object.keys(WS).forEach(id => { try { WS[id].destroy(); } catch (e) {} delete WS[id]; delete wsReady[id]; });
  lanes.innerHTML = '';
  document.getElementById('tlInner').style.width = TL_WIDTH + 'px';
  TRACKS.forEach((t) => {
    const trk = document.createElement('div');
    trk.className = 'trk' + (t.readonly ? ' readonly' : '');

    // wavesurfer 渲染容器
    const host = document.createElement('div');
    host.className = 'wave-host';
    host.id = 'wavehost-' + t.id;
    trk.appendChild(host);

    // 静态占位（无音源 / 加载中显示，ready 后隐藏）
    const ph = document.createElement('div');
    ph.className = 'wave-ph';
    ph.id = 'waveph-' + t.id;
    ph.textContent = t.readonly ? '对白混在原声内 · 无独立波形'
      : (TRACK_SRC[t.id] ? '加载波形…' : '无音源 · 推进配乐管线 / 出片后注入');
    trk.appendChild(ph);

    // clip 块（叠在波形上）
    t.clips.forEach(c => {
      const clip = document.createElement('div');
      clip.className = 'clip';
      clip.style.left = (c.s * PX_PER_SEC) + 'px';
      clip.style.width = Math.max(8, (c.e - c.s) * PX_PER_SEC - 2) + 'px';
      clip.style.background = rgba(t.color, 0.32);
      clip.style.borderColor = rgba(t.color, 0.5);
      clip.innerHTML = `<span class="lab">${c.lab}</span>${c.sub ? `<span class="sub">${c.sub}</span>` : ''}`;
      if (c.title) clip.title = c.title;
      trk.appendChild(clip);
    });

    lanes.appendChild(trk);

    // 建 WaveSurfer 实例并加载真实音源（无音源的只读轨/未注入轨仅显示占位）
    const ws = makeWave(t, host, ph);
    if (ws) {
      WS[t.id] = ws;
      const src = TRACK_SRC[t.id];
      if (src) { try { ws.load(fileSrc(src)); } catch (e) { ph.textContent = '（波形加载失败）'; } }
    }
  });
}

/* ---------- 渲染：时间标尺 ---------- */
function drawRuler() {
  const cv = document.getElementById('rulerCanvas');
  const dpr = window.devicePixelRatio || 1;
  const w = TL_WIDTH, h = 30;
  cv.style.width = w + 'px';
  cv.width = w * dpr; cv.height = h * dpr;
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);
  ctx.font = '10px Consolas, monospace';
  ctx.textBaseline = 'bottom';
  for (let sec = 0; sec <= TOTAL; sec++) {
    const x = sec * PX_PER_SEC;
    const major = sec % 2 === 0;
    ctx.strokeStyle = major ? '#3a4060' : '#262943';
    ctx.beginPath(); ctx.moveTo(x, major ? 12 : 20); ctx.lineTo(x, 30); ctx.stroke();
    if (major) {
      ctx.fillStyle = '#9aa0a6';
      const mm = String(Math.floor(sec / 60)).padStart(2, '0');
      const ss = String(sec % 60).padStart(2, '0');
      ctx.fillText(`${mm}:${ss}`, x + 3, 12);
    }
  }
}

/* ---------- 渲染：卡点标记带（贯穿所有轨高度） ----------
   ACCENTS 来自 /accent/detect 或 advance：{t, intensity, confirmed}。
   big = intensity ≥ 阈值（高强度爆点，参与真·卡点对齐）。可重复调用。 */
const ACCENT_BIG_THRESHOLD = 0.7;   // 与后端 mixdown/accent 默认 big_threshold 一致
function renderAccents() {
  const root = document.getElementById('accents');
  root.innerHTML = '';
  const fullH = TRACKS.length * 84;
  root.style.height = fullH + 'px';
  ACCENTS.forEach(a => {
    const big = (typeof a.intensity === 'number') ? a.intensity >= ACCENT_BIG_THRESHOLD : !!a.big;
    const el = document.createElement('div');
    el.className = 'accent' + (big ? ' big' : '');
    el.style.left = (a.t * PX_PER_SEC) + 'px';
    el.innerHTML = '<span class="dot"></span>';
    const inten = (typeof a.intensity === 'number') ? ` · 强度 ${a.intensity.toFixed(2)}` : '';
    el.title = `卡点 ${a.t.toFixed(1)}s${inten}${big ? ' · 大爆点（真·卡点对齐）' : ''}${a.confirmed ? ' · 已确认' : ''}`;
    root.appendChild(el);
  });
}

/* ---------- 走带 / 播放头 ----------
   播放头位置：本地 requestAnimationFrame 驱动（后端无 WS / 无服务端播放时钟，
   见 media_agent/routes/soundtrack.py docstring —— 播放/走带是纯前端职责）。
   transport 播放/暂停联动各 wavesurfer 实例（波形 progress 同步走）。 */
let playing = false, cur = 0, raf = null, last = 0;
const playhead = document.getElementById('playhead');
const tcCur = document.getElementById('tcCur');
function fmt(t) {
  const m = Math.floor(t / 60), s = (t % 60);
  return String(m).padStart(2, '0') + ':' + s.toFixed(1).padStart(4, '0');
}
function updateHead() {
  playhead.style.left = (cur * PX_PER_SEC) + 'px';
  tcCur.textContent = fmt(cur);
}

/* 把当前时间 cur 同步到所有 wavesurfer（按各自时长换算进度比例） */
function syncWaves(seek) {
  Object.keys(WS).forEach(id => {
    const ws = WS[id];
    if (!ws || !wsReady[id]) return;
    const dur = ws.getDuration() || TOTAL;
    if (seek) { try { ws.seekTo(Math.max(0, Math.min(1, cur / dur))); } catch (e) {} }
  });
}
function wavesPlay(on) {
  Object.keys(WS).forEach(id => {
    const ws = WS[id];
    if (!ws || !wsReady[id]) return;
    try { on ? ws.play() : ws.pause(); } catch (e) {}
  });
}

/* 本地定时器推进（TODO：后端若日后提供服务端播放头/走带 API，可在此切换为权威时钟驱动） */
function tick(ts) {
  if (!playing) return;
  if (!last) last = ts;
  cur += (ts - last) / 1000; last = ts;
  if (cur >= TOTAL) { cur = TOTAL; setPlay(false); }
  updateHead();
  if (playing) raf = requestAnimationFrame(tick);
}
function setPlay(on) {
  playing = on; last = 0;
  document.getElementById('btnPlay').textContent = on ? '❚❚' : '►';
  if (on) { syncWaves(true); wavesPlay(true); raf = requestAnimationFrame(tick); }
  else { cancelAnimationFrame(raf); wavesPlay(false); }
}

/* 外部（点击定位/停止/回到开头）改 cur 后调用：刷新播放头 + 同步波形 */
function seekTo(t) {
  cur = Math.max(0, Math.min(TOTAL, t));
  updateHead();
  syncWaves(true);
}

/* 重设时间线总时长（来自真实会话 segments 末段 / 成片时长）并重画标尺+卡点带。 */
function setTotal(sec) {
  if (!(sec > 0)) return;
  TOTAL = sec;
  TL_WIDTH = TOTAL * PX_PER_SEC;
  document.getElementById('tlInner').style.width = TL_WIDTH + 'px';
  document.getElementById('tcTotal').textContent = '/ ' + fmt(TOTAL);
  drawRuler();
  renderAccents();
}

/* M/S 状态 → 各轨 wavesurfer 静音：有任一 Solo 亮时只放亮 S 的轨；否则放未 Mute 的轨。 */
function applyMuteSolo() {
  const soloAny = TRACKS.some((t, i) => !t.readonly && document.querySelector(`.ms.s[data-trk="${i}"]`)?.classList.contains('on'));
  TRACKS.forEach((t, i) => {
    if (t.readonly) return;
    const muteOn = document.querySelector(`.ms.m[data-trk="${i}"]`)?.classList.contains('on');
    const soloOn = document.querySelector(`.ms.s[data-trk="${i}"]`)?.classList.contains('on');
    const audible = soloAny ? soloOn : !muteOn;
    const ws = WS[t.id];
    if (ws) { try { ws.setMuted(!audible); } catch (e) {} }
  });
}

/* ---------- 顶栏状态/提示 ---------- */
function setMeta(text) { document.getElementById('transportMeta').textContent = text; }
function setStyle(s) {
  document.getElementById('stylePill').textContent = '整体风格：' + (s && s.trim() ? s : '（未设置）');
}
function flashBtn(btn, busyText, ms) {
  const old = btn.dataset.label || btn.textContent;
  btn.dataset.label = old; btn.disabled = true; btn.textContent = busyText;
  return () => { btn.disabled = false; btn.textContent = old; };
}

/* ---------- 由真实会话视图更新轨道/卡点/时间线 ----------
   segments：advance 返回的 _session_segment_view（含 chosen_path / music_prompt / 区间）。 */
function applyAdvanceResult(res) {
  if (!res) return;
  if (typeof res.global_style === 'string') setStyle(res.global_style);

  const segs = Array.isArray(res.segments) ? res.segments : [];
  // 时间线总时长 = 末段 t_end（无则保持）；成片 output 在则以其驱动原声轨波形。
  if (segs.length) {
    const end = Math.max(...segs.map(s => s.t_end || 0));
    if (end > 0) setTotal(end);
  }
  // BGM 轨 clips：每段一个块（标 段号 / 状态 / 选中候选）。
  const bgm = TRACKS.find(t => t.id === 'bgm');
  bgm.clips = segs.map(s => ({
    s: s.t_start, e: s.t_end,
    lab: 'BGM·段' + ((s.index ?? 0) + 1),
    sub: (s.status || '') + (s.n_candidates ? ` · ${s.chosen_candidate != null ? (s.chosen_candidate + 1) + '/' : ''}${s.n_candidates}候选` : ''),
    title: (s.music_prompt || '').slice(0, 200),
  }));
  // 卡点
  if (Array.isArray(res.accents)) ACCENTS = res.accents;
  // 成片（含混好的多轨）→ 原声轨波形 + 回放
  if (res.output) setTrackSrc('orig', res.output);

  renderLanes();
  renderAccents();
}

/* SFX 视图 → SFX 轨 clips（每个 planned 镜头一个块）。 */
function applySfxResult(view) {
  if (!view || !Array.isArray(view.shots)) return;
  const sfx = TRACKS.find(t => t.id === 'sfx');
  sfx.clips = view.shots.map(s => ({
    s: s.t_start, e: s.t_end,
    lab: (s.prompt_short || 'SFX').slice(0, 18),
    sub: s.status || '',
    title: (s.prompt_short || '') + (s.chosen_path ? '\n' + s.chosen_path : ''),
  }));
  renderLanes();
}

/* overlay 列表 → 按 kind 并入 bgm/sfx 轨（叠加子轨片段，标 [叠加]）。 */
function applyOverlayList(segments) {
  if (!Array.isArray(segments)) return;
  ['bgm', 'sfx'].forEach(kind => {
    const trk = TRACKS.find(t => t.id === kind);
    if (!trk) return;
    const base = trk.clips.filter(c => !c._overlay);
    const ov = segments.filter(s => s.kind === kind).map(s => ({
      s: s.t_start, e: s.t_end, lab: '[叠加] ' + (s.prompt || '').slice(0, 14),
      sub: s.status || '', title: (s.prompt || '') + (s.audio_path ? '\n' + s.audio_path : ''), _overlay: true,
    }));
    trk.clips = base.concat(ov);
  });
  renderLanes();
}

/* ---------- 后端动作 ---------- */
async function doAdvance(btn) {
  if (!WORK_DIR) { setMeta('未选择项目（缺 ?project=/?workdir=），无法推进管线'); return; }
  const done = flashBtn(btn, '配乐中…');
  setMeta('POST /soundtrack/advance 推进中…（同步阻塞，耗时较长）');
  try {
    const res = await postJSON('/soundtrack/advance', {
      work_dir: WORK_DIR, video: VIDEO || undefined,
      global_style: undefined,        // 已有 session 时后端忽略；首次新建需 video+global_style（由壳/设置注入）
      workflow_id: '', seeds_count: 2, stop_after: 'mix',
    });
    applyAdvanceResult(res);
    setMeta('管线已推进至 ' + (res.stop_after || 'mix') + (res.output ? ' · 已出成片' : ''));
  } catch (e) {
    setMeta('配乐失败：' + e.message);
  } finally { done(); }
}

async function doMixdown(btn) {
  if (!WORK_DIR) { setMeta('未选择项目，无法出片'); return; }
  const done = flashBtn(btn, '混音中…');
  setMeta('POST /soundtrack/mixdown 多轨下混中…');
  try {
    const res = await postJSON('/soundtrack/mixdown', { work_dir: WORK_DIR });
    if (res.output) { setTrackSrc('orig', res.output); renderLanes(); }
    setMeta('出片完成：' + (res.output || ''));
  } catch (e) {
    setMeta('出片失败：' + e.message);
  } finally { done(); }
}

async function doAccentDetect(btn) {
  if (!VIDEO) { setMeta('缺成片 ?video=，无法检测卡点'); return; }
  const done = flashBtn(btn, '检测中…');
  setMeta('POST /soundtrack/accent/detect 光流爆点检测中…');
  try {
    const res = await postJSON('/soundtrack/accent/detect', {
      video: VIDEO, work_dir: WORK_DIR || undefined,
    });
    ACCENTS = Array.isArray(res.accents) ? res.accents : [];
    renderAccents();
    setMeta('检测到 ' + ACCENTS.length + ' 个卡点');
  } catch (e) {
    setMeta('卡点检测失败：' + e.message);
  } finally { done(); }
}

async function doAccentMix(btn) {
  if (!WORK_DIR) { setMeta('未选择项目，无法卡点混音'); return; }
  const done = flashBtn(btn, '试听生成中…');
  setMeta('POST /soundtrack/accent/mix 段拼接+对齐+泵感…');
  try {
    const res = await postJSON('/soundtrack/accent/mix', { work_dir: WORK_DIR });
    if (res.preview) { setTrackSrc('bgm', res.preview); renderLanes(); }
    setMeta('卡点泵感试听已就绪：' + (res.preview || ''));
  } catch (e) {
    setMeta('卡点混音失败：' + e.message);
  } finally { done(); }
}

async function doSfxDetect(btn) {
  if (!VIDEO || !WORK_DIR) { setMeta('缺 ?video= 或 work_dir，无法 SFX 检测'); return; }
  const done = flashBtn(btn, '检测中…');
  setMeta('POST /soundtrack/sfx/detect 镜头检测 + LLM 规划…');
  try {
    const view = await postJSON('/soundtrack/sfx/detect', { video: VIDEO, work_dir: WORK_DIR });
    applySfxResult(view);
    setMeta('SFX 规划：' + (view.shots ? view.shots.length : 0) + ' 个镜头');
  } catch (e) {
    setMeta('SFX 检测失败：' + e.message);
  } finally { done(); }
}

async function doSfxGenerate(btn) {
  if (!WORK_DIR) { setMeta('未选择项目，无法生成 SFX'); return; }
  const done = flashBtn(btn, '生成中…');
  setMeta('POST /soundtrack/sfx/generate 批量生成 SFX 候选…');
  try {
    const view = await postJSON('/soundtrack/sfx/generate', { work_dir: WORK_DIR });
    applySfxResult(view);
    setMeta('SFX 生成完成');
  } catch (e) {
    setMeta('SFX 生成失败：' + e.message);
  } finally { done(); }
}

/* overlay/generate（框选生成叠加子轨）：DAW 暂无框选 UI（属 3a/3b 框选交互范畴），
   端点已就绪。此处仅在加载时拉一次 overlay/list 把已有叠加子轨并入波形轨。
   TODO：补框选交互后调 /soundtrack/overlay/generate 提交 {kind,prompt,t_start,t_end}。 */
async function loadOverlayList() {
  if (!WORK_DIR) return;
  try {
    const res = await postJSON('/soundtrack/overlay/list', { work_dir: WORK_DIR });
    applyOverlayList(res.segments || []);
  } catch (e) { /* 无 overlay.json 时静默 */ }
}

/* 加载时只做真正只读的拉取：overlay/list（纯读 overlay.json，不触发管线）。
   后端无"只读会话状态"端点（advance 会真正推进阶段、跑重依赖），故不在 init 自动 advance，
   避免开页即跑豆包/cv2/生成。会话段落/卡点/成片波形在用户点「自动配乐 / 检测卡点」后填充。
   TODO：后端如补 GET /soundtrack/session（只读 segment view）可在此预加载段落与已有成片。 */
async function loadSession() {
  if (!WORK_DIR) { setMeta('未选择项目 · 用 ?project=/?workdir= 指定配乐工作目录'); return; }
  setMeta('就绪 · 点「自动配乐」推进管线 / 「检测卡点」分析成片');
  await loadOverlayList();
}

/* ---------- 交互绑定 ---------- */
function wire() {
  document.getElementById('btnPlay').addEventListener('click', () => setPlay(!playing));
  document.getElementById('btnStop').addEventListener('click', () => { setPlay(false); seekTo(0); });
  document.getElementById('btnStart').addEventListener('click', () => { seekTo(0); });

  // 时间线点击定位播放头（同步各 wavesurfer 进度）
  const inner = document.getElementById('tlInner');
  inner.addEventListener('click', (e) => {
    if (e.target.closest('.thead')) return;
    const rect = inner.getBoundingClientRect();
    const x = e.clientX - rect.left + document.getElementById('timeline').scrollLeft;
    seekTo(x / PX_PER_SEC);
  });

  // M / S / 音量 —— 事件委托到 #heads（轨头会随会话重渲染，委托后无需重绑）
  const heads = document.getElementById('heads');
  heads.addEventListener('click', (e) => {
    const ms = e.target.closest('.ms');
    if (ms) { ms.classList.toggle('on'); applyMuteSolo(); return; }
    const v = e.target.closest('.vol');
    if (v) {
      const rect = v.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      v.querySelector('.fill').style.width = (ratio * 100) + '%';
      v.querySelector('.knob').style.left = (ratio * 100) + '%';
      const i = v.getAttribute('data-trk');
      const pct = Math.round(ratio * 150);
      const pctEl = document.getElementById('pct-' + i); if (pctEl) pctEl.textContent = pct + '%';
      const tk = TRACKS[i];
      if (tk) { tk.vol = pct; const ws = WS[tk.id]; if (ws) { try { ws.setVolume(Math.min(1, pct / 100)); } catch (e2) {} } }
    }
  });

  // 主输出音量（前端混音预览：缩放所有非静音轨）
  const mv = document.getElementById('masterVol'), mp = document.getElementById('masterPct');
  mv.addEventListener('input', () => {
    mp.textContent = mv.value + '%';
    const g = Math.min(1, mv.value / 100);
    Object.keys(WS).forEach(id => { try { WS[id].setVolume(g * ((TRACKS.find(t => t.id === id)?.vol || 100) / 100)); } catch (e) {} });
  });

  // 真实后端动作
  document.getElementById('btnScore').addEventListener('click', (e) => doAdvance(e.currentTarget));
  document.getElementById('btnMixdown').addEventListener('click', (e) => doMixdown(e.currentTarget));
  document.getElementById('btnAccentDetect').addEventListener('click', (e) => doAccentDetect(e.currentTarget));
  document.getElementById('btnAccentMix').addEventListener('click', (e) => doAccentMix(e.currentTarget));
  document.getElementById('btnSfxDetect').addEventListener('click', (e) => doSfxDetect(e.currentTarget));
  document.getElementById('btnSfxGen').addEventListener('click', (e) => doSfxGenerate(e.currentTarget));
}

/* ---------- 启动 ---------- */
function init() {
  renderHeads();
  renderLanes();      // 各轨建 WaveSurfer 实例（音源由后端会话注入，无则显占位）
  drawRuler();
  renderAccents();
  updateHead();
  document.getElementById('tcTotal').textContent = '/ ' + fmt(TOTAL);
  wire();
  loadSession();      // 拉真实会话（含成片波形/段落/卡点）+ overlay 列表；无则留空提示
}
window.addEventListener('DOMContentLoaded', init);
</script>
