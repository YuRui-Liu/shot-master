<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糯米AI · 概览 · OVERVIEW</title>
<link rel="stylesheet" href="tokens.css">
<style>
  /* ===== 壳内容页：无自带标题栏/侧栏（由 web/app.html 提供），内容铺满 ===== */
  .wrap { max-width: 1320px; margin: 0 auto; padding: 22px 24px 60px; }

  /* ===== 顶部栏 ===== */
  .topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
  .topbar h1 {
    margin: 0; font-size: 22px; letter-spacing: .5px;
    background: linear-gradient(135deg, var(--blue), var(--mauve));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .topbar .en { font-size: 12px; color: var(--faint); letter-spacing: 2px; }
  .topbar .spacer { flex: 1; }
  .topbar .pill {
    font-size: 12px; color: var(--muted);
    border: 1px solid var(--border); border-radius: 14px; padding: 4px 13px;
  }

  /* ===== 项目信息卡 + 风格圣经 ===== */
  .project {
    display: flex; gap: 16px; align-items: center;
    background: linear-gradient(135deg, var(--panel), #1b1d2e);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 18px; margin-bottom: 14px;
  }
  .project .cover {
    width: 64px; height: 64px; flex: 0 0 64px; border-radius: 10px;
    background: radial-gradient(circle at 35% 30%, var(--mauve), var(--blue-dim));
    box-shadow: 0 0 16px rgba(139,127,217,.4);
  }
  .project .cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; display: block; }
  .project .info .name { font-size: 16px; font-weight: 700; }
  .project .info .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .project .info .meta b { color: var(--fg2); }

  /* 风格圣经条 */
  .bible {
    display: flex; gap: 13px; align-items: center;
    background: linear-gradient(135deg, var(--panel), #1b1d2e);
    border: 1px solid var(--border); border-left: 3px solid var(--periw);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px;
  }
  .bible .orb {
    width: 32px; height: 32px; flex: 0 0 32px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--mauve), var(--blue-dim));
    box-shadow: 0 0 14px rgba(139,127,217,.5);
  }
  .bible .bc { flex: 1; min-width: 0; }
  .bible .bt { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .bible .bt .t { font-size: 13px; font-weight: 650; }
  .bible .desc { font-size: 12px; color: var(--muted); }
  .bible .desc b { color: var(--fg2); }

  /* ===== 下一步行动条 ===== */
  .nab {
    display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
    background: rgba(74,158,255,.07); border: 1px solid #243a5a;
    border-radius: var(--radius); padding: 11px 15px;
  }
  .nab .ai { width: 18px; height: 18px; color: var(--blue); flex: 0 0 18px; }
  .nab .tx { font-size: 13px; color: #bcd4f5; flex: 1; } .nab .tx b { color: #fff; }

  /* ===== 流水线阶段（7阶段：创意→剧本→分镜→出图→视频→配音配乐→成片）===== */
  .flow { display: flex; gap: 8px; align-items: stretch; margin-bottom: 26px; flex-wrap: nowrap; }
  .pc {
    flex: 1; min-width: 0; background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 13px 13px 14px; position: relative;
    display: flex; flex-direction: column; box-shadow: 0 4px 12px rgba(0,0,0,.25);
    cursor: pointer; transition: border-color .14s, transform .05s;
  }
  .pc:hover { border-color: var(--mauve); }
  .pc:active { transform: translateY(1px); }
  .pc.cur { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue), 0 6px 16px rgba(74,158,255,.18); }
  .pc.locked { opacity: .5; cursor: not-allowed; }
  .pc.locked:hover { border-color: var(--border); }
  .pc .hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .pc .nm { font-size: 12.5px; color: var(--fg2); font-weight: 600; }
  .sb { font-size: 9px; border-radius: 8px; padding: 1px 7px; }
  .sb.done { color: var(--done); border: 1px solid #2c5a44; }
  .sb.cur  { color: var(--blue); border: 1px solid #2c4a6e; }
  .sb.lock { color: var(--faint); border: 1px solid var(--border); }
  .pc .big {
    font-size: 26px; font-weight: 750; line-height: 1;
    font-variant-numeric: tabular-nums; letter-spacing: -1px;
  }
  .pc .big .den { font-size: 13px; color: var(--faint); font-weight: 600; }
  .pc .meta { font-size: 10px; color: var(--muted); margin: 5px 0 9px; line-height: 1.4; }
  .pc .bar { height: 4px; background: #16182a; border-radius: 2px; overflow: hidden; margin-top: auto; }
  .pc .bar i { display: block; height: 100%; border-radius: 2px; }
  .pc.done .bar i { background: var(--done); }
  .pc.cur  .bar i { background: linear-gradient(90deg, var(--blue), var(--periw)); }
  .pc.locked .bar i { background: #4a4f63; }
  .arrow { display: flex; align-items: center; color: var(--faint); font-size: 14px; flex: 0 0 8px; }

  /* ===== 下半区：最近产物 + 快捷入口 ===== */
  .cols { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; align-items: start; }
  @media (max-width: 980px) { .cols { grid-template-columns: 1fr; } }

  .section-title { font-size: 13px; font-weight: 650; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
  .section-title .more { margin-left: auto; font-size: 11px; color: var(--blue); cursor: pointer; }

  /* 最近产物网格 */
  .recent { display: grid; grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)); gap: 12px; }
  .asset {
    background: var(--panel2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    overflow: hidden; cursor: pointer; transition: border-color .14s;
  }
  .asset:hover { border-color: var(--mauve); }
  .asset .ph {
    position: relative; aspect-ratio: 16 / 9;
    display: flex; align-items: center; justify-content: center;
    color: var(--faint); font-size: 11px; text-align: center; padding: 0 8px;
    background: linear-gradient(160deg, #20243a, #14172a); overflow: hidden;
  }
  .asset .ph img { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* 视频缩略角标 */
  .asset .ph .vtag {
    position: absolute; right: 6px; bottom: 6px; font-size: 9px; color: #cdd6f4;
    background: rgba(8,10,20,.7); border-radius: 6px; padding: 1px 6px;
  }
  .asset .cap { padding: 7px 9px; }
  .asset .cap .nm { font-size: 11.5px; color: var(--fg2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .asset .cap .sub { font-size: 10px; color: var(--faint); margin-top: 2px; }
  .asset .cap .kind {
    display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 7px; margin-top: 4px;
    color: var(--mauve); background: rgba(138,127,217,.16); border: 1px solid #4a3d6e;
  }

  /* 快捷入口 */
  .quick { display: flex; flex-direction: column; gap: 10px; }
  .qbtn {
    display: flex; align-items: center; gap: 12px; text-align: left;
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px 14px; color: var(--fg2); font: inherit; cursor: pointer; transition: border-color .14s;
  }
  .qbtn:hover { border-color: var(--mauve); filter: none; }
  .qbtn .qic {
    width: 34px; height: 34px; flex: 0 0 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center; color: #06122a;
    background: linear-gradient(135deg, var(--blue), var(--periw));
  }
  .qbtn .qic svg { width: 18px; height: 18px; }
  .qbtn .qt { font-size: 13px; font-weight: 600; color: var(--fg); }
  .qbtn .qd { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .qbtn .arr { margin-left: auto; color: var(--faint); }
</style>
</head>
<body>
<div class="wrap">

  <!-- 顶部栏 -->
  <div class="topbar">
    <h1>概览</h1><span class="en">OVERVIEW</span>
    <span class="spacer"></span>
    <span class="pill" id="pjPill">短剧 · 12 集 · 9:16</span>
  </div>

  <!-- 项目信息卡 -->
  <div class="project">
    <div class="cover" id="pjCover"></div>
    <div class="info">
      <div class="name" id="pjName">替嫁新娘的逆袭</div>
      <div class="meta" id="pjMeta">编号 <b>P-006</b> · 真人短剧 · <b>12</b> 集 · 画幅 <b>9:16</b> · 更新于 2026-05-31</div>
    </div>
  </div>

  <!-- 风格圣经 -->
  <div class="bible">
    <div class="orb"></div>
    <div class="bc">
      <div class="bt"><span class="t">全片风格圣经 · STYLE BIBLE</span><span class="badge">已设定 · 真人</span></div>
      <div class="desc" id="bibleDesc"><b>电影感暖调（real/cinematic-warm-v1）</b>：Panavision 65 + Vision3 500T 暖色调，浅景深、胶片颗粒。</div>
    </div>
    <button class="ghost" id="editBible">编辑</button>
  </div>

  <!-- 下一步行动条 -->
  <div class="nab">
    <span class="ai"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 2v4M12 18v4M2 12h4M18 12h4M5 5l3 3M16 16l3 3M19 5l-3 3M8 16l-3 3"/></svg></span>
    <span class="tx" id="nextTx">下一步 · <b>出图</b>：还有 <b>108</b> 个分镜待出图，完成后解锁「视频生成」</span>
    <button id="nextGo">去补全 →</button>
  </div>

  <!-- 流水线阶段进度（7 阶段） -->
  <div class="flow" id="flow"></div>

  <!-- 下半区 -->
  <div class="cols">
    <!-- 最近产物 -->
    <div>
      <div class="section-title">最近产物<span class="more" id="moreRecent">查看资源库 →</span></div>
      <div class="recent" id="recent"></div>
    </div>
    <!-- 快捷入口 -->
    <div>
      <div class="section-title">快捷入口</div>
      <div class="quick" id="quick"></div>
    </div>
  </div>

</div>

<script>
/* ===== API base + 项目目录（壳通过 ?media= / ?project= 注入，与其它内容页一致）===== */
const _qs = new URLSearchParams(location.search);
const MEDIA_API = _qs.get("media") || "http://127.0.0.1:18450";   // media_agent（项目概览聚合）
const PROJECT_DIR = _qs.get("project") || "";                     // 项目目录；空则保留占位

/* [A] 本地媒体 URL 助手（替代 file://，因 http 页面禁 file://）。 */
function mediaUrl(p){ if(!p) return ''; if(/^(https?:|data:|blob:)/.test(p)) return p;
  var u = MEDIA_API + '/file?path=' + encodeURIComponent(p);
  if (PROJECT_DIR && !/^([a-zA-Z]:[\\/]|\/|\\\\)/.test(p)) u += '&project=' + encodeURIComponent(PROJECT_DIR);
  return u; }
/* 约定封面路径：项目目录 + 分隔符 + cover.jpg（与 welcome.html 一致） */
function coverPath(dir) { if(!dir) return ''; const sep = dir.indexOf('\\\\')>=0 ? '\\\\' : '/'; return dir.replace(/[\\\\/]+$/,'') + sep + 'cover.jpg'; }

/* 概览阶段卡片 key → 壳左栏导航键（app.html data-key）。
   立意/剧本归「剧本创作」；分镜+出图都落「分镜板」；视频→视频生成；配音配乐+成片→视频后期。 */
const STAGE_NAV = {
  ideate: "screenwriter", script: "screenwriter",
  storyboard: "storyboard", imggen: "storyboard",
  video: "video_gen", audio: "video_post", final: "video_post",
};
/* 向壳（parent）发导航请求 */
function navTo(key) {
  try { window.parent.postMessage({ type: "nav", key }, "*"); } catch (e) {}
  console.log("[overview] nav →", key);
}

const SB = { done: "✓", cur: "●", lock: "🔒" };

/* 后端 status(done|cur|lock) → 卡片三态；缺省 lock。后端字段名可能是 status 或 st。 */
function stOf(s) {
  const v = s.status || s.st || "lock";
  return v === "done" || v === "cur" ? v : "lock";
}

/* 占位用的 7 阶段（无 project / 拉取失败时回退展示，全 lock 不报错）。 */
const FALLBACK_STAGES = [
  { key: "ideate",     label: "创意立意", status: "lock", done: 0, total: 1, meta: "题材/风格待定" },
  { key: "script",     label: "剧本",     status: "lock", done: 0, total: 0, meta: "等待立意完成" },
  { key: "storyboard", label: "分镜",     status: "lock", done: 0, total: 0, meta: "分镜脚本" },
  { key: "imggen",     label: "出图",     status: "lock", done: 0, total: 0, meta: "按镜出图" },
  { key: "video",      label: "视频生成", status: "lock", done: 0, total: 0, meta: "图生视频 · 按镜" },
  { key: "audio",      label: "配音配乐", status: "lock", done: 0, total: 0, meta: "配音 / 配乐" },
  { key: "final",      label: "成片",     status: "lock", done: 0, total: 0, meta: "合成导出" },
];

function renderFlow(stages) {
  const root = document.getElementById("flow");
  root.innerHTML = "";
  stages.forEach((s, i) => {
    const total = Number(s.total) || 0;
    const done = Number(s.done) || 0;
    const pct = total ? Math.min(100, Math.round((done / total) * 100)) : 0;
    const st = stOf(s);
    const cls = st === "done" ? "done" : st === "cur" ? "cur" : "locked";
    const card = document.createElement("div");
    card.className = "pc " + cls;
    card.dataset.stage = s.key;
    card.innerHTML = `
      <div class="hd"><span class="nm">${s.label || s.nm || s.key}</span><span class="sb ${st}">${SB[st]}</span></div>
      <div class="big">${done}<span class="den">/${total}</span></div>
      <div class="meta">${s.meta || ""}</div>
      <div class="bar"><i style="width:${pct}%"></i></div>`;
    card.addEventListener("click", () => {
      if (st === "lock") return;          // 锁定阶段不可达
      navTo(STAGE_NAV[s.key] || "overview");
    });
    root.appendChild(card);
    if (i < stages.length - 1) {
      const a = document.createElement("div");
      a.className = "arrow"; a.textContent = "›";
      root.appendChild(a);
    }
  });
}

/* ---- 最近产物（接真实 /project/clips）----
   GET {MEDIA_API}/project/clips?project=<dir>&sub=<子目录> →
   {clips:[{name, path(posix), kind:"image"|"video", size}]}。
   从若干常见出图/视频输出目录拉取并合并，取最近的若干条；无→空态。 */
const RECENT_MAX = 8;
// 真实产物输出目录（与项目文件规范一致）：出图 imggen/、分镜图 storyboard/、视频 video/、
// 角色/场景 ref 图 characters//scenes/、成片 exports/。原 shots/clips/exports 是错目录名→恒空→"暂无产物"。
const RECENT_SUBS = [
  { sub: "imggen",     label: "出图" },
  { sub: "storyboard", label: "分镜图" },
  { sub: "video",      label: "视频" },
  { sub: "characters", label: "角色图" },
  { sub: "scenes",     label: "场景图" },
  { sub: "exports",    label: "成片" },
];

function renderRecentEmpty(msg) {
  const root = document.getElementById("recent");
  root.innerHTML =
    `<div style="grid-column:1/-1;color:var(--faint);font-size:12px;` +
    `border:1px dashed var(--border);border-radius:var(--radius);` +
    `padding:22px;text-align:center;">${esc(msg || "暂无产物")}</div>`;
}

function renderRecent(items) {
  const root = document.getElementById("recent");
  root.innerHTML = "";
  if (!items || !items.length) { renderRecentEmpty("暂无产物"); return; }
  items.forEach(r => {
    const el = document.createElement("div");
    el.className = "asset";
    const url = mediaUrl(r.path);
    const vtag = r.kind === "video" ? `<span class="vtag">▶</span>` : "";
    // 缩略图：图/视频均尝试 <img>（视频可能无缩略 → onerror 回退文字占位）。
    const ph = url
      ? `<img src="${esc(url)}" alt="" loading="lazy"
             onerror="this.parentNode.textContent=this.alt||'无预览';">${vtag}`
      : esc(r.name);
    el.innerHTML = `
      <div class="ph">${ph}</div>
      <div class="cap">
        <div class="nm" title="${esc(r.name)}">${esc(r.name)}</div>
        <div class="sub">${esc(r.subLabel || "")}</div>
        <span class="kind">${r.kind === "video" ? "视频" : "图片"}</span>
      </div>`;
    el.addEventListener("click", () => navTo("asset_library"));
    root.appendChild(el);
  });
}

/* 拉一个子目录的 clips（失败/空 → 空数组，不抛）。 */
async function fetchClips(sub) {
  try {
    let u = MEDIA_API + "/project/clips?project=" + encodeURIComponent(PROJECT_DIR);
    if (sub) u += "&sub=" + encodeURIComponent(sub);
    const r = await fetch(u);
    if (!r.ok) return [];
    const data = await r.json();
    return Array.isArray(data.clips) ? data.clips : [];
  } catch (e) { return []; }
}

/* 进页拉最近产物：并行拉多个输出目录，合并去重，取最近若干条。
   端点无 mtime → 文件名降序近似「最近」（出图/视频按递增编号命名）。 */
async function loadRecent() {
  if (!PROJECT_DIR) { renderRecentEmpty("选择项目后展示最近产物。"); return; }
  try {
    const results = await Promise.all(RECENT_SUBS.map(s => fetchClips(s.sub)));
    const seen = new Set();
    let merged = [];
    results.forEach((clips, i) => {
      const label = RECENT_SUBS[i].label;
      clips.forEach(c => {
        if (!c || !c.path || seen.has(c.path)) return;
        if (/(^|\/)cover\.(jpg|jpeg|png|webp)$/i.test(c.path)) return; // 跳过封面
        seen.add(c.path);
        merged.push(Object.assign({ subLabel: label }, c));
      });
    });
    merged.sort((a, b) => String(b.name).localeCompare(String(a.name)));
    renderRecent(merged.slice(0, RECENT_MAX));
  } catch (e) {
    console.warn("[overview] 拉取最近产物失败：", e);
    renderRecentEmpty("无法连接后端，最近产物暂不可用。");
  }
}

/* ---- 快捷入口（nav 用壳左栏导航键）---- */
const QUICK = [
  { nm: "继续出图", desc: "前往分镜板，补全分镜参考图", nav: "storyboard",
    ic: '<path d="M3 3h18v18H3z"/><path d="M3 15l5-5 4 4 3-3 6 6"/><circle cx="8.5" cy="8.5" r="1.5"/>' },
  { nm: "剧本创作", desc: "立意 / 大纲 / 分集 / 分镜脚本", nav: "screenwriter",
    ic: '<path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18z"/>' },
  { nm: "资源库", desc: "角色 / 场景 / 道具 参考图", nav: "asset_library",
    ic: '<path d="M4 7l8-4 8 4-8 4-8-4Z"/><path d="M4 7v10l8 4 8-4V7"/>' },
  { nm: "全局设置", desc: "模型平台 / 出图 / 翻译 / 配乐", nav: "settings",
    ic: '<circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.4 1a7 7 0 0 0-1.7-1L14.5 3h-5l-.3 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.5L2.1 11a7 7 0 0 0 0 2"/>' },
];
function renderQuick() {
  const root = document.getElementById("quick");
  root.innerHTML = "";
  QUICK.forEach(q => {
    const b = document.createElement("button");
    b.className = "qbtn";
    b.innerHTML = `
      <span class="qic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">${q.ic}</svg></span>
      <span><span class="qt">${q.nm}</span><div class="qd">${q.desc}</div></span>
      <span class="arr">›</span>`;
    b.addEventListener("click", () => navTo(q.nav));
    root.appendChild(b);
  });
}

/* ---- 顶部信息卡 / 风格圣经 / 下一步 渲染 ---- */
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function renderHeader(data) {
  const p = data.project || {};
  const name = p.project_name || "未命名项目";
  const genre = data.genre || p.genre || "—";
  const aspect = p.aspect || "—";
  const eps = Number(p.episode_count) || 0;

  // 封面：项目目录约定封面（cover.jpg），与 welcome.html 一致
  const cvEl = document.getElementById('pjCover');
  if (cvEl && PROJECT_DIR) {
    const cvUrl = mediaUrl(coverPath(PROJECT_DIR));
    cvEl.innerHTML = `<img src="${esc(cvUrl)}" alt="" onerror="this.style.display='none'">`;
  }

  document.getElementById("pjName").textContent = name;
  document.getElementById("pjPill").textContent =
    `${genre} · ${eps ? eps + " 集" : "未分集"} · ${aspect}`;

  const metaBits = [];
  if (p.project_id) metaBits.push(`编号 <b>${esc(p.project_id)}</b>`);
  metaBits.push(esc(genre));
  if (eps) metaBits.push(`<b>${eps}</b> 集`);
  metaBits.push(`画幅 <b>${esc(aspect)}</b>`);
  const lm = (p.last_modified || "").slice(0, 10);
  if (lm) metaBits.push(`更新于 ${esc(lm)}`);
  document.getElementById("pjMeta").innerHTML = metaBits.join(" · ");
}

/* style_bible 是 dict（research §2.3 引用层），尽量取常见描述字段，兜底拼可读串。 */
function bibleText(bible, genre) {
  if (!bible || typeof bible !== "object") return "";
  const desc = bible.description || bible.desc || bible.summary || bible.style || "";
  const id = bible.id || bible.name || bible.key || "";
  if (desc) return id ? `<b>${esc(id)}</b>：${esc(desc)}` : esc(desc);
  if (id) return `<b>${esc(id)}</b>`;
  // 无结构化描述 → 列出键值兜底（避免空白）
  const parts = Object.entries(bible)
    .filter(([, v]) => typeof v === "string" && v)
    .slice(0, 3).map(([k, v]) => `${esc(k)}：${esc(v)}`);
  return parts.join("；");
}

function renderBible(data) {
  const txt = bibleText(data.bible, data.genre);
  const el = document.getElementById("bibleDesc");
  const badge = document.querySelector(".bible .badge");
  if (txt) {
    el.innerHTML = txt;
    if (badge) badge.textContent = "已设定" + (data.genre ? " · " + data.genre : "");
  } else {
    el.innerHTML = `<b>风格圣经待设定</b>：在立意阶段确定题材与全片风格后，这里会展示风格描述。`;
    if (badge) badge.textContent = "未设定";
  }
}

function renderNext(data) {
  const txt = (data.next_action || "").trim();
  const tx = document.getElementById("nextTx");
  if (txt) {
    tx.innerHTML = `下一步 · <b>${esc(txt)}</b>`;
  } else {
    tx.innerHTML = `流程暂无待办，或项目尚未开始 —— 从「剧本创作」开始你的下一集。`;
  }
}

/* 无 project 时的友好占位（不报错，保留布局）。 */
function renderPlaceholder(msg) {
  const cvEl = document.getElementById('pjCover');
  if (cvEl) cvEl.innerHTML = '';
  document.getElementById("pjName").textContent = "未选择项目";
  document.getElementById("pjPill").textContent = "—";
  document.getElementById("pjMeta").innerHTML =
    esc(msg || "请从首页选择或新建一个项目后，再查看概览。");
  document.getElementById("bibleDesc").innerHTML =
    `<b>风格圣经</b>：选择项目后展示。`;
  const badge = document.querySelector(".bible .badge");
  if (badge) badge.textContent = "—";
  document.getElementById("nextTx").innerHTML = esc(msg || "未选择项目。");
  renderFlow(FALLBACK_STAGES);
}

/* ---- 进页：拉真实概览 ---- */
async function loadOverview() {
  if (!PROJECT_DIR) { renderPlaceholder(); return; }
  try {
    const r = await fetch(MEDIA_API + "/project/overview?project=" +
      encodeURIComponent(PROJECT_DIR));
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    renderHeader(data);
    renderBible(data);
    renderNext(data);
    renderFlow(Array.isArray(data.stages) && data.stages.length
      ? data.stages : FALLBACK_STAGES);
  } catch (e) {
    console.warn("[overview] 拉取概览失败，保留占位：", e);
    renderPlaceholder("无法连接后端或读取项目概览，已显示占位。");
  }
}

/* 顶部动作按钮 → 路由到对应阶段 */
document.getElementById("editBible").addEventListener("click", () => navTo("screenwriter"));
document.getElementById("nextGo").addEventListener("click", () => navTo("screenwriter"));
document.getElementById("moreRecent").addEventListener("click", () => navTo("asset_library"));

loadRecent();     // 最近产物：接 /project/clips 真实数据
renderQuick();
loadOverview();
</script>
