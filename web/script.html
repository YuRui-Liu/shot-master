<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糯米AI · ② 剧本创作 · SCRIPT</title>
<link rel="stylesheet" href="tokens.css">
<style>
  /* 壳内容页：无自带标题栏/侧栏（由 web/app.html 糯米 AI 壳统一提供）；
     仅渲染剧本创作主从分栏内容，铺满工作区。 */
  body { overflow: hidden; }
  .work { height: 100vh; overflow: hidden; display: flex; flex-direction: column; padding: 22px 26px 0; }

  /* 顶部标题 + 健康（与 storyboard-script.html 同构：蓝紫渐变标题 + 项目路径 + 后端点） */
  .work-head { display: flex; align-items: center; gap: 16px; margin-bottom: 10px; flex-shrink: 0; }
  .work-head h1 {
    margin: 0; font-size: 21px; letter-spacing: .5px;
    background: linear-gradient(135deg, var(--blue), var(--mauve));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .work-head .pj { color: var(--muted); font-size: 12.5px; }
  .work-head .pj b { color: var(--fg2); }
  .work-head .status { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); }

  /* 向导步骤条（立意/剧本▸/分镜/出图prompt）——照搬 storyboard-script.html / ideate.html */
  .stepper { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; flex-shrink: 0; flex-wrap: wrap; }
  .step { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); padding: 5px 12px; border-radius: 18px; cursor: default; }
  .step .n { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 1px solid var(--border); }
  .step.active { background: linear-gradient(90deg, rgba(74,158,255,.2), rgba(74,158,255,.05)); color: var(--fg); font-weight: 600; }
  .step.active .n { background: var(--blue); color: #06122a; border-color: var(--blue); }
  .step.done .n { background: var(--done); color: #06220f; border-color: var(--done); }
  .step.clk { cursor: pointer; }
  .step.clk:hover { color: var(--fg); }
  .chev { color: var(--faint); font-size: 12px; }

  /* 参数条（集数/单集时长/语言风格 + 生成大纲） */
  .parambar {
    display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 11px 16px; margin-bottom: 14px;
  }
  .parambar .grp { display: flex; align-items: center; gap: 8px; }
  .parambar .grp label { color: var(--muted); font-size: 12.5px; }
  .parambar input[type="number"] { width: 64px; }
  .parambar .inject {
    font-size: 11px; color: var(--muted); background: #10131f;
    border: 1px solid #21243a; border-radius: var(--radius-sm); padding: 6px 10px;
  }
  .parambar .inject b { color: #9cc7ff; }
  .parambar .grow { flex: 1; }

  /* 主从分栏 */
  .split { flex: 1; display: flex; gap: 16px; min-height: 0; padding-bottom: 22px; }

  /* 左：大纲集列表 + 只读预览 + 一键全集 */
  .left {
    width: 360px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; min-height: 0;
    transition: width .18s ease, opacity .12s;
  }
  .left.collapsed { width: 0; opacity: 0; overflow: hidden; pointer-events: none; }

  .panel-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); display: flex; flex-direction: column; min-height: 0;
  }
  .panel-card .ph {
    display: flex; align-items: center; gap: 8px; padding: 12px 14px;
    border-bottom: 1px solid var(--border-lo); flex-shrink: 0;
  }
  .panel-card .ph .t { font-size: 12.5px; font-weight: 600; }
  .panel-card .ph .sp { flex: 1; }
  .panel-card .pbody { overflow: auto; padding: 10px 12px; flex: 1; min-height: 0; }

  /* 集列表 */
  .eplist { flex: 1; }
  .ep-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--field); margin-bottom: 8px; cursor: pointer; transition: all .14s;
  }
  .ep-item:hover { border-color: var(--mauve); }
  .ep-item.active { border-color: var(--blue); background: rgba(74,158,255,.08); }
  .ep-item .idx {
    width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
    background: var(--panel2); color: var(--mauve); border: 1px solid #4a3d6e;
  }
  .ep-item.active .idx { background: linear-gradient(135deg, var(--blue), var(--periw)); color: #06122a; border: none; }
  .ep-item .info { flex: 1; min-width: 0; }
  .ep-item .info .name { font-size: 13px; color: var(--fg); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ep-item .info .sum { font-size: 11.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ep-item .st { flex-shrink: 0; }
  .ep-empty { color: var(--faint); font-size: 12.5px; text-align: center; padding: 28px 10px; line-height: 1.7; }

  /* 只读预览（大纲流式文本） */
  .preview { max-height: 240px; }
  .preview .pbody { white-space: pre-wrap; font-size: 12px; line-height: 1.7; color: var(--fg2); }
  .preview .pbody .dim { color: var(--faint); }

  /* 左下：一键全集 */
  .leftfoot { flex-shrink: 0; }
  .btn-all { width: 100%; }
  .btn-all:disabled { filter: grayscale(.6) brightness(.7); }

  /* 右：折叠钮 + 集标题 + 剧集编辑器 */
  .right { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .rhead { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-shrink: 0; }
  .collapse-btn {
    background: var(--panel2); color: var(--fg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 7px 11px; font-size: 13px; line-height: 1;
  }
  .collapse-btn:hover { filter: none; border-color: var(--mauve); color: var(--fg); }
  .rhead .ep-title { font-size: 16px; font-weight: 600; color: var(--fg); }
  .rhead .ep-title .badge { margin-left: 8px; vertical-align: middle; }
  .rhead .sp { flex: 1; }
  .rhead .streaming { font-size: 11.5px; color: var(--blue); display: none; align-items: center; gap: 6px; }
  .rhead .streaming.on { display: flex; }
  .rhead .streaming .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: .3; } }

  .editor-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #episodeEditor {
    flex: 1; width: 100%; resize: none; font: inherit; line-height: 1.75;
    background: var(--field); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--fg); padding: 16px 18px; outline: none; min-height: 0;
  }
  #episodeEditor:focus { border-color: var(--mauve); }
  #episodeEditor::placeholder { color: var(--faint); }

  .ract { display: flex; gap: 10px; margin-top: 12px; flex-shrink: 0; }
  .btn-secondary { background: var(--panel2); color: var(--fg2); border: 1px solid var(--border); }
  .btn-secondary:hover { filter: none; border-color: var(--mauve); color: var(--fg); }
  .ract .grow { flex: 1; }

  /* 面板组件 基础间距 */
  .tonepanel, .pepanel { margin-top: 10px; padding: 10px 12px; font-size: 12.5px; }

  /* tone / pe 子元素 input/select/textarea 强制暗色（防系统样式） */
  .tonepanel input, .tonepanel select, .tonepanel textarea,
  .pepanel input, .pepanel select, .pepanel textarea {
    background: var(--field); color: var(--fg);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
  }
  .tonepanel select.dim-sel  { font-family: monospace; width: 100%; }
  .tonepanel .dim-row      { display: flex; align-items: center; gap: 4px; margin-bottom: 6px; flex-wrap: nowrap; }
  .tonepanel .dim-row .dim-lbl { width: 4em; font-size: 12px; color: var(--periw); flex-shrink: 0; }
  .tonepanel .dim-row .dim-inp { flex: 1; padding: 5px 7px; }
  .tonepanel .dim-note    { width: 100%; padding: 5px 7px; font-size: 11px; color: var(--muted); }
  .tonepanel .toneref-row { margin-top: 8px; }
  .tonepanel .toneref-inp { width: 100%; padding: 6px 7px; font-size: 12px; }

  /* 状态点小尺寸（集列表行） */
  .dot-sm { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); display: inline-block; }
  .dot-sm.ok { background: var(--done); box-shadow: 0 0 6px var(--done); }
  .dot-sm.run { background: var(--blue); animation: blink 1s infinite; }
</style>
</head>
<body>
<main class="work">
  <div class="work-head">
    <h1>② 剧本 · SCRIPT</h1>
    <span class="pj">项目：<b id="pjName">（未指定 project_dir）</b></span>
    <div class="status"><span class="dot" id="apiDot"></span><span id="apiText">检测后端…</span></div>
  </div>

  <!-- 向导步骤条（① 立意 done › ② 剧本 active › ③ 分镜 › ④ 出图提示词） -->
  <div class="stepper" id="stepper">
    <div class="step done clk" id="stepIdeate"><span class="n">1</span>立意</div><span class="chev">›</span>
    <div class="step active"><span class="n">2</span>剧本</div><span class="chev">›</span>
    <div class="step"><span class="n">3</span>分镜</div><span class="chev">›</span>
    <div class="step"><span class="n">4</span>出图提示词</div>
  </div>

  <!-- 本阶段参数 + 题材/风格继承提示 -->
  <div class="parambar">
    <div class="grp"><label>集数</label><input type="number" id="epCount" value="12" min="1" max="999"></div>
    <div class="grp"><label>单集时长</label><input type="number" id="durSec" value="60" min="10" max="600"><label>秒</label></div>
    <div class="grp"><label>语言风格</label>
      <select id="langStyle">
        <option value="口语化">口语化</option>
        <option value="书面">书面</option>
        <option value="文艺">文艺</option>
      </select>
    </div>
    <span class="inject">▸ 题材/风格 <b id="genreTag">继承自立意页</b>（改在立意页/概览）</span>
    <span class="grow"></span>
    <button id="btnOutline">✦ 生成剧本大纲</button>
  </div>

  <!-- 主从分栏 -->
  <div class="split">
    <!-- 左 -->
    <div class="left" id="leftPane">
      <div class="panel-card eplist">
        <div class="ph"><span class="t">分集大纲</span><span class="sp"></span><span class="faint" id="epCountLabel"></span></div>
        <div class="pbody" id="epList">
          <div class="ep-empty">尚无大纲。<br>设好参数后点「✦ 生成剧本大纲」，<br>流式预览见下方，完成后此处列出各集。</div>
        </div>
      </div>
      <div class="panel-card preview">
        <div class="ph"><span class="t">大纲预览（只读）</span></div>
        <div class="pbody" id="outlinePreview"><span class="dim">大纲生成时在此流式显示原始输出…</span></div>
      </div>
      <div class="leftfoot">
        <button class="btn-all" id="btnAll" disabled>⚡ 一键生成全集</button>
      </div>
    </div>

    <!-- 右 -->
    <div class="right">
      <div class="rhead">
        <button class="collapse-btn" id="btnCollapse" title="折叠/展开左栏">◧</button>
        <span class="ep-title" id="epTitle">选择左侧某一集开始编辑 <span class="badge" id="epBadge" style="display:none"></span></span>
        <span class="sp"></span>
        <span class="streaming" id="epStreaming"><span class="dot"></span>生成中…</span>
      </div>
      <div class="editor-wrap">
        <textarea id="episodeEditor" placeholder="点左侧某一集，再点「✦ 生成本集」由 AI 流式写入剧集正文；可直接编辑后「保存」。"></textarea>
        <div class="ract">
          <button id="btnEpisode" disabled>✦ 生成本集</button>
          <button class="btn-secondary" id="btnSave" disabled>保存</button>
          <span class="grow"></span>
          <button class="btn-secondary" id="btnRegen" disabled>↻ 重生成</button>
          <button id="btnPlanEntities" title="据大纲规划场景/角色/道具实体">🧩 规划实体</button>
          <button id="btnPlanTone" title="据大纲生成六维导演定调">🎬 生成定调</button>
          <button id="btnAdvance" title="进入分镜阶段">推进到分镜 →</button>
        </div>
        <div id="tonePanel" style="display:none;margin-top:10px;padding:10px 12px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:12.5px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <b>六维定调</b><span id="toneStatus" style="color:var(--muted);"></span><span style="flex:1"></span>
            <button id="toneClose" class="btn-secondary" style="padding:3px 9px;">关闭</button>
          </div>
          <div id="toneForm" style="margin-top:8px;"></div>
          <div style="margin-top:8px;">
            <button id="btnToneSave" style="display:none;">保存定调</button>
          </div>
        </div>
        <div id="planEntitiesPanel" style="display:none;margin-top:10px;padding:10px 12px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:12.5px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <b>规划实体</b><span id="peStatus" style="color:var(--muted);"></span><span style="flex:1"></span>
            <label style="font-size:12px;color:var(--muted);"><input type="checkbox" id="peForce"> 强制覆盖</label>
            <button id="peClose" class="btn-secondary" style="padding:3px 9px;">关闭</button>
          </div>
          <div id="peResult" style="margin-top:8px;line-height:1.8;"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
/* ===== 可配 API base：壳通过 ?sw=... 与 ?project=... 传入 =====
   后端 screenwriter_agent 默认 18430；路由前缀实际为 /script/outline /script/episode（SSE）。 */
const qs = new URLSearchParams(location.search);
const SW_API = qs.get("sw") || "http://127.0.0.1:18430";
/* media_agent（默认 18450）：题材模板库 /assets/genres、风格圣经库 /assets/styles（F1 域建） */
const MEDIA_API = qs.get("media") || "http://127.0.0.1:18450";
const PROJECT_DIR = qs.get("project") || qs.get("project_dir") || "";

const $ = (id) => document.getElementById(id);

/* 状态 */
let EPISODES = [];        // [{id:"E1", title, summary}]
let activeEp = null;      // 当前选中集 id
const epStatus = {};      // {E1: "idle"|"running"|"done"}
const epContent = {};     // {E1: "正文…"} 各集编辑器内容（持久化）
let busy = false;         // 单集/大纲流式互斥
// 壳切面板拦截约定：流式生成中告知壳「忙」，避免切页中断生成。
window.swIsBusy = () => busy;

/* ---------- 项目级持久化（localStorage 镜像，切页/重启不丢正文） ---------- */
const LS_SCRIPT = "nuomi.script.state." + (PROJECT_DIR || "noproj");
const LS_PROJECT_ASPECT = "nuomi.project.aspect." + (PROJECT_DIR || "noproj");
function saveLocal() {
  try {
    localStorage.setItem(LS_SCRIPT, JSON.stringify({
      episodes: EPISODES, status: epStatus, content: epContent, active: activeEp,
      epCount: $("epCount").value, durSec: $("durSec").value, langStyle: $("langStyle").value,
    }));
  } catch {}
  /* 传播画幅到分镜板：从立意页取当前 aspect 写入约定的跨页 key */
  try {
    const ideateKey = "nuomi.ideate.state." + (PROJECT_DIR || "noproj");
    const ideateRaw = localStorage.getItem(ideateKey);
    let ar = null;
    if (ideateRaw) { const s = JSON.parse(ideateRaw); if (s.aspect) ar = s.aspect; }
    if (!ar) ar = localStorage.getItem("nuomi.ideate.lastAspect");
    if (ar) localStorage.setItem(LS_PROJECT_ASPECT, ar);
  } catch (_) {}
}
function restoreLocal() {
  let s; try { s = JSON.parse(localStorage.getItem(LS_SCRIPT) || "null"); } catch {}
  if (s && s.epCount) $("epCount").value = s.epCount;
  if (s && s.durSec) $("durSec").value = s.durSec;
  if (s && s.langStyle) $("langStyle").value = s.langStyle;
  EPISODES = (s && Array.isArray(s.episodes)) ? s.episodes : [];
  Object.assign(epStatus, (s && s.status) || {});
  Object.assign(epContent, (s && s.content) || {});
  renderEpList();
  $("btnAll").disabled = EPISODES.length === 0;
  if (s && s.active && EPISODES.some((e) => e.id === s.active)) selectEp(s.active);
}

/* ---------- 二次打开：从后端读回分集/正文（BUGD 契约） ----------
   [列集]   GET {MEDIA_API}/project/episodes?project= → {episodes:[{id,title,has_storyboard}]}
            （合并 episode/ 与旧根，按集号排序；title 取自 剧本.json 大纲）
   [读内容] GET {MEDIA_API}/file?path=<相对项目|绝对>&project=<dir> → fetch().then(r=>r.text())
   后端落盘：剧本索引=剧本.json{episodes:[{id,title,summary}]}；
            分集正文=episode/剧本_E{id}.md（旧根 剧本_E{id}.md / 旧单文件 剧本.md=E1 兜底）。
   优先后端，读不到静默回退 localStorage；不抛错、不阻塞其余 init。 */
function epNum(id) { const m = /^E(\d+)$/.exec(id); return m ? parseInt(m[1], 10) : 0; }

async function mediaGet(path) {
  // path 形如 "/project/files?...";相对路径喂 /file 时由后端用 project 解析
  return fetch(MEDIA_API + path);
}

/* 列集：调 GET /project/episodes（后端合并 episode/ 与旧根，已按集号排序）→ id 列表。 */
async function listEpisodeMds() {
  if (!PROJECT_DIR) return [];
  try {
    const r = await mediaGet("/project/episodes?project=" + encodeURIComponent(PROJECT_DIR));
    if (!r.ok) return [];
    const j = await r.json().catch(() => ({}));
    const ids = (j.episodes || []).map((e) => e && e.id).filter(Boolean);
    return [...new Set(ids)].sort((a, b) => epNum(a) - epNum(b));
  } catch (_) { return []; }
}

/* 读 剧本.json 索引（title/summary 来源，可缺）→ {E1:{title,summary},...} 或 null。 */
async function readScriptIndex() {
  if (!PROJECT_DIR) return null;
  try {
    const r = await mediaGet("/file?path=" + encodeURIComponent("剧本.json")
      + "&project=" + encodeURIComponent(PROJECT_DIR));
    if (!r.ok) return null;                          // 404 = 无索引（仅有 .md 也行）
    const obj = JSON.parse(await r.text());
    const map = {};
    (obj.episodes || []).forEach((e) => {
      if (e && e.id) map[e.id] = { title: e.title || "", summary: e.summary || "" };
    });
    return map;
  } catch (_) { return null; }
}

/* 读单集正文：episode/剧本_E{id}.md → 旧根 剧本_E{id}.md → 旧单文件 剧本.md(E1)。
   返回文本或 null（与后端 script_episode_read_path 兜底链一致）。 */
async function readEpisodeMd(id) {
  const tryNames = ["episode/剧本_" + id + ".md", "剧本_" + id + ".md"];
  if (id === "E1") tryNames.push("剧本.md");
  for (const name of tryNames) {
    try {
      const r = await mediaGet("/file?path=" + encodeURIComponent(name)
        + "&project=" + encodeURIComponent(PROJECT_DIR));
      if (r.ok) return await r.text();
    } catch (_) { /* 试下一个名字 */ }
  }
  return null;
}

/* init：从后端读回分集与正文，覆盖 EPISODES/epContent/epStatus 并渲染。
   返回是否成功读到至少一集（false → 调用方回退 localStorage）。 */
async function loadFromBackend() {
  const ids = await listEpisodeMds();
  const idx = await readScriptIndex();
  // 集合并集：索引里有的 + 落盘 .md 有的，按编号排序去重
  const idSet = new Set(ids);
  if (idx) Object.keys(idx).forEach((k) => idSet.add(k));
  const allIds = [...idSet].sort((a, b) => epNum(a) - epNum(b));
  if (!allIds.length) return false;

  // 并行读各集正文
  const texts = await Promise.all(allIds.map((id) => readEpisodeMd(id)));

  EPISODES = allIds.map((id, i) => {
    const meta = (idx && idx[id]) || {};
    return { id, title: meta.title || "", summary: meta.summary || "" };
  });
  allIds.forEach((id, i) => {
    const t = texts[i];
    if (t != null) { epContent[id] = t; epStatus[id] = t.trim() ? "done" : "idle"; }
  });

  renderEpList();
  $("btnAll").disabled = EPISODES.length === 0;
  // 恢复 active：优先 localStorage 记录的 active（若仍存在），否则首集
  let act = null;
  try {
    const s = JSON.parse(localStorage.getItem(LS_SCRIPT) || "null");
    if (s && s.active && EPISODES.some((e) => e.id === s.active)) act = s.active;
  } catch (_) {}
  if (!act && EPISODES.length) act = EPISODES[0].id;

/* ---------- 通用 SSE 读取：fetch + ReadableStream，解析 event:/data: 块 ----------
   onEvent(name, dataObj) 回调；返回 Promise（done/error 时 resolve）。 */
async function streamSSE(path, body, onEvent) {
  const resp = await fetch(SW_API + path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!resp.ok) {
    let msg = resp.status + "";
    try { const j = await resp.json(); msg = (j.error && (j.error.message || j.error.hint)) || msg; } catch (_) {}
    onEvent("error", { code: "HTTP", message: msg });
    return;
  }
  const reader = resp.body.getReader();
  const decoder = new TextDecoder("utf-8");
  let buf = "";
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    // 以空行分割 SSE 事件块
    let idx;
    while ((idx = buf.indexOf("\n\n")) >= 0) {
      const block = buf.slice(0, idx);
      buf = buf.slice(idx + 2);
      let evName = "message", dataLines = [];
      block.split("\n").forEach((line) => {
        if (line.startsWith("event:")) evName = line.slice(6).trim();
        else if (line.startsWith("data:")) dataLines.push(line.slice(5).trim());
      });
      let data = {};
      if (dataLines.length) { try { data = JSON.parse(dataLines.join("\n")); } catch (_) { data = { text: dataLines.join("\n") }; } }
      onEvent(evName, data);
    }
  }
}

async function genOutline() {
  if (busy || !guardProject()) return;
  busy = true;
  $("btnOutline").disabled = true;
  $("btnAll").disabled = true;
  const prev = $("outlinePreview");
  prev.textContent = "";

    options: options(),
    reasoning_effort: "high",

      if (name === "delta") { prev.textContent += (data.text || ""); prev.scrollTop = prev.scrollHeight; }
      else if (name === "status") { /* phase: thinking/streaming/validating/saving */ }
      else if (name === "done") {

async function genEpisode(epId) {
  if (busy || !guardProject()) return;
  if (!epId) { alert("先在左侧选择一集。"); return; }
  busy = true;
  epStatus[epId] = "running"; renderEpList();
  $("epStreaming").classList.add("on");
  ["btnEpisode", "btnRegen", "btnOutline", "btnAll"].forEach((b) => ($(b).disabled = true));
  const ta = $("episodeEditor");
  ta.value = "";
  let acc = "";
  const body = {
    project_dir: PROJECT_DIR,
    episode_id: epId,
    options: options(),
    reasoning_effort: "high",
  };
  try {
    await streamSSE("/script/episode", body, (name, data) => {
      if (name === "delta") {
        acc += (data.text || "");
        // 仅当用户仍在看这集时实时写入编辑器（内容始终累积进 acc 以便持久化）
        if (activeEp === epId) { ta.value = acc; ta.scrollTop = ta.scrollHeight; }
      } else if (name === "done") {
        epStatus[epId] = "done";
        epContent[epId] = (activeEp === epId ? ta.value : acc);
        saveLocal();
      } else if (name === "error") {
        epStatus[epId] = "idle";
        if (activeEp === epId) ta.value += "\n[错误] " + (data.message || data.code || "");
      }
    });
  } catch (e) {
    epStatus[epId] = "idle";
    if (activeEp === epId) ta.value += "\n[网络错误] " + e.message;
  } finally {
    busy = false;
    $("epStreaming").classList.remove("on");
    $("btnOutline").disabled = false;
    $("btnAll").disabled = EPISODES.length === 0;
    if (activeEp === epId) ["btnEpisode", "btnSave", "btnRegen"].forEach((b) => ($(b).disabled = false));
    renderEpList();
  }
}

function pickName(arr, savedId, idKeys, nameKeys) {
  if (!Array.isArray(arr) || !arr.length) return null;
  const getId = (o) => idKeys.map((k) => o[k]).find((v) => v != null);
  const getName = (o) => nameKeys.map((k) => o[k]).find((v) => v != null);
  let rec = savedId ? arr.find((o) => getId(o) === savedId) : null;
  if (!rec) rec = arr[0];
  return getName(rec) || getId(rec) || null;
}

async function fetchAssetList(kind) {

    return Array.isArray(arr) ? arr : [];
  } catch (e) {
    console.warn("[script] /assets/" + kind + " 不可用，保留占位：", e.message);
    return null;
  }
}

(function wirePlanEntities() {

    const created = [], skipped = [], failed = [];
    try {
      const resp = await fetch(SW_API + "/plan_entities", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ project_dir: PROJECT_DIR, format: "drama",
                               options: { force_overwrite: $("peForce").checked } }),
      });
      if (!resp.ok) { statusEl.textContent = "失败 " + resp.status; return; }
      const reader = resp.body.getReader(), dec = new TextDecoder();
      let buf = "";
      for (;;) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const frames = buf.split("\n\n"); buf = frames.pop() || "";
        for (const f of frames) {
          let ev = "message", data = {};
          f.split("\n").forEach((ln) => {
            if (ln.startsWith("event:")) ev = ln.slice(6).trim();
            else if (ln.startsWith("data:")) { try { data = JSON.parse(ln.slice(5).trim()); } catch (e) {} }
          });
          if (ev === "status") statusEl.textContent = "生成中：" + (data.phase || "");
          else if (ev === "partial") (data.status === "created" ? created : data.status === "skipped" ? skipped : failed).push(data);
          else if (ev === "done") statusEl.textContent = "完成";

})();

function collectTone(prev) {
  const dims = {};
  const allDimEls = $("toneForm").querySelectorAll("[data-dim]");
  allDimEls.forEach(function(el) {
    const dim = el.dataset.dim, field = el.dataset.field;
    if (!dims[dim]) dims[dim] = {};
    if (field === "note") {
      dims[dim].note = el.value.trim();
    } else {
      /* 主字段名按 TONE_DIMS 的 field（level/ref/tag），与后端 validate_tone 一致 */
      const spec = TONE_DIMS.find(function(s) { return s[0] === dim; });
      const field = spec ? spec[3] : "value";
      dims[dim][field] = (typeof el.value === "string") ? el.value.trim() : el.value;
    }
  });
  const refsRaw = $("toneRefs") ? $("toneRefs").value.trim() : "";
  const director_refs = refsRaw ? refsRaw.split(/[,，]\s*/) : [];
  const sv = (prev && prev.schema_version) ? prev.schema_version : "1.0";
  return { schema_version: sv, dimensions: dims, director_refs: director_refs };
}

  /* 页面载入：回填已有定调 */
  if (PROJECT_DIR) {
    fetch(SW_API + "/tone?project=" + encodeURIComponent(PROJECT_DIR))
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(j) {
        if (j && j.tone && j.tone.dimensions) {
          _curTone = j.tone;
          $("tonePanel").style.display = "block";
          $("toneStatus").textContent = "已加载已有定调，可编辑后保存";
          renderToneForm(_curTone);
        }
      })
      .catch(function() {});
  }
})();

/* 切面板守卫：定调生成中也置忙 */
const _prevSwIsBusyTone = window.swIsBusy;
window.swIsBusy = () => (_toneBusy || (typeof _prevSwIsBusyTone === "function" && _prevSwIsBusyTone()));

/* ---------- 绑定 ---------- */
$("btnOutline").addEventListener("click", genOutline);
$("btnAll").addEventListener("click", genAll);
$("btnEpisode").addEventListener("click", () => genEpisode(activeEp));
$("btnRegen").addEventListener("click", () => genEpisode(activeEp));
$("btnSave").addEventListener("click", saveEpisode);
$("btnCollapse").addEventListener("click", toggleCollapse);
/* 编辑器改动 → 缓存到当前集（持久化在 保存/切集/blur 时落 localStorage） */
$("episodeEditor").addEventListener("input", () => { if (activeEp) epContent[activeEp] = $("episodeEditor").value; });
$("episodeEditor").addEventListener("blur", () => { if (activeEp) { epContent[activeEp] = $("episodeEditor").value; saveLocal(); } });
["epCount", "durSec", "langStyle"].forEach((id) => $(id).addEventListener("change", saveLocal));

/* 步骤条：① 立意 可点回退（postMessage 通知壳切回立意页，向后兼容；同 storyboard-script.html 的 advance 模式） */
$("stepIdeate").addEventListener("click", () => {
  saveLocal();
  window.parent && window.parent.postMessage({ type: "script.back", stage: "ideate" }, "*");
});

/* 右下角「推进到分镜 →」：保存后通知壳切到分镜阶段（同 ideate→剧本 的 advance 模式）。 */
$("btnAdvance").addEventListener("click", () => {
  saveLocal();
  window.parent && window.parent.postMessage({ type: "script.advance", stage: "storyboard" }, "*");
});

/* init：先恢复参数（集数/时长/语言风格）与 localStorage 镜像作即时占位，
   再异步从后端读回分集/正文覆盖（二次打开权威源）；后端读不到则保留 localStorage。 */
async function init() {
  checkHealth();
  renderEpList();
  restoreLocal();             // 即时占位：参数 + 上次分集/正文（无后端/离线时即终态）
  /* 首次加载：传播立意页画幅到分镜板约定的跨页 key */
  try {
    const ideateKey = "nuomi.ideate.state." + (PROJECT_DIR || "noproj");
    const ideateRaw = localStorage.getItem(ideateKey);
    let ar = null;
    if (ideateRaw) { const s = JSON.parse(ideateRaw); if (s.aspect) ar = s.aspect; }
    if (!ar) ar = localStorage.getItem("nuomi.ideate.lastAspect");
    if (ar) localStorage.setItem(LS_PROJECT_ASPECT, ar);
  } catch (_) {}
  readSelectedIdea();         // 显示立意页选定的立意（继承上下文）
  /* P0-6: 继承立意页集数（若脚本页从未保存过 epCount，从 ideate localStorage 回读） */
  if (!$("epCount").dataset.inherited) {
    try {
      const ideateKey = "nuomi.ideate.state." + (PROJECT_DIR || "noproj");
      const ideateRaw = localStorage.getItem(ideateKey);
      if (ideateRaw) {
        const ideateState = JSON.parse(ideateRaw);
        if (ideateState.episodes != null) {
          const epFromIdeate = parseInt(String(ideateState.episodes), 10);
          if (!isNaN(epFromIdeate) && epFromIdeate >= 1) {
            // 仅当脚本页自身未存过 epCount 时才继承（用户改过就不再覆盖）
            let savedEpCount = null;
            try {
              const s = JSON.parse(localStorage.getItem(LS_SCRIPT) || "null");
              if (s && s.epCount) savedEpCount = s.epCount;
            } catch (_) {}
            if (savedEpCount == null) {
              $("epCount").value = epFromIdeate;
              $("epCount").dataset.inherited = "1";
            }
          }
        }
      }
    } catch (_) {}
  }
  showInheritedContext();     // 域W3：只读显示当前选中题材/风格名
  try {
    await loadFromBackend();  // 二次打开：后端有则覆盖；读不到静默保留 localStorage
  } catch (e) {
    console.warn("[script] 后端读回失败，沿用 localStorage：", e && e.message);
  }
}
init();
</script>
</body>
</html>
