<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糯米AI · 创作技能库</title>
<link rel="stylesheet" href="tokens.css">
<style>
  /* ── 布局骨架 ─────────────────────────────────── */
  .app { max-width: 1280px; margin: 0 auto; padding: 22px 22px 60px; }
  .head { display: flex; align-items: center; gap: 13px; margin-bottom: 18px; }
  .head .logo { width: 36px; height: 36px; border-radius: 10px; flex: 0 0 auto;
    background: linear-gradient(135deg, var(--blue), var(--periw)); }
  .head .stat { margin-left: auto; font-size: 12px; color: var(--muted); }

  /* 工具条：搜索 + 分类筛选 */
  .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; }
  .search { flex: 1 1 280px; min-width: 220px; position: relative; }
  .search input { width: 100%; padding-left: 32px; }
  .search::before { content: "⌕"; position: absolute; left: 11px; top: 50%;
    transform: translateY(-50%); color: var(--faint); font-size: 15px; }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip { font: inherit; font-size: 12.5px; padding: 6px 13px; border-radius: 20px;
    background: var(--field); color: var(--fg2); border: 1px solid var(--border);
    cursor: pointer; transition: .15s; }
  .chip:hover { border-color: var(--blue-dim); color: var(--fg); }
  .chip.on { background: linear-gradient(135deg, var(--blue), var(--periw));
    color: #06122a; border-color: transparent; font-weight: 600; }

  /* 主体：左侧卡网格 + 右侧详情 */
  .main { display: grid; grid-template-columns: 1fr 372px; gap: 18px; align-items: start; }
  @media (max-width: 980px) { .main { grid-template-columns: 1fr; } }

  /* 技能卡网格 */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 14px; }
  .skill { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 15px 16px 14px; cursor: pointer; transition: .15s; display: flex; flex-direction: column;
    position: relative; min-height: 150px; }
  .skill:hover { border-color: var(--blue-dim); transform: translateY(-2px); }
  .skill.sel { border-color: var(--mauve); box-shadow: 0 0 0 1px var(--mauve) inset; }
  .skill .top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .skill .ico { width: 34px; height: 34px; border-radius: 9px; flex: 0 0 auto; font-size: 18px;
    display: grid; place-items: center; background: var(--panel2); border: 1px solid var(--border); }
  .skill .name { font-weight: 600; font-size: 14.5px; line-height: 1.35; }
  .skill .cat { font-size: 11px; color: var(--periw); margin-top: 2px; }
  .skill .desc { color: var(--muted); font-size: 12.5px; line-height: 1.5; flex: 1; margin-bottom: 11px; }
  .skill .foot { display: flex; align-items: center; gap: 8px; }
  .skill .load { padding: 6px 14px; font-size: 12.5px; }
  .skill .modnum { margin-left: auto; font-size: 11px; color: var(--faint); }

  .count { font-size: 12px; color: var(--muted); margin: 2px 0 12px; }
  .empty { color: var(--faint); padding: 40px; text-align: center; grid-column: 1 / -1; }

  /* 右侧详情面板 */
  .detail { position: sticky; top: 18px; }
  .detail .ph { color: var(--faint); text-align: center; padding: 60px 20px; line-height: 1.7; }
  .detail h2 { font-size: 17px; display: flex; align-items: center; gap: 10px; }
  .detail .dico { width: 30px; height: 30px; border-radius: 8px; font-size: 16px;
    display: grid; place-items: center; background: var(--panel2); border: 1px solid var(--border); }
  .detail .summary { color: var(--fg2); font-size: 13px; margin: 4px 0 14px; }
  .kv { display: flex; gap: 8px; font-size: 12.5px; margin: 6px 0; }
  .kv .k { color: var(--faint); flex: 0 0 64px; }
  .kv .v { color: var(--fg2); }
  .pillrow { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 14px; }
  .mod { display: flex; gap: 9px; padding: 9px 11px; background: var(--field);
    border: 1px solid var(--border-lo); border-radius: var(--radius-sm); margin-bottom: 8px; }
  .mod .mk { font-size: 12.5px; font-weight: 600; color: var(--fg); }
  .mod .md { font-size: 11.5px; color: var(--muted); margin-top: 2px; line-height: 1.45; }
  .mod .pri { margin-left: auto; flex: 0 0 auto; align-self: flex-start; }
  .pri-high { color: var(--done); } .pri-mid { color: var(--warn); } .pri-low { color: var(--faint); }
  .apply { width: 100%; margin-top: 6px; padding: 11px; }

  /* 可选模块资源区 */
  .resblock { margin-top: 26px; }
  .resgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 13px; }
  .res { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .res h3 { font-size: 13.5px; display: flex; align-items: center; gap: 8px; }
  .res ul { margin: 8px 0 0; padding-left: 18px; color: var(--muted); font-size: 12.5px; line-height: 1.7; }
  .res ul b { color: var(--fg2); font-weight: 600; }

  .divider { height: 1px; background: var(--border-lo); margin: 24px 0 18px; }
</style>
</head>
<body>
<div class="app">

  <!-- 头部 -->
  <div class="head">
    <div class="logo"></div>
    <div>
      <h1>创作技能库 · Skill Loader</h1>
      <div class="faint">选择创作类型 → 加载对应流水线预设（题材/风格/分镜schema/质检/音画对齐）。支持短剧·MV·广告·纪录片·动画·口播等多类型创作。</div>
    </div>
    <div class="stat"><span id="dot" class="dot"></span><span id="health">后端就绪</span></div>
  </div>

  <!-- 工具条：搜索 + 分类 -->
  <div class="toolbar">
    <div class="search"><input type="text" id="q" placeholder="搜索技能名称 / 简述 / 关键词…"></div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="main">
    <!-- 左：技能卡网格 -->
    <div>
      <div class="count" id="count">—</div>
      <div class="grid" id="grid"></div>
    </div>

    <!-- 右：详情 + 应用 -->

      <div class="ph">从左侧选择一个创作技能<br>查看流水线预设详情并应用到当前项目</div>
    </div>
  </div>

  <!-- 可选模块资源区（整合调研成果） -->
  <div class="resblock">
    <div class="divider"></div>
    <div class="section-label">可选模块资源 · 来自 4 仓库调研（只读知识库，按阶段注入 system-prompt）</div>
    <div class="faint" style="margin-bottom:14px;">下列方法论/schema 以纯 Markdown/JSON 登记于 <code>resources/skills/</code>，零外部依赖；技能加载时按其阶段标签自动挑选注入。配音/配乐/音效/智能转场维持自有工业化方案。</div>
    <div class="resgrid" id="resgrid"></div>
  </div>

</div>

      ["剧本台词结构化标记","角色(语气) → qwen3-tts / index-tts2 音色+情绪参数"],
      ["♪ / ambient 字段抽取","→ ACE-Step1.5XL 配乐 + stable-audio 音效提示"],
      ["节奏波浪/爆点节奏图","四阶段曲线 + 爆点锚点 → 配乐情绪强度"],
    ]},
  ];

  /* ── 渲染 ─────────────────────────────────── */
  let activeCat = "全部", query = "", selected = null;
  const PRI = { high:["高","pri-high"], mid:["中","pri-mid"], low:["低","pri-low"] };

  function renderChips() {
    $("chips").innerHTML = CATS.map(c =>
      `<button class="chip ${c===activeCat?"on":""}" data-cat="${c}">${c}</button>`).join("");
    $("chips").querySelectorAll(".chip").forEach(el =>
      el.onclick = () => { activeCat = el.dataset.cat; renderChips(); renderGrid(); });
  }

  function match(s) {
    const catOk = activeCat === "全部" || s.cat === activeCat;
    const q = query.trim().toLowerCase();
    const qOk = !q || (s.name + s.desc + s.cat).toLowerCase().includes(q);
    return catOk && qOk;
  }

  function renderGrid() {
    const list = SKILLS.filter(match);
    $("count").textContent = `${list.length} 个技能` + (activeCat !== "全部" ? ` · ${activeCat}` : "") + ` / 共 ${SKILLS.length}`;
    if (!list.length) { $("grid").innerHTML = `<div class="empty">没有匹配的技能</div>`; return; }
    $("grid").innerHTML = list.map(s => {
      const i = SKILLS.indexOf(s);
      return `<div class="skill ${selected===i?"sel":""}" data-i="${i}">
        <div class="top">
          <div class="ico">${s.icon}</div>
          <div><div class="name">${s.name}</div><div class="cat">${s.cat} · ${s.medium}</div></div>
        </div>
        <div class="desc">${s.desc}</div>
        <div class="foot">
          <button class="load" data-i="${i}">加载 ▸</button>
          <span class="modnum">${s.modules.length} 个模块</span>
        </div>
      </div>`;
    }).join("");
    $("grid").querySelectorAll(".skill").forEach(el =>
      el.onclick = () => select(+el.dataset.i));
    $("grid").querySelectorAll(".load").forEach(el =>
      el.onclick = (e) => { e.stopPropagation(); select(+el.dataset.i); });
  }

  function select(i) {
    selected = i; renderGrid();
    const s = SKILLS[i];
    $("detail").classList.remove("ph");
    $("detail").innerHTML = `
      <div class="section-label">技能详情</div>
      <h2><span class="dico">${s.icon}</span>${s.name}</h2>
      <div class="summary">${s.desc}</div>
      <div class="kv"><span class="k">创作类型</span><span class="v">${s.cat}</span></div>
      <div class="kv"><span class="k">媒介</span><span class="v">${s.medium}</span></div>
      <div class="kv"><span class="k">产物</span><span class="v">${s.output}</span></div>
      <div class="section-label" style="margin-top:14px;">注入的流水线模块</div>
      ${s.modules.map(m => {
        const [pl, pc] = PRI[m[2]];
        return `<div class="mod"><div><div class="mk">${m[0]}</div>
          <div class="md">阶段 · ${m[1]}</div></div>
          <span class="pri badge ${pc}">${pl}优先</span></div>`;
      }).join("")}
      <button class="apply" onclick="apply('${s.name.replace(/'/g,"")}')">应用到当前项目 ✓</button>
      <div class="faint" id="applymsg" style="text-align:center;margin-top:8px;"></div>`;
  }

  function apply(name) {
    $("applymsg").textContent = `已将「${name}」预设注入当前项目流水线（mockup）`;
  }

  function renderResources() {
    $("resgrid").innerHTML = RESOURCES.map(r => `
      <div class="res"><h3><span>${r.icon}</span>${r.stage}</h3>
        <ul>${r.items.map(it => `<li><b>${it[0]}</b> — ${it[1]}</li>`).join("")}</ul>
      </div>`).join("");
  }

  $("q").addEventListener("input", e => { query = e.target.value; renderGrid(); });

  // 后端健康检查（与 split-tool.html 同源；mockup 下静默降级）
  (async () => {
    const API = new URLSearchParams(location.search).get("api") || "http://127.0.0.1:18450";
    try { const r = await fetch(API + "/health"); if (r.ok) { $("dot").className="dot ok"; $("health").textContent="后端已连接"; return; } } catch(e){}
    $("dot").className = "dot"; $("health").textContent = "演示数据 (mockup)";
  })();

  renderChips(); renderGrid(); renderResources();
</script>
</body>
</html>
