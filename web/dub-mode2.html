<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糯米AI · ⑤ 配音 · DUBBING</title>
<link rel="stylesheet" href="tokens.css">
<style>
  /* 作为壳内容页：自带标题栏/侧栏由 web/app.html 壳(糯米 AI)统一提供，本页不重复。 */
  body { overflow-x: hidden; }

  /* 工作区 */
  .work { padding: 24px 28px 40px; }
  .work-head {
    display: flex; align-items: center; gap: 16px; margin-bottom: 14px; max-width: 1180px; flex-wrap: wrap;
  }
  .work-head h1 { margin: 0; font-size: 22px; }
  .ep-select { min-width: 150px; }
  .shot-select { min-width: 200px; }
  .head-spacer { flex: 1; }
  .btn-oneclick {
    background: linear-gradient(135deg, var(--done), #3aa978); color: #06231a; font-weight: 700;
    white-space: nowrap;
  }

  /* 并行任务切换器（替代旧左侧任务栏；像集数下拉，最多 5 个并行任务） */
  .taskbar {
    max-width: 1180px; display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
    background: var(--navy); border: 1px solid var(--border-lo);
    border-radius: var(--radius); padding: 9px 14px;
  }
  .taskbar .lbl { color: var(--muted); font-size: 12.5px; display: flex; align-items: center; gap: 6px; }
  .task-select { min-width: 260px; }
  .taskbar .cap { margin-left: auto; color: var(--faint); font-size: 11.5px; }
  .taskbar .cap b { color: var(--mauve); }

  /* 工作模式切换 */
  .modebar {
    max-width: 1180px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px; margin-bottom: 16px;
  }
  .modebar .lbl { color: var(--muted); font-size: 12.5px; }
  .seg { display: flex; background: var(--field); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 3px; }
  .seg button {
    background: transparent; color: var(--fg2); padding: 7px 16px;
    border-radius: 5px; font-weight: 500;
  }
  .seg button.on {
    background: linear-gradient(135deg, var(--blue), var(--periw));
    color: #06122a; font-weight: 600;
  }
  .seg button:hover:not(.on) { filter: none; background: rgba(255,255,255,.04); }
  .align-note {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    color: var(--mauve); font-size: 12.5px;
  }
  .align-note .badge { background: rgba(78,201,143,.16); color: var(--done); border-color: #2f6b4f; }

  /* SHOT/台词卡列表 */
  .shots { max-width: 1180px; display: flex; flex-direction: column; gap: 16px; }
  .shot {
    display: flex; gap: 18px; background: var(--panel);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
  }
  /* 左：分镜图竖图缩略（自动对齐） */
  .thumb {
    position: relative; width: 150px; flex-shrink: 0;
    aspect-ratio: 9 / 16; border-radius: var(--radius-sm); overflow: hidden;
    background: linear-gradient(160deg, #20243a, #14172a);
    border: 1px solid var(--border-lo); display: flex; align-items: center; justify-content: center;
  }
  .thumb .ph { color: var(--faint); font-size: 12px; text-align: center; padding: 0 10px; }
  .thumb .tag {
    position: absolute; left: 8px; bottom: 8px;
    font-size: 11px; letter-spacing: 1px; font-weight: 700; color: var(--fg);
    background: rgba(0,0,0,.55); padding: 3px 8px; border-radius: 5px;
  }
  .thumb .ord {
    position: absolute; right: 8px; top: 8px; font-size: 10px; color: var(--mauve);
    background: rgba(138,127,217,.18); border: 1px solid #4a3d6e; padding: 2px 7px; border-radius: 9px;
  }

  /* 右：编辑区 */
  .body { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .meta { color: var(--fg2); font-size: 13px; margin-bottom: 8px; }
  .meta .sep { color: var(--faint); margin: 0 6px; }
  .meta .dur { color: var(--blue); font-weight: 600; }
  .meta .role { color: var(--periw); font-weight: 600; }

  /* 台词文本 */
  .line {
    background: var(--field); border: 1px solid var(--border-lo); border-left: 3px solid var(--periw);
    border-radius: var(--radius-sm); padding: 10px 13px; margin-bottom: 12px;
    color: var(--fg); line-height: 1.6;
  }
  .line .ltag { color: var(--muted); font-size: 11px; letter-spacing: .5px; display: block; margin-bottom: 3px; }

  /* 配音参数行：音色 / 情绪 / 语速 */
  .params { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .params .field-grp { display: flex; flex-direction: column; gap: 4px; min-width: 150px; flex: 1; }
  .params label { font-size: 11.5px; color: var(--muted); }
  .params select { width: 100%; }
  .params .voice-grp { flex: 1.4; }

  /* 提示词标签 + textarea */
  .prompt-label { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .prompt-label .name { font-size: 12.5px; color: var(--periw); font-weight: 600; }
  .prompt-label .pill {
    font-size: 10.5px; background: rgba(74,158,255,.14); color: var(--blue);
    border: 1px solid var(--blue-dim); padding: 1px 8px; border-radius: 9px;
  }
  textarea {
    width: 100%; min-height: 96px; resize: vertical; font: inherit; line-height: 1.6;
    background: var(--field); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--fg); padding: 11px 13px; outline: none;
  }
  textarea:focus { border-color: var(--mauve); }
  textarea::placeholder { color: var(--faint); }

  /* 范例 chip 行 */
  .examples { display: flex; align-items: center; gap: 8px; margin: 11px 0; flex-wrap: wrap; }
  .examples .lab { color: var(--muted); font-size: 12.5px; margin-right: 2px; }
  .chip {
    background: var(--panel2); color: var(--fg2); border: 1px solid var(--border);
    border-radius: 14px; padding: 5px 13px; font-size: 12.5px; cursor: pointer;
    transition: all .14s;
  }
  .chip:hover { border-color: var(--mauve); color: var(--fg); background: var(--panel); filter: none; }
  .chip.active { background: rgba(138,127,217,.18); border-color: var(--mauve); color: var(--mauve); font-weight: 600; }
  .chip-hint { color: var(--faint); font-size: 11.5px; margin-left: 4px; }

  /* 操作按钮 */
  .actions { display: flex; gap: 10px; margin-top: 4px; align-items: center; }
  .btn-save { background: var(--panel2); color: var(--fg2); border: 1px solid var(--border); }
  .btn-save:hover { filter: none; border-color: var(--mauve); color: var(--fg); }
  .btn-listen {
    background: transparent; color: var(--blue); border: 1px solid var(--blue-dim);
  }
  .btn-listen:hover { filter: none; background: rgba(74,158,255,.08); }
  .btn-dub {
    background: linear-gradient(135deg, var(--done), #3aa978); color: #06231a; font-weight: 700;
  }
  .actions .grow { flex: 1; }
</style>
</head>
<body>
<div class="app">
  <main class="work">
    <div class="work-head">
      <h1>⑤ 配音 · DUBBING</h1>
      <select class="ep-select" id="epSelect">
        <option>第 1 集</option>
        <option>第 2 集</option>
        <option>第 3 集</option>
      </select>
      <select class="shot-select" id="shotSelect">
        <option>全部镜头</option>
        <option>1-1 城郊废品回收站</option>
        <option>1-2 审讯室对峙</option>
        <option>2-1 雨夜天台</option>
      </select>
      <span class="head-spacer"></span>
      <button class="btn-oneclick" id="oneClick">⚡ 一键分镜配音</button>
    </div>

    <!-- 并行任务切换器（最多 5 个并行任务，替代旧左侧任务栏） -->
    <div class="taskbar">
      <span class="lbl">⛁ 并行任务</span>
      <select class="task-select" id="taskSelect"></select>
      <span class="cap">最多 <b>5</b> 个并行任务 · 切换即聚焦该任务上下文</span>
    </div>

    <!-- 工作模式切换 -->
    <div class="modebar">
      <span class="lbl">工作模式</span>
      <div class="seg">
        <button id="m1">模式1 · 自由配音台</button>
        <button id="m2" class="on">模式2 · 剧集分镜对齐</button>
      </div>
      <div class="align-note">
        <span class="badge" id="alignCount">已按分镜顺序自动对齐 3 个镜头</span>
        分镜图 ↔ 台词 自动对齐
      </div>
    </div>

    <!-- SHOT/台词卡列表（由 JS 渲染） -->
    <div class="shots" id="shots"></div>
  </main>
</div>

<script>
/* ===== 后端 API base（可由壳通过 ?sw= 注入；默认 screenwriter_agent 本地端口） ===== */
const SW_API = new URLSearchParams(location.search).get('sw') || 'http://127.0.0.1:18430';

/* ===== 配音提示词范例模板 =====
   对应不同 TTS / 情绪表达「模式」，chip 点击填入对应 textarea。 */
const DUB_TEMPLATES = [
  {
    id: "dub-tense",
    name: "范例1",
    title: "短剧·压抑对峙（情绪克制·气声收尾）",
    text:
`角色：中年男（审讯对象）。整体压抑、克制，强忍怒意。
语气：低沉沙哑，咬字偏紧；关键词「认」「想多了」加重。
节奏：句中留一次明显停顿（约 0.4s），尾音下沉、带气声收。
情绪曲线：平静 → 压抑挑衅 → 收敛冷笑。`
  },
  {
    id: "dub-cry",
    name: "范例2",
    title: "短剧·哽咽独白（颤音·渐弱）",
    text:
`角色：年轻女性。情绪脆弱、隐忍落泪。
语气：偏柔、略带鼻音，句尾颤抖；「等」字拖长并轻微破音。
节奏：整体偏慢，关键句前吸气可闻；末句渐弱至近耳语。
情绪曲线：克制 → 委屈上涌 → 哽咽。`
  },
  {
    id: "dub-narrate",
    name: "范例3",
    title: "旁白·冷静叙事（清晰·中性）",
    text:
`角色：旁白（无实体）。冷静、客观、不带过多情绪。
语气：清晰稳定，中等音量，咬字干净；信息点轻微强调。
节奏：匀速偏稳，句间停顿一致，便于与画面剪辑对齐。
情绪曲线：全程中性平稳。`
  }
];

/* ===== 音色库（下拉：角色 → 音色） ===== */
const VOICE_LIBRARY = [
  { group: "男声", voices: ["秦烈 · 低沉磁性男声", "中年沉稳男声", "青年清亮男声"] },
  { group: "女声", voices: ["林夏 · 温柔女声", "御姐成熟女声", "少女清甜女声"] },
  { group: "旁白", voices: ["冷静中性旁白", "纪录片厚重旁白"] }
];
const EMOTIONS = ["自动（按提示词）", "平静", "压抑", "愤怒", "哽咽", "喜悦", "冷峻", "急促"];
const SPEEDS = ["0.8× 慢", "0.9×", "1.0× 正常", "1.1×", "1.25× 快"];

/* ===== 并行任务（最多 5 个；切换当前任务） ===== */
const PARALLEL_TASKS = [
  { id: "t1", name: "任务A · 都市悬疑《废铁》", ep: "第 1 集", shots: 3 },
  { id: "t2", name: "任务B · 古风《长安雨》", ep: "第 2 集", shots: 4 },
  { id: "t3", name: "任务C · 校园《晚自习》", ep: "第 1 集", shots: 2 }
];

/* ===== 三个镜头：分镜图缩略 + 台词 + 默认配音参数（stub，体现自动对齐） ===== */
const SHOTS = [
  {
    n: 1, role: "旁白", meta: ["全景", "俯拍", "固定", "4s"],
    desc: "雨夜废品场全景\n人群打伞站立",
    line: "雨，已经下了三天。这座城市的秘密，都被冲进了下水道。",
    voice: "冷静中性旁白", emotion: "平静", speed: "1.0× 正常"
  },
  {
    n: 2, role: "秦烈", meta: ["中景", "平视", "缓慢推", "3s"],
    desc: "男主蹲于废铁堆\n翻看地图",
    line: "（低声）就是这里……他们果然把东西藏在了这。",
    voice: "秦烈 · 低沉磁性男声", emotion: "压抑", speed: "0.9×"
  },
  {
    n: 3, role: "林夏", meta: ["近景", "过肩（秦烈肩后）", "固定", "2s"],
    desc: "面部特写\n眼神警觉",
    line: "（颤抖）别过去……求你了，会出事的。",
    voice: "林夏 · 温柔女声", emotion: "哽咽", speed: "0.9×"
  }
];

const PLACEHOLDER = "点「✦ 生成配音提示词」由 AI 看台词+分镜生成配音指导，或先选下方「范例」模板填入再编辑…";

/* 构造 音色下拉（分组：角色→音色） */
function voiceOptions(selected) {
  return VOICE_LIBRARY.map(g =>
    `<optgroup label="${g.group}">` +
    g.voices.map(v => `<option ${v === selected ? "selected" : ""}>${v}</option>`).join("") +
    `</optgroup>`
  ).join("");
}
function simpleOptions(arr, selected) {
  return arr.map(o => `<option ${o === selected ? "selected" : ""}>${o}</option>`).join("");
}

function renderTasks() {
  const sel = document.getElementById("taskSelect");
  sel.innerHTML = PARALLEL_TASKS
    .map((t, i) => `<option value="${t.id}" ${i === 0 ? "selected" : ""}>${t.name} · ${t.ep} · ${t.shots} 镜</option>`)
    .join("");
}

function renderShots() {
  const root = document.getElementById("shots");
  root.innerHTML = "";
  SHOTS.forEach((s) => {
    const card = document.createElement("div");
    card.className = "shot";
    const meta =
      `<span class="role">${s.role}</span><span class="sep">·</span>` +
      s.meta
        .map((m, i) => i === s.meta.length - 1 ? `<span class="dur">${m}</span>` : `<span>${m}</span>`)
        .join('<span class="sep">·</span>');

    card.innerHTML = `
      <div class="thumb">
        <div class="ph">${s.desc.replace(/\n/g, "<br>")}</div>
        <div class="ord">第 ${s.n} 个 · 自动对齐</div>
        <div class="tag">SHOT ${s.n}</div>
      </div>
      <div class="body">
        <div class="meta">${meta}</div>
        <div class="line"><span class="ltag">台词</span>${s.line}</div>

        <div class="params">
          <div class="field-grp voice-grp">
            <label>音色（角色 → 音色）</label>
            <select data-fld="voice" data-shot="${s.n}">${voiceOptions(s.voice)}</select>
          </div>
          <div class="field-grp">
            <label>情绪</label>
            <select data-fld="emotion" data-shot="${s.n}">${simpleOptions(EMOTIONS, s.emotion)}</select>
          </div>
          <div class="field-grp">
            <label>语速</label>
            <select data-fld="speed" data-shot="${s.n}">${simpleOptions(SPEEDS, s.speed)}</select>
          </div>
        </div>

        <div class="prompt-label">
          <span class="name">配音提示词</span>
          <span class="pill">角色 · 语气 · 节奏 · 情绪曲线</span>
        </div>
        <textarea data-shot="${s.n}" placeholder="${PLACEHOLDER}"></textarea>

        <div class="examples" data-shot="${s.n}">
          <span class="lab">范例：</span>
          ${DUB_TEMPLATES.map(t =>
            `<span class="chip" data-tpl="${t.id}" title="${t.title}">${t.name}</span>`
          ).join("")}
          <span class="chip-hint">点击填入对应配音范例模板</span>
        </div>

        <div class="actions">
          <button class="btn-gen" data-act="gen" data-shot="${s.n}">✦ 生成配音提示词</button>
          <button class="btn-save" data-act="save" data-shot="${s.n}">保存</button>
          <span class="grow"></span>
          <button class="btn-listen" data-act="listen" data-shot="${s.n}">▷ 试听</button>
          <button class="btn-dub" data-act="dub" data-shot="${s.n}">✦ 生成配音</button>
        </div>
      </div>`;
    root.appendChild(card);
  });
}

/* chip 点击：把对应配音模板示例文本填入本卡 textarea，并高亮当前 chip */
function wireExamples() {
  document.querySelectorAll(".examples").forEach((row) => {
    const shotN = row.getAttribute("data-shot");
    const ta = document.querySelector(`textarea[data-shot="${shotN}"]`);
    row.querySelectorAll(".chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        const tpl = DUB_TEMPLATES.find(t => t.id === chip.getAttribute("data-tpl"));
        if (!tpl) return;
        ta.value = tpl.text;
        row.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
      });
    });
  });
}

/* 按钮 stub：仅占位提示 + 注释真实接线 */
function wireActions() {
  document.querySelectorAll("button[data-act]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const act = btn.getAttribute("data-act");
      const n = btn.getAttribute("data-shot");
      const ta = document.querySelector(`textarea[data-shot="${n}"]`);
      if (act === "gen") {
        // 真实接线：screenwriter_agent POST {SW_API}/audio_prompt（SSE 流式吐配音提示词）
        ta.value = "（stub）AI 正读 SHOT " + n + " 台词 + 分镜，生成配音指导（角色/语气/节奏/情绪曲线）…\n" +
          "实际接 screenwriter_agent POST " + SW_API + "/audio_prompt （SSE 流式）。";
      } else if (act === "save") {
        btn.textContent = "已保存 ✓";
        setTimeout(() => (btn.textContent = "保存"), 1200);
      } else if (act === "listen") {
        // 真实接线：media_agent POST {SW_API}/soundtrack 或 TTS 试听端点，回放音频片段
        btn.textContent = "▷ 试听中…";
        setTimeout(() => (btn.textContent = "▷ 试听"), 1400);
      } else if (act === "dub") {
        // 真实接线：media_agent POST {SW_API}/soundtrack（或 TTS 合成端点），生成配音并入轨
        btn.textContent = "✦ 已入队";
        setTimeout(() => (btn.textContent = "✦ 生成配音"), 1400);
      }
    });
  });
}

/* 工作模式切换（本页默认模式2 高亮；点模式1 仅切高亮，stub） */
function wireModes() {
  const m1 = document.getElementById("m1");
  const m2 = document.getElementById("m2");
  m1.addEventListener("click", () => { m1.classList.add("on"); m2.classList.remove("on"); });
  m2.addEventListener("click", () => { m2.classList.add("on"); m1.classList.remove("on"); });
}

/* 顶部「一键分镜配音」stub：实际批量对每个 SHOT 调 /audio_prompt + /soundtrack */
function wireOneClick() {
  const b = document.getElementById("oneClick");
  b.addEventListener("click", () => {
    b.textContent = "⚡ 批量配音中…";
    setTimeout(() => (b.textContent = "⚡ 一键分镜配音"), 1600);
  });
}

renderTasks();
renderShots();
wireExamples();
wireActions();
wireModes();
wireOneClick();
document.getElementById("alignCount").textContent =
  `已按分镜顺序自动对齐 ${SHOTS.length} 个镜头`;
</script>
</body>
</html>
