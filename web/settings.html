<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糯米AI · 全局设置 · SETTINGS</title>
<!-- 壳内容页：自带标题栏/侧栏由 web/app.html（糯米 AI）统一提供，本页不再重复 -->
<link rel="stylesheet" href="tokens.css">
<style>
  /* 本页布局：左分类导航 + 右表单卡片 + 底栏[验证并保存]。内容铺满壳工作区。 */
  body { overflow: hidden; }
  .settings { display: flex; height: 100vh; min-height: 0; }

  /* ── 左：分类导航（按 section.category 自动分组）── */
  .nav {
    width: 208px; flex: 0 0 208px; background: var(--navy);
    border-right: 1px solid var(--border-lo);
    display: flex; flex-direction: column; min-height: 0;
  }
  .nav .nhead { padding: 14px 16px 10px; border-bottom: 1px solid var(--border-lo); }
  .nav .nhead .t { font-size: 13px; font-weight: 700; }
  .nav .nhead .d { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
  .nlist { flex: 1; overflow: auto; padding: 8px 7px; }
  .cat {
    font-size: 10px; color: var(--faint); font-weight: 700; letter-spacing: .6px;
    text-transform: uppercase; padding: 11px 9px 4px;
  }
  .ni {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-radius: 7px; margin-bottom: 2px; border: 1px solid transparent;
    cursor: pointer; color: var(--fg2); font-size: 12.5px; user-select: none;
  }
  .ni:hover { background: rgba(255,255,255,.04); }
  .ni.sel {
    background: linear-gradient(90deg, rgba(167,139,250,.18), rgba(74,158,255,.05));
    border-color: #3a3266; color: #fff; font-weight: 600;
  }
  .ni .ico { width: 15px; text-align: center; opacity: .9; }
  .ni .badge {
    margin-left: auto; font-size: 8.5px; color: var(--done);
    border: 1px solid #2c5a44; border-radius: 7px; padding: 0 5px;
  }
  .ni .badge.warn { color: var(--warn); border-color: #5a4a2c; }

  /* ── 右：表单区 ── */
  .body { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .bhead {
    display: flex; align-items: center; gap: 10px; padding: 14px 22px;
    border-bottom: 1px solid var(--border-lo); flex-shrink: 0;
  }
  .bhead .t { font-size: 15px; font-weight: 700; }
  .bhead .cat-pill {
    font-size: 9.5px; color: #cdbcf5; border: 1px solid #4a3d6e;
    border-radius: 9px; padding: 1px 9px;
  }
  .bhead .sp { flex: 1; }
  .bbody { flex: 1; overflow: auto; padding: 18px 22px; }

  .intro {
    font-size: 11.5px; color: var(--muted); line-height: 1.6; margin: 0 0 16px;
    background: var(--field); border: 1px solid var(--border);
    border-left: 3px solid var(--periw); border-radius: 8px; padding: 9px 12px;
  }
  .intro b { color: var(--fg2); }
  .intro code {
    background: #1c1f2e; border: 1px solid #2a2e44; border-radius: 4px;
    padding: 1px 5px; color: #9cc7ff; font-size: 11px;
  }

  /* 卡片分区（沿用 tokens .card 调色，本页定制 padding/标题） */
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 9px; padding: 14px 16px; margin-bottom: 14px;
  }
  .card .clab {
    font-size: 11px; color: var(--periw); font-weight: 700; letter-spacing: .4px;
    text-transform: uppercase; margin: 0 0 11px;
  }

  /* 表单行 */
  .frow { display: flex; align-items: center; gap: 12px; margin-bottom: 11px; }
  .frow:last-child { margin-bottom: 0; }
  .frow .fl { width: 118px; flex: 0 0 118px; text-align: right; font-size: 12px; color: var(--fg2); }
  .frow .fc { flex: 1; display: flex; gap: 8px; align-items: center; }
  .inp {
    flex: 1; background: var(--field); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 10px; color: var(--fg); font-size: 12px; min-width: 0;
  }
  .inp.pw { letter-spacing: 2px; font-family: monospace; }
  .inp:focus { border-color: var(--mauve); outline: none; }
  .inp::placeholder { color: var(--faint); }
  .sel {
    background: var(--field); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 10px; color: var(--fg); font-size: 12px;
  }
  .sel:focus { border-color: var(--mauve); outline: none; }
  .btn-sm {
    background: var(--field); border: 1px solid var(--border); color: var(--fg2);
    border-radius: 6px; padding: 7px 12px; font-size: 12px; cursor: pointer; white-space: nowrap;
  }
  .btn-sm:hover { border-color: var(--blue-dim); filter: none; }
  .btn-sm.test { color: var(--blue); border-color: #2c4a6e; }
  .hint { font-size: 10.5px; color: var(--muted); margin-top: 3px; padding-left: 130px; }
  .hint.ok { color: var(--done); }
  .hint.err { color: var(--err); }
  .hint a { color: #9cc7ff; }
  .num { width: 90px; flex: 0 0 90px; text-align: center; }

  /* toggle 开关 */
  .tg {
    width: 38px; height: 21px; border-radius: 11px; background: #2a2d44;
    border: 1px solid var(--border); position: relative; flex: 0 0 38px; cursor: pointer;
  }
  .tg .knob {
    position: absolute; top: 2px; left: 2px; width: 15px; height: 15px;
    border-radius: 50%; background: var(--faint); transition: .15s;
  }
  .tg.on { background: linear-gradient(135deg, var(--blue), var(--periw)); border-color: transparent; }
  .tg.on .knob { left: 19px; background: #fff; }
  .tg-note { font-size: 12px; color: var(--fg2); }

  /* 单选 radio 行 */
  .radios { display: flex; gap: 10px; flex-wrap: wrap; }
  .rad {
    display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--fg2);
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; cursor: pointer;
  }
  .rad.sel { border-color: var(--mauve); background: rgba(167,139,250,.1); color: #fff; }
  .rad .rdot { width: 11px; height: 11px; border-radius: 50%; border: 1.5px solid var(--faint); }
  .rad.sel .rdot { border-color: var(--mauve); background: radial-gradient(var(--mauve) 40%, transparent 45%); }

  /* 项目管理列表 */
  .projlist { display: flex; flex-direction: column; gap: 7px; }
  .proj {
    display: flex; align-items: center; gap: 11px; background: var(--field);
    border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px;
  }
  .proj .pthumb {
    width: 40px; height: 26px; border-radius: 5px;
    background: linear-gradient(135deg, #243a5a, #3a2746); flex: 0 0 40px;
  }
  .proj .pinfo { flex: 1; min-width: 0; }
  .proj .pnm { font-size: 12.5px; font-weight: 600; color: var(--fg); display: flex; align-items: center; gap: 7px; }
  .proj .pid {
    font-size: 9px; color: var(--faint); border: 1px solid var(--border);
    border-radius: 6px; padding: 0 5px; font-variant-numeric: tabular-nums;
  }
  .proj .ppth {
    font-size: 10.5px; color: var(--muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .proj .pmeta { font-size: 10px; color: var(--faint); margin-top: 2px; }
  .proj .pacts { display: flex; gap: 6px; flex-shrink: 0; }
  .iconbtn {
    font-size: 11px; color: var(--muted); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 9px; cursor: pointer; white-space: nowrap; background: transparent;
  }
  .iconbtn:hover { border-color: var(--blue-dim); color: var(--fg2); filter: none; }
  .iconbtn.del { color: var(--err); }
  .iconbtn.del:hover { border-color: #6a3434; background: rgba(224,90,90,.08); }
  .projbar { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .projbar .cnt { font-size: 10.5px; color: var(--muted); }
  .projbar .cnt b { color: var(--fg2); }
  .projbar .sp { flex: 1; }
  .danger-note { font-size: 10px; color: var(--warn); margin-top: 9px; line-height: 1.5; }
  .danger-note code { color: #e0a85a; background: #1c1f2e; border: 1px solid #2a2e44; border-radius: 4px; padding: 0 4px; }
  .empty { font-size: 12px; color: var(--faint); padding: 14px 4px; }

  /* 底栏 */
  .footer {
    display: flex; align-items: center; gap: 10px; padding: 12px 22px;
    border-top: 1px solid var(--border-lo); background: var(--bg); flex-shrink: 0;
  }
  .footer .dirty { font-size: 11px; color: var(--warn); visibility: hidden; }
  .footer .dirty.show { visibility: visible; }
  .footer .sp { flex: 1; }
  .footer .cancel {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 9px 16px; font-size: 12.5px; cursor: pointer;
  }
  .footer .cancel:hover { filter: none; border-color: var(--blue-dim); color: var(--fg2); }
  .footer .save {
    background: linear-gradient(135deg, var(--blue), var(--periw)); color: #06122a;
    font-weight: 700; border: none; border-radius: 8px; padding: 9px 22px; font-size: 12.5px; cursor: pointer;
  }

  /* 弹窗（删文件夹二次确认 / 清空确认） */
  .modal-mask {
    position: fixed; inset: 0; background: rgba(4,5,12,.62); display: none;
    align-items: center; justify-content: center; z-index: 50;
  }
  .modal-mask.show { display: flex; }
  .modal {
    width: 420px; max-width: 92vw; background: var(--panel);
    border: 1px solid var(--border); border-radius: 11px; padding: 20px 22px;
    box-shadow: 0 24px 60px rgba(0,0,0,.6);
  }
  .modal h3 { font-size: 15px; margin: 0 0 10px; color: var(--fg); }
  .modal .mbody { font-size: 12.5px; color: var(--fg2); line-height: 1.7; word-break: break-all; }
  .modal .mfoot { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
</style>
</head>
<body>
<div class="settings">
  <!-- ── 左：分类导航 ── -->
  <nav class="nav">
    <div class="nhead">
      <div class="t">⚙ 全局设置</div>
      <div class="d">分类导航 · 改一处全局生效</div>
    </div>
    <div class="nlist" id="navList"></div>
  </nav>

  <!-- ── 右：表单区 ── -->
  <div class="body">
    <div class="bhead">
      <span class="t" id="headTitle">项目管理</span>
      <span class="cat-pill" id="headCat">应用</span>
      <span class="sp"></span>
    </div>
    <div class="bbody" id="formBody"></div>
    <div class="footer">
      <span class="dirty" id="dirty">● 有未保存改动</span>
      <span class="sp"></span>
      <button class="cancel" id="btnCancel">取消</button>
      <button class="save" id="btnSave">验证并保存</button>
    </div>
  </div>
</div>

<!-- 通用确认弹窗 -->
<div class="modal-mask" id="modalMask">
  <div class="modal">
    <h3 id="modalTitle">确认</h3>
    <div class="mbody" id="modalBody"></div>
    <div class="mfoot">
      <button class="cancel" id="modalNo">取消</button>
      <button class="iconbtn del" id="modalYes" style="padding:9px 16px;font-size:12.5px;border-radius:8px;">确定删除</button>
    </div>
  </div>
</div>

<script>
/* ===========================================================================
   API base：壳内可经 ?ma= / ?sw= 覆盖。配置读写 + 项目管理走 media_agent：
     GET/PUT  {MA}/config                  读/写 settings.json（透传 update_settings）
     GET      {MA}/projects/list           最近项目列表
     POST     {MA}/recent/remove           仅移除显示（留文件夹）
     POST     {MA}/recent/delete_folder    rmtree + 移除（二次确认）
     POST     {MA}/recent/clear            清空列表（仅移除显示）
     POST     {MA}/projects/open           置顶/登记（“打开”用）
   media_agent 默认 18450；screenwriter_agent 默认 18430（SSE 生成路由）。
=========================================================================== */
const MA_API = new URLSearchParams(location.search).get('ma') || 'http://127.0.0.1:18450';
const SW_API = new URLSearchParams(location.search).get('sw') || 'http://127.0.0.1:18430';

/* ── 分类导航：1:1 对应现有 settings_sections/*.py 的 title/category ──
   分组顺序与展示名固定；category 与代码一致。*/
const SECTIONS = [
  // 平台核心
  { id: 'llm',        title: 'LLM 平台',    cat: '平台核心', ico: '🧠', badge: 'ok' },
  { id: 'runninghub', title: 'RunningHub',  cat: '平台核心', ico: '🎬', badge: 'ok' },
  // 生成功能（严格排序：编剧 → 出图 → 视频生成 → 智能转场 → 配音 → 配乐）
  { id: 'screenwriter', title: '编剧',      cat: '生成功能', ico: '✍' },
  { id: 'imggen',     title: '出图',        cat: '生成功能', ico: '🖼' },
  { id: 'videogen',   title: '视频生成',    cat: '生成功能', ico: '🎥' },
  { id: 'transition', title: '智能转场',    cat: '生成功能', ico: '🎞' },
  { id: 'dub',        title: '配音',        cat: '生成功能', ico: '🎙' },
  { id: 'soundtrack', title: '配乐',        cat: '生成功能', ico: '🎵' },
  // 辅助（提示词优化 → 翻译）
  { id: 'refine',     title: '提示词优化',  cat: '辅助',     ico: '✨' },
  { id: 'translation', title: '翻译',       cat: '辅助',     ico: '🌐', badge: 'warn' },
  // 外观
  { id: 'theme',      title: '主题',        cat: '外观',     ico: '🎨' },
  // 应用（项目管理 / 流程锁与调试）
  { id: 'project',    title: '项目管理',    cat: '应用',     ico: '📁' },
  { id: 'pipeline',   title: '流程 & 调试', cat: '应用',     ico: '🔒' },
];
const CAT_ORDER = ['平台核心', '生成功能', '辅助', '外观', '应用'];

/* ── 配置模型 ──
   CFG     ：GET /config 回填的真实快照（落盘的 settings.json 字段）。
   PENDING ：本次编辑的待保存改动（save → PUT {改动字段}），清空表示无脏。
   projects：GET /projects/list 的最近项目（{name,path,last_opened,shot_count}）。
   读单值用 getCfg(key)，改用 setCfg(key,v)（写进 PENDING 并标脏）。 */
let CFG = {};
let PENDING = {};
let PROJECTS = [];

let current = 'project';
let dirty = false;

/* 平台核心：LLM 平台 id ↔ 展示名/默认 base_url（与 cfg.llm_providers 的 key 对齐）。 */
const LLM_PLATFORMS = [
  { id: 'deepseek', label: 'DeepSeek',       base: 'https://api.deepseek.com' },
  { id: 'doubao',   label: '豆包·火山引擎',  base: 'https://ark.cn-beijing.volces.com/api/v3' },
  { id: 'openai',   label: '其它 OpenAI 兼容', base: 'https://api.openai.com/v1' },
];
/* prompts_default_grid 取值（cfg 用 single|4|9）。 */
const GRID_OPTS = [['single', '单帧'], ['4', '四宫格'], ['9', '九宫格']];

function getCfg(key, dflt) {
  if (key in PENDING) return PENDING[key];
  const v = CFG[key];
  return (v === undefined || v === null) ? (dflt !== undefined ? dflt : '') : v;
}
function setCfg(key, val) {
  // 与已落盘值相同则撤销该 pending；否则记入 pending 并标脏
  const base = CFG[key];
  if (JSON.stringify(base) === JSON.stringify(val)) {
    delete PENDING[key];
    if (!Object.keys(PENDING).length) clearDirty();
  } else {
    PENDING[key] = val;
    markDirty();
  }
}
/* 嵌套 dict 字段（llm_providers/screenwriter_models/...）的就地改写：
   读出整体（pending 优先）→ 改子键 → setCfg 回写整体。 */
function setCfgNested(key, subKey, subVal) {
  const cur = JSON.parse(JSON.stringify(getCfg(key, {}) || {}));
  if (subVal && typeof subVal === 'object' && !Array.isArray(subVal)) {
    cur[subKey] = Object.assign({}, cur[subKey] || {}, subVal);
  } else {
    cur[subKey] = subVal;
  }
  setCfg(key, cur);
}
function htmlesc(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function projectId(path) {
  const m = String(path || '').replace(/[\\/]+$/, '').split(/[\\/]/).pop().match(/^(P-\d+)/);
  return m ? m[1] : '—';
}
function toast(msg, isErr) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;left:50%;bottom:64px;transform:translateX(-50%);'
      + 'padding:9px 18px;border-radius:8px;font-size:12.5px;z-index:80;'
      + 'box-shadow:0 8px 28px rgba(0,0,0,.5);transition:opacity .2s;';
    document.body.appendChild(t);
  }
  t.style.background = isErr ? '#3a1c22' : '#16321f';
  t.style.border = '1px solid ' + (isErr ? '#6a3434' : '#2c5a44');
  t.style.color = isErr ? 'var(--err)' : 'var(--done)';
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._tm);
  t._tm = setTimeout(() => { t.style.opacity = '0'; }, 2200);
}

/* ===================== 分类导航渲染 ===================== */
function renderNav() {
  const root = document.getElementById('navList');
  root.innerHTML = '';
  CAT_ORDER.forEach(cat => {
    const items = SECTIONS.filter(s => s.cat === cat);
    if (!items.length) return;
    const c = document.createElement('div');
    c.className = 'cat';
    c.textContent = cat;
    root.appendChild(c);
    items.forEach(s => {
      const ni = document.createElement('div');
      ni.className = 'ni' + (s.id === current ? ' sel' : '');
      ni.dataset.id = s.id;
      let badge = '';
      if (s.badge === 'ok')   badge = '<span class="badge">✓ 已配</span>';
      if (s.badge === 'warn') badge = '<span class="badge warn">未启用</span>';
      ni.innerHTML = `<span class="ico">${s.ico}</span>${s.title}${badge}`;
      ni.addEventListener('click', () => selectSection(s.id));
      root.appendChild(ni);
    });
  });
}

function selectSection(id) {
  current = id;
  const s = SECTIONS.find(x => x.id === id);
  document.getElementById('headTitle').textContent = s.title;
  document.getElementById('headCat').textContent = s.cat;
  renderNav();
  renderForm(id);
}

/* ===================== 右栏表单渲染 ===================== */
function renderForm(id) {
  const body = document.getElementById('formBody');
  const fn = FORMS[id] || FORMS._stub;
  body.innerHTML = fn(SECTIONS.find(x => x.id === id));
  wireFormInteractions(id);
}

/* 复用的小构件 */
function card(label, inner) {
  return `<div class="card"><div class="clab">${label}</div>${inner}</div>`;
}
function row(label, control, hint) {
  return `<div class="frow"><span class="fl">${label}</span><span class="fc">${control}</span></div>${hint ? `<div class="hint">${hint}</div>` : ''}`;
}

const FORMS = {
  /* ── 项目管理（读 recent_projects.json，≤8 条；仅移除显示 / 删文件夹）── */
  project(s) {
    const rows = PROJECTS.map((p, i) => {
      const meta = [];
      if (p.shot_count) meta.push(`${p.shot_count} 分镜`);
      if (p.last_opened) meta.push('最后打开 ' + fmtTime(p.last_opened));
      return `
      <div class="proj" data-idx="${i}">
        <div class="pthumb"></div>
        <div class="pinfo">
          <div class="pnm">${htmlesc(p.name)} <span class="pid">${projectId(p.path)}</span></div>
          <div class="ppth">${htmlesc(p.path)}</div>
          <div class="pmeta">${meta.join(' · ') || '—'}</div>
        </div>
        <div class="pacts">
          <button class="iconbtn" data-act="open" data-idx="${i}">打开</button>
          <button class="iconbtn" data-act="remove" data-idx="${i}">移除显示</button>
          <button class="iconbtn del" data-act="delete" data-idx="${i}">删文件夹</button>
        </div>
      </div>`;
    }).join('');
    const listInner = PROJECTS.length
      ? `<div class="projlist">${rows}</div>`
      : `<div class="empty">（暂无最近项目）</div>`;
    const projCard = card('最近项目（8 条上限 · 按最后打开降序）', `
      ${listInner}
      <div class="projbar">
        <span class="cnt">共 <b>${PROJECTS.length}</b> / 8 个项目</span>
        <span class="sp"></span>
        <button class="iconbtn del" data-act="clear">清空列表（仅移除显示）</button>
      </div>

/* ===================== 交互绑定（写进 PENDING，底栏保存 PUT） ===================== */
function castNum(el, raw) {
  if (raw === '' || raw == null) return el.dataset.num === 'int' ? 0 : 0;
  return el.dataset.num === 'int' ? parseInt(raw, 10) : parseFloat(raw);
}
function wireFormInteractions(id) {
  // 通用单值字段：data-cfg → setCfg
  document.querySelectorAll('#formBody [data-cfg]').forEach(el => {
    const key = el.dataset.cfg;
    const handler = () => {
      let v = el.value;
      if (el.dataset.num) v = castNum(el, el.value);
      setCfg(key, v);
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });
  // LLM 平台嵌套：data-llm(id) + data-sub(base_url|api_key) → cfg.llm_providers[id][sub]
  document.querySelectorAll('#formBody [data-llm]').forEach(el => {
    const handler = () => setCfgNested('llm_providers', el.dataset.llm, { [el.dataset.sub]: el.value });
    el.addEventListener('input', handler);
  });
  // 配音工作流 / 采样嵌套
  document.querySelectorAll('#formBody [data-dubwf]').forEach(el => {
    el.addEventListener('input', () => setCfgNested('dub_workflow_ids', el.dataset.dubwf, el.value));
  });
  document.querySelectorAll('#formBody [data-dubsamp]').forEach(el => {
    el.addEventListener('input', () => {
      const v = el.value === '' ? 0 : parseFloat(el.value);
      setCfgNested('dub_sampling', el.dataset.dubsamp, v);
    });
  });
  // 编剧模型 → 写四阶段
  document.querySelectorAll('#formBody [data-swmodel]').forEach(el => {
    el.addEventListener('input', () => {
      const v = el.value;
      setCfg('screenwriter_models', { ideate: v, script: v, storyboard: v, prompts: v });
    });
  });
  // 编剧供应商 → 存 screenwriter_provider，并按 llm_providers[选中] 回填 screenwriter_llm_base_url/api_key
  document.querySelectorAll('#formBody [data-swprovider]').forEach(el => {
    el.addEventListener('change', () => {
      const pid = el.value;
      setCfg('screenwriter_provider', pid);
      const provs = getCfg('llm_providers', {}) || {};
      const p = provs[pid] || {};
      const preset = LLM_PLATFORMS.find(x => x.id === pid);
      setCfg('screenwriter_llm_base_url', p.base_url || (preset ? preset.base : ''));
      setCfg('screenwriter_llm_api_key', p.api_key || '');
    });
  });
  // 视频生成工作流 ID → cfg.workflow_ids.{director|director_v3}
  document.querySelectorAll('#formBody [data-wfid]').forEach(el => {
    el.addEventListener('input', () => setCfgNested('workflow_ids', el.dataset.wfid, el.value));
  });
  // 通用 toggle（data-tg → bool 字段）
  document.querySelectorAll('#formBody [data-tg]').forEach(tg => {
    tg.addEventListener('click', () => {
      const key = tg.dataset.tg;
      const next = !tg.classList.contains('on');
      tg.classList.toggle('on', next);
      const note = tg.parentElement.querySelector('.tg-note');
      if (note) note.textContent = next ? '开' : '关';
      setCfg(key, next);
    });
  });

  if (id === 'project') {
    document.querySelectorAll('#formBody [data-act]').forEach(btn => {
      btn.addEventListener('click', () => {
        const act = btn.dataset.act;
        const idx = btn.dataset.idx != null ? +btn.dataset.idx : -1;
        const p = PROJECTS[idx];
        if (act === 'open') {
          api('/projects/open', { path: p.path })
            .then(() => toast('已置顶：' + p.name))
            .then(() => loadProjects())
            .catch(e => toast('打开失败：' + e.message, true));
        } else if (act === 'remove') {
          api('/recent/remove', { path: p.path })
            .then(() => { toast('已移除显示'); return loadProjects(); })
            .catch(e => toast('移除失败：' + e.message, true));
        } else if (act === 'delete') {
          openConfirm(
            '删除项目文件夹',
            `将永久删除「<b>${htmlesc(p.name)}</b>」的整个文件夹：<br>${htmlesc(p.path)}<br><br>此操作不可恢复（调用 shutil.rmtree），确定？`,
            () => api('/recent/delete_folder', { path: p.path })
              .then(() => { toast('已删除文件夹'); return loadProjects(); })
              .catch(e => toast('删除失败：' + e.message, true)));
        } else if (act === 'clear') {
          openConfirm(
            '清空最近项目列表',
            '将<b>仅移除显示</b>所有最近项目（文件夹全部保留），确定？',
            () => api('/recent/clear', {})
              .then(() => { toast('已清空列表'); return loadProjects(); })
              .catch(e => toast('清空失败：' + e.message, true)),
            '清空列表');
        }
      });
    });
  }

  if (id === 'pipeline') {
    const tg = document.getElementById('lockTg');
    if (tg) tg.addEventListener('click', () => {
      const next = !tg.classList.contains('on');
      tg.classList.toggle('on', next);
      document.getElementById('lockNote').textContent = next
        ? '开 — 按阶段门禁，未完成下游置灰'
        : '关 — 全部面板可达（调试用，默认）';
      setCfg('pipeline_lock_enabled', next);
    });
    document.querySelectorAll('#gridRadios .rad').forEach(r => {
      r.addEventListener('click', () => {
        document.querySelectorAll('#gridRadios .rad').forEach(x => x.classList.remove('sel'));
        r.classList.add('sel');
        setCfg('prompts_default_grid', r.dataset.grid);
      });
    });
  }

  if (id === 'translation') {
    document.querySelectorAll('#transRadios .rad').forEach(r => {
      r.addEventListener('click', () => {
        const v = r.dataset.trans === 'disabled' ? '' : r.dataset.trans;
        setCfg('current_translator', v);
        renderForm('translation');   // 切 provider 显隐对应凭证卡（pending 已保留）
      });
    });
  }

  if (id === 'theme') {
    document.querySelectorAll('#formBody [data-theme]').forEach(r => {
      r.addEventListener('click', () => {
        document.querySelectorAll('#formBody [data-theme]').forEach(x => x.classList.remove('sel'));
        r.classList.add('sel');
        setCfgNested('ui', 'theme', r.dataset.theme);
      });
    });
  }

  // 测试连接按钮：对当前卡片 Base URL GET（带 Bearer），非 401/403 即视为通过
  document.querySelectorAll('#formBody [data-act^="test"]').forEach(btn => {
    btn.addEventListener('click', () => testConnection(btn));
  });
}

/* 测试连接：读同卡片内 base_url + api_key (+ LLM 平台卡可读 model)，走后端实测以绕开
   浏览器 CORS / 错误请求方式。后端用 openai 兼容客户端实测，返回 {ok, message}。
     LLM 平台 → POST {MA}/config/test/llm  {base_url, api_key, model?}
     RunningHub → POST {MA}/config/test/runninghub {api_key, base_url?}
   翻译等其它（data-act=testTrans 之类）暂仍按旧逻辑直连。 */
function testConnection(btn) {
  const act = btn.dataset.act;
  const cardEl = btn.closest('.card');
  const frow = btn.closest('.frow');
  // 定位可写 hint：优先用按钮所在行的 .hint 兄弟；该行没有 .hint（如 RunningHub
  // 的 API Key 行只传两参，nextElementSibling 是下一 .frow），则复用卡片内任一
  // .hint，仍没有就紧跟该 .frow 现造一个 .hint，保证任意 test 按钮都有反馈位。
  const resolveHint = () => {
    const sib = frow && frow.nextElementSibling;
    if (sib && sib.classList && sib.classList.contains('hint')) return sib;
    const own = cardEl && cardEl.querySelector('.hint');
    if (own) return own;
    if (frow) {
      const el = document.createElement('div');
      el.className = 'hint';
      frow.insertAdjacentElement('afterend', el);
      return el;
    }
    return null;
  };
  const hint = resolveHint();
  const setHint = (ok, msg) => {
    if (hint && hint.classList.contains('hint')) {
      hint.classList.remove('ok', 'err');
      hint.classList.add(ok ? 'ok' : 'err');
      hint.textContent = msg;
    }
  };
  // 从所在卡片读出 base / key / model
  const readCard = () => {
    let base = '', key = '', model = '';
    cardEl.querySelectorAll('input, select').forEach(i => {
      const v = (i.value || '').trim();
      if (!v) return;
      const cfg = i.dataset.cfg || '';
      const sub = i.dataset.sub || '';
      if (sub === 'base_url' || cfg.indexOf('base_url') >= 0 || cfg.indexOf('_url') >= 0) base = v;
      if (sub === 'api_key' || cfg.indexOf('api_key') >= 0 || cfg.indexOf('secret_key') >= 0) key = v;
      if (sub === 'model' || cfg.indexOf('model') >= 0 || i.dataset.swmodel) model = v;
    });
    return { base, key, model };
  };

  // 后端 {ok, message} → hint：始终把后端 message 文本显示出来（成功/失败都带），
  // message 缺省时再退回通用文案。前缀 ✓/✗ 让成败一眼可辨（若 message 自带则不重复加）。
  const showResult = (r) => {
    const ok = !!(r && r.ok);
    let msg = (r && typeof r.message === 'string') ? r.message.trim() : '';
    if (!msg) msg = ok ? '连接成功' : '测试失败';
    const glyph = ok ? '✓' : '✗';
    if (!/^[✓✗]/.test(msg)) msg = glyph + ' ' + msg;
    setHint(ok, msg);
  };
  const run = (path, body, validate) => {
    if (validate) { const err = validate(body); if (err) { setHint(false, err); return; } }
    btn.disabled = true; const old = btn.textContent; btn.textContent = '测试中…';
    api(path, body)
      .then(showResult)
      .catch(e => setHint(false, '✗ ' + e.message))
      .finally(() => { btn.disabled = false; btn.textContent = old; });
  };

  if (act === 'testLLM') {
    const { base, key, model } = readCard();
    run('/config/test/llm', { base_url: base, api_key: key, model: model || undefined },
        b => b.base_url ? '' : '请先填 Base URL');
    return;
  }
  if (act === 'testRH') {
    const { base, key } = readCard();
    run('/config/test/runninghub', { api_key: key, base_url: base || undefined },
        b => b.api_key ? '' : '请先填 API Key');
    return;
  }

  // 其它（翻译等）：保留旧的浏览器直连 GET 探测
  const { base, key } = readCard();
  if (!base) { setHint(false, '请先填 Base URL'); return; }
  btn.disabled = true; const old = btn.textContent; btn.textContent = '测试中…';
  fetch(base, { method: 'GET', headers: key ? { Authorization: 'Bearer ' + key } : {} })
    .then(r => {
      if (r.status === 401 || r.status === 403) setHint(false, `✗ 鉴权失败（HTTP ${r.status}）`);
      else setHint(true, `✓ 鉴权通过（HTTP ${r.status}）`);
    })
    .catch(e => setHint(false, '✗ 连接失败：' + e.message))
    .finally(() => { btn.disabled = false; btn.textContent = old; });
}

/* ===================== fetch 封装 + 脏标记 + 底栏 ===================== */
async function api(path, body) {
  const opt = body === undefined
    ? { method: 'GET' }
    : { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) };
  const r = await fetch(MA_API + path, opt);
  if (!r.ok) {
    let detail = 'HTTP ' + r.status;
    try { const j = await r.json(); if (j && j.detail) detail = j.detail; } catch (e) {}
    throw new Error(detail);
  }
  return r.json().catch(() => ({}));
}

function markDirty() {
  if (dirty) return;
  dirty = true;
  document.getElementById('dirty').classList.add('show');
}
function clearDirty() {
  dirty = false;
  document.getElementById('dirty').classList.remove('show');
}

document.getElementById('btnSave').addEventListener('click', async () => {
  const btn = document.getElementById('btnSave');
  if (!Object.keys(PENDING).length) { toast('没有改动'); return; }
  const payload = Object.assign({}, PENDING);
  btn.disabled = true; const old = btn.textContent; btn.textContent = '保存中…';
  try {
    await fetch(MA_API + '/config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    }).then(async r => {
      if (!r.ok) {
        let d = 'HTTP ' + r.status;
        try { const j = await r.json(); if (j && j.detail) d = JSON.stringify(j.detail); } catch (e) {}
        throw new Error(d);
      }
    });
    // 落盘成功：把 pending 并入 CFG 快照，清脏
    Object.assign(CFG, payload);
    PENDING = {};
    clearDirty();
    btn.textContent = '已保存 ✓';
    toast('已保存');
    setTimeout(() => (btn.textContent = old), 1200);
  } catch (e) {
    btn.textContent = old;
    toast('保存失败：' + e.message, true);
  } finally {
    btn.disabled = false;
  }
});

document.getElementById('btnCancel').addEventListener('click', () => {
  // 丢弃未保存改动，按 CFG 快照重渲染当前 section
  PENDING = {};
  clearDirty();
  renderForm(current);
});

/* ===================== 确认弹窗 ===================== */
let _confirmCb = null;
function openConfirm(title, bodyHtml, onYes, yesText) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalYes').textContent = yesText || '确定删除';
  _confirmCb = onYes;
  document.getElementById('modalMask').classList.add('show');
}
function closeConfirm() {
  document.getElementById('modalMask').classList.remove('show');
  _confirmCb = null;
}
document.getElementById('modalNo').addEventListener('click', closeConfirm);
document.getElementById('modalYes').addEventListener('click', () => {
  const cb = _confirmCb; closeConfirm();
  if (cb) cb();
});
document.getElementById('modalMask').addEventListener('click', (e) => {
  if (e.target.id === 'modalMask') closeConfirm();
});

/* ===================== 数据加载 + 初始渲染 ===================== */
async function loadConfig() {
  try {
    CFG = await api('/config');
  } catch (e) {
    CFG = {};
    toast('读取配置失败：' + e.message, true);
  }
}
async function loadProjects() {
  try {
    const r = await api('/projects/list');
    PROJECTS = Array.isArray(r.projects) ? r.projects : [];
  } catch (e) {
    PROJECTS = [];
    toast('读取项目列表失败：' + e.message, true);
  }
  if (current === 'project') renderForm('project');
}

(async function init() {
  renderNav();
  await Promise.all([loadConfig(), (async () => {
    try {
      const r = await api('/projects/list');
      PROJECTS = Array.isArray(r.projects) ? r.projects : [];
    } catch (e) { PROJECTS = []; }
  })()]);
  selectSection(current);
})();
</script>
