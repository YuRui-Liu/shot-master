<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糯米AI · ④ 视频碎片 · CLIPS</title>
<link rel="stylesheet" href="tokens.css">
<style>
  /* ===== 应用外壳：左侧导航 + 右侧工作区（复刻参考图） ===== */
  body { overflow: hidden; }
  .app { display: flex; height: 100vh; }

  /* 顶部自定义标题栏 */
  .titlebar {
    position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 30;
    display: flex; align-items: center; gap: 14px; padding: 0 16px;
    background: var(--navy); border-bottom: 1px solid var(--border-lo);
  }
  .titlebar .brand { display: flex; align-items: center; gap: 9px; font-weight: 700; }
  .titlebar .brand .logo {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, var(--blue), var(--periw));
  }
  .titlebar .crumb { color: var(--muted); font-size: 13px; }
  .titlebar .crumb b { color: var(--fg); }
  .titlebar .right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .titlebar .task { display: flex; align-items: center; gap: 7px; color: var(--fg2); font-size: 12px; }
  .titlebar .winctl { display: flex; gap: 6px; color: var(--muted); }
  .titlebar .winctl span { width: 26px; text-align: center; cursor: default; }

  /* 左侧导航 */
  .side {
    width: 180px; flex-shrink: 0; background: var(--navy);
    border-right: 1px solid var(--border-lo);
    padding-top: 60px; display: flex; flex-direction: column;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 11px 18px;
    color: var(--fg2); font-size: 13.5px; cursor: pointer; border-left: 3px solid transparent;
  }
  .nav-item:hover { background: rgba(255,255,255,.03); }
  .nav-item.active {
    color: var(--done); border-left-color: var(--done);
    background: rgba(78,201,143,.08); font-weight: 600;
  }
  .nav-item .ic { width: 16px; opacity: .8; }
  .nav-spacer { flex: 1; }
  .nav-item.bottom { color: var(--muted); }

  /* 工作区 */
  .work { flex: 1; overflow-y: auto; padding: 24px 28px 40px; }
  .work-head {
    display: flex; align-items: center; gap: 16px; margin-bottom: 18px; max-width: 1180px;
  }
  .work-head h1 { margin: 0; font-size: 22px; }
  .shot-select { min-width: 230px; }

  /* 并行任务下拉切换器（替代左侧"新建任务"任务栏） */
  .task-switch { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .task-switch .lbl { color: var(--muted); font-size: 12.5px; }
  .task-switch .wrap { position: relative; }
  .task-switch .trigger {
    background: var(--panel2); color: var(--fg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 13px; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 9px; min-width: 150px;
  }
  .task-switch .trigger:hover { filter: none; border-color: var(--mauve); }
  .task-switch .trigger .caret { margin-left: auto; color: var(--mauve); font-size: 11px; transition: transform .15s; }
  .task-switch .wrap.open .trigger .caret { transform: rotate(180deg); }
  .task-switch .trigger .pcount {
    font-size: 10.5px; font-weight: 600; color: var(--mauve);
    background: rgba(138,127,217,.18); border: 1px solid #4a3d6e;
    padding: 1px 7px; border-radius: 9px;
  }
  .task-switch .menu {
    position: absolute; top: calc(100% + 6px); right: 0; min-width: 220px; z-index: 40;
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 6px; display: none; box-shadow: 0 10px 28px rgba(0,0,0,.45);
  }
  .task-switch .wrap.open .menu { display: block; }
  .task-switch .opt {
    display: flex; align-items: center; gap: 10px; padding: 9px 11px;
    border-radius: var(--radius-sm); color: var(--fg2); font-size: 13px; cursor: pointer;
  }
  .task-switch .opt:hover { background: rgba(255,255,255,.04); color: var(--fg); }
  .task-switch .opt.active { color: var(--mauve); background: rgba(138,127,217,.12); font-weight: 600; }
  .task-switch .opt .tick { width: 14px; color: var(--mauve); font-size: 12px; }
  .task-switch .opt .sub { margin-left: auto; color: var(--faint); font-size: 11px; }
  .task-switch .sep-line { height: 1px; background: var(--border-lo); margin: 6px 4px; }
  .task-switch .opt.add { color: var(--blue); font-weight: 600; }
  .task-switch .opt.add:hover { background: rgba(74,158,255,.10); color: var(--blue); }
  .task-switch .opt.add.disabled { color: var(--faint); cursor: default; }
  .task-switch .opt.add.disabled:hover { background: transparent; }
  .task-switch .hint { color: var(--faint); font-size: 11px; padding: 2px 11px 4px; display: none; }
  .task-switch .opt.add.disabled + .hint { display: block; }

  /* 工作模式切换 */
  .modebar {
    max-width: 1180px; display: flex; align-items: center; gap: 12px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px; margin-bottom: 16px;
  }
  .modebar .lbl { color: var(--muted); font-size: 12.5px; }
  .seg { display: flex; background: var(--field); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 3px; }
  .seg button {
    background: transparent; color: var(--fg2); padding: 7px 16px;
    border-radius: 5px; font-weight: 500;
  }
  .seg button.on {
    background: linear-gradient(135deg, var(--blue), var(--periw));
    color: #06122a; font-weight: 600;
  }
  .seg button:hover:not(.on) { filter: none; background: rgba(255,255,255,.04); }
  .align-note {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    color: var(--mauve); font-size: 12.5px;
  }
  .align-note .badge { background: rgba(78,201,143,.16); color: var(--done); border-color: #2f6b4f; }

  /* SHOT 卡列表 */
  .shots { max-width: 1180px; display: flex; flex-direction: column; gap: 16px; }
  .shot {
    display: flex; gap: 18px; background: var(--panel);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
  }
  /* 左：分镜图竖图缩略 */
  .thumb {
    position: relative; width: 168px; flex-shrink: 0;
    aspect-ratio: 9 / 16; border-radius: var(--radius-sm); overflow: hidden;
    background: linear-gradient(160deg, #20243a, #14172a);
    border: 1px solid var(--border-lo); display: flex; align-items: center; justify-content: center;
  }
  .thumb .ph { color: var(--faint); font-size: 12px; text-align: center; padding: 0 10px; }
  .thumb .tag {
    position: absolute; left: 8px; bottom: 8px;
    font-size: 11px; letter-spacing: 1px; font-weight: 700; color: var(--fg);
    background: rgba(0,0,0,.55); padding: 3px 8px; border-radius: 5px;
  }
  .thumb .ord {
    position: absolute; right: 8px; top: 8px; font-size: 10px; color: var(--mauve);
    background: rgba(138,127,217,.18); border: 1px solid #4a3d6e; padding: 2px 7px; border-radius: 9px;
  }

  /* 右：编辑区 */
  .body { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .meta { color: var(--fg2); font-size: 13px; margin-bottom: 8px; }
  .meta .sep { color: var(--faint); margin: 0 6px; }
  .meta .dur { color: var(--blue); font-weight: 600; }
  .prompt-label { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .prompt-label .name { font-size: 12.5px; color: var(--periw); font-weight: 600; }
  .prompt-label .ltx-pill {
    font-size: 10.5px; background: rgba(74,158,255,.14); color: var(--blue);
    border: 1px solid var(--blue-dim); padding: 1px 8px; border-radius: 9px;
  }
  textarea {
    width: 100%; min-height: 118px; resize: vertical; font: inherit; line-height: 1.6;
    background: var(--field); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--fg); padding: 11px 13px; outline: none;
  }
  textarea:focus { border-color: var(--mauve); }
  textarea::placeholder { color: var(--faint); }

  /* 范例 chip 行 */
  .examples { display: flex; align-items: center; gap: 8px; margin: 11px 0; flex-wrap: wrap; }
  .examples .lab { color: var(--muted); font-size: 12.5px; margin-right: 2px; }
  .chip {
    background: var(--panel2); color: var(--fg2); border: 1px solid var(--border);
    border-radius: 14px; padding: 5px 13px; font-size: 12.5px; cursor: pointer;
    transition: all .14s;
  }
  .chip:hover { border-color: var(--mauve); color: var(--fg); background: var(--panel); filter: none; }
  .chip.active { background: rgba(138,127,217,.18); border-color: var(--mauve); color: var(--mauve); font-weight: 600; }
  .chip-hint { color: var(--faint); font-size: 11.5px; margin-left: 4px; }

  /* 操作按钮 */
  .actions { display: flex; gap: 10px; margin-top: 4px; }
  .btn-gen { /* ✦生成提示词：渐变主色（tokens 默认） */ }
  .btn-save { background: var(--panel2); color: var(--fg2); border: 1px solid var(--border); }
  .btn-save:hover { filter: none; border-color: var(--mauve); color: var(--fg); }
  .btn-i2v {
    background: linear-gradient(135deg, var(--done), #3aa978); color: #06231a; font-weight: 700;
  }
  .actions .grow { flex: 1; }

  /* ===== 模式1 · 高自由度导演台（自由时间轴：单提交多段 → 一条视频，复刻原 PySide6 导演台） ===== */
  .pane { display: none; }
  .pane.show { display: block; }
  .dir { max-width: 1180px; display: flex; flex-direction: column; gap: 14px; }

  /* 导演台顶部工具条：工作流选择器 + 批量提取/追加段/Add Text/Add Audio */
  .dir-toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
  }
  .dir-toolbar .wf-lbl { color: var(--muted); font-size: 12.5px; }
  .dir-toolbar select.wf { min-width: 230px; padding: 7px 10px; font-size: 13px; }
  .dir-toolbar .grow { flex: 1; }
  .dir-toolbar button {
    background: var(--panel2); color: var(--fg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 7px 13px; font-size: 12.5px; font-weight: 500;
  }
  .dir-toolbar button:hover { filter: none; border-color: var(--mauve); color: var(--fg); }
  .dir-toolbar .btn-extract { color: var(--blue); border-color: var(--blue-dim); font-weight: 600; }
  .dir-toolbar .btn-extract:hover { border-color: var(--blue); background: rgba(74,158,255,.10); color: var(--blue); }
  .dir-toolbar .btn-add-seg {
    background: linear-gradient(135deg, var(--blue), var(--periw)); color: #06122a;
    border: none; font-weight: 700;
  }

  /* 帧缩略片段条（segment strip：横向滚动，可加段/重排/删段） */
  .strip-wrap {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px;
  }
  .strip-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .strip-head .title { font-weight: 600; font-size: 13.5px; }
  .strip-head .hint { color: var(--faint); font-size: 11.5px; }
  .strip-head .grow { flex: 1; }
  .strip {
    display: flex; gap: 10px; overflow-x: auto; padding: 4px 2px 10px;
    min-height: 150px; align-items: stretch;
  }
  .seg {
    position: relative; width: 132px; flex-shrink: 0; cursor: pointer;
    background: var(--field); border: 1px solid var(--border); border-radius: var(--radius-sm);
    display: flex; flex-direction: column; overflow: hidden; transition: border-color .14s;
  }
  .seg.sel { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue-dim) inset; }
  .seg .seg-thumb {
    aspect-ratio: 16 / 9; background: linear-gradient(160deg, #20243a, #14172a);
    display: flex; align-items: center; justify-content: center; position: relative;
    border-bottom: 1px solid var(--border-lo); overflow: hidden;
  }
  .seg .seg-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .seg .seg-thumb .ph { color: var(--faint); font-size: 11px; text-align: center; padding: 0 8px; }
  .seg .seg-thumb .typetag {
    position: absolute; left: 6px; top: 6px; font-size: 9.5px; font-weight: 700; letter-spacing: .5px;
    padding: 2px 6px; border-radius: 5px;
  }
  .seg .seg-thumb .typetag.img { background: rgba(74,158,255,.20); color: var(--blue); border: 1px solid var(--blue-dim); }
  .seg .seg-thumb .typetag.txt { background: rgba(138,127,217,.20); color: var(--mauve); border: 1px solid #4a3d6e; }
  .seg .seg-meta {
    padding: 7px 8px; display: flex; flex-direction: column; gap: 4px; flex: 1;
  }
  .seg .seg-meta .ord { font-size: 10px; color: var(--mauve); font-weight: 700; letter-spacing: .5px; }
  .seg .seg-meta .dur { font-size: 11px; color: var(--blue); font-weight: 600; }
  .seg .seg-meta .pv { font-size: 10.5px; color: var(--fg2); line-height: 1.35; max-height: 28px; overflow: hidden; }
  .seg .seg-ops {
    display: flex; gap: 3px; padding: 0 6px 7px;
  }
  .seg .seg-ops button {
    flex: 1; background: var(--panel2); color: var(--fg2); border: 1px solid var(--border);
    border-radius: 5px; padding: 3px 0; font-size: 11px; font-weight: 600; line-height: 1;
  }
  .seg .seg-ops button:hover { filter: none; border-color: var(--mauve); color: var(--fg); }
  .seg .seg-ops button.del:hover { border-color: var(--err); color: var(--err); }
  .seg .seg-ops button:disabled { opacity: .3; }
  .strip .seg-add {
    width: 92px; flex-shrink: 0; border: 1px dashed var(--border); border-radius: var(--radius-sm);
    background: transparent; color: var(--faint); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px; font-size: 12px; cursor: pointer;
  }
  .strip .seg-add:hover { border-color: var(--blue); color: var(--blue); background: rgba(74,158,255,.06); }
  .strip .seg-add .plus { font-size: 24px; line-height: 1; }
  .strip-empty { color: var(--faint); font-size: 12.5px; padding: 24px; text-align: center; width: 100%; }

  /* 当前选中片段编辑器 */
  .seg-editor {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
  }
  .seg-editor .se-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .seg-editor .se-head .t { font-weight: 600; font-size: 13.5px; }
  .seg-editor .se-head .ord {
    font-size: 10.5px; font-weight: 700; color: var(--mauve); letter-spacing: 1px;
    background: rgba(138,127,217,.18); border: 1px solid #4a3d6e; padding: 2px 9px; border-radius: 9px;
  }
  .seg-editor .se-head .reftabs { margin-left: auto; display: flex; gap: 4px; }
  .seg-editor .se-head .reftabs button {
    background: var(--field); color: var(--fg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 5px 11px; font-size: 11.5px; font-weight: 500;
  }
  .seg-editor .se-head .reftabs button.on {
    background: rgba(74,158,255,.14); color: var(--blue); border-color: var(--blue-dim); font-weight: 600;
  }
  .seg-editor .se-empty { color: var(--faint); font-size: 12.5px; padding: 18px 0; text-align: center; }
  .seg-editor .imgrow { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .seg-editor .imgrow label { color: var(--muted); font-size: 12px; flex-shrink: 0; }
  .seg-editor .imgrow input {
    flex: 1; min-width: 0; padding: 7px 10px; font-size: 12.5px; font-family: inherit;
  }
  .seg-editor .imgrow button {
    background: var(--panel2); color: var(--blue); border: 1px solid var(--blue-dim);
    border-radius: var(--radius-sm); padding: 7px 12px; font-size: 12px; font-weight: 600;
  }
  .seg-editor .imgrow.txt { opacity: .4; pointer-events: none; }
  .seg-editor .se-params {
    display: flex; flex-wrap: wrap; align-items: center; gap: 16px; margin-top: 11px;
    padding: 11px 13px; background: var(--field); border: 1px solid var(--border-lo); border-radius: var(--radius-sm);
  }
  .seg-editor .se-params .grp { display: flex; align-items: center; gap: 8px; }
  .seg-editor .se-params .grp > label { color: var(--muted); font-size: 12px; }
  .seg-editor .se-params input[type="range"] { width: 130px; accent-color: var(--blue); }
  .seg-editor .se-params .val { color: var(--blue); font-weight: 600; font-size: 12.5px; min-width: 34px; }
  .seg-editor .se-params .val.g { color: var(--mauve); }

  /* 图片池 + 批量导入（QWebEngine 无原生选择 → 路径粘贴） */
  .pool-wrap {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px;
  }
  .pool-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .pool-head .title { font-weight: 600; font-size: 13.5px; }
  .pool-head .cnt { color: var(--faint); font-size: 11.5px; }
  .pool-head .grow { flex: 1; }
  .pool-head button {
    background: var(--panel2); color: var(--fg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px 11px; font-size: 12px; font-weight: 500;
  }
  .pool-head button:hover { filter: none; border-color: var(--mauve); color: var(--fg); }
  .pool-head .btn-pool-add { color: var(--blue); border-color: var(--blue-dim); font-weight: 600; }
  .pool { display: flex; gap: 8px; overflow-x: auto; padding: 2px; min-height: 64px; align-items: center; }
  .pool .pi {
    position: relative; width: 96px; height: 56px; flex-shrink: 0; border-radius: 6px; overflow: hidden;
    border: 1px solid var(--border); background: linear-gradient(160deg, #20243a, #14172a); cursor: grab;
    display: flex; align-items: flex-end;
  }
  .pool .pi img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .pool .pi .nm {
    position: relative; width: 100%; font-size: 9px; color: var(--fg); background: rgba(0,0,0,.6);
    padding: 2px 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pool .pi.sel { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue) inset; }
  .pool-empty { color: var(--faint); font-size: 12px; padding: 16px; text-align: center; width: 100%; }

  /* 音频轨 */
  .audio-wrap {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px;
  }
  .audio-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .audio-head .title { font-weight: 600; font-size: 13.5px; }
  .audio-head .grow { flex: 1; }
  .audio-head .toggle { display: flex; align-items: center; gap: 7px; color: var(--fg2); font-size: 12.5px; }
  .audio-head .btn-add-audio {
    background: var(--panel2); color: var(--blue); border: 1px solid var(--blue-dim);
    border-radius: var(--radius-sm); padding: 6px 12px; font-size: 12px; font-weight: 600;
  }
  .audio-list { display: flex; flex-direction: column; gap: 8px; }
  .audio-row {
    display: flex; align-items: center; gap: 10px; background: var(--field);
    border: 1px solid var(--border-lo); border-radius: var(--radius-sm); padding: 8px 11px;
  }
  .audio-row .ic { color: var(--mauve); font-size: 14px; }
  .audio-row .ap { flex: 1; min-width: 0; color: var(--fg2); font-size: 12px; word-break: break-all; }
  .audio-row .st { color: var(--muted); font-size: 11.5px; }
  .audio-row .st input { width: 54px; padding: 4px 6px; font-size: 11.5px; }
  .audio-row .del {
    background: var(--panel2); color: var(--fg2); border: 1px solid var(--border);
    border-radius: 5px; padding: 4px 9px; font-size: 11px; font-weight: 600;
  }
  .audio-row .del:hover { filter: none; border-color: var(--err); color: var(--err); }
  .audio-empty { color: var(--faint); font-size: 12px; padding: 10px; text-align: center; }
  .audio-list.off { opacity: .4; pointer-events: none; }

  /* 全局参数（global_prompt + LTX 参数栏） */
  .global-wrap {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px;
  }
  .global-wrap .gtitle { font-weight: 600; font-size: 13.5px; margin-bottom: 10px; }
  .global-wrap .grow1 { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .global-wrap .grow1 label { color: var(--periw); font-size: 12.5px; font-weight: 600; }
  .global-wrap textarea { min-height: 88px; }
  .global-wrap .gparams {
    display: flex; flex-wrap: wrap; align-items: center; gap: 16px; margin-top: 12px;
    padding: 12px 14px; background: var(--field); border: 1px solid var(--border-lo); border-radius: var(--radius-sm);
  }
  .global-wrap .gparams .grp { display: flex; align-items: center; gap: 7px; }
  .global-wrap .gparams .grp > label { color: var(--muted); font-size: 12px; }
  .global-wrap .gparams input[type="number"], .global-wrap .gparams input[type="text"] { padding: 6px 9px; font-size: 12.5px; }
  .global-wrap .gparams input.fps { width: 60px; }
  .global-wrap .gparams input.seed { width: 110px; }
  .global-wrap .gparams input.fn { width: 130px; }
  .global-wrap .gparams input.eps { width: 64px; }
  .global-wrap .gparams input.cw { width: 70px; }
  .global-wrap .gparams select.res { padding: 6px 9px; font-size: 12.5px; min-width: 180px; }

<script>
/* ===== 接活：后端约定（照编剧样板） =====
   SW_API：screenwriter_agent（视频提示词 SSE 路由所在），默认 18430；可由壳传 ?sw= 覆盖。
   MEDIA_API：media_agent（图生视频/LTX video provider 落在这里），默认 18450；?media= 覆盖。
   PROJECT_DIR / EPISODE_ID：壳已把 ?project=、?episode= 转发到本页 URL。
   真实路由（见 screenwriter_agent/routes/video_prompt.py）：
     POST {SW_API}/video_prompt  body={project_dir, episode_id:"E1", options:{template_id:"ltx",fps,aspect_ratio,language}}
     该路由对「整集分镜」一次性产出 {global_prompt, shots:[...]} 写入 shots.json；
     事件：start{message} / status{phase} / partial{file,content(JSON 文本)} / done{saved_dir} / error{code,message,hint,raw}。
     注意：本路由不发逐 token 的 delta（服务端累计后一次性回 partial.content），
     故本页按 status 显进度、partial/done 拿整集结果后按 shot 序号分发到各卡 textarea。 */
const SW_API = new URLSearchParams(location.search).get("sw") || "http://127.0.0.1:18430";
const MEDIA_API = new URLSearchParams(location.search).get("media") || "http://127.0.0.1:18450";
const PROJECT_DIR = new URLSearchParams(location.search).get("project") || "";
const EPISODE_ID = new URLSearchParams(location.search).get("episode") || "E1";

/* 解析单条 SSE 帧 → { event, data }（同 ideate 读法：event:/data:，data 为 JSON） */
function parseSSE(chunk) {
  let event = "message"; const dataLines = [];
  chunk.split("\n").forEach((line) => {
    if (line.startsWith("event:")) event = line.slice(6).trim();
    else if (line.startsWith("data:")) dataLines.push(line.slice(5).trim());
  });
  if (!dataLines.length) return null;
  let data = {};
  try { data = JSON.parse(dataLines.join("\n")); } catch { data = { text: dataLines.join("\n") }; }
  return { event, data };
}

/* 从整集结果对象里取第 n 个镜头的 local_prompt（容错多种字段命名）。 */
function shotPromptFromData(obj, n) {
  if (!obj || !Array.isArray(obj.shots)) return "";
  // 优先按 shot 显式编号匹配，否则退化为数组顺序 n-1
  const byNo = obj.shots.find((s) =>
    String(s.shot_id ?? s.shot ?? s.n ?? s.index ?? "") === String(n));
  const s = byNo || obj.shots[n - 1];
  if (!s) return "";
  return s.local_prompt || s.prompt || s.text || "";
}

/* 调 POST /video_prompt（整集 SSE）：status 显进度，partial/done 拿 {global_prompt,shots}。
   onShots(obj)：拿到整集结果对象后由调用方决定如何分发到各卡。 */
async function runVideoPrompt({ onStatus, onShots, onError }) {
  if (!PROJECT_DIR) {
    onError && onError({ hint: "未选择项目，请先在首页选择/打开一个项目。" });
    return;
  }
  const body = {
    project_dir: PROJECT_DIR,
    episode_id: EPISODE_ID,
    options: { template_id: "ltx", fps: 24, aspect_ratio: "9:16", language: "en" },
  };
  let resultObj = null;
  try {
    const resp = await fetch(SW_API + "/video_prompt", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "text/event-stream" },
      body: JSON.stringify(body),
    });
    if (!resp.ok || !resp.body) {
      // 同步错误体：{error:{code,message,hint}}
      let j = null; try { j = await resp.json(); } catch {}
      throw j && j.error ? j.error : { hint: "HTTP " + resp.status };
    }
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf("\n\n")) >= 0) {
        const chunk = buf.slice(0, idx); buf = buf.slice(idx + 2);
        const evt = parseSSE(chunk);
        if (!evt) continue;
        if (evt.event === "start") {
          onStatus && onStatus(evt.data.message || "正在生成…");
        } else if (evt.event === "status") {
          onStatus && onStatus(evt.data.phase === "streaming" ? "AI 生成中…" : (evt.data.phase || ""));
        } else if (evt.event === "partial") {
          try { resultObj = JSON.parse(evt.data.content || "{}"); } catch { resultObj = null; }
          if (resultObj) onShots && onShots(resultObj);
        } else if (evt.event === "done") {
          if (resultObj) onShots && onShots(resultObj);
          return resultObj;
        } else if (evt.event === "error") {
          throw evt.data || { hint: "生成失败" };
        }
      }
    }
    return resultObj;
  } catch (e) {
    onError && onError(e && (e.hint || e.message) ? e : { hint: (e && e.message) || "生成失败" });
    return null;
  }
}

/* ===== LTX 画质模式（全局）：director(导演台·默认) / hd_director(高清导演台) =====
   这是 LTX 2.3 的两种生成模式，对应本页所有「生成视频/图生视频」调用的 mode。 */
let ltxQualityMode = "director";

/* 按当前画幅推断 aspect 字符串。本页暂以竖屏短剧为主（9:16），壳后续可经 ?aspect= 覆盖。 */
const VIDEO_ASPECT = new URLSearchParams(location.search).get("aspect") || "9:16";

/* 调真实图生视频/文生视频后端：POST {MEDIA_API}/video/ltx（同步，耗时长）。
   两种调用：
   (a) 模式2 单卡：{prompt, first_frame?, mode, fps, aspect?, out_dir, base_name}
   (b) 模式1 整条时间轴：把 body 直接传入（含 segments / global_prompt / audio_segments / 分辨率 / epsilon …）。
   后端契约（media_agent/routes/video.py LtxRequest）：
     segments[] = {local_prompt, length(帧), image_path?, segment_type:"image"|"text", guide_strength(0~1), seg_id}
     mode=director|hd_director → profile director / director_v3；fps；aspect=分辨率预设串；out_dir；base_name；noise_seed。
   并按本仓「扩展后」契约附带 global_prompt/use_global_prompt/audio_segments/use_custom_audio/
     resolution/custom_width/custom_height/epsilon —— 现有后端忽略未知字段，扩展后即生效。
   → {output: 视频路径, mode, workflow_id, profile}；失败 {detail} 或 {error:{hint}}。 */
async function runVideoLtx(arg) {
  if (!PROJECT_DIR) {
    throw { hint: "未选择项目，请先在首页选择/打开一个项目。" };
  }
  let body;
  if (arg && arg.__timeline) {
    body = arg.body;            // 整条时间轴：调用方已组好完整 body
  } else {
    const { prompt, firstFrame, baseName } = arg || {};
    body = {
      prompt: prompt || "",
      first_frame: firstFrame || null,
      mode: ltxQualityMode,
      fps: 24,
      aspect: VIDEO_ASPECT,
      out_dir: PROJECT_DIR + "/video",
      base_name: baseName || "clip",
    };
  }
  let resp;
  try {
    resp = await fetch(MEDIA_API + "/video/ltx", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
  } catch (e) {
    throw { hint: "无法连接生成服务（media）：" + ((e && e.message) || "网络错误") };
  }
  let j = null;
  try { j = await resp.json(); } catch {}
  if (!resp.ok) {
    const err = (j && (j.detail || j.error)) || {};
    const hint = (err && (err.hint || err.message)) ||
                 (typeof (j && j.detail) === "string" ? j.detail : "") ||
                 ("HTTP " + resp.status);
    throw { hint };
  }
  return j || {};
}

/* 把 /video/ltx 成片结果渲染进结果槽：成片路径 + <video> 内嵌预览（file://）。 */
function renderVideoOk(slot, res) {
  if (!slot) return;
  const out = (res && res.output) || "";
  const src = out ? "file:///" + String(out).replace(/\\/g, "/").replace(/^\/+/, "") : "";
  slot.innerHTML = `
    <div class="ok">
      <div class="path">成片：<b>${out || "(未返回路径)"}</b>${res && res.mode ? " · " + res.mode : ""}${res && res.profile ? " · " + res.profile : ""}</div>
      ${src ? `<video src="${src}" controls preload="metadata"></video>` : ""}
    </div>`;
}
function renderVideoErr(slot, err) {
  if (!slot) return;
  slot.innerHTML = `<div class="err">⚠ ${(err && (err.hint || err.message)) || "生成失败"}</div>`;
}

/* ===== LTX 2.3 提示词模板（取自《生成模型提示词工程指南》一、LTX Video 2.3） =====
   三个范例对应 LTX 不同的提示词「模式」与要点，chip 点击填入对应 textarea。 */
const LTX_TEMPLATES = [
  {
    id: "lt-i2v-dialog",
    name: "范例1",
    title: "短剧·对白特写（中文 I2V / 分镜图为首帧）",
    // 要点：I2V 不复述静态元素 · 现在时动作链 · 固定镜头拆句 · 微动作防 mannequin · 对白拆短语夹表演指令 · 必写音频
    text:
`画面：中近景，昏暗审讯室冷白顶光与桌面台灯暖光交错，水泥墙面湿冷反光；中年男子（西装领口松开、额角渗汗）缓缓抬眼直视镜头，mouth moves naturally as the character speaks，手指在桌沿无意识敲击 throughout，背景吊扇持续转动、灰尘在光柱里 drifting continuously。人脸含 natural blinks 与 subtle eyebrow raises 防冻结。
运镜：固定（Camera holds locked still; subjects within frame continue motion），仅极慢 push-in，覆盖全片 4 秒。
音效：低频空调嗡鸣，金属椅偶尔吱呀，男声压抑沙哑：「你以为……我会认？」[停顿、眼神下移]「……你想多了。」`
  },
  {
    id: "lt-emotion-en",
    name: "范例2",
    title: "短剧·情绪反转特写（英文 / 单段流式现在时）",
    // 要点：单段流式现在时 · 电影术语 · 微动作(blinks/eyebrow) · 背景元素全给动词+throughout · slow dolly-in · 对白拆短语夹表演指令

  },
  {
    id: "lt-mv-a2v",
    name: "范例3",
    title: "MV·节拍同步性能镜（英文 A2V / 画面锚定音轨）",
    // 要点：A2V 画面诠释音频 · 大全景才用动态运镜(handheld/orbit) · 口型 synced to phrase · 背景持续运动+兜底句 · 必写音频(节拍/人声)
    text:
`Scene: low-angle wide shot of a singer on a fog-filled stage, magenta and cyan stage lights sweeping continuously, lens flares flickering, haze drifting throughout; the singer steps forward into a spotlight, head nodding on downbeats, shoulder lift on every snare hit, mouth moves naturally synced to each phrase, crowd silhouettes keep swaying in the foreground. Camera: handheld tracking, slow orbit. Audio: driving synth-pop track, crowd cheers swelling between phrases, powerful resonant female vocal. Nothing in this frame is still.`
  }
];

/* 三个镜头的元数据 + 缩略说明（stub 数据，体现「分镜图↔分镜」自动对齐） */
const SHOTS = [
  { n: 1, meta: ["全景", "俯拍", "固定", "4s"], desc: "雨夜废品场全景\n人群打伞站立", frame: "" },
  { n: 2, meta: ["中景", "平视", "缓慢推", "3s"], desc: "男主蹲于废铁堆\n翻看地图", frame: "" },

/* chip 点击：把对应 LTX 模板示例文本填入本卡 textarea，并高亮当前 chip */
function wireExamples() {
  document.querySelectorAll(".examples").forEach((row) => {
    const shotN = row.getAttribute("data-shot");
    const ta = document.querySelector(`textarea[data-shot="${shotN}"]`);
    row.querySelectorAll(".chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        const tpl = LTX_TEMPLATES.find(t => t.id === chip.getAttribute("data-tpl"));
        if (!tpl) return;
        ta.value = tpl.text;
        row.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
      });
    });
  });
}

/* 按钮接活：
   - gen：调整集 POST /video_prompt（SSE），整集结果按 shot 序号回填各卡 textarea；
          本卡按钮显进度/失败 hint，其余卡也同时被填充（整集一次产出）。
   - save：本地占位反馈（保存到项目由分镜/整集落盘处理，本页无单卡落盘端点）。
   - i2v：图生视频 — 真机接 media_agent 的 LTX 2.3 video provider；后端尚无 LTX 路由，先占位+TODO。 */
function wireActions() {
  document.querySelectorAll("button[data-act]").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const act = btn.getAttribute("data-act");
      const n = btn.getAttribute("data-shot");
      const ta = document.querySelector(`textarea[data-shot="${n}"]`);
      if (act === "gen") {
        if (btn.dataset.busy === "1") return;
        btn.dataset.busy = "1";
        const orig = btn.textContent;
        const obj = await runVideoPrompt({
          onStatus: (m) => { btn.textContent = "✦ " + m; },
          onShots: (data) => {
            // 整集结果：按序号回填所有 SHOT 卡（global_prompt 作为基底前缀仅本卡可选不强加）
            document.querySelectorAll("textarea[data-shot]").forEach((t) => {
              const sn = t.getAttribute("data-shot");
              const p = shotPromptFromData(data, sn);
              if (p) t.value = p;
            });
          },
          onError: (err) => {
            ta.value = "⚠ " + (err.hint || err.message || "生成失败");
          },
        });
        btn.textContent = obj ? "✦ 已生成" : orig;
        setTimeout(() => { btn.textContent = orig; btn.dataset.busy = ""; }, 1400);
      } else if (act === "save") {
        btn.textContent = "已保存 ✓";
        setTimeout(() => (btn.textContent = "保存"), 1200);
      } else if (act === "i2v") {
        // 图生视频：真机调 POST /video/ltx（同步、耗时长）。
        // prompt=本卡 textarea；first_frame=该镜分镜图路径（stub 暂空）；mode=所选 LTX 画质模式。
        if (btn.dataset.busy === "1") return;
        btn.dataset.busy = "1";
        const orig = "► 图生视频";
        const slot = document.querySelector(`.vid-result[data-result="${n}"]`);
        const shot = SHOTS.find((s) => String(s.n) === String(n));
        btn.disabled = true;
        btn.textContent = "⏳ 生成中…";
        if (slot) slot.innerHTML = "";
        try {
          const res = await runVideoLtx({
            prompt: ta.value,
            firstFrame: shot ? shot.frame : "",
            baseName: "shot_" + n,
          });
          renderVideoOk(slot, res);
          btn.textContent = "✓ 已生成";
        } catch (err) {
          renderVideoErr(slot, err);
          btn.textContent = "⚠ 生成失败";
        }
        setTimeout(() => {
          btn.textContent = orig; btn.disabled = false; btn.dataset.busy = "";
        }, 1600);
      }
    });
  });
}

/* LTX 画质模式切换（全局）：director(导演台·默认) / hd_director(高清导演台)。
   只切全局 ltxQualityMode，下次「生成视频/图生视频」即用该 mode。 */
function wireLtxMode() {
  const seg = document.getElementById("ltxSeg");
  const hint = document.getElementById("ltxModeHint");
  const HINTS = { director: "导演台：速度优先", hd_director: "高清导演台：画质优先（更慢）" };
  seg.querySelectorAll("button[data-ltx]").forEach((b) => {
    b.addEventListener("click", () => {
      ltxQualityMode = b.getAttribute("data-ltx");
      seg.querySelectorAll("button[data-ltx]").forEach((x) =>
        x.classList.toggle("on", x === b));
      if (hint) hint.textContent = HINTS[ltxQualityMode] || "";
      // 同步模式1 导演台的工作流选择器 + state（两者是同一 LTX mode 维度）
      if (typeof dirState !== "undefined") dirState.workflow_key = ltxQualityMode;
      const wf = document.getElementById("dirWorkflow");
      if (wf) wf.value = ltxQualityMode;
      if (typeof dirSave === "function") dirSave();
    });
  });
}

/* 工作模式切换：模式1=导演台自由区 / 模式2=对齐 SHOT 列表，同一 seg 切换。 */
function wireModes() {
  const m1 = document.getElementById("m1");
  const m2 = document.getElementById("m2");
  const p1 = document.getElementById("pane1");
  const p2 = document.getElementById("pane2");
  const note = document.getElementById("alignNote");
  function setMode(n) {
    const one = n === 1;
    m1.classList.toggle("on", one);
    m2.classList.toggle("on", !one);
    p1.classList.toggle("show", one);
    p2.classList.toggle("show", !one);
    note.style.visibility = one ? "hidden" : "visible";  // 对齐提示只属于模式2
  }
  m1.addEventListener("click", () => setMode(1));
  m2.addEventListener("click", () => setMode(2));
}

/* ===== 模式1 · 导演台「自由时间轴」（单提交多段 → 一条视频，复刻原 PySide6 VideoPanel/TimelineModel） =====
   架构：一条时间轴 = 多段 segment，底部「生成」一次性 POST /video/ltx（body.segments=...）。
   段内部长度一律「帧数」（length_frames），UI 以秒展示（秒 = 帧 / fps）。
   状态持久化到 localStorage(key nuomi.director.<project>)。 */

const DIR_LS_KEY = "nuomi.director." + (PROJECT_DIR || "default");

function dirGenId() {
  return String(Date.now()) + Math.random().toString(16).slice(2, 7);
}

const dirState = {
  segments: [],          // {seg_id, segment_type:"image"|"text", length_frames, local_prompt, image_path, guide_strength}
  audios: [],            // {audio_id, audio_path, start_sec}
  pool: [],              // [path]
  selectedId: null,      // 当前选中片段
  global_prompt: "",
  use_global_prompt: true,
  use_custom_audio: false,
  fps: 24,
  resolution_preset: "1280x720 (16:9) (横屏)",
  use_custom_resolution: false,
  custom_width: 1024,
  custom_height: 1024,
  noise_seed: null,
  filename_prefix: "spb_video",
  epsilon: 0.5,
  workflow_key: "director",
};

/* file:// 引用：本地路径 → 壳内可显示 src（同 storyboard-board fileSrc） */
function dirFileSrc(p) {
  if (!p) return "";
  return "file:///" + String(p).replace(/\\/g, "/").replace(/^\/+/, "");
}
function dirBaseName(p) {
  const s = String(p || "").replace(/\\/g, "/");
  return s.slice(s.lastIndexOf("/") + 1) || s;
}

/* ---------- 持久化 ---------- */
function dirSave() {
  try {
    localStorage.setItem(DIR_LS_KEY, JSON.stringify({
      segments: dirState.segments, audios: dirState.audios, pool: dirState.pool,
      global_prompt: dirState.global_prompt, use_global_prompt: dirState.use_global_prompt,
      use_custom_audio: dirState.use_custom_audio, fps: dirState.fps,
      resolution_preset: dirState.resolution_preset, use_custom_resolution: dirState.use_custom_resolution,
      custom_width: dirState.custom_width, custom_height: dirState.custom_height,
      noise_seed: dirState.noise_seed, filename_prefix: dirState.filename_prefix,
      epsilon: dirState.epsilon, workflow_key: dirState.workflow_key,
    }));
  } catch (e) { /* localStorage 不可用时静默 */ }
}
function dirLoad() {
  let d = null;
  try { d = JSON.parse(localStorage.getItem(DIR_LS_KEY) || "null"); } catch { d = null; }
  if (!d) return;
  Object.assign(dirState, {
    segments: Array.isArray(d.segments) ? d.segments : [],
    audios: Array.isArray(d.audios) ? d.audios : [],
    pool: Array.isArray(d.pool) ? d.pool : [],
    global_prompt: d.global_prompt || "",
    use_global_prompt: d.use_global_prompt !== false,
    use_custom_audio: !!d.use_custom_audio,
    fps: parseInt(d.fps, 10) || 24,
    resolution_preset: d.resolution_preset || "1280x720 (16:9) (横屏)",
    use_custom_resolution: !!d.use_custom_resolution,
    custom_width: parseInt(d.custom_width, 10) || 1024,
    custom_height: parseInt(d.custom_height, 10) || 1024,
    noise_seed: (d.noise_seed === null || d.noise_seed === undefined || d.noise_seed === "") ? null : parseInt(d.noise_seed, 10),
    filename_prefix: d.filename_prefix || "spb_video",
    epsilon: (typeof d.epsilon === "number") ? d.epsilon : 0.5,
    workflow_key: d.workflow_key === "hd_director" ? "hd_director" : "director",
  });
}

/* ---------- 段增删改排序 ---------- */
function dirGetSeg(id) { return dirState.segments.find(s => s.seg_id === id); }
function dirSegIndex(id) { return dirState.segments.findIndex(s => s.seg_id === id); }

function dirAddSegment(type, imagePath) {
  const seg = {
    seg_id: dirGenId(),
    segment_type: type,
    length_frames: 24,
    local_prompt: "",
    image_path: imagePath || null,
    guide_strength: 1.0,
  };
  dirState.segments.push(seg);
  dirState.selectedId = seg.seg_id;
  dirRenderAll();
}
function dirRemoveSegment(id) {
  dirState.segments = dirState.segments.filter(s => s.seg_id !== id);
  if (dirState.selectedId === id) {
    dirState.selectedId = dirState.segments.length ? dirState.segments[0].seg_id : null;
  }
  dirRenderAll();
}
function dirMoveSegment(id, delta) {
  const i = dirSegIndex(id), j = i + delta;
  if (i < 0 || j < 0 || j >= dirState.segments.length) return;
  const a = dirState.segments;
  [a[i], a[j]] = [a[j], a[i]];
  dirRenderAll();
}

/* ---------- 音频 ---------- */
function dirAddAudio(path) {
  dirState.audios.push({ audio_id: dirGenId(), audio_path: path, start_sec: 0 });
  if (!dirState.use_custom_audio) dirState.use_custom_audio = true;  // 加段即默认开启
  dirRenderAll();
}
function dirRemoveAudio(id) {
  dirState.audios = dirState.audios.filter(a => a.audio_id !== id);
  dirRenderAll();
}

/* ---------- 图片池 ---------- */
function dirAddToPool(paths) {
  let added = 0;
  paths.forEach(p => {
    const np = String(p).replace(/\\/g, "/").trim();
    if (np && !dirState.pool.includes(np)) { dirState.pool.push(np); added++; }
  });
  return added;
}

/* ---------- 渲染：片段条 ---------- */
function dirRenderStrip() {
  const strip = document.getElementById("dirStrip");
  strip.innerHTML = "";
  if (!dirState.segments.length) {
    strip.innerHTML = `<div class="strip-empty">还没有片段。点上方「＋ 追加段（图）/ Add Text」或从图片池拖图入此条。</div>`;
  }
  const total = dirState.segments.length;
  dirState.segments.forEach((s, idx) => {
    const el = document.createElement("div");
    el.className = "seg" + (s.seg_id === dirState.selectedId ? " sel" : "");
    el.setAttribute("data-seg", s.seg_id);
    const sec = (s.length_frames / Math.max(dirState.fps, 1)).toFixed(1);
    const thumb = (s.segment_type === "image" && s.image_path)
      ? `<img src="${dirFileSrc(s.image_path)}" alt="" onerror="this.style.display='none'">`
      : `<div class="ph">${s.segment_type === "image" ? "未设首帧/参考图" : "纯文本段（无图）"}</div>`;
    const typetag = s.segment_type === "image"
      ? `<span class="typetag img">IMG</span>` : `<span class="typetag txt">TEXT</span>`;
    el.innerHTML = `
      <div class="seg-thumb">${thumb}${typetag}</div>
      <div class="seg-meta">
        <span class="ord">片段 ${idx + 1}</span>
        <span class="dur">${sec}s · ${s.length_frames}f</span>
        <span class="pv">${(s.local_prompt || "").slice(0, 40) || "（无 prompt）"}</span>
      </div>
      <div class="seg-ops">
        <button class="mv-l" title="左移" ${idx === 0 ? "disabled" : ""}>◀</button>
        <button class="mv-r" title="右移" ${idx === total - 1 ? "disabled" : ""}>▶</button>
        <button class="del" title="删除">✕</button>
      </div>`;
    // 选中
    el.querySelector(".seg-thumb").addEventListener("click", () => { dirState.selectedId = s.seg_id; dirRenderAll(); });
    el.querySelector(".seg-meta").addEventListener("click", () => { dirState.selectedId = s.seg_id; dirRenderAll(); });
    el.querySelector(".mv-l").addEventListener("click", (e) => { e.stopPropagation(); dirMoveSegment(s.seg_id, -1); });
    el.querySelector(".mv-r").addEventListener("click", (e) => { e.stopPropagation(); dirMoveSegment(s.seg_id, 1); });
    el.querySelector(".del").addEventListener("click", (e) => { e.stopPropagation(); dirRemoveSegment(s.seg_id); });
    // 拖入图片池里的图 → 设为本段首帧/参考图
    el.addEventListener("dragover", (e) => { e.preventDefault(); el.classList.add("sel"); });
    el.addEventListener("dragleave", () => { if (s.seg_id !== dirState.selectedId) el.classList.remove("sel"); });
    el.addEventListener("drop", (e) => {
      e.preventDefault();
      const path = e.dataTransfer.getData("text/plain");
      if (!path) return;
      const seg = dirGetSeg(s.seg_id);
      if (seg) { seg.image_path = path; seg.segment_type = "image"; }
      dirState.selectedId = s.seg_id;
      dirRenderAll();
    });
    strip.appendChild(el);
  });
  // 末尾「＋」加段
  const add = document.createElement("div");
  add.className = "seg-add";
  add.innerHTML = `<span class="plus">＋</span><span>追加段</span>`;
  add.addEventListener("click", () => dirAddSegment("image", null));
  strip.appendChild(add);
}

/* ---------- 渲染：当前选中片段编辑器 ---------- */

  const s = dirGetSeg(dirState.selectedId);

    return;
  }
  const idx = dirSegIndex(s.seg_id);

    <div class="se-head">
      <span class="t">当前选中片段</span>

    </div>
    <div class="prompt-label">
      <span class="name">LTX 2.3 视频提示词（本段 local_prompt）</span>
      <span class="ltx-pill">${isImg ? "I2V · 不复述静态元素" : "T2V · 完整场景描述"}</span>
    </div>
    <textarea id="sefPrompt" placeholder="${isImg
      ? "I2V：只描述动作链/运镜/音效，不复述静态画面（LTX 2.3：现在时·背景元素给动词+throughout）…"
      : "T2V：完整场景描述（LTX 2.3：单段流式·现在时，长度∝时长）…"}">${s.local_prompt || ""}</textarea>
    <div class="examples">
      <span class="lab">范例：</span>
      ${LTX_TEMPLATES.map(t => `<span class="chip" data-tpl="${t.id}" title="${t.title}">${t.name}</span>`).join("")}
      <span class="chip-hint">点击填入对应 LTX 2.3 模板</span>
    </div>
    <div class="se-params">
      <div class="grp">
        <label>长度</label>
        <input type="range" id="seLen" min="0.5" max="8" step="0.5" value="${sec.toFixed(1)}">
        <span class="val" id="seLenVal">${sec.toFixed(1)}s</span>
        <span style="color:var(--faint);font-size:11px">(${s.length_frames}f @ ${dirState.fps}fps)</span>
      </div>
      <div class="grp">
        <label>Guide</label>
        <input type="range" id="seGuide" min="0" max="1" step="0.05" value="${s.guide_strength}">
        <span class="val g" id="seGuideVal">${Number(s.guide_strength).toFixed(2)}</span>
      </div>
    </div>`;

  // type 切换
  root.querySelectorAll(".reftabs button[data-type]").forEach(b => {
    b.addEventListener("click", () => {
      s.segment_type = b.getAttribute("data-type");
      dirRenderAll();

  // 首帧路径
  const imgInp = root.querySelector("#seImgPath");

    s.image_path = imgInp.value.trim() || null; dirSave(); dirRenderStrip();
  });
  const pick = root.querySelector("#seImgPick");
  if (pick) pick.addEventListener("click", () => {
    const v = prompt("粘贴首帧/参考图绝对路径：", s.image_path || "");
    if (v == null) return;
    s.image_path = v.trim() || null;
    if (s.image_path) { dirAddToPool([s.image_path]); }

  const ta = root.querySelector("#sefPrompt");
  ta.addEventListener("input", () => { s.local_prompt = ta.value; dirSave(); dirRenderStrip(); });
  // 范例 chip
  root.querySelectorAll(".examples .chip").forEach(chip => {
    chip.addEventListener("click", () => {
      const tpl = LTX_TEMPLATES.find(t => t.id === chip.getAttribute("data-tpl"));
      if (!tpl) return;
      ta.value = tpl.text; s.local_prompt = tpl.text;

    root.querySelector("#seGuideVal").textContent = s.guide_strength.toFixed(2);

/* ---------- 渲染：图片池 ---------- */
function dirRenderPool() {
  const root = document.getElementById("dirPool");
  document.getElementById("dirPoolCount").textContent = dirState.pool.length + " 张";
  root.innerHTML = "";
  if (!dirState.pool.length) {
    root.innerHTML = `<div class="pool-empty">图片池为空。点「＋ 批量导入（粘贴路径）」粘贴图片绝对路径（每行一个或用 ; 分隔），再拖到片段卡设首帧。</div>`;
    return;
  }
  dirState.pool.forEach(p => {
    const el = document.createElement("div");
    el.className = "pi";
    el.setAttribute("draggable", "true");
    el.title = p;
    el.innerHTML = `<img src="${dirFileSrc(p)}" alt="" onerror="this.style.display='none'"><span class="nm">${dirBaseName(p)}</span>`;
    el.addEventListener("dragstart", (e) => { e.dataTransfer.setData("text/plain", p); });
    // 点击：若有选中段，直接设为该段首帧
    el.addEventListener("click", () => {
      const s = dirGetSeg(dirState.selectedId);
      if (s) { s.image_path = p; s.segment_type = "image"; dirRenderAll(); }
    });
    root.appendChild(el);
  });
}

/* ---------- 渲染：音频轨 ---------- */
function dirRenderAudio() {
  const list = document.getElementById("dirAudioList");
  document.getElementById("dirUseAudio").checked = dirState.use_custom_audio;
  list.classList.toggle("off", !dirState.use_custom_audio);
  list.innerHTML = "";
  if (!dirState.audios.length) {
    list.innerHTML = `<div class="audio-empty">无音频段。点「＋ Add Audio 段」粘贴音频绝对路径。</div>`;
    return;
  }
  dirState.audios.forEach(a => {
    const row = document.createElement("div");
    row.className = "audio-row";
    row.innerHTML = `
      <span class="ic">♪</span>
      <span class="ap" title="${a.audio_path}">${dirBaseName(a.audio_path)}</span>
      <span class="st">起始 <input type="number" min="0" step="0.5" value="${a.start_sec}"> s</span>
      <button class="del">删除</button>`;
    row.querySelector("input").addEventListener("input", (e) => {
      a.start_sec = parseFloat(e.target.value) || 0; dirSave();
    });
    row.querySelector(".del").addEventListener("click", () => dirRemoveAudio(a.audio_id));
    list.appendChild(row);
  });
}

/* ---------- 总时长 / 段数 状态 ---------- */
function dirRefreshTotals() {
  const totalFrames = dirState.segments.reduce((n, s) => n + (s.length_frames || 0), 0);
  const totalSec = totalFrames / Math.max(dirState.fps, 1);
  document.getElementById("dirSegCount").textContent = dirState.segments.length;
  document.getElementById("dirTotal").textContent = totalSec.toFixed(1) + "s";
}

/* ---------- 全屏渲染 ---------- */
function dirRenderAll() {
  dirRenderStrip();
  dirRenderSegEditor();
  dirRenderPool();
  dirRenderAudio();
  dirRefreshTotals();
  dirSave();
}

/* ---------- 提交前校验（对齐 TimelineModel.validate） ---------- */
function dirValidate() {
  if (!PROJECT_DIR) return [false, "未选择项目，请先在首页选择/打开一个项目。"];
  if (!dirState.segments.length) return [false, "至少需要 1 段画面。"];
  if (!(dirState.fps >= 1 && dirState.fps <= 120)) return [false, `fps 越界（${dirState.fps}，需 1-120）。`];
  if (!(dirState.epsilon >= 0 && dirState.epsilon <= 1)) return [false, `Epsilon 越界（${dirState.epsilon}，需 0-1）。`];
  for (let i = 0; i < dirState.segments.length; i++) {
    const s = dirState.segments[i];
    if (s.length_frames < 1) return [false, `片段 ${i + 1} 长度不合法。`];
    if (s.segment_type === "image" && !(s.image_path && s.image_path.trim())) {
      return [false, `片段 ${i + 1} 是图片段但未绑定首帧/参考图（粘贴路径或拖入图片池图）。`];
    }
    if (!(s.guide_strength >= 0 && s.guide_strength <= 1)) return [false, `片段 ${i + 1} Guide 越界。`];
  }
  if (dirState.use_custom_audio) {
    for (let j = 0; j < dirState.audios.length; j++) {
      if (!(dirState.audios[j].audio_path && dirState.audios[j].audio_path.trim())) {
        return [false, `音频段 ${j + 1} 路径为空。`];
      }
    }
  }
  return [true, ""];
}

/* ---------- 组装 /video/ltx 请求体（整条时间轴一次提交） ---------- */
function dirBuildBody() {
  const fps = dirState.fps;
  const aspect = dirState.use_custom_resolution
    ? `${dirState.custom_width}x${dirState.custom_height}`
    : dirState.resolution_preset;
  return {
    // —— 现有后端 LtxRequest 直接识别的字段 ——
    mode: dirState.workflow_key,                 // director | hd_director
    fps: fps,
    aspect: aspect,
    out_dir: PROJECT_DIR + "/video",
    base_name: dirState.filename_prefix || "spb_video",
    noise_seed: dirState.noise_seed,
    segments: dirState.segments.map(s => ({
      local_prompt: s.local_prompt || "",
      length: s.length_frames,                   // 帧数
      image_path: s.segment_type === "image" ? (s.image_path || null) : null,
      segment_type: s.segment_type,              // "image" | "text"
      guide_strength: s.guide_strength,
      seg_id: s.seg_id,
    })),
    // —— 本仓「扩展后」契约的全 LTXDirectorSpec 字段（现后端忽略未知字段，扩展后生效）——
    global_prompt: dirState.global_prompt || "",
    use_global: dirState.use_global_prompt,
    use_global_prompt: dirState.use_global_prompt,
    audio_segments: dirState.use_custom_audio
      ? dirState.audios.map(a => ({
          path: a.audio_path,
          start: Math.round((a.start_sec || 0) * fps),  // 帧定位
        }))
      : [],
    use_custom_audio: dirState.use_custom_audio,
    frame_rate: fps,
    resolution: aspect,
    use_custom_resolution: dirState.use_custom_resolution,
    custom_w: dirState.custom_width,
    custom_h: dirState.custom_height,
    epsilon: dirState.epsilon,
    filename_prefix: dirState.filename_prefix || "spb_video",
  };
}

/* ---------- 顶部/全局控件接线 ---------- */
function wireDirector() {
  dirLoad();

  // 工作流选择器（与全局 LTX 画质模式 seg 联动）
  const wf = document.getElementById("dirWorkflow");
  wf.value = dirState.workflow_key;
  wf.addEventListener("change", () => {
    dirState.workflow_key = wf.value;
    ltxQualityMode = wf.value;       // 让全局画质模式 seg 同步
    const seg = document.getElementById("ltxSeg");
    seg.querySelectorAll("button[data-ltx]").forEach(x =>
      x.classList.toggle("on", x.getAttribute("data-ltx") === wf.value));
    const hint = document.getElementById("ltxModeHint");
    if (hint) hint.textContent = wf.value === "hd_director" ? "高清导演台：画质优先（更慢）" : "导演台：速度优先";
    dirSave();
  });

  // 工具条按钮
  document.getElementById("dirAddImg").addEventListener("click", () => dirAddSegment("image", null));
  document.getElementById("dirAddText").addEventListener("click", () => dirAddSegment("text", null));
  document.getElementById("dirAddAudio").addEventListener("click", dirPromptAddAudio);
  document.getElementById("dirAddAudio2").addEventListener("click", dirPromptAddAudio);

  // 批量提取：调 /video_prompt 取整集 LTX，按序填入各段 local_prompt + global_prompt
  document.getElementById("dirExtract").addEventListener("click", async () => {
    const btn = document.getElementById("dirExtract");
    if (btn.dataset.busy === "1") return;
    btn.dataset.busy = "1";
    const orig = btn.textContent;
    await runVideoPrompt({
      onStatus: (m) => { btn.textContent = "✦ " + m; },
      onShots: (data) => {
        if (data && data.global_prompt) {
          dirState.global_prompt = data.global_prompt;
          document.getElementById("dirGlobalPrompt").value = data.global_prompt;
        }
        // 按序回填各段；段不足时为多出的 shot 追加新图片段
        if (Array.isArray(data.shots)) {
          data.shots.forEach((sh, i) => {
            const p = shotPromptFromData(data, i + 1);
            if (!p) return;
            if (i < dirState.segments.length) {
              dirState.segments[i].local_prompt = p;
            } else {
              dirState.segments.push({
                seg_id: dirGenId(), segment_type: "image", length_frames: 24,
                local_prompt: p, image_path: null, guide_strength: 1.0,
              });
            }
          });
          if (!dirState.selectedId && dirState.segments.length) {
            dirState.selectedId = dirState.segments[0].seg_id;
          }
        }
        dirRenderAll();
      },
      onError: () => {},
    });
    btn.textContent = "✦ 已提取";
    setTimeout(() => { btn.textContent = orig; btn.dataset.busy = ""; }, 1400);
  });

  // 图片池：批量导入（粘贴路径）/ 清空
  document.getElementById("dirPoolAdd").addEventListener("click", () => {
    const raw = prompt("粘贴图片绝对路径（每行一个，或用 ; 分隔）：", "");
    if (raw == null) return;
    const paths = raw.split(/[\n;]+/).map(x => x.trim()).filter(Boolean);
    if (!paths.length) return;
    dirAddToPool(paths);
    dirRenderAll();
  });
  document.getElementById("dirPoolClear").addEventListener("click", () => {
    if (!dirState.pool.length) return;
    dirState.pool = [];
    dirRenderAll();
  });

  // 音频轨开关
  document.getElementById("dirUseAudio").addEventListener("change", (e) => {
    dirState.use_custom_audio = e.target.checked; dirRenderAll();
  });

  // 全局参数
  const gp = document.getElementById("dirGlobalPrompt");
  gp.value = dirState.global_prompt;
  gp.addEventListener("input", () => { dirState.global_prompt = gp.value; dirSave(); });
  const ug = document.getElementById("dirUseGlobal");
  ug.checked = dirState.use_global_prompt;
  ug.addEventListener("change", () => { dirState.use_global_prompt = ug.checked; dirSave(); });

  const fps = document.getElementById("dirFps");
  fps.value = dirState.fps;
  fps.addEventListener("input", () => {
    dirState.fps = Math.max(1, Math.min(120, parseInt(fps.value, 10) || 24));
    dirRenderAll();   // 帧↔秒换算变了，片段条/编辑器都要刷
  });

  const res = document.getElementById("dirRes");
  res.value = dirState.use_custom_resolution ? "__custom__" : dirState.resolution_preset;
  const whWrap = document.getElementById("dirCustomWH");
  const cw = document.getElementById("dirCustomW");
  const ch = document.getElementById("dirCustomH");
  cw.value = dirState.custom_width; ch.value = dirState.custom_height;
  function syncRes() {
    const custom = res.value === "__custom__";
    dirState.use_custom_resolution = custom;
    whWrap.classList.toggle("on", custom);
    if (!custom) dirState.resolution_preset = res.value;
    dirSave();
  }
  res.addEventListener("change", syncRes);
  cw.addEventListener("input", () => { dirState.custom_width = parseInt(cw.value, 10) || 1024; dirSave(); });
  ch.addEventListener("input", () => { dirState.custom_height = parseInt(ch.value, 10) || 1024; dirSave(); });
  whWrap.classList.toggle("on", dirState.use_custom_resolution);

  const seed = document.getElementById("dirSeed");
  seed.value = dirState.noise_seed == null ? "" : dirState.noise_seed;
  seed.addEventListener("input", () => {
    const v = seed.value.trim();
    dirState.noise_seed = v === "" ? null : (parseInt(v, 10) || 0);
    dirSave();
  });
  const fn = document.getElementById("dirFilename");
  fn.value = dirState.filename_prefix;
  fn.addEventListener("input", () => { dirState.filename_prefix = fn.value.trim() || "spb_video"; dirSave(); });
  const eps = document.getElementById("dirEpsilon");
  eps.value = dirState.epsilon;
  eps.addEventListener("input", () => {
    dirState.epsilon = Math.max(0, Math.min(1, parseFloat(eps.value) || 0));
    dirSave();
  });

  // 底部「生成」：单次提交整条时间轴
  document.getElementById("dirGenAll").addEventListener("click", dirGenerateAll);

  // 初次：若空，给一个起步图片段
  if (!dirState.segments.length) {
    dirState.segments.push({
      seg_id: dirGenId(), segment_type: "image", length_frames: 24,
      local_prompt: "", image_path: null, guide_strength: 1.0,
    });
  }
  if (!dirState.selectedId && dirState.segments.length) dirState.selectedId = dirState.segments[0].seg_id;
  dirRenderAll();
}

function dirPromptAddAudio() {
  const v = prompt("粘贴音频绝对路径（.mp3/.wav/.flac）：", "");
  if (v == null) return;
  const p = v.trim();
  if (!p) return;
  dirAddAudio(p);
}

async function dirGenerateAll() {
  const btn = document.getElementById("dirGenAll");
  const status = document.getElementById("dirStatus");
  const slot = document.getElementById("dirResult");
  if (btn.dataset.busy === "1") return;

  const [ok, msg] = dirValidate();
  if (!ok) { renderVideoErr(slot, { hint: msg }); return; }

  btn.dataset.busy = "1";
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = "⏳ 生成中…（整条时间轴，耗时较长）";
  slot.innerHTML = "";
  try {
    const res = await runVideoLtx({ __timeline: true, body: dirBuildBody() });
    renderVideoOk(slot, res);
    btn.textContent = "✓ 已生成";
  } catch (err) {
    renderVideoErr(slot, err);
    btn.textContent = "⚠ 生成失败";
  }
  setTimeout(() => {
    btn.textContent = orig; btn.disabled = false; btn.dataset.busy = "";
    dirRefreshTotals();
  }, 1800);
}

/* ===== 并行任务下拉切换器（纯前端占位，最多 5 个并行任务） =====
   切换即切当前任务上下文：更新标题/计数/当前名（不触后端，不影响模式与 SHOT 列表）。 */
const MAX_TASKS = 5;
const taskState = {
  tasks: [{ id: 1, name: "任务1" }],   // 初始一个并行任务
  current: 1,
  nextId: 2,
};

function renderTaskMenu() {
  const menu = document.getElementById("taskMenu");
  const atMax = taskState.tasks.length >= MAX_TASKS;
  const opts = taskState.tasks.map((t) => {
    const on = t.id === taskState.current;
    return `<div class="opt${on ? " active" : ""}" data-task="${t.id}">
      <span class="tick">${on ? "✓" : ""}</span>
      <span>${t.name}</span>
      <span class="sub">${on ? "当前" : "切换"}</span>
    </div>`;
  }).join("");
  menu.innerHTML = `${opts}
    <div class="sep-line"></div>
    <div class="opt add${atMax ? " disabled" : ""}" id="taskAdd">
      <span class="tick">＋</span><span>新建并行任务</span>
    </div>
    <div class="hint">已达上限：最多 ${MAX_TASKS} 个并行任务</div>`;

  // 切换任务
  menu.querySelectorAll(".opt[data-task]").forEach((el) => {
    el.addEventListener("click", () => {
      switchTask(parseInt(el.getAttribute("data-task"), 10));
      closeTaskMenu();
    });
  });
  // 新建并行任务
  const addBtn = document.getElementById("taskAdd");
  if (!atMax) {
    addBtn.addEventListener("click", () => { addTask(); });
  }
}

function refreshTaskHeader() {
  const cur = taskState.tasks.find((t) => t.id === taskState.current);
  document.getElementById("taskCurrent").textContent = cur ? cur.name : "";
  document.getElementById("taskTitle").textContent = cur ? ` · ${cur.name}` : "";
  document.getElementById("taskCount").textContent = `${taskState.tasks.length}/${MAX_TASKS}`;
}

function switchTask(id) {
  if (!taskState.tasks.some((t) => t.id === id)) return;
  taskState.current = id;
  refreshTaskHeader();
  renderTaskMenu();
  /* 占位：此处可重载该任务上下文（SHOT 列表/提示词草稿等）。本 mockup 仅切标题。 */
}

function addTask() {
  if (taskState.tasks.length >= MAX_TASKS) return;
  const id = taskState.nextId++;
  taskState.tasks.push({ id, name: `任务${id}` });
  taskState.current = id;        // 新建即切到新任务
  refreshTaskHeader();
  renderTaskMenu();
}

function closeTaskMenu() { document.getElementById("taskWrap").classList.remove("open"); }

function wireTaskSwitch() {
  const wrap = document.getElementById("taskWrap");
  document.getElementById("taskTrigger").addEventListener("click", (e) => {
    e.stopPropagation();
    wrap.classList.toggle("open");
  });
  // 点击空白处关闭
  document.addEventListener("click", (e) => {
    if (!wrap.contains(e.target)) closeTaskMenu();
  });
  renderTaskMenu();
  refreshTaskHeader();
}

renderShots();
wireExamples();
wireActions();
wireLtxMode();
wireModes();
wireDirector();
wireTaskSwitch();
document.getElementById("alignCount").textContent =
  `已按分镜顺序自动对齐 ${SHOTS.length} 个镜头`;
</script>
