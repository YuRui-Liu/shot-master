<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糯米AI · ④ 视频生成 · CLIPS</title>
<link rel="stylesheet" href="tokens.css">
<style>
  /* 本页是壳内容页：标题栏/左侧导航由 web/app.html 提供，此处不再自带 .titlebar/.side。 */
  html, body { height: 100%; }
  body { overflow: hidden; }
  /* 内容页用 min-height + 自身滚动：小窗(如 1366x768 非全屏)整页可滚动，避免子元素被裁剪/互相遮挡 */
  .work { height: 100vh; overflow-y: auto; padding: 22px 26px 30px; }
  .work-head {
    display: flex; align-items: center; gap: 16px; margin-bottom: 14px; max-width: 1440px;
  }
  .work-head h1 { margin: 0; font-size: 22px; background: linear-gradient(135deg, var(--blue), var(--mauve)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .shot-select { min-width: 210px; }

  /* 并行任务下拉切换器 */
  .task-switch { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .task-switch .lbl { color: var(--muted); font-size: 12.5px; }
  .task-switch .wrap { position: relative; }
  .task-switch .trigger {
    background: var(--panel2); color: var(--fg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 13px; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 9px; min-width: 150px;
  }
  .task-switch .trigger:hover { filter: none; border-color: var(--mauve); }
  .task-switch .trigger .caret { margin-left: auto; color: var(--mauve); font-size: 11px; transition: transform .15s; }
  .task-switch .wrap.open .trigger .caret { transform: rotate(180deg); }
  .task-switch .trigger .pcount {
    font-size: 10.5px; font-weight: 600; color: var(--mauve);
    background: rgba(138,127,217,.18); border: 1px solid #4a3d6e;
    padding: 1px 7px; border-radius: 9px;
  }
  .task-switch .menu {
    position: absolute; top: calc(100% + 6px); right: 0; min-width: 220px; z-index: 40;
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 6px; display: none; box-shadow: 0 10px 28px rgba(0,0,0,.45);
  }
  .task-switch .wrap.open .menu { display: block; }
  .task-switch .opt {
    display: flex; align-items: center; gap: 10px; padding: 9px 11px;
    border-radius: var(--radius-sm); color: var(--fg2); font-size: 13px; cursor: pointer;
  }
  .task-switch .opt:hover { background: rgba(255,255,255,.04); color: var(--fg); }
  .task-switch .opt.active { color: var(--mauve); background: rgba(138,127,217,.12); font-weight: 600; }
  .task-switch .opt .tick { width: 14px; color: var(--mauve); font-size: 12px; }
  .task-switch .opt .sub { margin-left: auto; color: var(--faint); font-size: 11px; }
  .task-switch .sep-line { height: 1px; background: var(--border-lo); margin: 6px 4px; }
  .task-switch .opt.add { color: var(--blue); font-weight: 600; }
  .task-switch .opt.add:hover { background: rgba(74,158,255,.10); color: var(--blue); }
  .task-switch .opt.add.disabled { color: var(--faint); cursor: default; }
  .task-switch .opt.add.disabled:hover { background: transparent; }
  .task-switch .hint { color: var(--faint); font-size: 11px; padding: 2px 11px 4px; display: none; }
  .task-switch .opt.add.disabled + .hint { display: block; }

  /* 工作模式切换 */
  .modebar {
    max-width: 1440px; display: flex; align-items: center; gap: 12px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px; margin-bottom: 14px;
  }
  .modebar .lbl { color: var(--muted); font-size: 12.5px; }
  .seg { display: flex; background: var(--field); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 3px; }
  .seg button {
    background: transparent; color: var(--fg2); padding: 7px 16px;
    border-radius: 5px; font-weight: 500;
  }
  .seg button.on {
    background: linear-gradient(135deg, var(--blue), var(--periw));
    color: #06122a; font-weight: 600;
  }
  .seg button:hover:not(.on) { filter: none; background: rgba(255,255,255,.04); }
  .align-note {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    color: var(--mauve); font-size: 12.5px;
  }
  .align-note .badge { background: rgba(78,201,143,.16); color: var(--done); border-color: #2f6b4f; }

  /* ===== 面板切换 ===== */
  .pane { display: none; }
  .pane.show { display: block; }

  /* ================================================================
     ===== 模式1 · 高自由度导演台（时间线编辑器风格） =====
     ================================================================ */
  .timeline-app {
    display: flex; flex-direction: column;
    /* 不写死高度：用 min-height 让其随内容增长，由 .work 滚动容器兜底；
       小窗时编辑区不会被挤成 0 高度、也不会溢出遮挡下方状态栏。 */
    min-height: calc(100vh - 130px);
    max-width: 1440px; gap: 0;
  }

  /* --- 顶部工具栏 --- */
  .tl-toolbar {
    display: flex; align-items: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px; margin-bottom: 10px;
    flex-shrink: 0; flex-wrap: nowrap; overflow-x: auto;
  }
  .tl-toolbar .workflow-select {
    min-width: 180px; font-size: 13px; font-weight: 600;
    background: var(--field); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--fg);
    padding: 6px 9px; outline: none; cursor: pointer; flex-shrink: 0;
  }
  .tl-toolbar .workflow-select:focus { border-color: var(--mauve); }
  .tl-toolbar .tl-btn {
    background: var(--panel2); color: var(--fg2);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 6px 10px; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .14s; white-space: nowrap; flex-shrink: 0;
  }
  .tl-toolbar .tl-btn:hover { filter: none; border-color: var(--mauve); color: var(--fg); background: rgba(255,255,255,.04); }
  .tl-toolbar .tl-btn.primary {
    background: linear-gradient(135deg, var(--blue), var(--periw));
    color: #06122a; font-weight: 600; border: none;
  }
  .tl-toolbar .tl-btn.primary:hover { filter: brightness(1.08); }
  .tl-toolbar .grow { flex: 1; min-width: 0; }

  /* --- 图片池 --- */
  .image-pool {
    display: flex; align-items: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px; margin-bottom: 10px;
    overflow-x: auto; flex-shrink: 0; min-height: 84px;
  }
  .image-pool::-webkit-scrollbar { height: 6px; }
  .image-pool::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .pool-thumb {
    flex-shrink: 0; width: 72px; height: 72px;
    border-radius: var(--radius-sm); overflow: hidden;
    background: linear-gradient(160deg, #20243a, #14172a);
    border: 1px solid var(--border-lo); cursor: grab;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    position: relative; transition: all .14s;
  }
  .pool-thumb:hover { border-color: var(--mauve); transform: translateY(-2px); }
  .pool-thumb .pool-img {
    width: 100%; height: 56px; object-fit: cover; display: block;
    background: linear-gradient(135deg, #2a2d42, #1a1c2e);
  }
  .pool-thumb .pool-name {
    font-size: 9.5px; color: var(--faint); padding: 2px 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
    background: rgba(0,0,0,.5);
  }
  .pool-thumb .pool-del {
    position: absolute; right: 2px; top: 2px; width: 16px; height: 16px;
    border-radius: 4px; background: rgba(224,90,90,.5); color: #fff; border: none;
    font-size: 10px; line-height: 1; cursor: pointer; display: none;
    align-items: center; justify-content: center;
  }
  .pool-thumb:hover .pool-del { display: flex; }
  .pool-thumb.add-btn {
    border-style: dashed; justify-content: center; gap: 2px; cursor: pointer;
    color: var(--faint); font-size: 11px;
  }
  .pool-thumb.add-btn:hover { color: var(--blue); border-color: var(--blue); }
  .pool-thumb.add-btn .plus { font-size: 18px; line-height: 1; }
  .pool-empty-hint { color: var(--faint); font-size: 12px; padding: 0 8px; }

  /* --- 时间轴整体容器 --- */
  .timeline-wrap {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 0; margin-bottom: 10px;
    flex-shrink: 0; overflow-x: auto; overflow-y: hidden;
    position: relative;
  }
  .timeline-ruler {
    display: flex; align-items: center; height: 28px;
    background: var(--navy); border-bottom: 1px solid var(--border-lo);
    padding: 0 12px; font-size: 11px; color: var(--faint);
    position: relative; user-select: none; min-width: 100%;
  }
  .timeline-ruler .tick {
    position: absolute; top: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center;
    font-size: 10px; color: var(--muted);
  }
  .timeline-ruler .tick::before {
    content: ""; display: block; width: 1px; height: 8px;
    background: var(--border); margin-bottom: 2px;
  }
  .timeline-ruler .tick.major::before { height: 12px; background: var(--muted); }

  .timeline-track {
    position: relative; height: 72px;
    background: repeating-linear-gradient(
      90deg, transparent, transparent 49px, var(--border-lo) 49px, var(--border-lo) 50px
    );
    margin: 0 12px; min-width: 100%;
  }

  .audio-track-wrap {
    border-top: 2px solid var(--border); margin: 6px 0 0 0; padding-top: 2px;
  }
  .audio-track-label {
    font-size: 11px; color: var(--muted); padding: 0 12px 2px; user-select: none;
    display: flex; align-items: center; gap: 8px;
  }
  .audio-track-label.off { opacity: .45; }
  .audio-track {
    position: relative; height: 36px;
    background: repeating-linear-gradient(
      90deg, transparent, transparent 49px, var(--border-lo) 49px, var(--border-lo) 50px
    );
    margin: 0 12px; min-width: 100%;
  }
  .audio-track.off { opacity: .4; pointer-events: none; }

  .clip-block, .audio-clip {
    position: absolute; top: 8px; bottom: 8px;
    background: linear-gradient(135deg, rgba(74,158,255,.12), rgba(139,127,217,.12));
    border: 2px solid var(--blue-dim); border-radius: var(--radius-sm);
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 6px 8px; cursor: pointer; overflow: hidden;
    transition: border-color .14s; min-width: 60px;
    user-select: none;
  }
  .clip-block:hover, .audio-clip:hover { border-color: var(--blue); background: linear-gradient(135deg, rgba(74,158,255,.18), rgba(139,127,217,.18)); }
  .clip-block.active, .audio-clip.active {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(74,158,255,.2), inset 0 0 20px rgba(74,158,255,.08);
  }
  .clip-block.txt { border-color: #6a5f9e; }
  .clip-block .clip-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--blue); box-shadow: 0 0 4px var(--blue);
    position: absolute; left: 6px; top: 6px;
  }
  .clip-block.txt .clip-dot { background: var(--mauve); box-shadow: 0 0 4px var(--mauve); }
  .clip-block .clip-thumb {
    position: absolute; right: 6px; top: 6px;
    width: 36px; height: 36px; border-radius: 4px;
    background: linear-gradient(135deg, #2a2d42, #1a1c2e);
    object-fit: cover; border: 1px solid var(--border-lo);
  }
  .clip-block .clip-label {
    font-size: 11px; color: var(--fg2); line-height: 1.4;
    padding-right: 44px; padding-top: 2px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .clip-block .clip-dur, .audio-clip .clip-dur {
    font-size: 10.5px; color: var(--blue); font-weight: 600;
    margin-top: auto; padding-top: 4px;
  }
  .clip-block .clip-del, .audio-clip .clip-del {
    position: absolute; right: 4px; bottom: 4px;
    width: 18px; height: 18px; border-radius: 4px;
    background: rgba(224,90,90,.2); color: var(--err);
    border: none; font-size: 11px; cursor: pointer; display: none;
    align-items: center; justify-content: center; line-height: 1;
  }
  .clip-block:hover .clip-del, .audio-clip:hover .clip-del { display: flex; }
  .clip-block .clip-del:hover, .audio-clip .clip-del:hover { background: rgba(224,90,90,.4); }

  .audio-clip {
    top: 4px; bottom: 4px; background: rgba(138,127,217,.12);
    border-color: #6a5f9e; flex-direction: row; align-items: center; gap: 6px;
    padding: 4px 8px; font-size: 11px; color: var(--fg2);
  }
  .audio-clip .audio-wave { flex: 1; height: 14px; background: rgba(255,255,255,.06); border-radius: 2px; min-width: 10px; }
  .audio-clip .audio-name { max-width: 90px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .resize-handle {
    position: absolute; top: 0; bottom: 0; width: 8px; cursor: col-resize;
    background: transparent; z-index: 2;
  }
  .resize-handle.left { left: -4px; }
  .resize-handle.right { right: -4px; }

  .align-line {
    position: absolute; top: 0; bottom: 0; width: 2px;
    background: var(--err, #e05a5a); z-index: 10; pointer-events: none;
    display: none;
  }

  .timeline-empty, .audio-empty {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--faint); font-size: 12px; pointer-events: none;
  }

  /* --- 分割条 --- */
  .splitter {
    height: 6px; background: var(--border-lo);
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    cursor: row-resize; flex-shrink: 0; position: relative;
  }
  .splitter::after {
    content: ""; position: absolute; left: 50%; top: 1px;
    width: 40px; height: 3px; border-radius: 2px;
    background: var(--border); transform: translateX(-50%);
  }

  /* --- 下部编辑区 --- */
  .editor-bottom {
    display: flex; gap: 12px; flex: 1;
    /* 给一个最小高度防小窗被挤扁；允许在窄屏换行堆叠(下方 @media)；
       不再 overflow:hidden 裁剪内容，由各 panel 自身滚动。 */
    min-height: 320px;
    margin-bottom: 10px;
  }
  .editor-bottom .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; flex-direction: column; overflow: hidden;
    min-height: 0;
  }
  .seg-panel { flex: 1.1; min-width: 0; overflow-y: auto; }
  .global-panel { flex: 1; min-width: 0; overflow-y: auto; }

  .panel-header {
    font-size: 12.5px; font-weight: 600; color: var(--periw);
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .panel-header .sub { color: var(--muted); font-size: 11px; font-weight: 400; }
  .panel-header .tr-btn {
    margin-left: auto; font-size: 11px; color: var(--muted);
    background: none; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; padding: 3px 9px;
  }
  .panel-header .tr-btn:hover { color: var(--fg2); border-color: var(--mauve); }

  .seg-imgrow { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
  .seg-imgrow label { color: var(--muted); font-size: 12px; flex-shrink: 0; }
  .seg-imgrow .seg-img-prev {
    width: 40px; height: 40px; border-radius: 5px; object-fit: cover; flex-shrink: 0;
    border: 1px solid var(--border-lo); background: linear-gradient(135deg, #2a2d42, #1a1c2e);
  }
  .seg-imgrow input { flex: 1; min-width: 0; padding: 6px 9px; font-size: 12px; }
  .seg-imgrow button {
    background: var(--panel2); color: var(--blue); border: 1px solid var(--blue-dim);
    border-radius: var(--radius-sm); padding: 6px 11px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .seg-typetabs { display: flex; gap: 4px; }
  .seg-typetabs button {
    background: var(--field); color: var(--fg2); border: 1px solid var(--border);
    border-radius: 5px; padding: 4px 10px; font-size: 11.5px; font-weight: 500; cursor: pointer;
  }
  .seg-typetabs button.on { background: rgba(74,158,255,.14); color: var(--blue); border-color: var(--blue-dim); font-weight: 600; }

  .prompt-tag {
    font-size: 11px; color: var(--periw); font-weight: 600;
    margin: 6px 0; flex-shrink: 0;
  }
  .examples { display: flex; align-items: center; gap: 6px; margin: 6px 0; flex-wrap: wrap; flex-shrink: 0; }
  .examples .lab { color: var(--muted); font-size: 11.5px; }
  .examples .chip {
    background: var(--panel2); color: var(--fg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 3px 10px; font-size: 11.5px; cursor: pointer; transition: all .14s;
  }
  .examples .chip:hover { border-color: var(--mauve); color: var(--fg); }
  .examples .chip.active { background: rgba(138,127,217,.18); border-color: var(--mauve); color: var(--mauve); font-weight: 600; }

  .editor-bottom textarea {
    width: 100%; flex: 1; resize: none; font: inherit; line-height: 1.6;
    background: var(--field); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--fg); padding: 10px 12px; outline: none; min-height: 70px;
  }
  .editor-bottom textarea:focus { border-color: var(--mauve); }
  .editor-bottom textarea::placeholder { color: var(--faint); }
  .editor-bottom .seg-empty { color: var(--faint); font-size: 12.5px; padding: 18px 0; text-align: center; }

  .param-row {
    display: flex; align-items: center; gap: 16px;
    margin-top: 10px; flex-shrink: 0; flex-wrap: wrap;
  }
  .param-row .grp { display: flex; align-items: center; gap: 7px; }
  .param-row .grp > label { font-size: 12px; color: var(--muted); }
  .param-row .grp input[type="text"],
  .param-row .grp input[type="number"],
  .param-row .grp select { width: 90px; padding: 6px 9px; font-size: 12.5px; }
  .param-row .grp input[type="range"] { width: 120px; accent-color: var(--blue); }
  .param-row .grp .rngval { color: var(--blue); font-weight: 600; font-size: 12px; min-width: 30px; }
  .param-row .grp .rngval.g { color: var(--mauve); }
  .param-row .grp input[type="text"].wide { width: 160px; }
  .param-row .grp input[type="text"].xwide { width: 200px; }
  /* 段长度数值输入框（可直接键入，单位由「时间显示」决定） */
  .param-row .grp input.seg-len-num { width: 66px; padding: 6px 7px; font-size: 12.5px; }
  .param-row .grp .seg-len-unit { color: var(--blue); font-weight: 600; font-size: 12px; min-width: 14px; }

  .global-panel .gp-row {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 10px; flex-shrink: 0; flex-wrap: wrap;
  }
  .global-panel .gp-row label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12.5px; color: var(--fg2); cursor: pointer;
  }
  .global-panel .gp-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--blue); cursor: pointer; }
  .global-panel .global-prompt-text { flex: none; min-height: 90px; height: 90px; resize: vertical; }
  .global-panel .customwh { display: none; align-items: center; gap: 5px; }
  .global-panel .customwh.on { display: flex; }

  /* 底部状态栏：粘在 .work 滚动容器底部，永不被编辑区/结果浮层遮挡，提交按钮始终可达 */
  .status-bar {
    display: flex; align-items: center; gap: 16px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 16px; flex-shrink: 0;
    position: sticky; bottom: 0; z-index: 20;
  }
  .status-bar .total-dur { white-space: nowrap; }
  .status-bar .status { font-size: 12.5px; color: var(--muted); }
  .status-bar .status.idle::before {
    content: ""; display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: var(--done); margin-right: 6px; box-shadow: 0 0 4px var(--done);
  }
  .status-bar .status.busy::before {
    content: ""; display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: var(--warn); margin-right: 6px; box-shadow: 0 0 4px var(--warn);
  }
  .status-bar .status.err::before {
    content: ""; display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: var(--err); margin-right: 6px; box-shadow: 0 0 4px var(--err);
  }
  .status-bar .total-dur { font-size: 12.5px; color: var(--fg2); font-variant-numeric: tabular-nums; }
  .status-bar .grow { flex: 1; }
  .status-bar .btn-submit {
    padding: 8px 22px; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, var(--done), #3aa978); color: #06231a; border: none;
    border-radius: var(--radius-sm); cursor: pointer;
  }
  .status-bar .btn-submit:disabled { opacity: .55; cursor: default; }

  .time-toggle {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--field); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 3px 8px;
  }
  .time-toggle label { display: flex; align-items: center; gap: 3px; font-size: 11.5px; color: var(--fg2); cursor: pointer; }
  .time-toggle input[type="radio"] { accent-color: var(--blue); }

  /* 模式1 成片结果 */
  .vid-result { margin-top: 8px; }
  .vid-result:empty { display: none; }
  .vid-result .ok {
    display: flex; flex-direction: column; gap: 8px;
    background: rgba(78,201,143,.08); border: 1px solid #2f6b4f;
    border-radius: var(--radius-sm); padding: 10px 12px;
  }
  .vid-result .ok .path { color: var(--done); font-size: 12px; word-break: break-all; }
  .vid-result .ok .path b { color: var(--fg); }
  .vid-result video { width: 240px; max-width: 100%; border-radius: var(--radius-sm); background: #000; border: 1px solid var(--border-lo); }
  .vid-result .err {
    background: rgba(255,90,90,.08); border: 1px solid var(--err);
    border-radius: var(--radius-sm); padding: 10px 12px; color: var(--err); font-size: 12.5px;
  }

  /* ================================================================
     ===== 响应式：窄屏/小窗(如 1366x768 非全屏) 防遮挡 =====
     窄屏时编辑区双栏改为纵向堆叠；整页靠 .work 滚动，状态栏 sticky 兜底。
     ================================================================ */
  @media (max-width: 1100px) {
    .work { padding: 16px 16px 24px; }
    /* 编辑区两栏在窄屏换行堆叠，避免横向挤压导致内容溢出遮挡 */
    .editor-bottom { flex-wrap: wrap; min-height: 0; }
    .editor-bottom .seg-panel,
    .editor-bottom .global-panel { flex: 1 1 100%; min-width: 0; overflow: visible; }
    .editor-bottom .panel { overflow: visible; }
    .editor-bottom textarea { min-height: 120px; }
  }
  /* 矮屏：不再强求 timeline-app 占满视口高度，纯随内容流式排布 */
  @media (max-height: 820px) {
    .timeline-app { min-height: 0; }
    .editor-bottom { min-height: 0; }
  }

  /* ================================================================
     ===== 模式2 · 剧集分镜对齐（SHOT 卡列表） =====
     ================================================================ */
  .shots { max-width: 1180px; display: flex; flex-direction: column; gap: 16px; }
  .shot {
    display: flex; gap: 18px; background: var(--panel);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
  }
  .thumb {
    position: relative; width: 168px; flex-shrink: 0;
    /* 画幅自适应：默认 9/16，实际由行内 style 按分镜 aspectRatio 动态覆盖 */
    aspect-ratio: 9 / 16; border-radius: var(--radius-sm); overflow: hidden;
    background: linear-gradient(160deg, #20243a, #14172a);
    border: 1px solid var(--border-lo); display: flex; align-items: center; justify-content: center;
  }
  /* 横屏卡：16:9 等宽幅画面更宽，缩略图列加宽以保留可读高度 */
  .shot.wide .thumb { width: 248px; }
  .thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .thumb .ph { color: var(--faint); font-size: 12px; text-align: center; padding: 0 10px; position: relative; }
  .thumb .tag {
    position: absolute; left: 8px; bottom: 8px;

    background: rgba(0,0,0,.55); padding: 3px 8px; border-radius: 5px;
  }
  .thumb .ord {
    position: absolute; right: 8px; top: 8px; font-size: 10px; color: var(--mauve);
    background: rgba(138,127,217,.18); border: 1px solid #4a3d6e; padding: 2px 7px; border-radius: 9px;

  .prompt-label { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .prompt-label .name { font-size: 12.5px; color: var(--periw); font-weight: 600; }
  .prompt-label .ltx-pill {

  .pane2-textarea {

<script>
/* ===== 后端约定 =====
   SW_API：screenwriter_agent（/video_prompt SSE），默认 18430；?sw= 覆盖。
   MEDIA_API：media_agent（/video/ltx、/file），默认 18450；?media= 覆盖。
   PROJECT_DIR / EPISODE_ID：壳经 ?project=、?episode= 转发。 */
const SW_API = new URLSearchParams(location.search).get("sw") || "http://127.0.0.1:18430";
const MEDIA_API = new URLSearchParams(location.search).get("media") || "http://127.0.0.1:18450";
const PROJECT_DIR = new URLSearchParams(location.search).get("project") || "";
const EPISODE_ID = new URLSearchParams(location.search).get("episode") || "E1";

/* [A] 本地媒体 URL 助手（http 页面禁 file://，走壳 media_agent /file 代理） */
function mediaUrl(p){ if(!p) return ''; if(/^(https?:|data:|blob:)/.test(p)) return p;
  var u = MEDIA_API + '/file?path=' + encodeURIComponent(p);
  if (PROJECT_DIR && !/^([a-zA-Z]:[\\/]|\/|\\\\)/.test(p)) u += '&project=' + encodeURIComponent(PROJECT_DIR);
  return u; }

/* [B] 原生文件/目录选择（经壳中继，绕 iframe） */
var _pkSeq = 0;
function pickNative(mode, cb){ var reqId = 'pk_' + (++_pkSeq);
  function onMsg(e){ var d=e.data||{}; if(d.type==='pick.result'&&d.reqId===reqId){ window.removeEventListener('message',onMsg);
    if(d.nobridge){ var t=prompt('粘贴路径(多条换行/分号分隔)：')||''; cb(t.split(/[\n;]+/).map(s=>s.trim()).filter(Boolean)); }
    else cb(d.paths||[]); } }
  window.addEventListener('message',onMsg);
  window.parent.postMessage({type:'pick.request', mode:mode, reqId:reqId}, '*'); }

function baseName(p){ const s = String(p || "").replace(/\\/g, "/"); return s.slice(s.lastIndexOf("/") + 1) || s; }

/* 解析单条 SSE 帧 → { event, data } */
function parseSSE(chunk) {
  let event = "message"; const dataLines = [];
  chunk.split("\n").forEach((line) => {
    if (line.startsWith("event:")) event = line.slice(6).trim();
    else if (line.startsWith("data:")) dataLines.push(line.slice(5).trim());
  });
  if (!dataLines.length) return null;
  let data = {};
  try { data = JSON.parse(dataLines.join("\n")); } catch { data = { text: dataLines.join("\n") }; }
  return { event, data };
}

function shotPromptFromData(obj, n) {
  if (!obj || !Array.isArray(obj.shots)) return "";
  const byNo = obj.shots.find((s) => String(s.shot_id ?? s.shot ?? s.n ?? s.index ?? "") === String(n));
  const s = byNo || obj.shots[n - 1];
  if (!s) return "";
  return s.local_prompt || s.prompt || s.text || "";
}

/* 调 POST /video_prompt（整集 SSE）：status 显进度，partial/done 拿 {global_prompt,shots}。 */
async function runVideoPrompt({ onStatus, onShots, onError }) {
  if (!PROJECT_DIR) { onError && onError({ hint: "未选择项目，请先在首页选择/打开一个项目。" }); return; }
  const body = {
    project_dir: PROJECT_DIR, episode_id: EPISODE_ID,
    options: { template_id: "ltx", fps: dirState.fps || 24, aspect_ratio: "9:16", language: "en" },
  };
  let resultObj = null;
  try {
    const resp = await fetch(SW_API + "/video_prompt", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "text/event-stream" },
      body: JSON.stringify(body),
    });
    if (!resp.ok || !resp.body) {
      let j = null; try { j = await resp.json(); } catch {}
      throw j && j.error ? j.error : { hint: "HTTP " + resp.status };
    }
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf("\n\n")) >= 0) {
        const chunk = buf.slice(0, idx); buf = buf.slice(idx + 2);
        const evt = parseSSE(chunk);
        if (!evt) continue;
        if (evt.event === "start") onStatus && onStatus(evt.data.message || "正在生成…");
        else if (evt.event === "status") onStatus && onStatus(evt.data.phase === "streaming" ? "AI 生成中…" : (evt.data.phase || ""));
        else if (evt.event === "partial") { try { resultObj = JSON.parse(evt.data.content || "{}"); } catch { resultObj = null; } if (resultObj) onShots && onShots(resultObj); }
        else if (evt.event === "done") { if (resultObj) onShots && onShots(resultObj); return resultObj; }
        else if (evt.event === "error") throw evt.data || { hint: "生成失败" };
      }
    }
    return resultObj;
  } catch (e) {
    onError && onError(e && (e.hint || e.message) ? e : { hint: (e && e.message) || "生成失败" });
    return null;
  }
}

/* 调真实图生视频/文生视频后端：POST {MEDIA_API}/video/ltx（同步、耗时长）。
   (a) 单卡：{prompt, first_frame?, mode, fps, aspect?, out_dir, base_name}
   (b) 整条时间轴：把组好的完整 body 直接传入（含全 LTXDirectorSpec）。 */
async function runVideoLtx(arg) {
  if (!PROJECT_DIR) throw { hint: "未选择项目，请先在首页选择/打开一个项目。" };
  let body;
  if (arg && arg.__timeline) { body = arg.body; }
  else {
    const { prompt, firstFrame, baseName: bn, mode, duration } = arg || {};
    body = {
      prompt: prompt || "", first_frame: firstFrame || null,
      mode: mode || "director", fps: dirState.fps || 24,
      aspect: "9:16", out_dir: PROJECT_DIR + "/video", base_name: bn || "clip",
      ...(duration != null ? { duration } : {}),
    };
  }
  let resp;
  try {
    resp = await fetch(MEDIA_API + "/video/ltx", {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
    });
  } catch (e) { throw { hint: "无法连接生成服务（media）：" + ((e && e.message) || "网络错误") }; }
  let j = null;
  try { j = await resp.json(); } catch {}
  if (!resp.ok) {
    const err = (j && (j.detail || j.error)) || {};
    const hint = (err && (err.hint || err.message)) || (typeof (j && j.detail) === "string" ? j.detail : "") || ("HTTP " + resp.status);
    throw { hint };
  }
  return j || {};
}

function renderVideoOk(slot, res) {
  if (!slot) return;
  const out = (res && res.output) || "";
  const src = out ? mediaUrl(out) : "";
  // 构建可点击的文件路径（file:// 协议，HTTP 页面中点击仅复制到剪贴板或不跳转，给出提示）
  const pathHtml = out
    ? `<span title="点击复制路径" onclick="navigator.clipboard.writeText('${out.replace(/'/g, "\\'")}');this.style.color='var(--done)';setTimeout(()=>this.style.color='',1800)" style="cursor:pointer;border-bottom:1px dashed var(--muted);user-select:all;">${out}</span>`
    : "(未返回路径)";
  slot.innerHTML = `
    <div class="ok">
      <div class="path">成片：${pathHtml}${res && res.mode ? " · " + res.mode : ""}${res && res.profile ? " · " + res.profile : ""}<br><span style="font-size:10px;color:var(--muted);">（点击路径复制到剪贴板 · 浏览器内可通过 file:// 直接打开；或路由到媒体 URL 在下方预览）</span></div>
      ${src ? `<video src="${src}" controls preload="metadata"></video>` : ""}
    </div>`;
}
function renderVideoErr(slot, err) {
  if (!slot) return;
  slot.innerHTML = `<div class="err">⚠ ${(err && (err.hint || err.message)) || "生成失败"}</div>`;
}

/* workflowSelect 值 → LTX mode：ltx23→director / hd→hd_director */
function wfToMode(v) { return v === "hd" ? "hd_director" : "director"; }
function modeToWf(m) { return m === "hd_director" ? "hd" : "ltx23"; }

/* ===== LTX 2.3 提示词模板 ===== */
const LTX_TEMPLATES = [
  { id: "lt-i2v-dialog", name: "范例1", title: "短剧·对白特写（中文 I2V / 分镜图为首帧）",
    text: `画面：中近景，昏暗审讯室冷白顶光与桌面台灯暖光交错，水泥墙面湿冷反光；中年男子（西装领口松开、额角渗汗）缓缓抬眼直视镜头，mouth moves naturally as the character speaks，手指在桌沿无意识敲击 throughout，背景吊扇持续转动、灰尘在光柱里 drifting continuously。人脸含 natural blinks 与 subtle eyebrow raises 防冻结。
运镜：固定（Camera holds locked still; subjects within frame continue motion），仅极慢 push-in，覆盖全片 4 秒。
音效：低频空调嗡鸣，金属椅偶尔吱呀，男声压抑沙哑：「你以为……我会认？」[停顿、眼神下移]「……你想多了。」` },
  { id: "lt-emotion-en", name: "范例2", title: "短剧·情绪反转特写（英文 / 单段流式现在时）",
    text: `Scene: medium close-up, a young woman in a worn beige coat sits by a rain-streaked window at dusk, cold blue exterior light mixing with a warm lamp, condensation beading on glass; she lowers her eyes then slowly looks up, subtle eyebrow raises on key words, natural blinks between phrases, raindrops keep sliding down the glass throughout. Camera: slow dolly-in over the full clip. Audio: soft rain hiss, distant traffic, her voice trembling and low: "I waited" [pause, voice cracks] "every single night." Nothing in this frame is still.` },
  { id: "lt-mv-a2v", name: "范例3", title: "MV·节拍同步性能镜（英文 A2V / 画面锚定音轨）",

];

/* ===== 工作模式切换 ===== */
function wireModes() {
  const m1 = document.getElementById("m1"), m2 = document.getElementById("m2");
  const p1 = document.getElementById("pane1"), p2 = document.getElementById("pane2");
  const note = document.getElementById("alignNote");
  function setMode(n) {
    const one = n === 1;
    m1.classList.toggle("on", one); m2.classList.toggle("on", !one);
    p1.classList.toggle("show", one); p2.classList.toggle("show", !one);
    if (note) note.style.visibility = one ? "hidden" : "visible";
    try { localStorage.setItem(VM_LS_KEY, n === 1 ? "m1" : "m2"); } catch (_) {}
  }
  // 初始化时从 localStorage 恢复模式（默认 m1）
  (function () {
    let saved = null;
    try { saved = localStorage.getItem(VM_LS_KEY); } catch (_) {}
    if (saved === "m2") setMode(2);
  })();
  m1.addEventListener("click", () => setMode(1));
  m2.addEventListener("click", () => setMode(2));
}

/* ================================================================
   ===== 模式1 · 导演台时间轴编辑器 =====
   状态持久化到 localStorage(key nuomi.director.<project>)。
   段内部长度 = 秒（duration），提交时按 fps 换算为帧。 ================ */
let TIME_SCALE = 80;                 // 像素/秒，ctrl+滚轮缩放
const VM_LS_KEY = "nuomi.videoMode." + (PROJECT_DIR || "default");
const SNAP_THRESHOLD = 6;
const DIR_LS_KEY = "nuomi.director." + (PROJECT_DIR || "default");

function genId() { return String(Date.now()) + Math.random().toString(16).slice(2, 7); }

const dirState = {
  pool: [],            // [path]
  clips: [],           // {id, type:'image'|'text', path, start, duration(秒), prompt, guide, shotNo}
  audioClips: [],      // {id, path, start, duration(秒)}
  selectedClipId: null,
  global_prompt: "",
  use_global_prompt: true,
  use_custom_audio: false,
  fps: 24,
  resolution_preset: "1280x720 (16:9) (横屏)",
  use_custom_resolution: false,
  custom_width: 1024,
  custom_height: 1024,
  noise_seed: null,
  filename_prefix: "spb_video",
  epsilon: 0.5,
  workflow_key: "director",          // director | hd_director
  timeUnit: "sec",                   // sec | frame
  pending: [],                       // [{id, slotId, startedAt}] background task resilience
};

/* ---------- 持久化 ---------- */
function dirSave() {
  try { localStorage.setItem(DIR_LS_KEY, JSON.stringify({
    pool: dirState.pool, clips: dirState.clips, audioClips: dirState.audioClips,
    global_prompt: dirState.global_prompt, use_global_prompt: dirState.use_global_prompt,
    use_custom_audio: dirState.use_custom_audio, fps: dirState.fps,
    resolution_preset: dirState.resolution_preset, use_custom_resolution: dirState.use_custom_resolution,
    custom_width: dirState.custom_width, custom_height: dirState.custom_height,
    noise_seed: dirState.noise_seed, filename_prefix: dirState.filename_prefix,
    epsilon: dirState.epsilon, workflow_key: dirState.workflow_key, timeUnit: dirState.timeUnit,
    selectedClipId: dirState.selectedClipId, pending: dirState.pending,
  })); } catch (e) {}
}
function dirLoad() {
  let d = null;
  try { d = JSON.parse(localStorage.getItem(DIR_LS_KEY) || "null"); } catch { d = null; }
  if (!d) return;
  Object.assign(dirState, {
    pool: Array.isArray(d.pool) ? d.pool : [],
    clips: Array.isArray(d.clips) ? d.clips : [],
    audioClips: Array.isArray(d.audioClips) ? d.audioClips : [],
    global_prompt: d.global_prompt || "",
    use_global_prompt: d.use_global_prompt !== false,
    use_custom_audio: !!d.use_custom_audio,
    fps: parseInt(d.fps, 10) || 24,
    resolution_preset: d.resolution_preset || "1280x720 (16:9) (横屏)",
    use_custom_resolution: !!d.use_custom_resolution,
    custom_width: parseInt(d.custom_width, 10) || 1024,
    custom_height: parseInt(d.custom_height, 10) || 1024,
    noise_seed: (d.noise_seed === null || d.noise_seed === undefined || d.noise_seed === "") ? null : parseInt(d.noise_seed, 10),
    filename_prefix: d.filename_prefix || "spb_video",
    epsilon: (typeof d.epsilon === "number") ? d.epsilon : 0.5,
    workflow_key: d.workflow_key === "hd_director" ? "hd_director" : "director",
    timeUnit: d.timeUnit === "frame" ? "frame" : "sec",
    selectedClipId: d.selectedClipId != null ? d.selectedClipId : null,
    pending: Array.isArray(d.pending) ? d.pending : [],
  });
}

/* 自动左对齐：片段按 start 排序后紧密衔接 */
function autoAlignClips() {
  if (dirState.clips.length === 0) return;
  dirState.clips.sort((a, b) => a.start - b.start);
  let cursor = 0;
  dirState.clips.forEach(c => { c.start = cursor; cursor += c.duration; });
}

/* 秒/帧 显示 */
function fmtDur(sec) {
  if (dirState.timeUnit === "frame") return Math.round(sec * dirState.fps) + "f";
  return sec.toFixed(2) + "s";
}

/* ---- 段「长度」数值文本框 ↔ duration(秒) 换算（单位由 timeUnit 决定） ----
   帧模式：文本框显示/接收 帧数（= 秒*fps，整数）；秒模式：显示/接收 秒。 */
function segLenNumStep() { return dirState.timeUnit === "frame" ? "1" : "0.5"; }
function segLenNumVal(sec) {
  return dirState.timeUnit === "frame" ? String(Math.round(sec * dirState.fps)) : String(Number(sec.toFixed(2)));
}
/* 文本框输入值 → duration(秒)。帧模式：帧/fps；秒模式：直接秒。下限 0.5s。 */
function segLenInputToSec(raw) {
  let v = parseFloat(raw);
  if (!isFinite(v) || v < 0) v = 0;
  let sec = dirState.timeUnit === "frame" ? (v / Math.max(1, dirState.fps)) : v;
  return Math.max(0.5, Math.round(sec * 1000) / 1000);
}

/* ---------- 图片池 ---------- */
function poolAdd(paths) {
  let added = 0;
  (paths || []).forEach(p => {
    const np = String(p).replace(/\\/g, "/").trim();
    if (np && !dirState.pool.includes(np)) { dirState.pool.push(np); added++; }
  });
  return added;
}

function renderImagePool() {
  const pool = document.getElementById("imagePool");
  const addBtn = document.getElementById("poolAddBtn");
  pool.querySelectorAll(".pool-thumb:not(.add-btn), .pool-empty-hint").forEach(el => el.remove());
  if (!dirState.pool.length) {
    const hint = document.createElement("div");
    hint.className = "pool-empty-hint";
    hint.textContent = "图片池为空。点「＋ 批量导入图片」选真实文件，再拖到时间轴。";
    pool.insertBefore(hint, addBtn);
  }
  dirState.pool.forEach((path) => {
    const thumb = document.createElement("div");
    thumb.className = "pool-thumb";
    thumb.title = path;
    thumb.draggable = true;
    thumb.innerHTML =
      `<img class="pool-img" src="${mediaUrl(path)}" alt="" onerror="this.style.visibility='hidden'">` +
      `<div class="pool-name">${baseName(path)}</div>` +
      `<button class="pool-del" title="从池移除">✕</button>`;
    thumb.addEventListener("dragstart", e => {
      e.dataTransfer.setData("text/plain", "pool:" + path);
      e.dataTransfer.effectAllowed = "copy";
    });
    thumb.addEventListener("click", (e) => {
      if (e.target.classList.contains("pool-del")) {
        dirState.pool = dirState.pool.filter(p => p !== path);
        renderImagePool(); dirSave(); return;
      }
      addClipFromPath(path);
    });
    pool.insertBefore(thumb, addBtn);
  });
}

/* ---------- 时间轴刻度 ---------- */
function renderRuler() {
  const ruler = document.getElementById("timelineRuler");
  ruler.innerHTML = "";
  const maxEnd = Math.max(
    0,
    ...dirState.clips.map(c => c.start + c.duration),
    ...dirState.audioClips.map(c => c.start + c.duration)
  ) || 0;
  const span = Math.max(maxEnd, 20);
  const totalW = span * TIME_SCALE + 100;
  ruler.style.width = totalW + "px";
  document.getElementById("timelineTrack").style.width = totalW + "px";
  document.getElementById("audioTrack").style.width = totalW + "px";
  for (let s = 0; s <= span + 2; s++) {
    const tick = document.createElement("div");
    tick.className = "tick" + (s % 5 === 0 ? " major" : "");
    tick.style.left = (s * TIME_SCALE) + "px";
    tick.textContent = dirState.timeUnit === "frame" ? (s * dirState.fps) + "f" : s + "s";
    ruler.appendChild(tick);
  }
}

/* ---------- 创建片段 DOM ---------- */
function createClipBlock(c, type) {
  const block = document.createElement("div");
  block.className = type === 'video' ? ("clip-block" + (c.type === "text" ? " txt" : "")) : "audio-clip";
  block.dataset.clipId = c.id;
  block.dataset.type = type;
  block.style.left = (c.start * TIME_SCALE) + "px";
  block.style.width = Math.max(c.duration * TIME_SCALE, 60) + "px";
  if (type === 'video' && c.id === dirState.selectedClipId) block.classList.add("active");

  if (type === 'video') {
    const firstLine = (c.prompt || "").split("\n")[0] || "";
    const label = firstLine.replace(/^画面[：:]/, "").trim().substring(0, 40) || (c.type === "text" ? "纯文本段" : "未设提示词");
    const thumb = (c.type === "image" && c.path)
      ? `<img class="clip-thumb" src="${mediaUrl(c.path)}" alt="" onerror="this.style.visibility='hidden'">`
      : `<span class="clip-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:9px;">${c.type === "text" ? "T2V" : "无图"}</span>`;
    block.innerHTML = `
      <span class="clip-dot"></span>
      ${thumb}
      <span class="clip-label">${label}${label.length >= 40 ? "…" : ""}</span>
      <span class="clip-dur">${fmtDur(c.duration)}</span>
      <button class="clip-del" title="删除片段">✕</button>
      <div class="resize-handle left"></div>
      <div class="resize-handle right"></div>`;
  } else {
    block.innerHTML = `
      <span>🎵</span>
      <span class="audio-name" title="${c.path || ''}">${c.path ? baseName(c.path) : "音频"}</span>
      <span class="audio-wave"></span>
      <span class="clip-dur">${fmtDur(c.duration)}</span>
      <button class="clip-del" title="删除音频">✕</button>
      <div class="resize-handle left"></div>
      <div class="resize-handle right"></div>`;
  }
  return block;
}

function renderTimeline() {
  const track = document.getElementById("timelineTrack");
  const empty = document.getElementById("timelineEmpty");
  const line = document.getElementById("alignLine");
  track.querySelectorAll(".clip-block").forEach(el => el.remove());
  track.appendChild(line);
  if (dirState.clips.length === 0) { empty.style.display = "flex"; }
  else { empty.style.display = "none"; dirState.clips.forEach(c => track.appendChild(createClipBlock(c, 'video'))); }
}

function renderAudioTrack() {
  const track = document.getElementById("audioTrack");
  const empty = document.getElementById("audioEmpty");
  const label = document.getElementById("audioTrackLabel");
  track.classList.toggle("off", !dirState.use_custom_audio);
  label.classList.toggle("off", !dirState.use_custom_audio);
  track.querySelectorAll(".audio-clip").forEach(el => el.remove());
  if (dirState.audioClips.length === 0) { empty.style.display = "flex"; }
  else { empty.style.display = "none"; dirState.audioClips.forEach(c => track.appendChild(createClipBlock(c, 'audio'))); }
}

/* 总时长口径：各画面段 duration 之和（Σsegment），不含时间轴空隙/空轨/音轨 span。 */
function totalSegSeconds() {
  return dirState.clips.reduce((s, c) => s + c.duration, 0);
}
function updateTotalDuration() {
  const total = totalSegSeconds();
  const frames = Math.round(total * dirState.fps);
  document.getElementById("totalDuration").textContent =
    `片段 ${dirState.clips.length} · 总时长：${frames}f / ${total.toFixed(2)} s`;
}

/* ---------- 片段操作 ---------- */
function addClipFromPath(path) {
  const c = {
    id: genId(), type: "image", path: path || null,
    start: 0, duration: 1, prompt: `画面：\n运镜：\n音效：`, guide: 1.0,
    shotNo: path ? baseName(path).replace(/\.[^.]+$/, "") : "",
  };
  dirState.clips.push(c);
  dirState.selectedClipId = c.id;
  refreshAll(); renderSegEditor();
}
function addTextClip() {
  const c = { id: genId(), type: "text", path: null, start: 0, duration: 1,
    prompt: `画面：\n运镜：\n音效：`, guide: 1.0, shotNo: "TXT" };
  dirState.clips.push(c); dirState.selectedClipId = c.id;
  refreshAll(); renderSegEditor();
}
function deleteClip(id) {
  dirState.clips = dirState.clips.filter(c => c.id !== id);
  if (dirState.selectedClipId === id) dirState.selectedClipId = dirState.clips.length ? dirState.clips[0].id : null;
  refreshAll(); renderSegEditor();
}
function selectClip(id) { dirState.selectedClipId = id; renderTimeline(); renderSegEditor(); dirSave(); }
function getClip(id) { return dirState.clips.find(c => c.id === id); }

/* ---------- 音频操作 ---------- */
function addAudioClip(path) {
  const start = dirState.audioClips.length ? Math.max(...dirState.audioClips.map(c => c.start + c.duration)) : 0;
  dirState.audioClips.push({ id: genId(), path: path || null, start, duration: 3 });
  if (!dirState.use_custom_audio) { dirState.use_custom_audio = true; document.getElementById("chkCustomAudio").checked = true; }
  refreshAll();
}

/* ---------- 当前段编辑器 ---------- */
function renderSegEditor() {

    <div class="seg-imgrow">

    </div>
    <div class="seg-imgrow" ${isImg ? "" : 'style="display:none;"'}>

    <div class="prompt-tag">Prompt（本段 local_prompt）</div>

    <div class="examples">
      <span class="lab">范例：</span>
      ${LTX_TEMPLATES.map(t => `<span class="chip" data-tpl="${t.id}" title="${t.title}">${t.name}</span>`).join("")}
    </div>

      <div class="grp">

        <span class="seg-len-unit" id="segLenUnit">${dirState.timeUnit === "frame" ? "帧" : "秒"}</span>
        <span id="segLenFrames" style="color:var(--faint);font-size:11px">(${frames}f)</span>
      </div>
      <div class="grp">
        <label>Guide</label>
        <input type="range" id="segGuide" min="0" max="1" step="0.05" value="${c.guide}">
        <span class="rngval g" id="segGuideVal">${Number(c.guide).toFixed(2)}</span>
      </div>

  const pick = root.querySelector("#segImgPick");
  if (pick) pick.addEventListener("click", () => {
    pickNative("files", (paths) => {
      if (!paths || !paths.length) return;
      c.path = String(paths[0]).replace(/\\/g, "/"); c.type = "image";
      poolAdd([c.path]); refreshAll(); renderSegEditor();
    });

  const ta = root.querySelector("#segPrompt");
  ta.addEventListener("input", () => { c.prompt = ta.value; dirSave(); renderTimeline(); });
  root.querySelectorAll(".examples .chip").forEach(chip => {
    chip.addEventListener("click", () => {
      const tpl = LTX_TEMPLATES.find(t => t.id === chip.getAttribute("data-tpl"));
      if (!tpl) return;
      ta.value = tpl.text; c.prompt = tpl.text;
      root.querySelectorAll(".examples .chip").forEach(x => x.classList.remove("active"));
      chip.classList.add("active");

  const len = root.querySelector("#segLen");
  const lenNum = root.querySelector("#segLenNum");
  // 同步「帧/秒提示」+ 数值框，但不在用户正编辑的框上覆盖光标
  function syncSegLenUI(skipNum) {
    root.querySelector("#segLenFrames").textContent = "(" + Math.round(c.duration * dirState.fps) + "f)";
    len.value = c.duration;

  len.addEventListener("input", () => {

  lenNum.addEventListener("input", () => {
    c.duration = segLenInputToSec(lenNum.value);

  lenNum.addEventListener("blur", () => { lenNum.value = segLenNumVal(c.duration); });
  const g = root.querySelector("#segGuide");
  g.addEventListener("input", () => {
    c.guide = parseFloat(g.value);
    root.querySelector("#segGuideVal").textContent = c.guide.toFixed(2); dirSave();
  });
  const sn = root.querySelector("#segShotNo");
  sn.addEventListener("input", () => { c.shotNo = sn.value; dirSave(); });
}

/* ---------- 全局刷新 ---------- */
function refreshAll() {
  autoAlignClips();
  renderRuler();
  renderTimeline();
  renderAudioTrack();
  updateTotalDuration();
  attachClipEvents();
  dirSave();
}

/* ---------- 拖拽 / 拉伸 ---------- */
let dragInfo = null;
const alignLine = () => document.getElementById("alignLine");

function pxToTime(px) { return px / TIME_SCALE; }

function snapPosition(proposedStart, proposedEnd, ignoreId, allClips) {
  const snaps = [];
  allClips.forEach(c => { if (c.id === ignoreId) return; snaps.push({ pos: c.start }, { pos: c.start + c.duration }); });
  for (let i = 0; i <= 120; i += 0.5) snaps.push({ pos: i });
  let bestStart = proposedStart, bestEnd = proposedEnd, snapUsed = false;
  snaps.forEach(s => {
    if (Math.abs(proposedStart - s.pos) * TIME_SCALE < SNAP_THRESHOLD) { bestStart = s.pos; snapUsed = true; }
    if (Math.abs(proposedEnd - s.pos) * TIME_SCALE < SNAP_THRESHOLD) { bestEnd = s.pos; snapUsed = true; }
  });
  return { start: bestStart, end: bestEnd, snapped: snapUsed };
}

function onDragStart(e, clipEl, type) {
  e.stopPropagation();
  const clipId = clipEl.dataset.clipId;
  const clipsArr = type === 'video' ? dirState.clips : dirState.audioClips;
  const clip = clipsArr.find(c => String(c.id) === String(clipId));
  if (!clip) return;
  const mode = e.target.classList.contains('resize-handle')
    ? (e.target.classList.contains('left') ? 'resize-left' : 'resize-right') : 'move';
  dragInfo = { clipEl, clipId, clipsArr, startX: e.clientX, origStart: clip.start, origDuration: clip.duration, mode, minDuration: 0.5 };
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  e.preventDefault();
}

function onDragMove(e) {
  if (!dragInfo) return;
  const { clipEl, origStart, origDuration, mode, clipsArr, clipId } = dragInfo;
  const deltaX = e.clientX - dragInfo.startX;
  let newStart = origStart, newDuration = origDuration;
  if (mode === 'move') newStart = Math.max(0, origStart + pxToTime(deltaX));
  else if (mode === 'resize-left') {
    let newLeftPx = Math.max(0, origStart * TIME_SCALE + deltaX);
    newStart = pxToTime(newLeftPx);
    newDuration = origDuration + (origStart - newStart);
    if (newDuration < dragInfo.minDuration) { newDuration = dragInfo.minDuration; newStart = origStart + origDuration - dragInfo.minDuration; }
  } else if (mode === 'resize-right') newDuration = Math.max(dragInfo.minDuration, origDuration + pxToTime(deltaX));
  const proposedEnd = newStart + newDuration;
  const { start: ss, end: se, snapped } = snapPosition(newStart, proposedEnd, clipId, clipsArr);
  if (snapped) { newStart = ss; newDuration = se - ss; }
  clipEl.style.left = (newStart * TIME_SCALE) + "px";
  clipEl.style.width = Math.max(newDuration * TIME_SCALE, 60) + "px";
  const durEl = clipEl.querySelector('.clip-dur'); if (durEl) durEl.textContent = fmtDur(newDuration);
  const al = alignLine();
  al.style.display = snapped ? 'block' : 'none';
  if (snapped) {
    const endSnapped = Math.abs(se - proposedEnd) > 0.0001;
    al.style.left = (endSnapped ? se : ss) * TIME_SCALE + "px";
  }
}

function onDragEnd() {
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  alignLine().style.display = 'none';
  if (!dragInfo) return;
  const { clipId, clipsArr, clipEl } = dragInfo;
  const clip = clipsArr.find(c => String(c.id) === String(clipId));
  if (!clip) { dragInfo = null; return; }
  clip.start = Math.round(parseFloat(clipEl.style.left) / TIME_SCALE * 100) / 100;
  clip.duration = Math.max(0.5, Math.round(parseFloat(clipEl.style.width) / TIME_SCALE * 100) / 100);
  refreshAll();
  if (String(clipId) === String(dirState.selectedClipId)) renderSegEditor();
  dragInfo = null;
}

function attachClipEvents() {
  document.querySelectorAll('.clip-block, .audio-clip').forEach(el => {
    if (el.dataset.eventsAttached) return;
    el.dataset.eventsAttached = '1';
    el.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('clip-del')) {
        const id = el.dataset.clipId;
        if (el.dataset.type === 'video') deleteClip(id);
        else { dirState.audioClips = dirState.audioClips.filter(c => String(c.id) !== String(id)); refreshAll(); }
        return;
      }
      if (!e.target.classList.contains('resize-handle') && el.dataset.type === 'video') selectClip(el.dataset.clipId);
      onDragStart(e, el, el.dataset.type);
    });
  });
}

/* ---------- 提交校验 + body 组装 ---------- */
function dirValidate() {
  if (!PROJECT_DIR) return [false, "未选择项目，请先在首页选择/打开一个项目。"];
  if (!dirState.clips.length) return [false, "至少需要 1 段画面。"];
  if (!(dirState.fps >= 1 && dirState.fps <= 120)) return [false, `fps 越界（${dirState.fps}，需 1-120）。`];
  if (!(dirState.epsilon >= 0 && dirState.epsilon <= 1)) return [false, `Epsilon 越界（${dirState.epsilon}，需 0-1）。`];
  for (let i = 0; i < dirState.clips.length; i++) {
    const c = dirState.clips[i];
    if (c.duration < 0.5) return [false, `片段 ${i + 1} 长度过短。`];
    if (c.type === "image" && !(c.path && c.path.trim())) return [false, `片段 ${i + 1} 是图片段但未绑定首帧/参考图。`];
    if (!(c.guide >= 0 && c.guide <= 1)) return [false, `片段 ${i + 1} Guide 越界。`];
  }
  if (dirState.use_custom_audio) for (let j = 0; j < dirState.audioClips.length; j++)
    if (!(dirState.audioClips[j].path && dirState.audioClips[j].path.trim())) return [false, `音频段 ${j + 1} 路径为空。`];
  return [true, ""];
}

function dirBuildBody() {
  const fps = dirState.fps;
  const aspect = dirState.use_custom_resolution ? `${dirState.custom_width}x${dirState.custom_height}` : dirState.resolution_preset;
  // 总时长口径 = 各段 duration 之和（Σsegment），不含时间轴空隙/空轨。
  const totalSec = totalSegSeconds();
  const totalFrames = dirState.clips.reduce((s, c) => s + Math.max(1, Math.round(c.duration * fps)), 0);
  return {
    mode: dirState.workflow_key,                 // director | hd_director
    fps: fps,
    total_length: totalFrames,                   // Σ段帧数（提交口径，不含空隙）
    total_duration: totalSec,                    // Σ段秒数
    aspect: aspect,
    out_dir: PROJECT_DIR + "/video",
    base_name: dirState.filename_prefix || "spb_video",
    noise_seed: dirState.noise_seed,
    segments: dirState.clips.map(c => ({
      local_prompt: c.prompt || "",
      length: Math.max(1, Math.round(c.duration * fps)),   // 帧数
      image_path: c.type === "image" ? (c.path || null) : null,
      segment_type: c.type,                                 // "image" | "text"
      guide_strength: c.guide,
      seg_id: c.id,
      shot_no: c.shotNo || "",
    })),
    // 扩展后契约的全 LTXDirectorSpec 字段
    global_prompt: dirState.global_prompt || "",
    use_global: dirState.use_global_prompt,
    use_global_prompt: dirState.use_global_prompt,
    audio_segments: dirState.use_custom_audio
      ? dirState.audioClips.map(a => ({ path: a.path, start: Math.round((a.start || 0) * fps), length: Math.round((a.duration || 0) * fps) }))
      : [],
    use_custom_audio: dirState.use_custom_audio,
    frame_rate: fps,
    resolution: aspect,
    use_custom_resolution: dirState.use_custom_resolution,
    custom_w: dirState.custom_width,
    custom_h: dirState.custom_height,
    epsilon: dirState.epsilon,
    filename_prefix: dirState.filename_prefix || "spb_video",
  };
}

/* 后台任务韧性：扫描 video/ 目录发现已完成产物，清除已恢复的 pending */
async function recoverPendingTasks() {
  const pending = dirState.pending.filter(p => p.kind === "dirGenerateAll");
  if (!pending.length) { dirState.pending = []; dirSave(); return; }

  setStatus("busy", "恢复未完成的任务…");
  try {
    const qp = new URLSearchParams({ project: PROJECT_DIR, sub: "video", ext: "mp4" });
    const r = await fetch(MEDIA_API + "/project/clips?" + qp.toString());
    const j = (r && r.ok) ? await r.json().catch(() => null) : null;
    const files = (j && Array.isArray(j.files)) ? j.files : [];

    if (files.length) {
      const latest = files.sort((a, b) => {
        const na = (a && a.mtime) || (a && a.name) || "";
        const nb = (b && b.mtime) || (b && b.name) || "";
        return String(nb).localeCompare(String(na));
      })[0];
      const slot = document.getElementById("dirResult");
      renderVideoOk(slot, { output: latest.path || latest });
      setStatus("idle", "已恢复：上次生成产物可见");
    }
  } catch (_) {}

  dirState.pending = dirState.pending.filter(p => p.kind !== "dirGenerateAll");
  dirSave();
  if (dirState.pending.length) setStatus("idle", "空闲");
  else {
    const el = document.getElementById("statusText");
    if (el && el.classList.contains("busy")) { el.className = "status idle"; el.textContent = "空闲"; }
  }
}

async function dirGenerateAll() {
  const btn = document.getElementById("btnSubmit");
  const slot = document.getElementById("dirResult");
  if (btn.dataset.busy === "1") return;
  const [ok, msg] = dirValidate();
  if (!ok) { setStatus("err", msg); renderVideoErr(slot, { hint: msg }); return; }
  btn.dataset.busy = "1"; btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = "⏳ 生成中…"; setStatus("busy", "生成中…（整条时间轴，耗时较长）");
  slot.innerHTML = "";

  // 后台任务韧性：写入 pending 记录，页面重载后可扫描产物恢复
  const pendId = genId();
  dirState.pending.push({ id: pendId, kind: "dirGenerateAll", startedAt: performance.now() });
  dirSave();

  try {
    const res = await runVideoLtx({ __timeline: true, body: dirBuildBody() });
    renderVideoOk(slot, res);
    btn.textContent = "✓ 已生成"; setStatus("idle", "完成");
  } catch (err) {
    renderVideoErr(slot, err);
    btn.textContent = "⚠ 生成失败"; setStatus("err", (err && (err.hint || err.message)) || "生成失败");
  }

  dirState.pending = dirState.pending.filter(p => p.id !== pendId);
  dirSave();

  setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.dataset.busy = ""; setStatus("idle", "空闲"); }, 2000);
}

/* ================================================================
   ===== 模式2 · 剧集分镜对齐（对齐真实分镜：SHOT 卡列表） =====
   读真实 分镜_E{id}.json（共享契约：MEDIA_API /project/files + /file），
   按 shots 顺序渲染 SHOT 卡（不再用静态假数据）。无分镜→友好空态。
   ================================================================ */
const PLACEHOLDER = "点「✦ 生成提示词」由 AI 看图生成 LTX 视频提示词，或先选「范例」模板填入再编辑…";

/* 模式2 真实状态：
   episodes [{id, path, file}]（来自 列集/读分镜 推断）；
   activeEp 当前集 id；shots 当前集渲染用镜头数组（已规整字段）。 */
const sbState = { episodes: [], activeEp: EPISODE_ID, shots: [], title: "", aspectRatio: "", shotImages: {} };

/* 一个 shot 缩略图候选字段（分镜 JSON 若有出图产物路径则用之，否则空） */
function shotFrame(s) {
  if (!s || typeof s !== "object") return "";
  return s.mediaUrl || s.media_url || s.image || s.firstFrame || s.first_frame || s.frame || s.path || "";
}

/* [画幅] 解析 aspectRatio 字符串（如 "16:9"/"9:16"/"1:1"/"4:5"）→ CSS aspect-ratio 值（"W / H"）。
   非法/缺省 → 退回竖屏 "9 / 16"（与原写死行为一致）。 */
function aspectCss(ar) {
  const m = String(ar || "").trim().match(/^(\d+(?:\.\d+)?)\s*[:：/xX×]\s*(\d+(?:\.\d+)?)$/);
  if (m) {
    const w = parseFloat(m[1]), h = parseFloat(m[2]);
    if (w > 0 && h > 0) return w + " / " + h;
  }
  return "9 / 16";
}
/* 该 aspect-ratio 是否为横屏（W>H）→ 用于给 .shot 加 .wide 拓宽缩略图列。 */
function aspectIsWide(ar) {
  const m = String(ar || "").trim().match(/^(\d+(?:\.\d+)?)\s*[:：/xX×]\s*(\d+(?:\.\d+)?)$/);
  return !!(m && parseFloat(m[1]) > parseFloat(m[2]));
}

/* [出图发现] 按 [出图产物约定] 列 imggen 目录、过滤 shot_{shotId}_ 前缀，
   发现该镜头已生成的分镜图（取最后一张 = 最新批次的最末序号）。
   返回 { shotId(原始字符串) → path }；列目录失败 → 空映射。切集/进页都重新发现。 */
async function discoverShotImages() {
  const map = {};
  if (!PROJECT_DIR || !MEDIA_API) return map;
  try {
    const r = await fetch(MEDIA_API + "/project/files?" + new URLSearchParams({
      project: PROJECT_DIR, sub: "imggen", ext: "png,jpg",
    }));
    if (!r.ok) return map;
    const j = await r.json().catch(() => null);
    const files = (j && Array.isArray(j.files)) ? j.files : [];
    // 文件名形如 shot_{shotId}_NN.png；按名排序后取每个 shotId 的最后一张
    const buckets = {};   // shotId → [{name, path}]
    files.forEach((f) => {
      const name = (f && f.name) || "";
      const m = name.match(/^shot_(.+?)_(\d+)\.(?:png|jpg|jpeg)$/i);
      if (!m) return;
      const sid = m[1];
      (buckets[sid] = buckets[sid] || []).push({ name, path: (f && f.path) || name });
    });
    Object.keys(buckets).forEach((sid) => {
      const arr = buckets[sid].sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
      map[sid] = arr[arr.length - 1].path;   // 最末序号 = 最新一张
    });
  } catch (_) {}
  return map;
}
function shotMeta(s) {
  const m = [];
  if (s.composition) m.push(String(s.composition));
  const dur = (typeof s.duration === "number") ? s.duration : parseFloat(s.duration);
  if (!isNaN(dur) && dur > 0) m.push(dur + "s");
  return m;
}
function shotDesc(s) {
  return String(s.description || s.stylePrompt || "").trim() || "（无描述）";
}

/* [列集] 优先 剧本_E*.md 推断集列表；其次 分镜_E*.json；旧 分镜.json→E1。
   返回 [{id, path}]（按集号升序），并回填 #sceneSelect 下拉。 */
async function listEpisodes() {
  const out = {};   // id → {id, path}
  if (PROJECT_DIR && MEDIA_API) {
    // 1) 剧本_E*.md（推断集列表）
    try {
      const r = await fetch(MEDIA_API + "/project/files?" + new URLSearchParams({ project: PROJECT_DIR, ext: "md" }));
      if (r.ok) {
        const j = await r.json().catch(() => null);
        (j && Array.isArray(j.files) ? j.files : []).forEach((f) => {
          const m = (f && f.name || "").match(/^剧本_(E\d+)\.md$/);
          if (m) out[m[1]] = { id: m[1], path: f.path || f.name };
        });
      }
    } catch (_) {}
    // 2) 分镜_E*.json（兜底+取分镜路径）
    try {
      const r = await fetch(MEDIA_API + "/project/files?" + new URLSearchParams({ project: PROJECT_DIR, ext: "json" }));
      if (r.ok) {
        const j = await r.json().catch(() => null);
        (j && Array.isArray(j.files) ? j.files : []).forEach((f) => {
          const name = f && f.name || "";
          const m = name.match(/^分镜_(E\d+)\.json$/);
          const id = m ? m[1] : (name === "分镜.json" ? "E1" : null);
          if (id && !out[id]) out[id] = { id, path: f.path || name };
        });
      }
    } catch (_) {}
  }
  const list = Object.values(out).sort(
    (a, b) => (parseInt((a.id || "").slice(1), 10) || 0) - (parseInt((b.id || "").slice(1), 10) || 0)
  );
  sbState.episodes = list;

  const sel = document.getElementById("sceneSelect");
  if (sel) {
    if (list.length) {
      sel.innerHTML = list.map((e) => `<option value="${e.id}">${e.id}${e.title ? " " + e.title : ""}</option>`).join("");
      if (!list.some((e) => e.id === sbState.activeEp)) sbState.activeEp = list[0].id;
      sel.value = sbState.activeEp;
    } else {
      sel.innerHTML = `<option value="${EPISODE_ID}">${EPISODE_ID}（无分镜）</option>`;
    }
  }
  return list;
}

/* [读分镜] 读单集 分镜_E{id}.json → 规整 shots 写入 sbState；解析失败→空。 */
async function loadStoryboard(epId) {
  sbState.activeEp = epId;
  sbState.shots = []; sbState.title = ""; sbState.aspectRatio = ""; sbState.shotImages = {};
  if (!PROJECT_DIR || !MEDIA_API) return [];

  // 先用 列集 已知路径，否则按命名约定拼 分镜_E{id}.json
  let path = "";
  const hit = sbState.episodes.find((e) => e.id === epId);
  // 列集里 path 可能是 剧本_E*.md，分镜需独立文件名
  if (hit && /分镜_E\d+\.json$/.test(hit.path || "")) path = hit.path;
  if (!path) path = "分镜_" + epId + ".json";

  let sb = null;
  try {
    const r = await fetch(MEDIA_API + "/file?" + new URLSearchParams({ path, project: PROJECT_DIR }));
    if (r.ok) sb = JSON.parse(await r.text());
  } catch (_) { sb = null; }
  // 旧 分镜.json 兜底（仅 E1）
  if (!sb && epId === "E1") {
    try {
      const r = await fetch(MEDIA_API + "/file?" + new URLSearchParams({ path: "分镜.json", project: PROJECT_DIR }));
      if (r.ok) sb = JSON.parse(await r.text());
    } catch (_) { sb = null; }
  }
  if (sb && typeof sb === "object") {
    sbState.title = sb.title || "";
    sbState.aspectRatio = sb.aspectRatio || "";
    sbState.shots = Array.isArray(sb.shots) ? sb.shots : [];
  }
  // 发现已生成分镜图（imggen/shot_{shotId}_NN）—— 切集/进页都重新发现
  sbState.shotImages = await discoverShotImages();
  return sbState.shots;
}

/* 渲染当前集 shots → SHOT 卡（对齐真实分镜）。data-shot 用 1..N 顺序号，
   data-shotid 存真实 shotId，以便提示词回填/i2v 取首帧对齐。 */
function renderShots() {
  const root = document.getElementById("shots");
  if (!root) return;
  const shots = sbState.shots || [];
  if (!shots.length) {
    root.innerHTML = `
      <div class="shot" style="justify-content:center;text-align:center;">
        <div class="body" style="align-items:center;gap:8px;">
          <div class="meta" style="font-size:14px;color:var(--fg2);">该集暂无分镜数据</div>
          <div style="color:var(--faint);font-size:12.5px;line-height:1.7;">
            请先到「③ 分镜板」生成本集分镜（分镜_${sbState.activeEp}.json），<br>
            或在上方下拉切换到已生成分镜的剧集。
          </div>
        </div>
      </div>`;
    return;
  }
  root.innerHTML = "";
  // 画幅自适应：缩略图 aspect-ratio 按本集分镜 aspectRatio 动态设置（不再写死 9/16）
  const arCss = aspectCss(sbState.aspectRatio);
  const wide = aspectIsWide(sbState.aspectRatio);
  shots.forEach((s, i) => {
    const n = i + 1;                               // 顺序号（卡片/回填用）
    const shotId = (s.shotId != null && s.shotId !== "") ? String(s.shotId) : String(n);
    // 缩略图：优先已生成的分镜图（imggen/shot_{shotId}_NN），无则退回分镜 JSON 内字段，再无则占位
    const frame = sbState.shotImages[shotId] || shotFrame(s);
    const meta = shotMeta(s);
    const desc = shotDesc(s);
    const card = document.createElement("div");
    card.className = "shot" + (wide ? " wide" : "");
    const metaHtml = meta.length
      ? meta.map((m, mi) => mi === meta.length - 1 ? `<span class="dur">${m}</span>` : `<span>${m}</span>`).join('<span class="sep">·</span>')
      : `<span style="color:var(--faint);">无构图/时长信息</span>`;
    const descHtml = String(desc).replace(/[<>&]/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c])).replace(/\n/g, "<br>");
    const thumbInner = frame
      ? `<img src="${mediaUrl(frame)}" alt="" onerror="this.style.display='none'"><div class="ph">${descHtml}</div>`
      : `<div class="ph">${descHtml}</div>`;
    card.innerHTML = `
      <div class="thumb" style="aspect-ratio:${arCss};">
        ${thumbInner}
        <div class="ord">第 ${n} 个 · 自动对齐</div>
        <div class="tag">SHOT ${shotId}</div>
      </div>
      <div class="body">
        <div class="meta">${metaHtml}</div>
        <div class="prompt-label">
          <span class="name">LTX 2.3 视频提示词</span>
          <span class="ltx-pill">单段流式 · 现在时 · 长度∝时长</span>
        </div>
        <textarea class="pane2-textarea" data-shot="${n}" data-shotid="${shotId}" placeholder="${PLACEHOLDER}">${s.stylePrompt ? String(s.stylePrompt).replace(/[<>&]/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c])) : ""}</textarea>
        <div class="examples" data-shot="${n}">
          <span class="lab">范例：</span>
          ${LTX_TEMPLATES.map(t => `<span class="chip" data-tpl="${t.id}" title="${t.title}">${t.name}</span>`).join("")}
        </div>
        <div class="actions">
          <button class="btn-gen" data-act="gen" data-shot="${n}">✦ 生成提示词</button>
          <button class="btn-save" data-act="save" data-shot="${n}">保存</button>
          <span class="grow"></span>
          <button class="btn-i2v" data-act="i2v" data-shot="${n}">► 图生视频</button>
        </div>
        <div class="vid-result" data-result="${n}"></div>
      </div>`;
    root.appendChild(card);
  });
}

/* 把 /video_prompt 的 shots 结果按顺序回填到真实卡（对齐分镜）。
   优先按 shotId 匹配；匹配不到则退化为顺序号（卡 n=1..N 对应 data shots[n-1]）。 */
function fillPromptsFromData(data) {
  const tas = Array.from(document.querySelectorAll("#pane2 textarea[data-shot]"));
  if (!tas.length || !data) return;
  tas.forEach((t) => {
    const n = t.getAttribute("data-shot");
    const sid = t.getAttribute("data-shotid");
    // 先按真实 shotId 取，再退化按顺序号取
    let p = sid ? shotPromptFromData(data, sid) : "";
    if (!p) p = shotPromptFromData(data, n);
    if (p) t.value = p;
  });
}

function wireExamples() {
  document.querySelectorAll("#pane2 .examples").forEach((row) => {
    const shotN = row.getAttribute("data-shot");
    const ta = document.querySelector(`textarea[data-shot="${shotN}"]`);
    row.querySelectorAll(".chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        const tpl = LTX_TEMPLATES.find(t => t.id === chip.getAttribute("data-tpl"));
        if (!tpl) return;
        ta.value = tpl.text;
        row.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
      });
    });
  });
}

function wireActions() {
  document.querySelectorAll("#pane2 button[data-act]").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const act = btn.getAttribute("data-act");
      const n = btn.getAttribute("data-shot");
      const ta = document.querySelector(`textarea[data-shot="${n}"]`);
      if (act === "gen") {
        if (btn.dataset.busy === "1") return;
        btn.dataset.busy = "1";
        const orig = btn.textContent;
        const obj = await runVideoPrompt({
          onStatus: (m) => { btn.textContent = "✦ " + m; },
          onShots: (data) => fillPromptsFromData(data),
          onError: (err) => { ta.value = "⚠ " + (err.hint || err.message || "生成失败"); },
        });
        btn.textContent = obj ? "✦ 已生成" : orig;
        setTimeout(() => { btn.textContent = orig; btn.dataset.busy = ""; }, 1400);
      } else if (act === "save") {
        btn.textContent = "已保存 ✓"; setTimeout(() => (btn.textContent = "保存"), 1200);
      } else if (act === "i2v") {
        if (btn.dataset.busy === "1") return;
        btn.dataset.busy = "1";
        const orig = "► 图生视频";
        const slot = document.querySelector(`.vid-result[data-result="${n}"]`);
        const shot = sbState.shots[parseInt(n, 10) - 1] || null;   // 顺序号 → 真实分镜
        const shotId = ta.getAttribute("data-shotid") || n;
        // 首帧：优先已发现的分镜图（imggen/shot_{shotId}_NN），退回分镜 JSON 字段
        const firstFrame = sbState.shotImages[String(shotId)] || (shot ? shotFrame(shot) : "");
        const shotDuration = (shot && typeof shot.duration === "number") ? shot.duration : parseFloat(shot && shot.duration) || null;
        btn.disabled = true; btn.textContent = "⏳ 生成中…";
        if (slot) slot.innerHTML = "";
        try {
          const res = await runVideoLtx({
            prompt: ta.value, firstFrame: firstFrame,
            baseName: "shot_" + shotId, mode: wfToMode(document.getElementById("workflowSelect2").value),
            duration: shotDuration,
          });
          renderVideoOk(slot, res); btn.textContent = "✓ 已生成";
        } catch (err) { renderVideoErr(slot, err); btn.textContent = "⚠ 生成失败"; }
        setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.dataset.busy = ""; }, 1600);
      }
    });
  });
}

function wireMode2Extract() {
  const btn = document.getElementById("btnExtract2");
  btn.addEventListener("click", async () => {
    if (btn.dataset.busy === "1") return;
    btn.dataset.busy = "1";
    const orig = btn.textContent;
    if (!sbState.shots.length) { btn.textContent = "无分镜可提取"; setTimeout(() => { btn.textContent = orig; btn.dataset.busy = ""; }, 1600); return; }
    await runVideoPrompt({
      onStatus: (m) => { btn.textContent = "✦ " + m; },
      onShots: (data) => fillPromptsFromData(data),
      onError: () => {},
    });
    btn.textContent = "✦ 已提取";
    setTimeout(() => { btn.textContent = orig; btn.dataset.busy = ""; }, 1400);
  });
  // 模式2 工作流下拉同步 → 模式1 mode
  const wf2 = document.getElementById("workflowSelect2");
  wf2.value = modeToWf(dirState.workflow_key);
  wf2.addEventListener("change", () => {
    dirState.workflow_key = wfToMode(wf2.value);
    const wf1 = document.getElementById("workflowSelect");
    if (wf1) wf1.value = wf2.value;
    dirSave();
  });
}

/* ===== 并行任务下拉切换器（纯前端占位，最多 5 个） ===== */
const MAX_TASKS = 5;
const taskState = { tasks: [{ id: 1, name: "任务1" }], current: 1, nextId: 2 };

function removeTask(id) {
  if (taskState.tasks.length <= 1) return;
  taskState.tasks = taskState.tasks.filter(t => t.id !== id);
  if (id === taskState.current) taskState.current = taskState.tasks[0].id;
  refreshTaskHeader(); renderTaskMenu();
}
function renderTaskMenu() {
  const menu = document.getElementById("taskMenu");
  const atMax = taskState.tasks.length >= MAX_TASKS;
  const onlyOne = taskState.tasks.length <= 1;
  const opts = taskState.tasks.map((t) => {
    const on = t.id === taskState.current;
    const delBtn = (!on && !onlyOne)
      ? `<span style="margin-left:auto;color:var(--err);cursor:pointer;font-size:13px;padding:2px 6px;border-radius:4px;" data-del="${t.id}" title="删除任务">✕</span>`
      : "";
    return `<div class="opt${on ? " active" : ""}" data-task="${t.id}">
      <span class="tick">${on ? "✓" : ""}</span><span>${t.name}</span>
      <span class="sub">${on ? "当前" : "切换"}</span>${delBtn}</div>`;
  }).join("");
  menu.innerHTML = `${opts}
    <div class="sep-line"></div>
    <div class="opt add${atMax ? " disabled" : ""}" id="taskAdd">
      <span class="tick">＋</span><span>新建并行任务</span></div>
    <div class="hint">已达上限：最多 ${MAX_TASKS} 个并行任务</div>`;
  menu.querySelectorAll(".opt[data-task]").forEach((el) => {
    el.addEventListener("click", (e) => {
      // 如果点击的是删除按钮，不执行切换
      if (e.target.closest("[data-del]")) return;
      switchTask(parseInt(el.getAttribute("data-task"), 10)); closeTaskMenu();
    });
  });
  // 绑定删除按钮
  menu.querySelectorAll("[data-del]").forEach((del) => {
    del.addEventListener("click", (e) => {
      e.stopPropagation();
      removeTask(parseInt(del.getAttribute("data-del"), 10));
      closeTaskMenu();
    });
  });
  const addBtn = document.getElementById("taskAdd");
  if (!atMax) addBtn.addEventListener("click", addTask);
}
function refreshTaskHeader() {
  const cur = taskState.tasks.find((t) => t.id === taskState.current);
  document.getElementById("taskCurrent").textContent = cur ? cur.name : "";
  document.getElementById("taskTitle").textContent = cur ? ` · ${cur.name}` : "";
  document.getElementById("taskCount").textContent = `${taskState.tasks.length}/${MAX_TASKS}`;
}
function switchTask(id) { if (!taskState.tasks.some((t) => t.id === id)) return; taskState.current = id; refreshTaskHeader(); renderTaskMenu(); }
function addTask() { if (taskState.tasks.length >= MAX_TASKS) return; const id = taskState.nextId++; taskState.tasks.push({ id, name: `任务${id}` }); taskState.current = id; refreshTaskHeader(); renderTaskMenu(); }
function closeTaskMenu() { document.getElementById("taskWrap").classList.remove("open"); }
function wireTaskSwitch() {
  const wrap = document.getElementById("taskWrap");
  document.getElementById("taskTrigger").addEventListener("click", (e) => { e.stopPropagation(); wrap.classList.toggle("open"); });
  document.addEventListener("click", (e) => { if (!wrap.contains(e.target)) closeTaskMenu(); });
  renderTaskMenu(); refreshTaskHeader();
}

/* ===== 模式2 整体刷新：渲染卡 + 重绑交互 + 对齐提示 ===== */
function refreshMode2() {
  renderShots();
  wireExamples();
  wireActions();
  const note = document.getElementById("alignCount");
  if (note) note.textContent = sbState.shots.length
    ? `已按分镜顺序自动对齐 ${sbState.shots.length} 个镜头`
    : "该集暂无分镜";
}

/* 选集下拉：切集 → 读分镜 → 重渲 */
function wireSceneSelect() {
  const sel = document.getElementById("sceneSelect");
  if (!sel) return;
  sel.addEventListener("change", async () => {
    sel.disabled = true;
    await loadStoryboard(sel.value);
    refreshMode2();
    sel.disabled = false;
  });
}

/* 进模式2/选集：列集 → 读当前集分镜 → 渲染（替换静态假数据） */
async function initMode2() {
  await listEpisodes();
  await loadStoryboard(sbState.activeEp);
  refreshMode2();
}

/* ===== 启动 ===== */
wireModes();
wireDirector();
wireSceneSelect();
wireMode2Extract();
wireTaskSwitch();
renderShots();                 // 首帧占位（数据到达前空态）
initMode2();                   // 异步拉真实分镜后重渲
</script>
