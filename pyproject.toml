[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "shot-prompt-backwards"
version = "0.2.0"
description = "分镜提示词反推桌面应用（PySide6 + shot-master 整合）"
requires-python = ">=3.10"
dependencies = [
    "PySide6>=6.6",
    "python-dotenv>=1.0",
    "Pillow>=10.0",
    "numpy>=1.24",
    "pyyaml>=6.0",
    "google-genai>=0.3",
    "openai>=1.30",
    "anthropic>=0.30",
    "dashscope>=1.17",
    "httpx>=0.27",
    "shot-master @ file:../../shot-master",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.scripts]
shot-prompt-backwards = "app.main:main"

[tool.setuptools.packages.find]
include = ["app*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
